    <style>
      :root {
        /* カワセミ（kingfisher）配色：コバルトブルー × バーントオレンジ */
        --bg: #04111e;
        --bg2: #082336;
        --bg3: #0e3149;
        --surface: #103e58;
        --surface-2: #154d6d;
        --line: rgba(14, 165, 233, 0.2);
        --line-strong: rgba(14, 165, 233, 0.5);

        --text: #e6f4f9;
        --text-muted: #93c5d8;
        --text-dim: #5b8597;

        --primary: #0891b2;
        --primary-light: #22d3ee;
        --primary-deep: #155e75;
        --secondary: #f97316;
        --secondary-light: #fb923c;
        --accent: #fbbf24;
        --gold: #fbbf24;
        --success: #34d399;
        --danger: #fb7185;

        /* 盆栽メタファー：葉色（緑系）と幹／鉢の木色 */
        --leaf: #34d399;
        --leaf-deep: #047857;
        --leaf-soft: rgba(52, 211, 153, 0.18);
        --leaf-line: rgba(52, 211, 153, 0.35);
        --wood: #92400e;
        --wood-light: #b45309;
        --wood-deep: #451a03;
        --soil: #44403c;

        /* 葉と鋏のインライン SVG（::before の background-image で使う） */
        --icon-leaf: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M17 8C8 10 5.9 16.17 3.82 21.34l1.89.66.95-2.3c.48.17.98.3 1.34.3C19 20 22 3 22 3c-1 2-8 2.25-13 3.25S2 11.5 2 13.5s1.75 3.75 1.75 3.75C7 8 17 8 17 8z' fill='%2334d399'/></svg>");
        --icon-leaf-bright: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M17 8C8 10 5.9 16.17 3.82 21.34l1.89.66.95-2.3c.48.17.98.3 1.34.3C19 20 22 3 22 3c-1 2-8 2.25-13 3.25S2 11.5 2 13.5s1.75 3.75 1.75 3.75C7 8 17 8 17 8z' fill='%236ee7b7'/></svg>");
        --icon-leaf-wilt: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M17 8C8 10 5.9 16.17 3.82 21.34l1.89.66.95-2.3c.48.17.98.3 1.34.3C19 20 22 3 22 3c-1 2-8 2.25-13 3.25S2 11.5 2 13.5s1.75 3.75 1.75 3.75C7 8 17 8 17 8z' fill='%23fbbf24'/></svg>");
        --icon-scissors-red: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M9.64 7.64c.23-.5.36-1.05.36-1.64 0-2.21-1.79-4-4-4S2 3.79 2 6s1.79 4 4 4c.59 0 1.14-.13 1.64-.36L10 12l-2.36 2.36C7.14 14.13 6.59 14 6 14c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4c0-.59-.13-1.14-.36-1.64L12 14l7 7h3v-1L9.64 7.64zM6 8c-1.1 0-2-.89-2-2s.9-2 2-2 2 .89 2 2-.9 2-2 2zm0 12c-1.1 0-2-.89-2-2s.9-2 2-2 2 .89 2 2-.9 2-2 2zM19 3l-6 6 2 2 7-7V3z' fill='%23fb7185'/></svg>");
        --icon-scissors-green: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M9.64 7.64c.23-.5.36-1.05.36-1.64 0-2.21-1.79-4-4-4S2 3.79 2 6s1.79 4 4 4c.59 0 1.14-.13 1.64-.36L10 12l-2.36 2.36C7.14 14.13 6.59 14 6 14c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4c0-.59-.13-1.14-.36-1.64L12 14l7 7h3v-1L9.64 7.64zM6 8c-1.1 0-2-.89-2-2s.9-2 2-2 2 .89 2 2-.9 2-2 2zm0 12c-1.1 0-2-.89-2-2s.9-2 2-2 2 .89 2 2-.9 2-2 2zM19 3l-6 6 2 2 7-7V3z' fill='%2334d399'/></svg>");

        --radius: 14px;
        --radius-sm: 8px;
        --shadow: 0 12px 40px rgba(14, 165, 233, 0.22);
        --shadow-strong: 0 0 60px rgba(14, 165, 233, 0.4);

        --pad-x: 20px;
        --pad-bottom: max(80px, env(safe-area-inset-bottom));
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        height: 100%;
      }
      html,
      body {
        overflow-x: hidden;
        max-width: 100%;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      body {
        font-family:
          "Inter", "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic",
          "Noto Sans JP", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        word-wrap: break-word;
        overflow-wrap: break-word;
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      .bg-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .bg-grid {
        background-image:
          linear-gradient(
            to right,
            rgba(14, 165, 233, 0.04) 1px,
            transparent 1px
          ),
          linear-gradient(
            to bottom,
            rgba(14, 165, 233, 0.04) 1px,
            transparent 1px
          );
        background-size: 56px 56px;
        mask-image: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0.85) 0%,
          rgba(0, 0, 0, 0.2) 70%,
          transparent 100%
        );
      }
      .bg-glow1 {
        background: radial-gradient(
          circle at 18% 12%,
          rgba(14, 165, 233, 0.18),
          transparent 55%
        );
      }
      .bg-glow2 {
        background: radial-gradient(
          circle at 82% 88%,
          rgba(52, 211, 153, 0.1),
          transparent 60%
        );
      }
      #particles {
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
        max-width: 880px;
        width: 100%;
        margin: 0 auto;
        padding: 28px var(--pad-x) var(--pad-bottom);
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }
      .brand-mark {
        width: 36px;
        height: 36px;
        border-radius: 9px;
        background: linear-gradient(135deg, var(--leaf), var(--leaf-deep));
        display: flex;
        align-items: center;
        justify-content: center;
        color: #04261b;
        font-weight: 800;
        font-size: 18px;
        box-shadow: 0 0 20px rgba(52, 211, 153, 0.45);
      }
      .brand-text {
        display: flex;
        flex-direction: column;
        line-height: 1.15;
      }
      .brand-name {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.5px;
        color: var(--text);
      }
      .brand-sub {
        font-size: 10.5px;
        color: var(--text-dim);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .lang-toggle {
        display: inline-flex;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px;
        position: relative;
        overflow: hidden;
      }
      .lang-toggle button {
        background: transparent;
        border: 0;
        color: var(--text-muted);
        padding: 7px 14px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        border-radius: 999px;
        transition: color 0.2s;
        position: relative;
        z-index: 1;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        -webkit-tap-highlight-color: transparent;
      }
      .lang-toggle button.active {
        color: #fff;
      }
      .lang-toggle .lang-pill {
        position: absolute;
        top: 3px;
        left: 3px;
        height: calc(100% - 6px);
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        border-radius: 999px;
        transition:
          transform 0.28s ease,
          width 0.28s ease;
        z-index: 0;
        box-shadow: 0 0 16px rgba(14, 165, 233, 0.4);
      }

      .screen {
        display: none;
        animation: fadeIn 0.45s ease;
      }
      .screen.active {
        display: block;
      }

      .start-hero {
        text-align: center;
        margin-top: 6px;
        margin-bottom: 28px;
      }
      .hero-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        font-size: 11px;
        letter-spacing: 2.5px;
        color: var(--leaf);
        background: var(--leaf-soft);
        border: 1px solid var(--leaf-line);
        border-radius: 999px;
        font-weight: 700;
        margin-bottom: 18px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .hero-tag-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--leaf);
        box-shadow: 0 0 8px var(--leaf);
        animation: blink 1.4s infinite;
      }

      /* スタート画面の盆栽イラスト：そよ風で軽く揺れる */
      .bonsai-illustration {
        display: block;
        width: clamp(140px, 26vw, 200px);
        height: auto;
        margin: 0 auto 18px;
        filter: drop-shadow(0 10px 24px rgba(52, 211, 153, 0.22))
          drop-shadow(0 4px 8px rgba(0, 0, 0, 0.35));
        transform-origin: 50% 90%;
        animation: bonsaiSway 6s ease-in-out infinite alternate;
      }
      @keyframes bonsaiSway {
        from {
          transform: rotate(-1.2deg);
        }
        to {
          transform: rotate(1.2deg);
        }
      }
      .hero-title {
        font-size: clamp(22px, 6vw, 44px);
        font-weight: 900;
        letter-spacing: -0.5px;
        line-height: 1.22;
        background: linear-gradient(
          120deg,
          var(--leaf) 8%,
          var(--primary-light) 50%,
          var(--secondary-light) 95%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 12px;
      }
      .hero-sub {
        color: var(--text-muted);
        font-size: clamp(13.5px, 2vw, 15.5px);
        max-width: 620px;
        margin: 0 auto;
      }

      .info-card {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 22px 26px;
        margin-bottom: 22px;
        position: relative;
        overflow: hidden;
      }
      .info-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at top right,
          rgba(52, 211, 153, 0.08),
          transparent 60%
        );
        pointer-events: none;
      }
      .info-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 16px;
        position: relative;
      }
      .info-stat {
        text-align: center;
      }
      .info-stat-num {
        font-size: 26px;
        font-weight: 900;
        background: linear-gradient(135deg, var(--leaf), var(--primary-light));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        font-feature-settings: "tnum";
      }
      .info-stat-label {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 6px;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .rules {
        background: linear-gradient(160deg, var(--bg2), var(--surface));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 24px;
        margin-bottom: 22px;
      }
      .rules-title {
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 14px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .rules-list {
        display: grid;
        gap: 10px;
      }
      .rule-row {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        font-size: 13px;
        line-height: 1.65;
        color: var(--text-muted);
      }
      .rule-icon {
        flex-shrink: 0;
        width: 26px;
        height: 26px;
        border-radius: 7px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 12px;
      }
      .rule-icon.keep {
        background: var(--leaf-soft);
        color: var(--leaf);
        border: 1px solid var(--leaf-line);
      }
      .rule-icon.cut {
        background: rgba(251, 113, 133, 0.12);
        color: var(--danger);
        border: 1px solid rgba(251, 113, 133, 0.32);
      }
      .rule-icon.score {
        background: rgba(34, 211, 238, 0.12);
        color: var(--primary-light);
        border: 1px solid rgba(34, 211, 238, 0.3);
      }
      .rule-row strong {
        color: var(--text);
        font-weight: 700;
      }

      .sources {
        background: linear-gradient(160deg, var(--bg2), var(--surface));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 24px;
        margin-bottom: 26px;
      }
      .sources-title {
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 12px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .source-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .source-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        text-decoration: none;
        color: var(--text-muted);
        font-size: 13px;
        transition: all 0.2s;
      }
      .source-item:hover {
        border-color: var(--leaf);
        color: var(--leaf);
        transform: translateX(2px);
      }
      .source-tag {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 10.5px;
        font-weight: 700;
        color: var(--secondary-light);
        background: rgba(251, 146, 60, 0.1);
        padding: 3px 8px;
        border-radius: 4px;
        flex-shrink: 0;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .source-title {
        flex: 1;
      }
      .source-arrow {
        color: var(--text-dim);
      }

      .start-btn-wrap {
        text-align: center;
      }
      .btn-start {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 16px 36px;
        background: linear-gradient(135deg, var(--leaf), var(--leaf-deep));
        border: 0;
        color: #04261b;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.5px;
        border-radius: 999px;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 8px 32px rgba(52, 211, 153, 0.35);
        position: relative;
        overflow: hidden;
      }
      .btn-start::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          120deg,
          transparent 30%,
          rgba(255, 255, 255, 0.28) 50%,
          transparent 70%
        );
        transform: translateX(-100%);
        transition: transform 0.6s ease;
      }
      .btn-start:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 40px rgba(52, 211, 153, 0.45);
      }
      .btn-start:hover::after {
        transform: translateX(100%);
      }
      .start-note {
        margin-top: 14px;
        color: var(--text-dim);
        font-size: 12px;
      }

      .quiz-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px 12px;
        flex-wrap: wrap;
        margin-bottom: 14px;
        font-size: 12.5px;
      }
      .quiz-counter {
        color: var(--text-muted);
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        letter-spacing: 1px;
      }
      .quiz-counter strong {
        color: var(--leaf);
        font-size: 16px;
        font-weight: 800;
      }
      .quiz-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 12px;
        background: rgba(251, 146, 60, 0.08);
        border: 1px solid rgba(251, 146, 60, 0.25);
        border-radius: 999px;
        color: var(--secondary-light);
        font-size: 11px;
        letter-spacing: 0.5px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      /* 健康ゲージを「鉢の中の土」に見立てる：木の縁＋土色のベース */
      .bonsai-bar {
        margin-bottom: 22px;
        background: linear-gradient(
          180deg,
          rgba(68, 64, 60, 0.6),
          rgba(28, 25, 23, 0.7)
        );
        border: 1px solid var(--wood);
        border-radius: 12px;
        padding: 4px 6px;
        position: relative;
        overflow: hidden;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          inset 0 -2px 0 rgba(0, 0, 0, 0.3),
          0 6px 14px rgba(0, 0, 0, 0.3);
      }
      /* 鉢の脚（左右の小さな台座） */
      .bonsai-bar::before,
      .bonsai-bar::after {
        content: "";
        position: absolute;
        bottom: -4px;
        width: 16px;
        height: 4px;
        background: var(--wood-deep);
        border-radius: 0 0 3px 3px;
      }
      .bonsai-bar::before {
        left: 14%;
      }
      .bonsai-bar::after {
        right: 14%;
      }
      .bonsai-fill {
        height: 10px;
        background: linear-gradient(
          90deg,
          var(--leaf-deep),
          var(--leaf),
          var(--accent)
        );
        background-size: 200% 100%;
        animation: shimmer 4s linear infinite;
        border-radius: 999px;
        width: 0%;
        transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow:
          0 0 12px rgba(52, 211, 153, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.25);
      }
      .bonsai-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 10.5px;
        color: var(--text-dim);
        letter-spacing: 1.2px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        margin-bottom: 6px;
      }
      .bonsai-meta strong {
        color: var(--leaf);
        font-weight: 800;
        font-size: 12px;
      }

      .scenario-card {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 22px 24px;
        margin-bottom: 16px;
        animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .scenario-vuln {

      .scenario-goal {

      .inline-code {

        padding: 1px 5px;
        background: rgba(14, 165, 233, 0.1);
        color: var(--primary-light);
        border-radius: 4px;
        font-size: 92%;

      }

      .poc-block {
        background: var(--bg);
        border: 1px solid var(--line);
        border-left: 3px solid var(--leaf);
        border-radius: var(--radius-sm);
        padding: 12px 8px;
        margin: 16px 0 14px;
        overflow-x: auto;
      }
      .poc-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        font-size: 10.5px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--leaf);
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        margin: 0 6px 10px;
        padding-bottom: 8px;
        border-bottom: 1px dashed var(--leaf-line);
      }
      .poc-head-count {
        color: var(--text-dim);
      }
      .poc-head-count strong {
        color: var(--leaf);
        font-weight: 800;
      }

      .poc-line {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 6px 10px;
        margin: 2px 0;
        border-radius: 6px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 12.5px;
        line-height: 1.55;
        color: var(--text);
        cursor:
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M9.64 7.64c.23-.5.36-1.05.36-1.64 0-2.21-1.79-4-4-4S2 3.79 2 6s1.79 4 4 4c.59 0 1.14-.13 1.64-.36L10 12l-2.36 2.36C7.14 14.13 6.59 14 6 14c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4c0-.59-.13-1.14-.36-1.64L12 14l7 7h3v-1L9.64 7.64zM6 8c-1.1 0-2-.89-2-2s.9-2 2-2 2 .89 2 2-.9 2-2 2zm0 12c-1.1 0-2-.89-2-2s.9-2 2-2 2 .89 2 2-.9 2-2 2zM19 3l-6 6 2 2 7-7V3z' fill='%23fb923c' stroke='%23ffffff' stroke-width='0.5'/></svg>")
            12 12,
          pointer;
        transition: all 0.15s ease;
        position: relative;
        white-space: pre-wrap;
        word-break: break-word;
        background: rgba(52, 211, 153, 0.04);
        border: 1px solid transparent;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        /* タッチで scroll に食われず即座に剪定できるように */
        touch-action: manipulation;
      }
      /* キーボードユーザー向け：剪定対象の "選択中" 表示を強める */
      .poc-line[aria-pressed="true"] {
        outline: none;
      }
      .poc-line:hover:not(.locked) {
        background: rgba(52, 211, 153, 0.1);
        border-color: var(--leaf-line);
      }
      .poc-line-num {
        flex-shrink: 0;
        width: 26px;
        color: var(--text-dim);
        text-align: right;
        font-size: 11px;
        font-weight: 700;
        padding-top: 1px;
      }
      .poc-line-mark {
        flex-shrink: 0;
        width: 22px;
        height: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-weight: 800;
        font-size: 13px;
        color: var(--text-dim);
      }
      /* デフォルト：そっと枝についている葉っぱ。ホバーで揺れる。 */
      .poc-line-mark::before {
        content: "";
        display: block;
        width: 14px;
        height: 14px;
        background-image: var(--icon-leaf);
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        opacity: 0.55;
        transform-origin: 50% 90%;
        transition:
          opacity 0.2s ease,
          transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .poc-line:hover:not(.locked) .poc-line-mark::before {
        opacity: 1;
        transform: rotate(-12deg);
      }
      .poc-line-code {
        flex: 1;
        min-width: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }

      /* 剪定対象として選択中：葉が鋏に変わる */
      .poc-line.cut-selected {
        background: rgba(251, 113, 133, 0.14);
        border-color: rgba(251, 113, 133, 0.5);
        color: var(--danger);
      }
      .poc-line.cut-selected .poc-line-code {
        text-decoration: line-through;
        text-decoration-color: var(--danger);
        text-decoration-thickness: 2px;
        opacity: 0.85;
      }
      .poc-line.cut-selected .poc-line-mark::before {
        content: "";
        background-image: var(--icon-scissors-red);
        opacity: 1;
        transform: rotate(0deg);
        animation: snipReady 1.6s ease-in-out infinite;
      }
      .poc-line.cut-selected .poc-line-num {
        color: var(--danger);
      }

      .poc-line.locked {
        cursor: default;
      }

      /* 残した essential：濃い緑の葉として描く */
      .poc-line.feed-good {
        background: rgba(52, 211, 153, 0.16);
        border-color: var(--leaf);
      }
      .poc-line.feed-good .poc-line-mark::before {
        content: "";
        background-image: var(--icon-leaf-bright);
        opacity: 1;
        transform: rotate(-4deg);
        filter: drop-shadow(0 0 4px rgba(52, 211, 153, 0.5));
      }
      .poc-line.feed-good .poc-line-code {
        color: var(--leaf);
      }

      /* essential を切ってしまった（致命）：赤鋏 + 落葉アニメで枝から落とす */
      .poc-line.feed-mistake-cut {
        background: rgba(251, 113, 133, 0.16);
        border-color: var(--danger);
        color: var(--danger);
        animation: leafFall 0.55s cubic-bezier(0.4, 0, 0.6, 1) forwards;
      }
      .poc-line.feed-mistake-cut .poc-line-mark::before {
        content: "";
        background-image: var(--icon-scissors-red);
        opacity: 1;
        transform: rotate(-15deg);
      }
      .poc-line.feed-mistake-cut .poc-line-code {
        text-decoration: line-through;
        text-decoration-color: var(--danger);
        opacity: 0.7;
        color: var(--danger);
      }

      /* 切り損ねた junk：枯れた葉 */
      .poc-line.feed-missed-junk {
        background: rgba(251, 191, 36, 0.14);
        border-color: rgba(251, 191, 36, 0.55);
      }
      .poc-line.feed-missed-junk .poc-line-mark::before {
        content: "";
        background-image: var(--icon-leaf-wilt);
        opacity: 0.95;
        transform: rotate(40deg);
        filter: drop-shadow(0 0 3px rgba(251, 191, 36, 0.35));
      }
      .poc-line.feed-missed-junk .poc-line-code {
        color: var(--accent);
      }

      /* junk を正しく剪定：緑の鋏 + 葉を散らせる */
      .poc-line.feed-correct-cut {
        background: rgba(52, 211, 153, 0.16);
        border-color: var(--leaf);
        color: var(--leaf);
        animation: leafFall 0.55s cubic-bezier(0.4, 0, 0.6, 1) forwards;
      }
      .poc-line.feed-correct-cut .poc-line-mark::before {
        content: "";
        background-image: var(--icon-scissors-green);
        opacity: 1;
        transform: rotate(0deg);
      }
      .poc-line.feed-correct-cut .poc-line-code {
        text-decoration: line-through;
        text-decoration-color: var(--leaf);
        text-decoration-thickness: 2px;
      }

      /* 剪定が確定したときに、切られた行が枝から落ちるアニメ */
      @keyframes leafFall {
        0% {
          transform: translateX(0) translateY(0) rotate(0deg);
          opacity: 1;
        }
        40% {
          transform: translateX(6px) translateY(2px) rotate(2deg);
          opacity: 0.95;
        }
        100% {
          transform: translateX(14px) translateY(4px) rotate(4deg);
          opacity: 0.9;
        }
      }

      /* 鋏マークが小さく開閉して「切るよ」シグナルを出す */
      @keyframes snipReady {
        0%,
        100% {
          transform: rotate(0deg) scale(1);
        }
        50% {
          transform: rotate(-8deg) scale(1.08);
        }
      }

      .poc-reason {

      .play-actions {

        /* =========================================================
           正解難読化
             - 各行の正解 role（essential / junk）は XOR + Base64 で隠蔽し、
               r フィールドに格納する（line.code を salt にして 1 行ごとに
               一意なトークンになる）。
             - DevTools の Sources 検索で "essential" / "junk" や
               role: といった文字列が直接マッチしないようにする。
             - kaiten-bounty / caido-ninja と同じレベルのカジュアルな
               チート対策（暗号強度は期待しない）。
           ========================================================= */
        const _BK = "B0nsa1R3con7";
        function _decRole(payload, salt) {
          const k = salt + "|" + _BK;
          const bin = atob(payload);
          const out = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) {
            out[i] = bin.charCodeAt(i) ^ k.charCodeAt(i % k.length);
          }
          return new TextDecoder().decode(out);
        }
        // 同じ行に対して何度もデコードしないようキャッシュ
        const _roleCache = new WeakMap();
        function roleOf(line) {
          let v = _roleCache.get(line);
          if (v === undefined) {
            v = _decRole(line.r, line.code);
            _roleCache.set(line, v);
          }
          return v;
        }

              { code: "beta-mobile-v2.target.com [500] [-] [Express]", r: "BxYHBEMZBgMF", reason: { ja: "<strong>500 はサーバ稼働 + エラー応答</strong>。Express スタックトレースが返ってくれば <strong>パス・ファイル名・ライブラリバージョン</strong>が漏れる。デバッグ情報漏洩 → スタック特定 → 既知 CVE。", en: "<strong>500 means the server is up and erroring.</strong> If Express leaks a stack trace, you get paths, filenames, library versions — info disclosure that powers CVE lookups." } },

            lines: [
              { code: "[High] SQL injection on /api/search?q=%27%20OR%201%3D1", r: "PjsaAgYpSTI9", reason: { ja: "古典 SQLi。<strong>error-based / time-based / UNION でデータ抽出まで進められれば High 確定</strong>。手で再現して報告。", en: "Classic SQLi. If you can chain error-based / time-based / UNION into data extraction, it lands as High. Reproduce manually before filing." } },
              { code: "[Medium] Cross-Site Scripting (DOM) on /redirect.html", r: "Pj4WAQcBBDxM", reason: { ja: "DOM XSS。<strong>session hijack まで demo すれば High 帯</strong>。auto-scan 結果だけで報告せず PoC URL を作る。", en: "DOM XSS. Demonstrating session hijack pushes it to High. Don't ship the scanner output — build a real PoC URL." } },
              { code: "[Info] Cookie without Secure flag (anonymous session cookie)", r: "MTwADQ==", reason: { ja: "<strong>未認証 Cookie の Secure 不在は実害なし</strong> = Informative 確定。session cookie ですらない anonymous は無視。", en: "<strong>Missing Secure on an anonymous cookie has no impact</strong> — flat Informative. Especially worthless when it isn't even a session cookie." } },

              { code: "[Low] Email address disclosed (info@target.com in footer)", r: "MTkBHA==", reason: { ja: "<strong>公開メアド</strong>は site の問い合わせ用。impact 0。", en: "<strong>A public contact email</strong> — that's literally why it's in the footer." } },
              { code: "[High] Open Redirect via /goto?url=", r: "PjsaAgYpSS4c", reason: { ja: "Open redirect 単独だと Low の program が多いが、<strong>OAuth callback と組み合わせて token 奪取まで demo すれば High</strong>。チェーンを組んで報告。", en: "Open redirect alone is Low at many programs; <strong>chain it through OAuth callback to steal a token</strong> and it climbs to High. Build the chain before filing." } },
              { code: "[Info] Server version disclosure (Apache/2.4.41 in Server header)", r: "MTwADQ==", reason: { ja: "<strong>単独では報告不可</strong>。Apache 2.4.41 + 既知 CVE の demo を組めば別、それまでは保留メモ。", en: "<strong>Not reportable alone.</strong> Stash it; if you later weaponise it with a CVE-2.4.41 exploit, the disclosure becomes context." } },
              { code: "[Critical] Remote Code Execution via /upload (.jsp execution allowed)", r: "PjABDBodCgAA", reason: { ja: "<strong>RCE は最優先</strong>。手で `id` を実行して証拠スクショ → 即報告。program 上限の bounty が出る案件。", en: "<strong>RCE always tops the queue.</strong> Run `id` manually, capture proof, file today — these typically pay program-max bounty." } },
              { code: "[Low] CORS misconfiguration: Origin: null reflected with credentials", r: "Pj8cEjNUKi4+", reason: { ja: "<strong>null origin + credentials reflection は『立派なバグ』</strong>。sandboxed iframe や file:// から credentialed request が通る。Medium 以上で受理されやすい。", en: "<strong>Reflecting `Origin: null` with credentials is a real bug</strong> — sandboxed iframes / `file://` contexts can send credentialed requests. Usually triages Medium+." } },
              { code: "[Info] HTML form without CSRF token on logout form", r: "MTwADQ==", reason: { ja: "<strong>logout CSRF は大半の program で no-impact</strong>。プログラム規約 (Out-of-scope vulns) で明記されていることも多い。", en: "<strong>Logout CSRF is no-impact at most programs</strong> — and is often explicitly listed as out-of-scope vulns in policy." } },
              { code: "[Medium] Path Traversal in /download?file=", r: "Pj4WAQcBBDxM", reason: { ja: "古典トラバーサル。<strong>`/etc/passwd` まで取れれば Medium-High</strong>。手で再現確認して報告。", en: "Classic traversal. Pulling `/etc/passwd` brings it to Medium-High. Reproduce manually before filing." } },
              { code: "[Low] HTTP TRACE method enabled", r: "MTkBHA==", reason: { ja: "<strong>現代ブラウザでは XST 攻撃不能</strong>。スキャナの古い rule。10 年前ならともかく、今は Informative 行き。", en: "<strong>XST is dead in modern browsers</strong> — old scanner rule. May have mattered a decade ago; today it's flat Informative." } },
            ],
          },
        ];

        /* 状態 */
        // 全ゲーム共通キー mk12_game_lang を優先して読み出し、なければ "ja"
        let currentLang = "ja";
        try {
          const stored = localStorage.getItem("mk12_game_lang");
          if (stored === "ja" || stored === "en") currentLang = stored;
        } catch (e) {}
        let qIndex = 0;
        let selectedCuts = [];
        let perQuestionResults = [];
        let phase = "play";

        function el(tag, className, text) {
          const e = document.createElement(tag);
          if (className) e.className = className;
          if (text !== undefined && text !== null) e.textContent = text;
          return e;
        }

        /* renderInline:
             <strong>...</strong> と `code` を DOM に安全に展開。
             String.split() のキャプチャグループで分割するため、innerHTML を経由しない。 */
        function renderInline(target, text) {
          target.textContent = "";
          if (!text) return;
          const parts = text.split(/(<strong>[\s\S]*?<\/strong>|`[^`]+`)/g);
          for (let i = 0; i < parts.length; i++) {
            const tok = parts[i];
            if (!tok) continue;
            if (tok.indexOf("<strong>") === 0 && tok.indexOf("</strong>") > 0) {
              const inner = tok.slice(8, tok.length - 9);
              const s = document.createElement("strong");
              s.textContent = inner;
              target.appendChild(s);
            } else if (
              tok.length >= 2 &&
              tok.charAt(0) === "`" &&
              tok.charAt(tok.length - 1) === "`"
            ) {
              const c = document.createElement("code");
              c.className = "inline-code";
              c.textContent = tok.slice(1, tok.length - 1);
              target.appendChild(c);
            } else {
              target.appendChild(document.createTextNode(tok));
            }
          }
        }

        function t(k) {
          return I18N[currentLang][k];
        }

        function showScreen(id) {
          ["screen-start", "screen-quiz", "screen-result"].forEach(function (s) {
            const node = document.getElementById(s);
            if (node) node.classList.toggle("active", s === id);
          });
          window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function applyI18n() {
          const dict = I18N[currentLang];
          document.documentElement.lang = currentLang;
          document.getElementById("brand-name").textContent = dict.brandName;
          document.getElementById("hero-tag-text").textContent = dict.heroTag;
          document.getElementById("hero-title").textContent = dict.heroTitle;
          document.getElementById("hero-sub").textContent = dict.heroSub;

          document.getElementById("stat-label-q").textContent = dict.statQ;
          document.getElementById("stat-label-pt").textContent = dict.statPt;
          document.getElementById("stat-label-time").textContent = dict.statTime;
          document.getElementById("stat-label-lang").textContent = dict.statLang;

          document.getElementById("rules-title").textContent = dict.rulesTitle;
          renderInline(document.getElementById("rule-keep"), dict.ruleKeep);
          renderInline(document.getElementById("rule-cut"), dict.ruleCut);
          renderInline(document.getElementById("rule-score"), dict.ruleScore);

          document.getElementById("sources-title").textContent = dict.sourcesTitle;
          document.getElementById("src-h1").textContent = dict.srcH1;
          document.getElementById("src-owasp").textContent = dict.srcOwasp;
          document.getElementById("src-psw").textContent = dict.srcPsw;
          document.getElementById("btn-start-text").textContent = dict.startBtn;
          document.getElementById("start-note").textContent = dict.startNote;

          document.getElementById("qm-q-label").textContent = dict.qmQ;
          document.getElementById("q-total").textContent = SCENARIOS.length;
          document.getElementById("bonsai-label").textContent = dict.bonsaiLabel;
          document.getElementById("poc-head-label").textContent = dict.pocHead;
          document.getElementById("poc-count-label").textContent = dict.pocCount;
          document.getElementById("btn-prune-text").textContent = dict.pruneBtn;
          document.getElementById("btn-reset-text").textContent = dict.resetBtn;

          document.getElementById("btn-share-text").textContent = dict.resultShare;
          document.getElementById("btn-retry-text").textContent = dict.resultRetry;
          document.getElementById("review-title").textContent = dict.resultReview;
          document.getElementById("score-suffix").textContent = dict.scoreSuffix;
          document.getElementById("stat-lbl-perfect").textContent = dict.statLblPerfect;
          document.getElementById("stat-lbl-cut").textContent = dict.statLblCut;
          document.getElementById("stat-lbl-pct").textContent = dict.statLblPct;
          document.getElementById("footer-by").textContent = dict.footerBy;

          if (document.getElementById("screen-quiz").classList.contains("active")) {
            renderScenario(true);
          }
          if (document.getElementById("screen-result").classList.contains("active")) {
            renderResult();
          }
        }

        function setLanguage(lang) {
          if (lang === currentLang) return;
          currentLang = lang;
          try {
            localStorage.setItem("mk12_game_lang", lang);
          } catch (e) {}
          document.querySelectorAll(".lang-toggle button").forEach(function (b) {
            b.classList.toggle("active", b.dataset.lang === lang);
          });
          updateLangPill();
          applyI18n();
        }

        const langPill = document.getElementById("lang-pill");
        function updateLangPill() {
          const active = document.querySelector(".lang-toggle button.active");
          if (!active) return;
          langPill.style.width = active.offsetWidth + "px";
          langPill.style.transform = "translateX(" + (active.offsetLeft - 3) + "px)";
        }

        function startQuiz() {
          qIndex = 0;
          selectedCuts = [];
          perQuestionResults = [];
          phase = "play";
          renderScenario();
          showScreen("screen-quiz");
        }

        function totalEarned() {
          return perQuestionResults.reduce(function (s, r) {
            return s + (r ? r.score : 0);
          }, 0);
        }
        function totalPossible() {
          return SCENARIOS.length * 10;
        }

        function renderScenario(keepState) {
          const item = SCENARIOS[qIndex];
          const lang = currentLang;
          if (!keepState) {
            selectedCuts = [];
            phase = "play";
            document.getElementById("feedback-area").textContent = "";
            document.getElementById("btn-next").style.display = "none";
          }

          document.getElementById("q-current").textContent = qIndex + 1;
          document.getElementById("q-tag").textContent = item.tag[lang];
          document.getElementById("scenario-vuln-text").textContent = item.vuln[lang];
          renderInline(document.getElementById("scenario-context"), item.context[lang]);
          document.getElementById("scenario-question").textContent = item.question[lang];
          renderInline(document.getElementById("scenario-goal"), item.goal[lang]);

          const earned = totalEarned();
          const possibleSoFar = SCENARIOS.length * 10;
          const pct = Math.round((earned / possibleSoFar) * 100);
          document.getElementById("bonsai-num").textContent = earned;
          document.getElementById("bonsai-fill").style.width = pct + "%";

          const linesWrap = document.getElementById("poc-lines");
          linesWrap.textContent = "";
          item.lines.forEach(function (line, idx) {
            const lineEl = el("div", "poc-line");
            lineEl.dataset.idx = idx;
            const num = el("span", "poc-line-num", String(idx + 1));
            const mark = el("span", "poc-line-mark");
            const code = el("code", "poc-line-code");
            code.textContent = line.code === "" ? " " : line.code;
            lineEl.appendChild(num);
            lineEl.appendChild(mark);
            lineEl.appendChild(code);

            if (phase === "play") {
              // キーボード操作可能にする（剪定はゲームの主操作）
              lineEl.setAttribute("role", "button");
              lineEl.setAttribute("tabindex", "0");
              const isCut = selectedCuts.indexOf(idx) !== -1;
              lineEl.setAttribute("aria-pressed", isCut ? "true" : "false");
              lineEl.addEventListener("click", function () {
                toggleCut(idx);
              });
              lineEl.addEventListener("keydown", function (e) {
                if (e.isComposing || e.keyCode === 229) return;
                if (e.key === "Enter" || e.key === " " || e.code === "Space") {
                  e.preventDefault();
                  toggleCut(idx);
                }
              });
              if (isCut) {
                lineEl.classList.add("cut-selected");
              }
            } else {
              lineEl.classList.add("locked");
              const isJunk = roleOf(line) === "junk";
              const wasCut = selectedCuts.indexOf(idx) !== -1;
              if (isJunk && wasCut) lineEl.classList.add("feed-correct-cut");
              else if (isJunk && !wasCut) lineEl.classList.add("feed-missed-junk");
              else if (!isJunk && wasCut) lineEl.classList.add("feed-mistake-cut");
              else lineEl.classList.add("feed-good");
            }
            linesWrap.appendChild(lineEl);

            if (phase === "review") {
              const isJunk = roleOf(line) === "junk";
              const wasCut = selectedCuts.indexOf(idx) !== -1;
              let cls = "good";
              let tag = "";
              if (isJunk && wasCut) {
                cls = "good";
                tag = t("tagGood");
              } else if (isJunk && !wasCut) {
                cls = "warn";
                tag = t("tagWarn");
              } else if (!isJunk && wasCut) {
                cls = "bad";
                tag = t("tagBad");
              } else {
                cls = "good";
                tag = t("tagKeep");
              }
              const reasonEl = el("div", "poc-reason " + cls);
              const tagEl = el("span", "poc-reason-tag", tag);
              reasonEl.appendChild(tagEl);
              const reasonText = document.createElement("span");
              renderInline(reasonText, line.reason[lang]);
              reasonEl.appendChild(reasonText);
              linesWrap.appendChild(reasonEl);
            }
          });

          updateKeptCount();

          const pruneBtn = document.getElementById("btn-prune");
          const resetBtn = document.getElementById("btn-reset");
          if (phase === "play") {
            pruneBtn.disabled = false;
            resetBtn.disabled = selectedCuts.length === 0;
            pruneBtn.style.display = "inline-flex";
            resetBtn.style.display = "inline-flex";
          } else {
            pruneBtn.style.display = "none";
            resetBtn.style.display = "none";
          }
        }

        function updateKeptCount() {
          const item = SCENARIOS[qIndex];
          document.getElementById("poc-total-num").textContent = item.lines.length;
          document.getElementById("poc-kept-num").textContent =
            item.lines.length - selectedCuts.length;
        }

        function toggleCut(idx) {
          if (phase !== "play") return;
          const at = selectedCuts.indexOf(idx);
          if (at === -1) selectedCuts.push(idx);
          else selectedCuts.splice(at, 1);
          const lineEl = document
            .getElementById("poc-lines")
            .querySelector('[data-idx="' + idx + '"]');
          if (lineEl) {
            lineEl.classList.toggle("cut-selected", at === -1);
          }
          updateKeptCount();
          document.getElementById("btn-reset").disabled = selectedCuts.length === 0;
        }

        function resetSelection() {
          if (phase !== "play") return;
          selectedCuts = [];
          renderScenario(true);
        }

        function scoreCurrent() {
          const item = SCENARIOS[qIndex];
          let correct = 0;
          let cutCorrect = 0;
          let mistakes = 0;
          let missed = 0;
          item.lines.forEach(function (line, idx) {
            const wasCut = selectedCuts.indexOf(idx) !== -1;
            const isJunk = roleOf(line) === "junk";
            if (isJunk === wasCut) {
              correct++;
              if (wasCut) cutCorrect++;
            } else if (!isJunk && wasCut) {
              mistakes++;
            } else if (isJunk && !wasCut) {
              missed++;
            }
          });
          const accuracy = correct / item.lines.length;
          let score = Math.round(accuracy * 9);
          const perfect = correct === item.lines.length;
          if (perfect) score = 10;
          if (mistakes > 0) score = Math.min(score, 5);
          if (score < 0) score = 0;
          return {
            score: score,
            total: 10,
            perfect: perfect,
            cutCorrect: cutCorrect,
            mistakes: mistakes,
            missed: missed,
            correctLines: correct,
            totalLines: item.lines.length,
          };
        }

        function prune() {
          if (phase !== "play") return;
          const result = scoreCurrent();
          perQuestionResults[qIndex] = result;
          phase = "review";
          renderScenario(true);
          showResultFeedback(result);

          const nextBtn = document.getElementById("btn-next");
          nextBtn.textContent =
            qIndex >= SCENARIOS.length - 1 ? t("lastBtn") : t("nextBtn");
          nextBtn.style.display = "flex";
          nextBtn.onclick = onNext;

          const earned = totalEarned();
          const pct = Math.round((earned / totalPossible()) * 100);
          document.getElementById("bonsai-num").textContent = earned;
          document.getElementById("bonsai-fill").style.width = pct + "%";
        }

        function showResultFeedback(r) {
          const fbArea = document.getElementById("feedback-area");
          fbArea.textContent = "";
          const fb = document.createElement("div");
          let titleKey = "quizPartial";
          let cls = "partial";
          if (r.perfect) {
            titleKey = "quizPerfect";
            cls = "perfect";
          } else if (r.mistakes > 0) {
            titleKey = "quizDead";
            cls = "dead";
          }
          fb.className = "result-feedback " + cls;

          const title = document.createElement("div");
          title.className = "feedback-title";
          const titleText = document.createElement("span");
          titleText.textContent =
            (r.perfect ? "✓ " : r.mistakes > 0 ? "✕ " : "△ ") + t(titleKey);
          title.appendChild(titleText);

          const pts = document.createElement("span");
          pts.className = "feedback-points";
          const sStrong = document.createElement("strong");
          sStrong.textContent = "+ " + r.score;
          pts.appendChild(sStrong);
          pts.appendChild(document.createTextNode(" / " + r.total + " pt"));
          title.appendChild(pts);
          fb.appendChild(title);

          const body = document.createElement("div");
          body.className = "feedback-body";
          renderInline(body, buildSummary(r, currentLang));
          fb.appendChild(body);

          const tipText = buildTip(r, currentLang);
          if (tipText) {
            const tipEl = document.createElement("div");
            tipEl.className = "feedback-tip";
            renderInline(tipEl, tipText);
            fb.appendChild(tipEl);
          }
          fbArea.appendChild(fb);
        }

        function buildSummary(r, lang) {
          if (lang === "ja") {
            if (r.perfect) {
              return (
                "<strong>完璧な盆栽</strong>。" +
                r.correctLines +
                " / " +
                r.totalLines +
                " 行すべて正しく判定できています。ノイズを刈り取り、ホットリードだけ残せた状態。"
              );
            }
            if (r.mistakes > 0) {
              return (
                "<strong>ホットリードを切った</strong>：深掘りすべき行を " +
                r.mistakes +
                " 本切ってしまい、本物の手がかりを見逃しました。" +
                "（ノイズの剪定は " +
                r.cutCorrect +
                " 本、残してしまったノイズ " +
                r.missed +
                " 本）"
              );
            }
            return (
              "<strong>剪定不足</strong>：ノイズが " +
              r.missed +
              " 本残っています。recon の信号雑音比を上げるほど、次の 1 時間で見つかるバグの量が増えます。" +
              "（正しく切った数 " +
              r.cutCorrect +
              " / 正答行 " +
              r.correctLines +
              "）"
            );
          }
          if (r.perfect) {
            return (
              "<strong>Perfect bonsai.</strong> All " +
              r.correctLines +
              " / " +
              r.totalLines +
              " lines judged correctly. Noise gone, only hot leads remain."
            );
          }
          if (r.mistakes > 0) {
            return (
              "<strong>You cut a hot lead:</strong> " +
              r.mistakes +
              " worth-investigating line(s) removed, so you'd miss the real finding. " +
              "(Noise pruned correctly: " +
              r.cutCorrect +
              ", noise still in: " +
              r.missed +
              ")"
            );
          }
          return (
            "<strong>Needs more pruning:</strong> " +
            r.missed +
            " noise line(s) still attached. Tightening your signal-to-noise on recon directly raises the bugs-per-hour you find. " +
            "(Cut right: " +
            r.cutCorrect +
            " / correct lines: " +
            r.correctLines +
            ")"
          );
        }

        function buildTip(r, lang) {
          if (lang === "ja") {
            if (r.perfect)
              return "<strong>Pro Tip</strong>：実 recon では、ツール出力を <code>uddup</code> / <code>uro</code> で重複圧縮 → grep でドメイン外し → catch-all calibration の三段ノイズ除去をルーチン化すると、深掘り対象が 10 倍速で絞れる。";
            if (r.mistakes > 0)
              return "<strong>Pro Tip</strong>：迷ったら「これを今日触らないと後悔するか？」を自問。Yes なら残す（ホットリード）。No なら切る（ノイズ）。<strong>internal / legacy / billing / 認証ゲート / 古いスタック</strong> は条件反射で残す。";
            return "<strong>Pro Tip</strong>：3rd party SaaS（Zendesk・statuspage・Salesforce 等）、CDN edge、tracking pixel、ワイルドカード証明書、`pk_live_*` のような公開前提キー、未認証 Cookie の Secure 欠落 — これらは <strong>反射で切る</strong>癖をつける。";
          }
          if (r.perfect)
            return "<strong>Pro tip:</strong> on real recon, pipe everything through <code>uddup</code> / <code>uro</code> for dedup, grep the noise domains out, and calibrate ffuf's catch-all baseline — three quick filters compound to 10x faster shortlisting.";
          if (r.mistakes > 0)
            return "<strong>Pro tip:</strong> when in doubt, ask 'would I regret not touching this today?'. Yes -> keep it. No -> prune. <strong>internal-*, legacy-*, billing, auth gates, ancient stacks</strong> are reflexive keeps.";
          return "<strong>Pro tip:</strong> 3rd-party SaaS (Zendesk / statuspage / Salesforce), CDN edge hosts, tracking pixels, wildcard certs, intentionally-public keys like `pk_live_*`, and Secure-flag-missing on anonymous cookies — train yourself to cut these on sight.";
        }

        function onNext() {
          if (qIndex >= SCENARIOS.length - 1) {
            finishQuiz();
          } else {
            qIndex++;
            renderScenario();
          }
        }

        function getRankKey(score) {
          if (score >= 90) return "sensei";
          if (score >= 75) return "master";
          if (score >= 60) return "apprentice";
          if (score >= 40) return "novice";
          return "seed";
        }

        function getRank(score) {
          const isJa = currentLang === "ja";
          const key = getRankKey(score);
          if (key === "sensei") {
            return {
              key: key,
              tag: "★ BONSAI SENSEI",
              title: isJa ? "盆栽の達人" : "Bonsai Sensei",
              sub: isJa
                ? "90+ 点。recon の信号雑音比を本能で見抜ける達人。"
                : "90+. You read signal vs. noise on instinct.",
              comment: isJa
                ? "<strong>90〜100 点（盆栽の達人）</strong>：recon ノイズの判別眼が完成しています。実 hunt でも、subfinder → httpx → ffuf → dirsearch → linkfinder の各段で <strong>「ホットリードだけ蓄積する」フロー</strong>を確立しているはず。次は automation で「他人より先に新規ホストへ着く」スピード勝負へ。"
                : "<strong>90–100 (Bonsai Sensei):</strong> your signal-vs-noise instincts are dialed in. On real hunts you already stack only the hot leads across subfinder → httpx → ffuf → dirsearch → linkfinder. Next step: automate it to beat other hunters to fresh hosts.",
            };
          }
          if (key === "master") {
            return {
              key: key,
              tag: "★ BONSAI MASTER",
              title: isJa ? "剪定上手" : "Bonsai Master",
              sub: isJa
                ? "75+ 点。recon ノイズの 8 割は反射で切れる段階。"
                : "75+. You reflexively prune ~80% of recon noise.",
              comment: isJa
                ? "<strong>75〜89 点（剪定上手）</strong>：3rd party SaaS・CDN edge・catch-all・publishable key 等の典型ノイズは見抜けています。次は <strong>「最近の CT log（数日前）」「`internal-*` / `legacy-*` の外露出」「JS bundle の FEATURE_FLAGS」</strong> など、見落とされがちな宝箱を意識的に拾う癖をつけると Sensei 級へ。"
                : "<strong>75–89 (Bonsai Master):</strong> you cut the obvious noise — 3rd-party SaaS, CDN edge, catch-alls, publishable keys. To break into Sensei, start consciously chasing the goldmines pros pick over: <strong>fresh-by-days CT log entries, exposed `internal-*` / `legacy-*` hosts, FEATURE_FLAGS in JS bundles</strong>.",
            };
          }
          if (key === "apprentice") {
            return {
              key: key,
              tag: "★ BONSAI APPRENTICE",
              title: isJa ? "剪定見習い" : "Bonsai Apprentice",
              sub: isJa
                ? "60+ 点。recon の輪郭は見えてきた段階。"
                : "60+. The shape of recon is starting to show.",
              comment: isJa
                ? "<strong>60〜74 点（剪定見習い）</strong>：基本（パークドメイン / wildcard 証明書 / tracking pixel / SaaS / 静的アセットは切る）は身についています。次は <strong>「`pk_live_*` は公開鍵」「AKIA...EXAMPLE は AWS サンプル」「JWT_SECRET の `||` フォールバック」</strong> など、初心者が誤報告する罠を覚えると 75+ が見えてきます。"
                : "<strong>60–74 (Bonsai Apprentice):</strong> basics are in place (parked domains, wildcard certs, tracking pixels, SaaS, static assets — you prune those). Next, memorise the classic newbie traps that turn into Informatives: <strong>`pk_live_*` is publishable, `AKIA...EXAMPLE` is the AWS sample key, `JWT_SECRET ||` fallbacks aren't impact on their own</strong>. That unlocks 75+.",
            };
          }
          if (key === "novice") {
            return {
              key: key,
              tag: "★ BONSAI NOVICE",
              title: isJa ? "種から学ぶ" : "Bonsai Novice",
              sub: isJa
                ? "40+ 点。まずは「絶対に切らない」リストを固める段階。"
                : "40+. Lock in your never-cut list first.",
              comment: isJa
                ? "<strong>40〜59 点（種から学ぶ）</strong>：まず <strong>「`api.*` / `admin.*` / `billing.*` / `legacy-*` / `internal-*` / `m.*` / 401 / 403 / .git / .env / backup.zip / Jenkins / Grafana / Tomcat 古い」は絶対に切らない</strong> という「never-cut リスト」を固定するところから始めましょう。"
                : "<strong>40–59 (Bonsai Novice):</strong> nail down your <strong>never-cut list first</strong>: `api.*`, `admin.*`, `billing.*`, `legacy-*`, `internal-*`, `m.*`, 401 / 403 status, `.git` / `.env` / `backup.zip` paths, exposed Jenkins / Grafana / old Tomcat. Internalize those, then layer noise recognition on top.",
            };
          }
          return {
            key: key,
            tag: "★ BONSAI SEED",
            title: isJa ? "種：もう一度" : "Bonsai Seed",
            sub: isJa
              ? "<40 点。盆栽は枯れたが、種から再挑戦できる。"
              : "<40. The bonsai withered — but seeds regrow.",
            comment: isJa
              ? "<strong>0〜39 点（種：もう一度）</strong>：ホットリードを切りすぎ / ノイズを残しすぎ。recon の出発点は <strong>「自分が今日 1 時間でバグを見つけたいなら、どのホストの Burp タブを最初に開くか」</strong>。`api.*` / `admin.*` / `legacy-*` / 認証ゲート (401/403) / 露出パネル (Jenkins/Grafana) は反射で残す。3rd party SaaS / CDN / tracking / wildcard 証明書 は反射で切る。"
              : "<strong>0–39 (Bonsai Seed):</strong> you're either cutting hot leads or hoarding noise. Reset to the core question: <strong>'which Burp tab do I open first if I want a bug in the next hour?'</strong> Reflexively keep `api.*` / `admin.*` / `legacy-*` / auth gates (401/403) / exposed panels (Jenkins, Grafana). Reflexively cut 3rd-party SaaS / CDN / tracking pixels / wildcard certs.",
          };
        }

        function renderResult() {
          const earned = totalEarned();
          const total = totalPossible();
          const pct = Math.round((earned / total) * 100);
          const rank = getRank(earned);
          const perfectCount = perQuestionResults.filter(function (r) {
            return r && r.perfect;
          }).length;
          const cutCorrectCount = perQuestionResults.reduce(function (s, r) {
            return s + (r ? r.cutCorrect : 0);
          }, 0);

          document.getElementById("result-rank").textContent = rank.tag;
          document.getElementById("result-title").textContent = rank.title;
          document.getElementById("result-sub").textContent = rank.sub;
          document.getElementById("score-num").textContent = earned;
          document.getElementById("score-ring").style.setProperty("--pct", pct);
          document.getElementById("stat-perfect").textContent = perfectCount;
          document.getElementById("stat-cut-correct").textContent = cutCorrectCount;
          document.getElementById("stat-pct").textContent = pct + "%";
          renderInline(document.getElementById("result-comment"), rank.comment);

          const reviewGrid = document.getElementById("review-grid");
          reviewGrid.textContent = "";
          SCENARIOS.forEach(function (item, i) {
            const r = perQuestionResults[i];
            const row = document.createElement("div");
            row.className = "review-item";
            const mark = document.createElement("div");
            let kind = "ok";
            if (!r) kind = "ng";
            else if (r.perfect) kind = "ok";
            else if (r.mistakes > 0) kind = "ng";
            else kind = "warn";
            mark.className = "review-mark " + kind;
            mark.textContent = r ? r.score : 0;

            const content = document.createElement("div");
            content.className = "review-content";
            const qLine = document.createElement("div");
            qLine.className = "review-q";
            const dim = document.createElement("span");
            dim.className = "review-dim";
            dim.textContent = "[" + item.vuln[currentLang] + "]";
            const qText = document.createElement("span");
            qText.textContent = item.tag[currentLang];
            const pointsLabel = document.createElement("span");
            pointsLabel.className = "review-points";
            pointsLabel.textContent = (r ? r.score : 0) + " / 10 pt";
            qLine.appendChild(dim);
            qLine.appendChild(qText);
            qLine.appendChild(pointsLabel);
            content.appendChild(qLine);

            if (r) {
              const aLine = document.createElement("div");
              aLine.className = "review-a";
              renderInline(aLine, buildShortReview(r, currentLang));
              content.appendChild(aLine);
            }

            row.appendChild(mark);
            row.appendChild(content);
            reviewGrid.appendChild(row);
          });
        }

        function buildShortReview(r, lang) {
          if (lang === "ja") {
            if (r.perfect) return "完璧 — 全行を正しく判断";
            if (r.mistakes > 0)
              return "ホットリードを切った（ホットリード " + r.mistakes + " 本見逃し / ノイズ残し " + r.missed + " 本）";
            return "剪定不足 — ノイズ " + r.missed + " 本残し（正しく切った数 " + r.cutCorrect + "）";
          }
          if (r.perfect) return "Perfect — all lines judged correctly";
          if (r.mistakes > 0)
            return "Cut a hot lead (" + r.mistakes + " leads missed / " + r.missed + " noise left)";
          return "Under-pruned — " + r.missed + " noise left (cut right: " + r.cutCorrect + ")";
        }

        function finishQuiz() {
          renderResult();
          showScreen("screen-result");
        }

        function rankBandLabel(key, langKey) {
          const map = {
            sensei: { ja: "盆栽の達人 / Sensei", en: "Bonsai Sensei" },
            master: { ja: "剪定上手 / Master", en: "Bonsai Master" },
            apprentice: { ja: "剪定見習い / Apprentice", en: "Bonsai Apprentice" },
            novice: { ja: "種から学ぶ / Novice", en: "Bonsai Novice" },
            seed: { ja: "種：もう一度 / Seed", en: "Bonsai Seed" },
          };
          return (map[key] && map[key][langKey]) || key;
        }

        function buildShareText(earned, total, pct, rankKey) {
          const band = rankBandLabel(rankKey, currentLang);
          if (currentLang === "ja") {
            return (
              "「Bonsai Recon (偵察盆栽)」で " +
              earned +
              " / " +
              total +
              " 点（" +
              pct +
              "%）獲得！判定: " +
              band +
              "\n" +
              "subfinder / nuclei / ffuf / gau / JS bundle などのリコン出力から「真のリード」だけを盆栽のように剪定する、バグハンター視点の学習ゲーム。あなたも挑戦してみよう！\n\n" +
              "#BugBountyJPGame"
            );
          }
          return (
            "I scored " +
            earned +
            " / " +
            total +
            " (" +
            pct +
            "%) — " +
            band +
            " rank on Bonsai Recon.\n" +
            "A bug-hunter's pruning game: shape subfinder / nuclei / ffuf / gau / JS-bundle output down to the real hot leads. Give it a shot!\n\n" +
            "#BugBountyJPGame"
          );
        }

        function onShare() {
          const earned = totalEarned();
          const total = totalPossible();
          const pct = Math.round((earned / total) * 100);
          const rankKey = getRankKey(earned);
          const text = buildShareText(earned, total, pct, rankKey);
          // new URL の相対パス解決でランク別シェア URL を組み立てる。
          // ドット入りディレクトリ名や /index.html 直指定にも安全。
          const url = new URL("share/" + rankKey + "/", location.href).href;
          const intent =
            "https://x.com/intent/tweet?text=" +
            encodeURIComponent(text) +
            "&url=" +
            encodeURIComponent(url);
          window.open(intent, "_blank", "noopener,noreferrer");
        }

        document.querySelectorAll(".lang-toggle button").forEach(function (btn) {
          btn.addEventListener("click", function () {
            setLanguage(btn.dataset.lang);
          });
        });
        document.getElementById("btn-start").addEventListener("click", startQuiz);
        document.getElementById("btn-prune").addEventListener("click", prune);
        document.getElementById("btn-reset").addEventListener("click", resetSelection);
        document.getElementById("btn-share").addEventListener("click", onShare);
        document.getElementById("btn-retry").addEventListener("click", startQuiz);

        (function initParticles() {
          const canvas = document.getElementById("particles");
          const ctx = canvas.getContext("2d");
          let w = 0;
          let h = 0;
          let particles = [];
          const reduce =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;

          function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
          }
          function create() {
            particles = [];
            const count = Math.max(28, Math.floor((w * h) / 32000));
            for (let i = 0; i < count; i++) {
              particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                r: Math.random() * 1.6 + 0.4,
                vx: (Math.random() - 0.5) * 0.18,
                vy: (Math.random() - 0.5) * 0.18,
                alpha: Math.random() * 0.5 + 0.15,
                hue: Math.random() < 0.55 ? "52, 211, 153" : "14, 165, 233",
              });
            }
          }
          function draw() {
            ctx.clearRect(0, 0, w, h);
            for (let i = 0; i < particles.length; i++) {
              const p = particles[i];
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
              ctx.fillStyle = "rgba(" + p.hue + ", " + p.alpha + ")";
              ctx.fill();
              p.x += p.vx;
              p.y += p.vy;
              if (p.x < 0) p.x = w;
              if (p.x > w) p.x = 0;
              if (p.y < 0) p.y = h;
              if (p.y > h) p.y = 0;
            }
            if (!reduce) requestAnimationFrame(draw);
          }
          resize();
          create();
          draw();
          window.addEventListener("resize", function () {
            resize();
            create();
          });
        })();

        // 言語トグルボタンの active 状態を currentLang に合わせて同期
        document.querySelectorAll(".lang-toggle button").forEach(function (b) {
          b.classList.toggle("active", b.dataset.lang === currentLang);
        });
        document.documentElement.lang = currentLang;
        applyI18n();
        requestAnimationFrame(updateLangPill);
        window.addEventListener("resize", updateLangPill);
      })();
    </script>
  </body>
</html>
