    <style>
      :root {
        /* カワセミ（kingfisher）配色：コバルトブルー × バーントオレンジ */
        --bg: #04111e;
        --bg2: #082336;
        --bg3: #0e3149;
        --surface: #103e58;
        --surface-2: #154d6d;
        --line: rgba(14, 165, 233, 0.2);
        --line-strong: rgba(14, 165, 233, 0.5);

        --text: #e6f4f9;
        --text-muted: #93c5d8;
        --text-dim: #5b8597;

        --primary: #0891b2;
        --primary-light: #22d3ee;
        --primary-deep: #155e75;
        --secondary: #f97316;
        --secondary-light: #fb923c;
        --accent: #fbbf24;
        --gold: #fbbf24;
        --success: #34d399;
        --danger: #fb7185;

        --radius: 14px;
        --radius-sm: 8px;
        --shadow: 0 12px 40px rgba(14, 165, 233, 0.22);
        --shadow-strong: 0 0 60px rgba(14, 165, 233, 0.4);

        --pad-x: 20px;
        --pad-bottom: max(80px, env(safe-area-inset-bottom));
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        height: 100%;
      }
      html,
      body {
        overflow-x: hidden;
        max-width: 100%;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      body {
        font-family:
          "Inter", "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic",
          "Noto Sans JP", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        word-wrap: break-word;
        overflow-wrap: break-word;
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      .bg-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .bg-grid {
        background-image:
          linear-gradient(
            to right,
            rgba(14, 165, 233, 0.04) 1px,
            transparent 1px
          ),
          linear-gradient(
            to bottom,
            rgba(14, 165, 233, 0.04) 1px,
            transparent 1px
          );
        background-size: 56px 56px;
        mask-image: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0.85) 0%,
          rgba(0, 0, 0, 0.2) 70%,
          transparent 100%
        );
      }
      .bg-glow1 {
        background: radial-gradient(
          circle at 18% 12%,
          rgba(14, 165, 233, 0.18),
          transparent 55%
        );
      }
      .bg-glow2 {
        background: radial-gradient(
          circle at 82% 88%,
          rgba(251, 146, 60, 0.14),
          transparent 60%
        );
      }
      #particles {
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
        max-width: 880px;
        width: 100%;
        margin: 0 auto;
        padding: 28px var(--pad-x) var(--pad-bottom);
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }
      .brand-mark {
        width: 36px;
        height: 36px;
        border-radius: 9px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 800;
        font-size: 18px;
        box-shadow: 0 0 20px rgba(14, 165, 233, 0.5);
      }
      .brand-text {
        display: flex;
        flex-direction: column;
        line-height: 1.15;
      }
      .brand-name {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.5px;
        color: var(--text);
      }
      .brand-sub {
        font-size: 10.5px;
        color: var(--text-dim);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .lang-toggle {
        display: inline-flex;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px;
        position: relative;
        overflow: hidden;
      }
      .lang-toggle button {
        background: transparent;
        border: 0;
        color: var(--text-muted);
        padding: 7px 14px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        border-radius: 999px;
        transition: color 0.2s;
        position: relative;
        z-index: 1;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        -webkit-tap-highlight-color: transparent;
      }
      .lang-toggle button.active {
        color: #fff;
      }
      .lang-toggle .lang-pill {
        position: absolute;
        top: 3px;
        left: 3px;
        height: calc(100% - 6px);
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        border-radius: 999px;
        transition:
          transform 0.28s ease,
          width 0.28s ease;
        z-index: 0;
        box-shadow: 0 0 16px rgba(14, 165, 233, 0.4);
      }

      .screen {
        display: none;
        animation: fadeIn 0.45s ease;
      }
      .screen.active {
        display: block;
      }

      .start-hero {
        text-align: center;
        margin-top: 6px;
        margin-bottom: 28px;
      }

      /* スタートヒーロー：クリップボード + 報告書 + 虫眼鏡 + 赤ペン */
      .triage-illustration {
        display: block;
        width: clamp(200px, 38vw, 280px);
        height: auto;
        margin: 0 auto 14px;
        filter: drop-shadow(0 14px 24px rgba(0, 0, 0, 0.55))
          drop-shadow(0 0 14px rgba(14, 165, 233, 0.12));
      }
      /* 虫眼鏡がレポート上をホバーする */
      .triage-illustration .magnifier {
        animation: magHover 4s ease-in-out infinite alternate;
        transform-origin: 30% 70%;
      }
      @keyframes magHover {
        from {
          transform: translate(0, 0) rotate(-3deg);
        }
        to {
          transform: translate(10px, -4px) rotate(4deg);
        }
      }
      /* チェックマークが順に書かれていくように */
      .triage-illustration .check-stroke {
        stroke-dasharray: 24;
        stroke-dashoffset: 24;
        animation: checkDraw 5s ease-in-out infinite;
      }
      .triage-illustration .check-stroke-b {
        animation-delay: 1s;
      }
      .triage-illustration .check-stroke-c {
        animation-delay: 2s;
      }
      .triage-illustration .check-stroke-d {
        animation-delay: 3s;
      }
      @keyframes checkDraw {
        0%,
        10% {
          stroke-dashoffset: 24;
        }
        25%,
        90% {
          stroke-dashoffset: 0;
        }
        100% {
          stroke-dashoffset: 0;
          opacity: 0;
        }
      }
      /* 赤ペンがゆらゆら */
      .triage-illustration .red-pen {
        animation: penTilt 5s ease-in-out infinite alternate;
        transform-origin: 100% 100%;
      }
      @keyframes penTilt {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(-6deg);
        }
      }

      .hero-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        font-size: 11px;
        letter-spacing: 2.5px;
        color: var(--secondary-light);
        background: rgba(251, 146, 60, 0.08);
        border: 1px solid rgba(251, 146, 60, 0.3);
        border-radius: 999px;
        font-weight: 700;
        margin-bottom: 18px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .hero-tag-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--secondary);
        box-shadow: 0 0 8px var(--secondary);
        animation: blink 1.4s infinite;
      }
      .hero-title {
        font-size: clamp(22px, 6vw, 44px);
        font-weight: 900;
        letter-spacing: -0.5px;
        line-height: 1.22;
        background: linear-gradient(
          120deg,
          var(--primary-light) 10%,
          var(--secondary-light) 55%,
          var(--accent) 95%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 12px;
      }
      .hero-sub {
        color: var(--text-muted);
        font-size: clamp(13.5px, 2vw, 15.5px);
        max-width: 600px;
        margin: 0 auto;
      }

      .info-card {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 22px 26px;
        margin-bottom: 22px;
        position: relative;
        overflow: hidden;
      }
      .info-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at top right,
          rgba(14, 165, 233, 0.08),
          transparent 60%
        );
        pointer-events: none;
      }
      .info-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 16px;
        position: relative;
      }
      .info-stat {
        text-align: center;
      }
      .info-stat-num {
        font-size: 26px;
        font-weight: 900;
        background: linear-gradient(
          135deg,
          var(--primary-light),
          var(--secondary-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        font-feature-settings: "tnum";
      }
      .info-stat-label {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 6px;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .sources {
        background: linear-gradient(160deg, var(--bg2), var(--surface));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 24px;
        margin-bottom: 26px;
      }
      .sources-title {
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 12px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .source-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .source-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        text-decoration: none;
        color: var(--text-muted);
        font-size: 13px;
        transition: all 0.2s;
      }
      .source-item:hover {
        border-color: var(--primary);
        color: var(--primary-light);
        transform: translateX(2px);
      }
      .source-tag {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 10.5px;
        font-weight: 700;
        color: var(--secondary-light);
        background: rgba(251, 146, 60, 0.1);
        padding: 3px 8px;
        border-radius: 4px;
        flex-shrink: 0;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .source-title {
        flex: 1;
      }
      .source-arrow {
        color: var(--text-dim);
      }

      .start-btn-wrap {
        text-align: center;
      }
      .btn-start {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 16px 36px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        border: 0;
        color: #fff;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.5px;
        border-radius: 999px;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 8px 32px rgba(14, 165, 233, 0.35);
        position: relative;
        overflow: hidden;
      }
      .btn-start::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          120deg,
          transparent 30%,
          rgba(255, 255, 255, 0.18) 50%,
          transparent 70%
        );
        transform: translateX(-100%);
        transition: transform 0.6s ease;
      }
      .btn-start:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 40px rgba(14, 165, 233, 0.5);
      }
      .btn-start:hover::after {
        transform: translateX(100%);
      }
      .start-note {
        margin-top: 14px;
        color: var(--text-dim);
        font-size: 12px;
      }

      /* クイズ画面のメタ情報＋進捗 */
      .quiz-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px 12px;
        flex-wrap: wrap;
        margin-bottom: 14px;
        font-size: 12.5px;
      }
      .quiz-counter {
        color: var(--text-muted);
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        letter-spacing: 1px;
      }
      .quiz-counter strong {
        color: var(--primary-light);
        font-size: 16px;
        font-weight: 800;
      }
      .quiz-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 12px;
        background: rgba(251, 146, 60, 0.08);
        border: 1px solid rgba(251, 146, 60, 0.25);
        border-radius: 999px;
        color: var(--secondary-light);
        font-size: 11px;
        letter-spacing: 0.5px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      /* レポート読み込み度合いゲージ */
      .readiness-bar {
        margin-bottom: 18px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 4px;
        position: relative;
        overflow: hidden;
      }
      .readiness-fill {
        height: 8px;
        background: linear-gradient(
          90deg,
          var(--primary),
          var(--secondary),
          var(--accent)
        );
        background-size: 200% 100%;
        animation: shimmer 4s linear infinite;
        border-radius: 999px;
        width: 0%;
        transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 0 12px rgba(14, 165, 233, 0.5);
      }
      .readiness-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 10.5px;
        color: var(--text-dim);
        letter-spacing: 1.2px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        margin-bottom: 6px;
      }
      .readiness-meta strong {
        color: var(--primary-light);
        font-weight: 800;
        font-size: 12px;
      }

      /* シナリオ全体のカード */
      .scenario-card {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 26px 28px;
        margin-bottom: 18px;
        animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .scenario-context {
        font-size: 13.5px;
        line-height: 1.7;
        color: var(--text-muted);
        margin-bottom: 14px;
      }
      .scenario-context strong {
        color: var(--text);
        font-weight: 700;
      }
      .scenario-question {
        font-size: clamp(15px, 2.4vw, 17px);
        line-height: 1.7;
        color: var(--text);
        font-weight: 700;
        margin-top: 18px;
      }

      /* 受信レポート風のパネル */
      .report-panel {
        background: var(--bg);
        border: 1px solid var(--line);
        border-left: 3px solid var(--secondary);
        border-radius: var(--radius-sm);
        padding: 14px 18px;
        margin: 14px 0 8px;
        position: relative;
      }
      .report-panel-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        font-size: 10.5px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--secondary-light);
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-bottom: 1px dashed rgba(251, 146, 60, 0.2);
      }
      .report-flag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        background: rgba(251, 113, 133, 0.12);
        border: 1px solid rgba(251, 113, 133, 0.35);
        color: var(--danger);
        font-weight: 700;
        border-radius: 4px;
        font-size: 9.5px;
        letter-spacing: 1.3px;
      }
      .report-flag-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--danger);
        box-shadow: 0 0 6px var(--danger);
      }
      .report-section-label {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        color: var(--text-dim);
        font-size: 10.5px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .report-content {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 13px;
        line-height: 1.7;
        color: var(--text);
        white-space: pre-wrap;
        word-break: break-word;
      }

      /* 重み付けバッジ（このシナリオが何点配点か） */
      .weight-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 10px;
        background: rgba(34, 211, 238, 0.1);
        border: 1px solid rgba(34, 211, 238, 0.3);
        color: var(--primary-light);
        border-radius: 999px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 10.5px;
        font-weight: 800;
        letter-spacing: 0.5px;
      }

      /* 選択肢 */
      .choices {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 16px;
      }
      .choice {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 16px 18px;
        background: var(--surface);
        border: 1.5px solid var(--line);
        color: var(--text);
        border-radius: var(--radius-sm);
        cursor: pointer;
        text-align: left;
        font-size: 14px;
        line-height: 1.6;
        transition: all 0.2s;
        position: relative;
        font-family: inherit;
        word-break: break-word;
        -webkit-tap-highlight-color: transparent;
      }
      .choice .choice-key,
      .choice .choice-icon {
        margin-top: 1px;
      }
      .choice:hover:not(:disabled) {
        border-color: var(--primary);
        background: var(--surface-2);
        transform: translateX(2px);
      }
      .choice:disabled {
        cursor: default;
      }
      .choice-key {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: rgba(14, 165, 233, 0.15);
        border: 1px solid rgba(14, 165, 233, 0.3);
        color: var(--primary-light);
        font-size: 12px;
        font-weight: 800;
        flex-shrink: 0;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        transition: all 0.2s;
      }
      .choice-text {
        flex: 1;
      }
      /* ◎ ○ △ × の段階ラベル（回答後に挿入される） */
      .choice-kind {
        display: inline-block;
        margin-right: 8px;
        padding: 1px 7px;
        border-radius: 4px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 10.5px;
        font-weight: 800;

      .feedback {

      .feedback.correct-fb {
        border-left-color: var(--success);

          var(--primary),

      .result-sub {

          var(--accent) calc(var(--pct) * 1%),

        align-items: center;
        justify-content: center;

        content: "";

        inset: 14px;
        border-radius: 50%;

      .score-content {
        position: relative;
        z-index: 1;
        text-align: center;
      }
      .score-num {
        font-size: 54px;
        font-weight: 900;

          135deg,
          var(--primary-light),
          var(--secondary-light)

        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        font-feature-settings: "tnum";

      .score-total {

      .result-stat {

      .result-stat-num {

      .result-stat-label {

      .btn-secondary {

        background: rgba(14, 165, 233, 0.12);

        background: rgba(251, 113, 133, 0.18);

        flex-wrap: wrap;

        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

        /* =========================================================
           正解インデックスの軽い難読化
             - 直書きせず XOR ベースで復号
             - DevTools でざっと QUIZ を眺めただけでは答えが拾えないようにする
           ========================================================= */
        const _ANS_ENC = [1, 3, 2, 0, 3, 2, 2, 1, 3, 0, 2, 2, 0];
        function _correctIdx(qIdx) {
          // _ANS_ENC[i] ^ ((i*5+13) & 3)  で実値を復元
          return _ANS_ENC[qIdx] ^ (((qIdx * 5 + 13) | 0) & 3);
        }

        // kinds 配列を 1 バイトにパックし、qIdx 依存マスクで軽く難読化
        // （SCENARIOS から ideal の位置を View Source で直読みされないように）
        // 0=ideal, 1=near, 2=ordinary, 3=far の 2bit を 4 個並べた値
        const _KIND_ENC = [
          227, 243, 252, 204, 180, 218, 42, 181, 153, 163, 148, 73, 89,
        ];
        const _KIND_NAMES = ["ideal", "near", "ordinary", "far"];
        function _kindAt(qIdx, choiceIdx) {
          const raw = _KIND_ENC[qIdx] ^ (((qIdx * 11 + 7) | 0) & 0xff);
          return _KIND_NAMES[(raw >> (choiceIdx * 2)) & 0x3];
        }

        /* =========================================================
           状態
           ========================================================= */
        let lang = "ja";
        try {
          // 全ゲーム共通キー mk12_game_lang を優先、旧キー triage_sim_lang から移行も読む
          const stored =
            localStorage.getItem("mk12_game_lang") ||
            localStorage.getItem("triage_sim_lang");
          if (stored === "ja" || stored === "en") lang = stored;
        } catch (e) {}

        let qIndex = 0;
        let answers = []; // { selected, correct, points, earned }
        let answered = false;

        function t(key) {
          return I18N[lang][key] !== undefined ? I18N[lang][key] : key;
        }

        /* =========================================================
           Markdown 風の **strong** を安全に DOM 描画
           （innerHTML を使わず XSS リスクを回避）
           ========================================================= */
        function renderInline(target, text) {
          target.textContent = "";
          const parts = String(text).split(/(\*\*[^*]+\*\*)/g);
          for (const part of parts) {
            if (part.startsWith("**") && part.endsWith("**")) {
              const strong = document.createElement("strong");
              strong.textContent = part.slice(2, -2);
              target.appendChild(strong);
            } else if (part.length) {
              // 改行文字 \n を <br> として尊重
              const lines = part.split(/\\n|\n/);
              lines.forEach((line, i) => {
                target.appendChild(document.createTextNode(line));
                if (i < lines.length - 1) {
                  target.appendChild(document.createElement("br"));
                }
              });
            }
          }
        }

        function updateLangPill() {
          const pill = document.getElementById("lang-pill");
          const buttons = document.querySelectorAll(".lang-toggle button");
          const active = document.querySelector(
            '.lang-toggle button[data-lang="' + lang + '"]',
          );
          if (!active || !pill) return;
          buttons.forEach(function (b) {
            b.classList.toggle("active", b === active);
          });
          pill.style.width = active.offsetWidth + "px";
          pill.style.transform =
            "translateX(" + (active.offsetLeft - 3) + "px)";
        }

        function setLanguage(next) {
          if (lang === next) return;
          lang = next;
          try {
            localStorage.setItem("mk12_game_lang", lang);
          } catch (e) {}
          applyI18n();
          updateLangPill();
          if (

          ) {

          if (
            document
              .getElementById("screen-result")
              .classList.contains("active")

        /* =========================================================
           画面切替
           ========================================================= */
        function showScreen(id) {
          document.querySelectorAll(".screen").forEach(function (s) {
            s.classList.remove("active");
          });
          document.getElementById(id).classList.add("active");
          window.scrollTo({ top: 0, behavior: "smooth" });

        /* =========================================================
           スコア集計
           ========================================================= */
        function totalEarned() {
          let earned = 0;
          for (const a of answers) {
            if (a) earned += a.earned || 0;
          }
          return earned;
        }
        function totalPossible() {
          let s = 0;
          for (const sc of SCENARIOS) s += sc.weight;
          return s; // = 100
        }

        function updateReadiness() {
          const earned = totalEarned();
          const total = totalPossible();
          const pct = Math.round((earned / total) * 100);
          document.getElementById("readiness-num").textContent = earned;
          document.getElementById("readiness-fill").style.width = pct + "%";
        }

        /* =========================================================
           シナリオ描画
           ========================================================= */
        function startQuiz() {
          qIndex = 0;
          answers = [];
          answered = false;
          document.getElementById("q-total").textContent = SCENARIOS.length;
          showScreen("screen-quiz");
          renderScenario();

        function renderScenario() {
          const item = SCENARIOS[qIndex];
          answered = !!answers[qIndex];

          document.getElementById("q-current").textContent = qIndex + 1;
          document.getElementById("q-tag").textContent = item.tag[lang];
          renderInline(
            document.getElementById("scenario-context"),

          document.getElementById("report-section").textContent =
            "// " + item.section[lang];
          document.getElementById("report-content").textContent =
            item.badContent[lang];
          document.getElementById("scenario-question").textContent =
            item.question[lang];

          updateReadiness();

          const choicesEl = document.getElementById("choices");
          choicesEl.textContent = "";

          const keys = ["A", "B", "C", "D"];
          item.choices.forEach(function (c, idx) {
            const btn = document.createElement("button");
            btn.className = "choice";
            btn.type = "button";

            const key = document.createElement("span");
            key.className = "choice-key";
            key.textContent = keys[idx];

            const text = document.createElement("span");
            text.className = "choice-text";
            renderInline(text, c[lang]);

            const icon = document.createElement("span");
            icon.className = "choice-icon";
            icon.setAttribute("aria-hidden", "true");

            btn.appendChild(key);
            btn.appendChild(text);
            btn.appendChild(icon);

            btn.addEventListener("click", function () {
              onAnswer(idx);
            });
            choicesEl.appendChild(btn);
          });

          document.getElementById("feedback-area").textContent = "";
          document.getElementById("btn-next").style.display = "none";

          if (answered) {
            applyAnswerVisual(answers[qIndex].selected);
            showFeedback(answers[qIndex].selected);
          }
        }

        function onAnswer(selectedIdx) {
          if (answered) return;
          answered = true;

          const item = SCENARIOS[qIndex];
          const correctIdx = _correctIdx(qIndex);
          const isCorrect = selectedIdx === correctIdx;
          const earned = isCorrect ? item.weight : 0;
          answers[qIndex] = {
            selected: selectedIdx,
            correct: correctIdx,
            points: item.weight,
            earned: earned,
          };

          applyAnswerVisual(selectedIdx);
          showFeedback(selectedIdx);
          updateReadiness();
        }

        // ◎正解 / ○近い誤り / △普通の誤り / ×全然違う のラベル
        function kindLabel(kind, langKey) {
          const map = {
            ideal: { ja: "◎ 正解", en: "◎ Ideal" },
            near: { ja: "○ 近い誤り", en: "○ Near miss" },
            ordinary: { ja: "△ 普通の誤り", en: "△ Common mistake" },
            far: { ja: "× 全然違う", en: "× Way off" },
          };
          return (map[kind] && map[kind][langKey]) || kind;
        }
        function kindGlyph(kind) {
          if (kind === "ideal") return "◎";
          if (kind === "near") return "○";
          if (kind === "ordinary") return "△";
          if (kind === "far") return "×";
          return "?";
        }

        function applyAnswerVisual(selectedIdx) {
          const item = SCENARIOS[qIndex];
          const correctIdx = _correctIdx(qIndex);
          const btns = document.querySelectorAll(".choice");
          btns.forEach(function (b, idx) {
            b.disabled = true;
            const icon = b.querySelector(".choice-icon");
            if (idx === correctIdx) {
              b.classList.add("correct");
              icon.textContent = "✓";
            } else if (idx === selectedIdx) {
              b.classList.add("wrong");
              icon.textContent = "✕";
            } else {
              b.classList.add("dim");
            }
            // 既存の choice-text の前に「種別ラベル」を差し込んで
            // 4 段階のグラデーション（◎/○/△/×）を可視化する
            const kind = _kindAt(qIndex, idx);
            if (kind) {
              const txt = b.querySelector(".choice-text");
              if (txt && !txt.querySelector(".choice-kind")) {
                const kindEl = document.createElement("span");
                kindEl.className = "choice-kind kind-" + kind;
                kindEl.textContent = kindLabel(kind, lang);
                txt.insertBefore(kindEl, txt.firstChild);
              }
            }
          });
        }

        function showFeedback(selectedIdx) {
          const item = SCENARIOS[qIndex];
          const correctIdx = _correctIdx(qIndex);
          const isCorrect = selectedIdx === correctIdx;
          const earned = isCorrect ? item.weight : 0;

          const fb = document.createElement("div");
          fb.className = "feedback " + (isCorrect ? "correct-fb" : "wrong-fb");

          const title = document.createElement("div");
          title.className = "feedback-title";
          const titleText = document.createElement("span");
          titleText.textContent =
            (isCorrect ? "✓ " : "✕ ") +
            (isCorrect ? t("quizCorrect") : t("quizWrong"));
          title.appendChild(titleText);
          const pts = document.createElement("span");
          pts.className = "feedback-points";
          pts.textContent = "+ " + earned + " / " + item.weight + " pt";
          pts.style.color = isCorrect ? "var(--success)" : "var(--danger)";
          title.appendChild(pts);
          fb.appendChild(title);

          const body = document.createElement("div");
          body.className = "feedback-body";
          renderInline(body, item.ex[lang].ok);
          fb.appendChild(body);

          if (item.ex[lang].tip) {
            const tip = document.createElement("div");
            tip.className = "feedback-tip";
            renderInline(tip, item.ex[lang].tip);
            fb.appendChild(tip);
          }

          const fbArea = document.getElementById("feedback-area");
          fbArea.textContent = "";
          fbArea.appendChild(fb);

          const nextBtn = document.getElementById("btn-next");
          nextBtn.textContent =
            qIndex >= SCENARIOS.length - 1 ? t("quizLast") : t("quizNext");
          nextBtn.style.display = "flex";
          nextBtn.onclick = onNext;
          /* focus-next-btn-after-answer */
          {
            const _ae = document.activeElement;
            const _aeChoice =
              _ae && _ae.classList && _ae.classList.contains("choice");
            if (!_ae || _ae === document.body || _aeChoice) {
              requestAnimationFrame(function () {
                try {
                  nextBtn.focus({ preventScroll: false });
                } catch (e) {
                  nextBtn.focus();
                }
              });
            }
          }
        }

        function onNext() {
          if (qIndex >= SCENARIOS.length - 1) {
            finishQuiz();
          } else {
            qIndex++;
            renderScenario();
          }
        }

        /* =========================================================
           結果
           ========================================================= */
        function finishQuiz() {
          renderResult();
          showScreen("screen-result");
        }

        // BBR-Review の override rule：Dim 12 = 0 / Dim 13 ≤ 5 で強制 "Do not submit"
        // 戻り値：null（発動なし）/ "dim12" / "dim13"
        function detectOverride() {
          const a12 = answers[11]; // Dim 12 · Tone & Formatting（10pt）
          const a13 = answers[12]; // Dim 13 · Quality Contamination（10pt）
          if (a12 && (a12.earned || 0) === 0) return "dim12";
          if (a13 && (a13.earned || 0) <= 5) return "dim13";
          return null;
        }

        // BBR-Review の 5 readiness band（share/<key>/ パスにも使う）
        // override 発動時は合計に関わらず "do-not-submit" を返す
        function getRankKey(score) {
          if (detectOverride()) return "do-not-submit";
          if (score >= 90) return "submit-ready";
          if (score >= 75) return "almost-ready";
          if (score >= 60) return "needs-work";
          if (score >= 40) return "major-rewrite";
          return "do-not-submit";
        }

        function getRank(score) {
          // BBR-Review readiness band: 90+/75+/60+/40+/<40
          const isJa = lang === "ja";
          const key = getRankKey(score);
          if (key === "submit-ready") {
            return {
              key: key,
              tag: "★ SUBMIT-READY",
              title: isJa ? "Submit-Ready" : "Submit-Ready",
              sub: isJa
                ? "BBR-Review 最上位バンド。即提出可能なクオリティ。"
                : "Top BBR-Review band. Ships straight to triage.",
              comment: isJa
                ? "**90〜100 点（Submit-ready）**：13 軸を読みこなし、override rule（Dim 12=0 / Dim 13≤5）も正しくハンドリングできる Triager 視点が身についています。次は実レポートで **first pass で 90+** を狙いましょう。"
                : "**90–100 (Submit-ready)**: you read all 13 axes and handle the override rules (Dim 12=0 / Dim 13≤5) correctly. Next: aim for **first-pass 90+** on real reports.",
            };
          }
          if (key === "almost-ready") {
            return {
              key: key,
              tag: "★ ALMOST READY",
              title: isJa ? "Almost Ready" : "Almost Ready",
              sub: isJa
                ? "微修正で提出可。あと 1〜2 軸の精度上げで Submit-ready。"
                : "Minor revisions away. Tighten 1–2 axes to ship.",
              comment: isJa
                ? "**75〜89 点（Almost ready）**：微修正で通るレベル。落とした 1〜2 軸 — 特に **再現手順 / PoC / 影響 / 攻撃シナリオ** のいずれか — を下の軸別レビューで復習すれば Submit-ready 圏内です。"
                : "**75–89 (Almost ready)**: a small revision away. Re-read the 1–2 axes you missed (commonly Reproduction / PoC / Impact / Attack Scenario) in the axis review below to land in Submit-ready.",
            };
          }
          if (key === "needs-work") {
            return {
              key: key,
              tag: "★ NEEDS WORK",
              title: isJa ? "Needs Work" : "Needs Work",
              sub: isJa
                ? "土台あり、ただしトリアージから質問が 1〜2 ラウンド来る水準。"
                : "Foundation present, but expect 1–2 rounds of triage questions.",
              comment: isJa
                ? "**60〜74 点（Needs work）**：高配点軸 — **再現 (12) / PoC (12) / 影響 (10) / Tone (10) / Quality Contamination (10)** — のうち落としている軸を優先的に潰すと一気に 75+ が見えてきます。**override rule** を確実に拾えるかも 75 への分岐点です。"
                : "**60–74 (Needs work)**: focus first on the high-weight axes — **Reproduction (12) / PoC (12) / Impact (10) / Tone (10) / Quality Contamination (10)**. Catching the **override rules** reliably is also the swing into 75+.",
            };
          }
          if (key === "major-rewrite") {
            return {
              key: key,
              tag: "★ MAJOR REWRITE",
              title: isJa ? "Major Rewrite" : "Major Rewrite",
              sub: isJa
                ? "構造から書き直し。Informative リスクあり。"
                : "Heavy rewrite needed. Risk of Informative closure.",
              comment: isJa
                ? "**40〜59 点（Major rewrite）**：提出すると Informative / N/A で閉じられる確率が高い帯。**Scope → Title → Reproduction → PoC → Impact** の順で 1 軸ずつ理想形へ書き直す習慣で、次回 60〜70+ に届きます。"
                : "**40–59 (Major rewrite)**: likely Informative / N/A on submission. Rewrite one axis at a time in order **Scope → Title → Reproduction → PoC → Impact** to reach 60–70+ next pass.",
            };
          }
          return {
            key: key,
            tag: "★ DO NOT SUBMIT",
            title: isJa ? "Do Not Submit" : "Do Not Submit",
            sub: isJa
              ? "提出は控え、まず BBR-Review の 13 軸を 1 周読んでください。"
              : "Don't submit — read BBR-Review's 13-axis frame first.",
            comment: isJa
              ? "**0〜39 点（Do not submit）**：提出はリスクが高い水準です。まず **scgajge12/bug-bounty-report-review** の `references/checklist.md` と `references/cvss-guide.md` を 1 周読み、override rule（Dim 12=0 / Dim 13≤5）を含む 13 軸の配点を体に入れてからリトライしてください。"
              : "**0–39 (Do not submit)**: submitting at this level risks reputation. Read **scgajge12/bug-bounty-report-review**'s `references/checklist.md` and `references/cvss-guide.md` once, internalize the 13 axes (and the Dim 12=0 / Dim 13≤5 override rules), then retry.",
          };
        }

        function renderResult() {
          const correctCount = answers.filter(function (a) {
            return a && a.selected === a.correct;
          }).length;
          const wrongCount = SCENARIOS.length - correctCount;
          const earned = totalEarned();
          const total = totalPossible();
          const pct = Math.round((earned / total) * 100);
          const rank = getRank(earned);

          document.getElementById("result-rank").textContent = rank.tag;
          document.getElementById("result-title").textContent = rank.title;
          document.getElementById("result-sub").textContent = rank.sub;
          document.getElementById("score-num").textContent = earned;
          document.getElementById("score-ring").style.setProperty("--pct", pct);
          document.getElementById("stat-correct").textContent = correctCount;
          document.getElementById("stat-wrong").textContent = wrongCount;
          document.getElementById("stat-pct").textContent = pct + "%";
          renderInline(document.getElementById("result-comment"), rank.comment);

          // override rule 発動時は理由を表示し、合計点だけでは判定が変わらないことを明示する
          const overrideKind = detectOverride();
          const overrideEl = document.getElementById("result-override-notice");
          if (overrideKind) {
            overrideEl.style.display = "block";
            renderInline(
              overrideEl,
              t(
                overrideKind === "dim12"
                  ? "overrideNoticeDim12"
                  : "overrideNoticeDim13",
              ),
            );
          } else {
            overrideEl.style.display = "none";
            overrideEl.textContent = "";
          }

          const reviewGrid = document.getElementById("review-grid");
          reviewGrid.textContent = "";
          const keys = ["A", "B", "C", "D"];
          SCENARIOS.forEach(function (item, i) {
            const ans = answers[i];
            const isOk = ans && ans.selected === ans.correct;
            const row = document.createElement("div");
            row.className = "review-item";

            const mark = document.createElement("div");
            mark.className = "review-mark " + (isOk ? "ok" : "ng");
            mark.textContent = (isOk ? "+" : "") + (ans ? ans.earned : 0);

            const content = document.createElement("div");
            content.className = "review-content";

            const qLine = document.createElement("div");
            qLine.className = "review-q";
            const dim = document.createElement("span");
            dim.className = "review-dim";
            dim.textContent = "[" + item.dim[lang] + "]";
            const qText = document.createElement("span");
            qText.textContent = item.question[lang];
            const pointsLabel = document.createElement("span");
            pointsLabel.className = "review-points";
            pointsLabel.textContent = item.weight + " pt";
            qLine.appendChild(dim);
            qLine.appendChild(qText);
            qLine.appendChild(pointsLabel);
            content.appendChild(qLine);

            if (ans) {
              const aLine = document.createElement("div");
              aLine.className = "review-a";
              const yourTag = document.createElement("span");
              yourTag.className = "review-a-tag";
              yourTag.style.color = isOk ? "var(--success)" : "var(--danger)";
              const _selKind = _kindAt(i, ans.selected);
              const yourKind = _selKind ? " " + kindGlyph(_selKind) : "";
              yourTag.textContent =
                "[" + t("resultYour") + "] " + keys[ans.selected] + yourKind;
              aLine.appendChild(yourTag);
              const yourText = document.createElement("span");
              renderInline(yourText, item.choices[ans.selected][lang]);
              aLine.appendChild(yourText);
              content.appendChild(aLine);

              if (!isOk) {
                const cLine = document.createElement("div");
                cLine.className = "review-a";
                cLine.style.marginTop = "4px";
                const cTag = document.createElement("span");
                cTag.className = "review-a-tag";
                cTag.style.color = "var(--success)";
                cTag.textContent =
                  "[" + t("resultAnswer") + "] " + keys[ans.correct] + " ◎";
                cLine.appendChild(cTag);
                const cText = document.createElement("span");
                renderInline(cText, item.choices[ans.correct][lang]);
                cLine.appendChild(cText);
                content.appendChild(cLine);
              }
            }

            row.appendChild(mark);
            row.appendChild(content);
            reviewGrid.appendChild(row);
          });
        }

        /* =========================================================
           X (Twitter) シェア
             - スコアを BBR-Review 5 readiness band（Submit-ready 〜 Do not submit）
               にバケット化し、`share/<rank-key>/index.html` のスコア別 OGP を持つ
               シェアランディングページへリンクする。
           ========================================================= */
        function rankBandLabel(key, langKey) {
          const map = {
            "submit-ready": { ja: "Submit-ready", en: "Submit-ready" },
            "almost-ready": { ja: "Almost ready", en: "Almost ready" },
            "needs-work": { ja: "Needs work", en: "Needs work" },
            "major-rewrite": { ja: "Major rewrite", en: "Major rewrite" },
            "do-not-submit": { ja: "Do not submit", en: "Do not submit" },
          };
          return (map[key] && map[key][langKey]) || key;
        }

        function buildShareText(earned, total, pct, rankKey) {
          const band = rankBandLabel(rankKey, lang);
          if (lang === "ja") {
            return (
              "「トリアージ・シミュレーション」で " +
              earned +
              " / " +
              total +
              " 点（" +
              pct +
              "%）獲得！判定: " +
              band +
              "（BBR-Review 13 軸 100 点法準拠）\n" +
              "バグバウンティのレポート品質を 13 軸で診断する 4 択シミュレーションです。あなたも挑戦してみよう！\n\n" +
              "#BugBountyJPGame"
            );
          }
          return (
            "I scored " +
            earned +
            " / " +
            total +
            " (" +
            pct +
            "%) — " +
            band +
            " band on the Bug Bounty Triage Simulator (BBR-Review 13-axis, 100-pt frame).\n" +
            "A 4-choice sim that grades reports across 13 axes — give it a shot!\n\n" +
            "#BugBountyJPGame"
          );
        }

        function onShare() {
          const earned = totalEarned();
          const total = totalPossible();
          const pct = Math.round((earned / total) * 100);
          const rankKey = getRankKey(earned);
          const text = buildShareText(earned, total, pct, rankKey);
          // share/<rank-key>/index.html は事前に静的生成されている。
          // OGP がランクごとに焼かれるため X のカードもランク別になる。
          // new URL の相対パス解決でドット入りディレクトリ名や /index.html 直指定にも安全。
          const url = new URL("share/" + rankKey + "/", location.href).href;
          const intent =
            "https://x.com/intent/tweet?text=" +
            encodeURIComponent(text) +
            "&url=" +
            encodeURIComponent(url);
          window.open(intent, "_blank", "noopener,noreferrer");
        }

        /* =========================================================
           イベントバインド
           ========================================================= */
        document
          .querySelectorAll(".lang-toggle button")
          .forEach(function (btn) {
            btn.addEventListener("click", function () {
              setLanguage(btn.dataset.lang);
            });
          });
        document
          .getElementById("btn-start")
          .addEventListener("click", startQuiz);
        document.getElementById("btn-share").addEventListener("click", onShare);
        document
          .getElementById("btn-retry")
          .addEventListener("click", startQuiz);

        /* =========================================================
           パーティクル背景（共通カワセミ風）
           ========================================================= */
        (function initParticles() {
          const canvas = document.getElementById("particles");
          const ctx = canvas.getContext("2d");
          let w = 0;
          let h = 0;
          let particles = [];
          const reduce =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;

          function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
          }
          function create() {
            particles = [];
            const count = Math.max(28, Math.floor((w * h) / 32000));
            for (let i = 0; i < count; i++) {
              particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                r: Math.random() * 1.6 + 0.4,
                vx: (Math.random() - 0.5) * 0.18,
                vy: (Math.random() - 0.5) * 0.18,
                alpha: Math.random() * 0.5 + 0.15,
                hue: Math.random() < 0.5 ? "14, 165, 233" : "251, 146, 60",
              });
            }
          }
          function draw() {
            ctx.clearRect(0, 0, w, h);
            for (let i = 0; i < particles.length; i++) {
              const p = particles[i];
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
              ctx.fillStyle = "rgba(" + p.hue + ", " + p.alpha + ")";
              ctx.fill();
              p.x += p.vx;
              p.y += p.vy;
              if (p.x < 0) p.x = w;
              if (p.x > w) p.x = 0;
              if (p.y < 0) p.y = h;
              if (p.y > h) p.y = 0;
            }
            if (!reduce) requestAnimationFrame(draw);
          }
          resize();
          create();
          draw();
          window.addEventListener("resize", function () {
            resize();
            create();
          });
        })();

        /* =========================================================
           初期化
           ========================================================= */
        applyI18n();
        requestAnimationFrame(updateLangPill);
        /* ===== Quiz keyboard shortcuts (1-4 / A-D / Enter) ===== */
        document.addEventListener("keydown", function (_kbEvt) {
          if (_kbEvt.isComposing || _kbEvt.keyCode === 229) return;
          const _tg = _kbEvt.target;
          if (_tg && /^(INPUT|TEXTAREA|SELECT)$/i.test(_tg.tagName)) return;
          // quiz 画面がアクティブな時のみ反応する
          const _scr = document.querySelector("#screen-quiz.active");
          if (!_scr) return;
          // Enter / Space で「次へ」ボタンを進める
          if (
            _kbEvt.key === "Enter" ||
            _kbEvt.key === " " ||
            _kbEvt.code === "Space"
          ) {
            const _nb = document.getElementById("btn-next");
            if (_nb && _nb.style.display !== "none" && !_nb.disabled) {
              _kbEvt.preventDefault();
              _nb.click();
            }
            return;
          }
          // 1-4 / A-D で choice を選択（disabled なら無視）
          let _idx = -1;
          if (/^[1-4]$/.test(_kbEvt.key)) _idx = parseInt(_kbEvt.key, 10) - 1;
          else if (/^[a-dA-D]$/.test(_kbEvt.key))
            _idx = _kbEvt.key.toUpperCase().charCodeAt(0) - 65;
          if (_idx < 0) return;
          const _btns = _scr.querySelectorAll(".choice");
          if (_btns[_idx] && !_btns[_idx].disabled) {
            _kbEvt.preventDefault();
            _btns[_idx].click();
          }
        });

        window.addEventListener("resize", updateLangPill);
      })();
    </script>
  </body>
</html>
