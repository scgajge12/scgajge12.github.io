    <style>
      :root {
        /* カワセミ（kingfisher）配色：BBH と統一 */
        --bg: #04111e;
        --bg2: #082336;
        --bg3: #0e3149;
        --surface: #103e58;
        --surface-2: #154d6d;
        --line: rgba(14, 165, 233, 0.2);
        --line-strong: rgba(14, 165, 233, 0.5);

        --text: #e6f4f9;
        --text-muted: #93c5d8;
        --text-dim: #5b8597;

        --primary: #0891b2;
        --primary-light: #22d3ee;
        --primary-deep: #155e75;
        --secondary: #f97316;
        --secondary-light: #fb923c;
        --accent: #fbbf24;
        --gold: #fbbf24;
        --success: #34d399;
        --danger: #fb7185;

        /* 寿司テーマのアクセント（醤油・木目） */
        --shoyu: #3b1d09;
        --wood: #6b3a1c;
        --wood-light: #a05a2c;

        --radius: 14px;
        --radius-sm: 8px;
        --shadow: 0 12px 40px rgba(14, 165, 233, 0.22);
        --shadow-strong: 0 0 60px rgba(14, 165, 233, 0.4);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        font-family:
          "Inter", "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic",
          "Noto Sans JP", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        word-wrap: break-word;
        overflow-wrap: break-word;
        /* セーフエリア（iPhone ノッチ／ホームインジケータ）対応 */
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      /* 背景レイヤー（BBH と同等のカワセミ風） */
      .bg-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .bg-grid {
        background-image:
          linear-gradient(
            to right,
            rgba(14, 165, 233, 0.04) 1px,
            transparent 1px
          ),
          linear-gradient(
            to bottom,
            rgba(14, 165, 233, 0.04) 1px,
            transparent 1px
          );
        background-size: 56px 56px;
        mask-image: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0.85) 0%,
          rgba(0, 0, 0, 0.2) 70%,
          transparent 100%
        );
      }
      .bg-glow1 {
        background: radial-gradient(
          circle at 18% 12%,
          rgba(14, 165, 233, 0.18),
          transparent 55%
        );
      }
      .bg-glow2 {
        background: radial-gradient(
          circle at 82% 88%,
          rgba(251, 146, 60, 0.14),
          transparent 60%
        );
      }
      #particles {
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
        max-width: 920px;
        margin: 0 auto;
        /* セーフエリア（iPhone ホームインジケータ）下部に追従 */
        padding: 28px 20px max(80px, env(safe-area-inset-bottom));
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }
      .brand-mark {
        width: 36px;
        height: 36px;
        border-radius: 9px;
        background: linear-gradient(135deg, var(--secondary), var(--accent));
        display: flex;
        align-items: center;
        justify-content: center;
        color: #2a1402;
        font-weight: 800;
        font-size: 18px;
        box-shadow: 0 0 20px rgba(251, 146, 60, 0.45);
      }
      .brand-text {
        display: flex;
        flex-direction: column;
        line-height: 1.15;
      }
      .brand-name {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.5px;
        color: var(--text);
      }
      .brand-sub {
        font-size: 10.5px;
        color: var(--text-dim);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .lang-toggle {
        display: inline-flex;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px;
        position: relative;
        overflow: hidden;
      }
      .lang-toggle button {
        background: transparent;
        border: 0;
        color: var(--text-muted);
        padding: 7px 14px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        border-radius: 999px;
        transition: color 0.2s;
        position: relative;
        z-index: 1;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        -webkit-tap-highlight-color: transparent;
      }
      .lang-toggle button.active {
        color: #fff;
      }
      .lang-toggle .lang-pill {
        position: absolute;
        top: 3px;
        left: 3px;
        height: calc(100% - 6px);
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        border-radius: 999px;
        transition:
          transform 0.28s ease,
          width 0.28s ease;
        z-index: 0;
        box-shadow: 0 0 16px rgba(14, 165, 233, 0.4);
      }

      .screen {
        display: none;
        animation: fadeIn 0.45s ease;
      }
      .screen.active {
        display: block;
      }

      /* ============ START SCREEN ============ */
      .start-hero {
        text-align: center;
        margin-top: 6px;
        margin-bottom: 28px;
      }
      .hero-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        font-size: 11px;
        letter-spacing: 2.5px;
        color: var(--secondary-light);
        background: rgba(251, 146, 60, 0.08);
        border: 1px solid rgba(251, 146, 60, 0.3);
        border-radius: 999px;
        font-weight: 700;
        margin-bottom: 18px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .hero-tag-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--secondary);
        box-shadow: 0 0 8px var(--secondary);
        animation: blink 1.4s infinite;
      }
      .hero-title {
        font-size: clamp(24px, 6.4vw, 46px);
        font-weight: 900;
        letter-spacing: -0.5px;
        line-height: 1.18;
        background: linear-gradient(
          120deg,
          var(--primary-light) 10%,
          var(--secondary-light) 55%,
          var(--accent) 95%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 12px;
      }
      .hero-sub {
        color: var(--text-muted);
        font-size: clamp(13.5px, 2vw, 15.5px);
        max-width: 600px;
        margin: 0 auto;
      }

      .info-card {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 22px 26px;
        margin-bottom: 22px;
        position: relative;
        overflow: hidden;
      }
      .info-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at top right,
          rgba(14, 165, 233, 0.08),
          transparent 60%
        );
        pointer-events: none;
      }
      .info-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 16px;
        position: relative;
      }
      .info-stat {
        text-align: center;
      }
      .info-stat-num {
        font-size: 26px;
        font-weight: 900;
        background: linear-gradient(
          135deg,
          var(--primary-light),
          var(--secondary-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        font-feature-settings: "tnum";
      }
      .info-stat-label {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 6px;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      /* モード選択 */
      .mode-select {
        background: linear-gradient(160deg, var(--bg2), var(--surface));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 24px;
        margin-bottom: 22px;
      }
      .mode-title {
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 12px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .mode-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
      }
      .mode-card {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 14px 16px;
        background: var(--bg);
        border: 1.5px solid var(--line);
        border-radius: var(--radius-sm);
        color: var(--text-muted);
        cursor: pointer;
        text-align: left;
        font-family: inherit;
        transition: all 0.2s;
        -webkit-tap-highlight-color: transparent;
      }
      .mode-card:hover {
        border-color: var(--primary);
        color: var(--text);
        transform: translateY(-1px);
      }
      .mode-card.selected {
        border-color: var(--secondary);
        background: rgba(251, 146, 60, 0.08);
        color: var(--text);
        box-shadow: 0 0 18px rgba(251, 146, 60, 0.2);
      }
      .mode-card-name {
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.5px;
      }
      .mode-card-name .mode-icon {
        margin-right: 6px;
      }
      .mode-card-desc {
        font-size: 12px;
        color: var(--text-dim);
        line-height: 1.5;
      }
      .mode-card.selected .mode-card-desc {
        color: var(--text-muted);
      }

      .start-btn-wrap {
        text-align: center;
      }
      .btn-start {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 16px 36px;
        background: linear-gradient(135deg, var(--secondary), var(--accent));
        border: 0;
        color: #2a1402;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.5px;
        border-radius: 999px;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 8px 32px rgba(251, 146, 60, 0.4);
        position: relative;
        overflow: hidden;
      }
      .btn-start::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          120deg,
          transparent 30%,
          rgba(255, 255, 255, 0.25) 50%,
          transparent 70%
        );
        transform: translateX(-100%);
        transition: transform 0.6s ease;
      }
      .btn-start:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 40px rgba(251, 146, 60, 0.55);
      }
      .btn-start:hover::after {
        transform: translateX(100%);
      }
      .start-note {
        margin-top: 14px;
        color: var(--text-dim);
        font-size: 12px;
      }

      .howto {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 24px;
        margin-bottom: 26px;
      }
      .howto-title {
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 10px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .howto-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.65;
      }
      .howto-list li {
        padding-left: 22px;
        position: relative;
      }
      .howto-list li::before {
        content: "▸";
        position: absolute;
        left: 6px;
        top: 0;
        color: var(--primary-light);
        font-weight: 700;
      }
      .howto-list code {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 11.5px;
        background: var(--bg);
        border: 1px solid var(--line);
        padding: 1px 6px;
        border-radius: 4px;
        color: var(--accent);
      }

      /* ============ GAME SCREEN ============ */
      .hud {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-bottom: 14px;
      }
      .hud-cell {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 10px 12px;
        text-align: center;
      }
      .hud-label {
        font-size: 9.5px;
        color: var(--text-dim);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .hud-value {
        font-size: 19px;
        font-weight: 900;
        color: var(--text);
        font-feature-settings: "tnum";
        margin-top: 3px;
        line-height: 1.1;
      }
      .hud-value.score {
        background: linear-gradient(
          135deg,
          var(--primary-light),
          var(--secondary-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .hud-value.combo {
        color: var(--accent);
      }
      .hud-value.combo.boost {
        animation: comboBoost 0.4s ease;
      }
      .hud-value.timer.warn {
        color: var(--danger);
        animation: pulse 0.6s infinite;
      }
      .hud-lives {
        font-size: 18px;
        margin-top: 1px;
        line-height: 1.1;
        letter-spacing: 2px;
      }
      .hud-life {
        display: inline-block;
        transition:
          opacity 0.3s,
          transform 0.3s;
      }
      .hud-life.lost {
        opacity: 0.18;
        transform: scale(0.7);
      }

      /* タイマーバー */
      .game-progress {
        height: 5px;
        background: var(--surface);
        border-radius: 999px;
        overflow: hidden;
        margin-bottom: 18px;
        border: 1px solid var(--line);
      }
      .game-progress-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--primary),
          var(--secondary),
          var(--accent)
        );
        background-size: 200% 100%;
        animation: shimmer 4s linear infinite;
        transition: width 0.2s linear;
        border-radius: 999px;
        box-shadow: 0 0 12px rgba(14, 165, 233, 0.5);
      }
      .game-progress-fill.warn {
        background: linear-gradient(90deg, var(--danger), var(--secondary));
      }

      /* 寿司レーン全体 */
      .lane-stage {
        position: relative;
        margin-bottom: 16px;
      }
      .countdown {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(80px, 18vw, 140px);
        font-weight: 900;
        background: linear-gradient(
          120deg,
          var(--primary-light),
          var(--secondary-light),
          var(--accent)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        z-index: 5;
        pointer-events: none;
        animation: countdownPulse 0.7s ease;
      }

      /* 現在のターゲット皿 */
      .target-stage {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 22px 26px;
        position: relative;
        overflow: hidden;
        min-height: 220px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .target-stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at top right,
          rgba(251, 146, 60, 0.08),
          transparent 60%
        );
        pointer-events: none;
      }
      .target-card {
        position: relative;
        display: flex;
        align-items: center;
        gap: 18px;
        animation: slideInFromRight 0.45s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .target-card.exit-correct {
        animation: slideOutLeft 0.4s ease forwards;
      }
      .target-card.exit-wrong {
        animation: shakeOut 0.5s ease forwards;
      }
      .target-card.exit-miss {
        animation: dropOut 0.45s ease forwards;
      }
      .plate {
        flex-shrink: 0;
        position: relative;
        width: 110px;
        height: 110px;
        border-radius: 50%;
        background: radial-gradient(
          circle at 30% 28%,
          #e8e8ec 0%,
          #c7c8cd 45%,
          #8b8d94 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 56px;
        line-height: 1;
        box-shadow:
          inset 0 -6px 14px rgba(0, 0, 0, 0.18),
          inset 0 6px 14px rgba(255, 255, 255, 0.32),
          0 8px 22px rgba(0, 0, 0, 0.4);
        border: 3px solid #5a5d65;
      }
      .plate.gold {
        background: radial-gradient(
          circle at 30% 28%,
          #fff5c2 0%,
          #fbbf24 45%,
          #b3760a 100%
        );
        border-color: #7a4f06;
        box-shadow:
          inset 0 -6px 14px rgba(122, 79, 6, 0.4),
          inset 0 6px 14px rgba(255, 255, 255, 0.45),
          0 0 28px rgba(251, 191, 36, 0.55);
        animation: goldShine 1.4s ease-in-out infinite;
      }
      .plate.trap {
        background: radial-gradient(
          circle at 30% 28%,
          #4a4a55 0%,
          #1f1f28 50%,
          #0a0a10 100%
        );
        border-color: #000;
        box-shadow:
          inset 0 -6px 14px rgba(0, 0, 0, 0.6),
          inset 0 6px 14px rgba(255, 255, 255, 0.05),
          0 0 22px rgba(251, 113, 133, 0.25);
      }
      .plate-timer {
        position: absolute;
        inset: -8px;
        border-radius: 50%;
        pointer-events: none;
        background: conic-gradient(
          from -90deg,
          var(--primary-light) calc(var(--ptime) * 1%),
          rgba(14, 165, 233, 0.15) calc(var(--ptime) * 1%)
        );
        -webkit-mask: radial-gradient(
          circle,
          transparent 53%,
          black 53%,
          black 60%,
          transparent 60%
        );
        mask: radial-gradient(
          circle,
          transparent 53%,
          black 53%,
          black 60%,
          transparent 60%
        );
        --ptime: 100;
        transition: background 0.2s linear;
      }
      .plate-timer.warn {
        background: conic-gradient(
          from -90deg,
          var(--danger) calc(var(--ptime) * 1%),
          rgba(251, 113, 133, 0.15) calc(var(--ptime) * 1%)
        );
      }

      .target-info {
        flex: 1;
        min-width: 0;
      }
      .target-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 10px;
        background: rgba(251, 146, 60, 0.08);
        border: 1px solid rgba(251, 146, 60, 0.25);
        border-radius: 999px;
        color: var(--secondary-light);
        font-size: 10.5px;
        letter-spacing: 1px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        margin-bottom: 8px;
      }
      .target-tag.gold {
        color: var(--accent);
        background: rgba(251, 191, 36, 0.1);
        border-color: rgba(251, 191, 36, 0.4);
      }
      .target-tag.trap {
        color: var(--text-muted);
        background: rgba(0, 0, 0, 0.4);
        border-color: rgba(255, 255, 255, 0.2);
      }
      .target-name {
        font-size: 13px;
        color: var(--text-dim);
        letter-spacing: 1px;
        margin-bottom: 4px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .target-func {
        font-size: clamp(15px, 2.4vw, 18px);
        line-height: 1.55;
        color: var(--text);
        font-weight: 700;
      }
      .target-func code {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 0.86em;
        background: var(--bg);
        border: 1px solid var(--line);
        padding: 1px 6px;
        border-radius: 4px;
        color: var(--accent);
        font-weight: 600;
      }

      /* レーン（next 表示） */
      .lane-belt {
        position: relative;
        background: repeating-linear-gradient(
          90deg,
          var(--shoyu) 0,
          var(--shoyu) 28px,
          var(--wood) 28px,
          var(--wood) 32px
        );
        border: 1px solid rgba(160, 90, 44, 0.4);
        border-radius: var(--radius-sm);
        padding: 12px 14px;
        overflow: hidden;
        box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.45);
      }
      .lane-belt::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.35) 0%,
          transparent 30%,
          transparent 70%,
          rgba(0, 0, 0, 0.45) 100%
        );
        pointer-events: none;
      }
      .lane-belt.move::after {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          90deg,
          transparent 0,
          transparent 28px,
          rgba(255, 255, 255, 0.05) 28px,
          rgba(255, 255, 255, 0.05) 32px
        );
        animation: beltMove 1.2s linear infinite;
      }
      .lane-next-row {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: nowrap;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .lane-next-row::-webkit-scrollbar {
        display: none;
      }
      .lane-arrow {
        color: rgba(255, 255, 255, 0.5);
        font-size: 14px;
        flex-shrink: 0;
      }
      .lane-next-label {
        font-size: 10px;
        letter-spacing: 1.5px;
        color: rgba(255, 255, 255, 0.55);
        text-transform: uppercase;
        margin-right: 4px;
        flex-shrink: 0;
      }
      .lane-mini {
        flex-shrink: 0;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 28%, #d8d8dc 0%, #a0a1a8 70%);
        border: 2px solid #4d4f55;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        line-height: 1;
        box-shadow: inset 0 -2px 4px rgba(0, 0, 0, 0.25);
      }
      .lane-mini.gold-mini {
        background: radial-gradient(circle at 30% 28%, #fff0a8 0%, #d99405 70%);
        border-color: #6a4304;
      }
      .lane-mini.trap-mini {
        background: radial-gradient(circle at 30% 28%, #2d2d36 0%, #0a0a10 70%);
        border-color: #000;
      }

      /* 攻撃選択ボタン */
      .choices {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 14px;
      }
      .choice {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 16px;
        background: var(--surface);
        border: 1.5px solid var(--line);
        color: var(--text);
        border-radius: var(--radius-sm);
        cursor: pointer;
        text-align: left;
        font-size: 13.5px;
        line-height: 1.5;
        transition: all 0.18s;
        position: relative;
        font-family: inherit;
        word-break: break-word;
        -webkit-tap-highlight-color: transparent;
      }
      .choice:hover:not(:disabled) {
        border-color: var(--primary);
        background: var(--surface-2);
        transform: translateY(-1px);
      }
      .choice:disabled {
        cursor: default;
      }
      .choice-key {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 7px;
        background: rgba(14, 165, 233, 0.15);
        border: 1px solid rgba(14, 165, 233, 0.3);
        color: var(--primary-light);
        font-size: 11px;
        font-weight: 800;
        flex-shrink: 0;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        margin-top: 1px;
      }
      .choice-text {
        flex: 1;
        font-weight: 600;
      }
      .choice.correct {
        border-color: var(--success);
        background: rgba(52, 211, 153, 0.12);
        animation: correctFlash 0.5s ease;
      }
      .choice.correct .choice-key {
        background: var(--success);
        color: #04261b;
        border-color: var(--success);
      }
      .choice.wrong {
        border-color: var(--danger);
        background: rgba(251, 113, 133, 0.12);
        animation: wrongShake 0.4s ease;
      }
      .choice.wrong .choice-key {
        background: var(--danger);
        color: #2a0710;
        border-color: var(--danger);
      }
      .choice.dim {
        opacity: 0.45;
      }

      .pass-row {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }
      .btn-pass {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 13px 16px;
        background: var(--bg2);
        border: 1.5px dashed var(--line-strong);
        color: var(--text-muted);
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.5px;
        font-family: inherit;
        transition: all 0.2s;
        -webkit-tap-highlight-color: transparent;
      }
      .btn-pass:hover:not(:disabled) {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(251, 191, 36, 0.06);
      }
      .btn-pass:disabled {
        cursor: default;
      }
      .btn-pass.correct {
        border: 1.5px solid var(--success);
        background: rgba(52, 211, 153, 0.12);
        color: var(--success);
        animation: correctFlash 0.5s ease;
      }
      .btn-pass.wrong {
        border: 1.5px solid var(--danger);
        background: rgba(251, 113, 133, 0.12);
        color: var(--danger);
        animation: wrongShake 0.4s ease;
      }
      .btn-pass-key {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 28px;
        height: 22px;
        padding: 0 8px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.16);
        font-size: 10.5px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      /* 一時フィードバック吹き出し */
      .toast {
        position: absolute;
        top: 14px;
        right: 14px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-left: 3px solid var(--success);
        border-radius: var(--radius-sm);
        padding: 8px 14px;
        font-size: 12.5px;
        font-weight: 800;
        color: var(--success);
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        animation:
          toastIn 0.25s ease,
          toastOut 0.4s ease 0.9s forwards;
        pointer-events: none;
        z-index: 6;
      }
      .toast.wrong {
        border-left-color: var(--danger);
        color: var(--danger);
      }
      .toast.miss {
        border-left-color: var(--text-dim);
        color: var(--text-muted);
      }
      .toast.gold {
        border-left-color: var(--accent);
        color: var(--accent);
      }

      /* 退出ボタン */
      .game-actions {
        text-align: center;
        margin-top: 18px;
      }
      .btn-quit {
        background: transparent;
        border: 1px dashed var(--text-dim);
        color: var(--text-dim);
        padding: 7px 18px;
        border-radius: 999px;
        font-size: 11.5px;
        cursor: pointer;
        font-family: inherit;
        letter-spacing: 0.5px;
      }
      .btn-quit:hover {
        color: var(--danger);
        border-color: var(--danger);
      }

      /* ============ RESULT SCREEN ============ */
      .result {
        text-align: center;
        max-width: 660px;
        margin: 0 auto;
      }
      .result-rank-tag {
        display: inline-block;
        padding: 6px 18px;
        font-size: 11px;
        letter-spacing: 3px;
        color: var(--gold);
        background: rgba(251, 191, 36, 0.08);
        border: 1px solid rgba(251, 191, 36, 0.3);
        border-radius: 999px;
        font-weight: 700;
        margin-bottom: 18px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .result-title {
        font-size: clamp(22px, 6vw, 44px);
        font-weight: 900;
        background: linear-gradient(
          120deg,
          var(--primary-light),
          var(--secondary-light),
          var(--accent)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.2;
        margin-bottom: 10px;
      }
      .result-sub {
        color: var(--text-muted);
        margin-bottom: 30px;
        font-size: 14px;
      }

      .score-display {
        position: relative;
        display: inline-block;
        margin-bottom: 24px;
      }
      .score-ring {
        --pct: 0;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: conic-gradient(
          from -90deg,
          var(--primary) 0%,
          var(--secondary) calc(var(--pct) * 0.5%),
          var(--accent) calc(var(--pct) * 1%),
          var(--surface-2) calc(var(--pct) * 1%)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        box-shadow: var(--shadow-strong);
      }
      .score-ring::before {
        content: "";
        position: absolute;
        inset: 14px;
        border-radius: 50%;
        background: var(--bg);
      }
      .score-content {
        position: relative;
        z-index: 1;
        text-align: center;
      }
      .score-num {
        font-size: 44px;
        font-weight: 900;
        background: linear-gradient(
          135deg,
          var(--primary-light),
          var(--secondary-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        font-feature-settings: "tnum";
      }
      .score-label {
        color: var(--text-dim);
        font-size: 11px;
        margin-top: 6px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .result-stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 28px;
      }
      .result-stat {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 14px 10px;
      }
      .result-stat-num {
        font-size: 20px;
        font-weight: 800;
        color: var(--primary-light);
        font-feature-settings: "tnum";
      }
      .result-stat-num.combo {
        color: var(--accent);
      }
      .result-stat-num.acc {
        color: var(--secondary-light);
      }
      .result-stat-num.miss {
        color: var(--danger);
      }
      .result-stat-label {
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 1px;
        margin-top: 4px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .result-comment {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 24px;
        margin-bottom: 26px;
        text-align: left;
        font-size: 14px;
        line-height: 1.75;
        color: var(--text-muted);
      }
      .result-comment strong {
        color: var(--text);
      }

      .result-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
      }
      .btn-share-x {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 14px 28px;
        background: #000;
        border: 1.5px solid #2a2a2a;
        color: #fff;
        font-size: 14px;
        font-weight: 800;
        border-radius: 999px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s;
        font-family: inherit;
      }
      .btn-share-x:hover {
        background: #111;
        border-color: #555;
        transform: translateY(-2px);
      }
      .btn-secondary {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 28px;
        background: transparent;
        color: var(--primary-light);
        font-size: 14px;
        font-weight: 800;
        border-radius: 999px;
        border: 1.5px solid var(--primary);
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }
      .btn-secondary:hover {
        background: rgba(14, 165, 233, 0.12);
        transform: translateY(-2px);
      }

      .review {
        margin-top: 36px;
        text-align: left;
      }
      .review-title {
        font-size: 14px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 16px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        text-align: center;
      }
      .review-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .review-item {
        display: flex;
        gap: 12px;
        padding: 14px 18px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        font-size: 13px;
      }
      .review-mark {
        flex-shrink: 0;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 14px;
      }
      .review-mark.ok {
        background: rgba(52, 211, 153, 0.18);
        color: var(--success);
      }
      .review-mark.ng {
        background: rgba(251, 113, 133, 0.18);
        color: var(--danger);
      }
      .review-mark.miss {
        background: rgba(91, 133, 151, 0.2);
        color: var(--text-dim);
      }
      .review-content {
        flex: 1;
      }
      .review-q {
        color: var(--text);
        font-weight: 600;
        margin-bottom: 6px;
        line-height: 1.5;
      }
      .review-q .review-icon {
        margin-right: 6px;
      }
      .review-a {
        color: var(--text-muted);
        font-size: 12.5px;
      }
      .review-a-tag {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-weight: 700;
        margin-right: 6px;
      }

      .footer {
        margin-top: 60px;
        text-align: center;
        font-size: 12px;
        color: var(--text-dim);
      }
      .footer a {
        color: var(--text-muted);
        text-decoration: none;
        border-bottom: 1px dotted var(--text-dim);
      }
      .footer a:hover {
        color: var(--primary-light);
        border-color: var(--primary-light);
      }

      /* ============ ANIMATIONS ============ */
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      @keyframes shimmer {
        0% {
          background-position: 0% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      @keyframes comboBoost {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.25);
        }
        100% {
          transform: scale(1);
        }
      }
      @keyframes slideInFromRight {
        from {
          opacity: 0;
          transform: translateX(80px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes slideOutLeft {
        to {
          opacity: 0;
          transform: translateX(-100px);
        }
      }
      @keyframes shakeOut {
        0% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-12px) rotate(-2deg);
        }
        40% {
          transform: translateX(10px) rotate(2deg);
        }
        60% {
          transform: translateX(-8px) rotate(-1deg);
        }
        80% {
          transform: translateX(6px) rotate(1deg);
        }
        100% {
          transform: translateX(0) rotate(0);
          opacity: 0.4;
        }
      }
      @keyframes dropOut {
        to {
          opacity: 0;
          transform: translateY(40px) rotate(-12deg);
        }
      }
      @keyframes correctFlash {
        0%,
        100% {
          box-shadow: 0 0 0 rgba(52, 211, 153, 0);
        }
        50% {
          box-shadow: 0 0 24px rgba(52, 211, 153, 0.55);
        }
      }
      @keyframes wrongShake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-4px);
        }
        75% {
          transform: translateX(4px);
        }
      }
      @keyframes goldShine {
        0%,
        100% {
          box-shadow:
            inset 0 -6px 14px rgba(122, 79, 6, 0.4),
            inset 0 6px 14px rgba(255, 255, 255, 0.45),
            0 0 22px rgba(251, 191, 36, 0.45);
        }
        50% {
          box-shadow:
            inset 0 -6px 14px rgba(122, 79, 6, 0.4),
            inset 0 6px 14px rgba(255, 255, 255, 0.55),
            0 0 38px rgba(251, 191, 36, 0.85);
        }
      }
      @keyframes beltMove {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-32px);
        }
      }
      @keyframes countdownPulse {
        0% {
          transform: scale(1.6);
          opacity: 0;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(0.7);
          opacity: 0;
        }
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes toastOut {
        to {
          opacity: 0;
          transform: translateY(-8px);
        }
      }
      @keyframes plusScoreRise {
        from {
          opacity: 0;
          transform: translate(-50%, 0) scale(0.7);
        }
        20% {
          opacity: 1;
          transform: translate(-50%, -10px) scale(1.1);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -60px) scale(1);
        }
      }

      .plus-score {
        position: absolute;
        left: 50%;
        top: 30%;
        transform: translate(-50%, 0);
        font-size: 22px;
        font-weight: 900;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        background: linear-gradient(
          135deg,
          var(--primary-light),
          var(--accent)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        pointer-events: none;
        animation: plusScoreRise 1s ease-out forwards;
        z-index: 7;
      }

      /* ============ RESPONSIVE ============ */
      /* タブレット〜スマホ：HUD と Result stats を 2x2 へ。Toast の位置調整。*/
      @media (max-width: 520px) {
        .hud {
          grid-template-columns: 1fr 1fr;
          gap: 6px;
        }
        .result-stats {
          grid-template-columns: 1fr 1fr;
          gap: 8px;
        }
        .toast {
          /* 縦積みカードのとき右上だと plate と被るので右下へ退避 */
          top: auto;
          bottom: 12px;
          right: 12px;
          font-size: 11.5px;
          padding: 6px 12px;
        }
        .target-stage {
          /* 縦積み時、Toast 用のスペースを下部に確保 */
          padding-bottom: 44px;
        }
      }

      @media (max-width: 640px) {
        .page {
          padding: 22px 14px 60px;
        }
        .target-stage {
          padding: 18px 18px;
        }
        .target-card {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }
        .plate {
          width: 90px;
          height: 90px;
          font-size: 44px;
        }
        .info-card,
        .mode-select,
        .howto {
          padding: 18px 16px;
        }
        .top-bar {
          flex-wrap: wrap;
        }
        .choices {
          grid-template-columns: 1fr;
          gap: 8px;
        }
        .choice {
          padding: 13px 14px;
          font-size: 13px;
        }
        .hud {
          gap: 6px;
        }
        .hud-cell {
          padding: 8px 6px;
        }
        .hud-value {
          font-size: 16px;
        }
        .hud-lives {
          font-size: 15px;
        }
        .lane-mini {
          width: 32px;
          height: 32px;
          font-size: 18px;
        }
        .lane-next-label {
          display: none;
        }
        .review-item {
          padding: 12px 14px;
          font-size: 12.5px;
        }
        .btn-share-x,
        .btn-secondary {
          padding: 13px 22px;
          font-size: 13.5px;

      /* ___SPACE___ ___COMBO___ ___K1234___ をスタイル付き要素に置換（split ベース） */
      function renderTokenized(target, text) {
        const parts = text.split(/(___SPACE___|___COMBO___|___K1234___)/g);
        for (const part of parts) {
          if (part === "___SPACE___") {
            target.appendChild(makeKbd("Space"));
          } else if (part === "___COMBO___") {
            target.appendChild(
              makeStrong("×1.5 → ×2.0 → ×3.0", "var(--accent)"),
            );
          } else if (part === "___K1234___") {
            ["1", "2", "3", "4"].forEach((k, i) => {
              if (i > 0) target.appendChild(document.createTextNode(" "));
              target.appendChild(makeKbd(k));
            });
          } else if (part) {
            target.appendChild(document.createTextNode(part));
          }
        }
      }

      function makeKbd(label) {
        const k = document.createElement("code");
        k.textContent = label;
        return k;
      }
      function makeStrong(label, color) {
        const span = document.createElement("strong");
        span.style.color = color;
        span.textContent = label;
        return span;
      }

      /* バッククォート区間を <code> に展開（split ベース） */
      function renderFuncText(target, text) {
        target.textContent = "";
        const parts = text.split("`");
        for (let i = 0; i < parts.length; i++) {
          if (i % 2 === 0) {
            if (parts[i]) target.appendChild(document.createTextNode(parts[i]));
          } else {
            const code = document.createElement("code");
            code.textContent = parts[i];
            target.appendChild(code);
          }
        }
      }

      /* =========================================================
         プール抽選
         ========================================================= */
      function pickPlate(prevIcon) {
        const wantTrap = Math.random() < 0.13;
        const pool = PLATES.filter((p) => {
          if (wantTrap) return p.isTrap === true;
          return !p.isTrap && p.icon !== prevIcon;
        });
        const list = pool.length > 0 ? pool : PLATES;
        return list[Math.floor(Math.random() * list.length)];
      }

      function buildQueue() {
        const q = [];
        let prev = null;
        for (let i = 0; i < 4; i++) {
          const p = pickPlate(prev ? prev.plate.icon : null);
          q.push({
            plate: p,
            isGold: !p.isTrap && Math.random() < GOLD_PROBABILITY,
          });
          prev = q[q.length - 1];
        }
        return q;
      }

      function shuffleArray(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          const tmp = a[i];
          a[i] = a[j];
          a[j] = tmp;
        }
        return a;
      }

          mode === "timeattack" ? TIME_ATTACK_DURATION + "s" : "∞";
        document.getElementById("hud-time").classList.remove("warn");
        const fill = document.getElementById("game-progress-fill");
        fill.style.width = "100%";
        fill.classList.remove("warn");
        renderLives();

        showScreen("screen-game");
        runCountdown(() => {
          session.startedAt = performance.now();
          session.paused = false;
          renderActivePlate();
          startMainLoop();
        });
      }

      function runCountdown(done) {
        const stage = document.getElementById("target-stage");
        const card = document.getElementById("target-card");
        card.style.visibility = "hidden";

        const labels = ["3", "2", "1", "GO!"];
        let idx = 0;
        const tick = () => {
          const exist = stage.querySelector(".countdown");
          if (exist) exist.remove();
          if (idx >= labels.length) {
            card.style.visibility = "";
            done();
            return;
          }
          const el = document.createElement("div");
          el.className = "countdown";
          el.textContent = labels[idx];
          stage.appendChild(el);
          idx++;
          countdownTimerId = setTimeout(tick, 700);
        };
        tick();
      }

      /* =========================================================
         皿の表示
         ========================================================= */
      function currentPlateTimeAllowance() {
        if (mode === "timeattack") {
          const ratio = Math.min(
            1,
            (TIME_ATTACK_DURATION - session.remainingTime) /
              TIME_ATTACK_DURATION,
          );
          return PLATE_TIME_BASE - (PLATE_TIME_BASE - PLATE_TIME_MIN) * ratio;
        }
        const ratio = Math.min(1, session.plateIndex / 25);
        return PLATE_TIME_BASE - (PLATE_TIME_BASE - PLATE_TIME_MIN) * ratio;
      }

      function renderActivePlate() {
        if (!session || session.ended) return;
        const head = session.queue[0];
        const item = head.plate;
        const isGold = head.isGold;
        const isTrap = !!item.isTrap;

        const plateEl = document.getElementById("plate");
        plateEl.classList.remove("gold", "trap");
        if (isGold) plateEl.classList.add("gold");
        if (isTrap) plateEl.classList.add("trap");
        document.getElementById("plate-icon").textContent = item.icon;

        const tagEl = document.getElementById("target-tag");
        tagEl.classList.remove("gold", "trap");
        if (isGold) {
          tagEl.classList.add("gold");
          tagEl.textContent = "GOLD · +500";
        } else if (isTrap) {
          tagEl.classList.add("trap");
          tagEl.textContent = lang === "ja" ? "BLACK · 罠" : "BLACK · trap";
        } else {
          tagEl.textContent = "PLATE #" + (session.plateIndex + 1);
        }

        document.getElementById("target-name").textContent = item.name[lang];
        renderFuncText(document.getElementById("target-func"), item.func[lang]);

        // Pass プレートの場合、4 択ボタンには pass を含めず wrong のみ表示。
        // 正解は Pass ボタン側で取る。
        const ans = getChoices(item);
        const choiceKeys =
          ans.c === "pass"
            ? shuffleArray(ans.w).slice(0, 4)
            : shuffleArray([ans.c, ...ans.w]);
        session.choiceKeys = choiceKeys;
        const choicesEl = document.getElementById("choices");
        choicesEl.textContent = "";
        const labels = ["1", "2", "3", "4"];
        choiceKeys.forEach((k, idx) => {
          const btn = document.createElement("button");
          btn.className = "choice";
          btn.type = "button";

          const key = document.createElement("span");
          key.className = "choice-key";
          key.textContent = labels[idx];

          const text = document.createElement("span");
          text.className = "choice-text";
          text.textContent = ATTACKS[k][lang];

          btn.appendChild(key);
          btn.appendChild(text);

          btn.addEventListener("click", () => onAnswer(idx));
          choicesEl.appendChild(btn);
        });
        const passBtn = document.getElementById("btn-pass");
        passBtn.classList.remove("correct", "wrong");
        passBtn.disabled = false;

        const minis = ["next-1", "next-2", "next-3"];
        for (let i = 0; i < 3; i++) {
          const el = document.getElementById(minis[i]);
          const next = session.queue[i + 1];
          el.classList.remove("gold-mini", "trap-mini");
          if (!next) {
            el.textContent = "";
            continue;
          }
          el.textContent = next.plate.icon;
          if (next.isGold) el.classList.add("gold-mini");
          if (next.plate.isTrap) el.classList.add("trap-mini");
        }

        const allowance = currentPlateTimeAllowance();
        session.activeStartedAt = performance.now();
        session.activeDuration = allowance * 1000;
        session.answered = false;
        const ringEl = document.getElementById("plate-timer");
        ringEl.classList.remove("warn");
        ringEl.style.setProperty("--ptime", "100");

        const card = document.getElementById("target-card");
        card.classList.remove("exit-correct", "exit-wrong", "exit-miss");
        card.style.animation = "none";
        // eslint-disable-next-line no-unused-expressions
        void card.offsetWidth;
        card.style.animation = "";

        runPlateTimer();
      }

      /* =========================================================
         皿の制限時間（リング）
         ========================================================= */
      function runPlateTimer() {
        cancelAnimationFrame(plateRafId);
        const ringEl = document.getElementById("plate-timer");
        const tick = () => {
          if (!session || session.paused || session.ended || session.answered) {
            return;
          }
          const elapsed = performance.now() - session.activeStartedAt;
          const remain = Math.max(0, session.activeDuration - elapsed);
          const pct = (remain / session.activeDuration) * 100;
          ringEl.style.setProperty("--ptime", pct.toFixed(1));
          if (pct < 30) ringEl.classList.add("warn");
          else ringEl.classList.remove("warn");
          if (remain <= 0) {
            onTimeout();
            return;
          }
          plateRafId = requestAnimationFrame(tick);
        };
        plateRafId = requestAnimationFrame(tick);
      }

      /* =========================================================
         メインループ（残り時間 / HUD 更新）
         ========================================================= */
      function startMainLoop() {
        cancelAnimationFrame(rafId);
        const tick = () => {
          if (!session || session.ended) return;
          if (!session.paused) {
            if (mode === "timeattack") {
              const elapsed = (performance.now() - session.startedAt) / 1000;
              session.remainingTime = Math.max(
                0,
                TIME_ATTACK_DURATION - elapsed,
              );
              const tt = session.remainingTime;
              const tEl = document.getElementById("hud-time");
              tEl.textContent = tt.toFixed(1) + "s";
              if (tt <= 10) tEl.classList.add("warn");
              else tEl.classList.remove("warn");
              const fill = document.getElementById("game-progress-fill");
              fill.style.width = (tt / TIME_ATTACK_DURATION) * 100 + "%";
              if (tt <= 10) fill.classList.add("warn");
              else fill.classList.remove("warn");
              if (tt <= 0) {
                endGame("time");
                return;
              }
            } else {
              const livesPct = (session.lives / ENDLESS_LIVES) * 100;
              const fill = document.getElementById("game-progress-fill");
              fill.style.width = livesPct + "%";
              if (session.lives <= 1) fill.classList.add("warn");
              else fill.classList.remove("warn");
              document.getElementById("hud-time").textContent = "∞";
            }
          }
          rafId = requestAnimationFrame(tick);
        };
        rafId = requestAnimationFrame(tick);
      }

      /* =========================================================
         回答
         ========================================================= */
      function onAnswer(choiceIdx) {
        if (!session || session.answered || session.paused || session.ended)
          return;
        session.answered = true;
        const head = session.queue[0];
        const correctKey = getChoices(head.plate).c;
        const pickedKey = session.choiceKeys[choiceIdx];
        const isCorrect = pickedKey === correctKey;
        applyResult(isCorrect, "answer", choiceIdx, pickedKey);
      }

      function onPass() {
        if (!session || session.answered || session.paused || session.ended)
          return;
        session.answered = true;
        const head = session.queue[0];
        const isCorrect = getChoices(head.plate).c === "pass";
        applyResult(isCorrect, "pass", -1, "pass");
      }

      function onTimeout() {
        if (!session || session.answered || session.paused || session.ended)
          return;
        session.answered = true;
        applyResult(false, "timeout", -1, null);
      }

      function applyResult(isCorrect, mode2, choiceIdx, pickedKey) {
        const head = session.queue[0];
        const plate = head.plate;
        const isGold = head.isGold;
        const correctKey = getChoices(plate).c;

        const choiceBtns = document.querySelectorAll(".choice");
        const correctIdx = session.choiceKeys.indexOf(correctKey);
        const passBtn = document.getElementById("btn-pass");
        choiceBtns.forEach((b, i) => {
          b.disabled = true;
          if (correctKey === "pass") {
            // pass 正解の場合はボタン側に正解表示はしない
          } else if (i === correctIdx) {
            b.classList.add("correct");
          }
          if (mode2 === "answer" && i === choiceIdx && !isCorrect) {
            b.classList.add("wrong");
          }
          if (
            i !== correctIdx &&
            !(mode2 === "answer" && i === choiceIdx && !isCorrect)
          ) {
            b.classList.add("dim");
          }
        });
        passBtn.disabled = true;
        if (mode2 === "pass") {
          if (isCorrect) passBtn.classList.add("correct");
          else passBtn.classList.add("wrong");
        } else if (correctKey === "pass") {
          passBtn.classList.add("correct");
        }

        let gained = 0;
        if (isCorrect) {
          session.consecutiveCorrect += 1;
          session.combo = computeCombo(session.consecutiveCorrect);
          if (session.combo > session.maxCombo)
            session.maxCombo = session.combo;
          gained = Math.round(100 * session.combo);
          if (isGold) gained += 500;
          session.score += gained;
          session.caught += 1;
          showToast(
            isGold ? t("toastGold") : "+" + gained,
            isGold ? "gold" : "correct",
          );
          showFloatingPlus("+" + gained);
        } else {
          session.consecutiveCorrect = 0;
          session.combo = 1.0;
          session.lives -= 1;
          session.missed += 1;
          if (mode2 === "timeout") showToast(t("toastMiss"), "miss");
          else showToast(t("toastWrong"), "wrong");
        }

        document.getElementById("hud-score").textContent =
          session.score.toLocaleString();
        const comboEl = document.getElementById("hud-combo");
        comboEl.textContent = "x" + session.combo.toFixed(1);
        if (isCorrect && session.combo > 1.0) {
          comboEl.classList.remove("boost");
          // eslint-disable-next-line no-unused-expressions
          void comboEl.offsetWidth;
          comboEl.classList.add("boost");
        }
        renderLives();

        session.history.push({
          plate: plate,
          isGold: isGold,
          isTrap: !!plate.isTrap,
          picked: pickedKey,
          correct: correctKey,
          isCorrect: isCorrect,
          isMiss: mode2 === "timeout",
          gained: gained,
        });
        session.plateIndex += 1;

        const card = document.getElementById("target-card");
        if (mode2 === "timeout") card.classList.add("exit-miss");
        else if (isCorrect) card.classList.add("exit-correct");
        else card.classList.add("exit-wrong");

        if (session.lives <= 0) {
          setTimeout(() => endGame("lives"), 600);
          return;
        }

        setTimeout(() => {
          if (!session || session.ended) return;
          session.queue.shift();
          const lastIcon =
            session.queue[session.queue.length - 1] &&
            session.queue[session.queue.length - 1].plate.icon;
          const newPlate = pickPlate(lastIcon);
          session.queue.push({
            plate: newPlate,
            isGold: !newPlate.isTrap && Math.random() < GOLD_PROBABILITY,
          });
          renderActivePlate();
        }, 650);
      }

      function computeCombo(streak) {
        if (streak >= 7) return 3.0;
        if (streak >= 5) return 2.0;
        if (streak >= 3) return 1.5;
        return 1.0;
      }

      function renderLives() {
        if (!session) return;
        const max = mode === "timeattack" ? TIME_ATTACK_LIVES : ENDLESS_LIVES;
        const el = document.getElementById("hud-lives");
        el.textContent = "";
        for (let i = 0; i < max; i++) {
          const span = document.createElement("span");
          span.className = "hud-life";
          span.textContent = "❤";
          if (i >= session.lives) span.classList.add("lost");
          el.appendChild(span);
        }
      }

      function showToast(text, kind) {
        const stage = document.getElementById("target-stage");
        const old = stage.querySelector(".toast");
        if (old) old.remove();
        const el = document.createElement("div");
        el.className = "toast " + (kind || "");
        el.textContent = text;
        stage.appendChild(el);
        setTimeout(() => el.remove(), 1400);
      }

      function showFloatingPlus(text) {
        const stage = document.getElementById("target-stage");
        const el = document.createElement("div");
        el.className = "plus-score";
        el.textContent = text;
        stage.appendChild(el);
        setTimeout(() => el.remove(), 1100);
      }

      /* =========================================================
         ゲーム終了
         ========================================================= */
      function endGame() {
        if (!session || session.ended) return;
        session.ended = true;
        session.paused = true;
        cancelAnimationFrame(rafId);
        cancelAnimationFrame(plateRafId);
        renderResult();
        showScreen("screen-result");
      }

      function quitGame() {
        if (!session) return;
        session.ended = true;
        session.paused = true;
        cancelAnimationFrame(rafId);
        cancelAnimationFrame(plateRafId);
        clearTimeout(countdownTimerId);
        showScreen("screen-start");
      }

      /* =========================================================
         結果表示
         ========================================================= */

      function renderResult() {
        const score = session ? session.score : 0;
        const caught = session ? session.caught : 0;
        const missed = session ? session.missed : 0;
        const total = caught + missed;
        const acc = total === 0 ? 0 : Math.round((caught / total) * 100);
        const maxCombo = session ? session.maxCombo : 1.0;
        const rank = getRank(score);

        document.getElementById("result-rank").textContent = rank.tag;
        document.getElementById("result-title").textContent = rank.title;
        document.getElementById("result-sub").textContent = rank.sub;
        document.getElementById("score-num").textContent =
          score.toLocaleString();
        document
          .getElementById("score-ring")
          .style.setProperty("--pct", Math.min(100, score / 80));
        document.getElementById("stat-caught").textContent = caught;
        document.getElementById("stat-missed").textContent = missed;
        document.getElementById("stat-maxcombo").textContent =
          "x" + maxCombo.toFixed(1);
        document.getElementById("stat-acc").textContent = acc + "%";

        renderSegments(document.getElementById("result-comment"), rank.comment);
        renderReview();
      }

      function renderSegments(target, segments) {
        target.textContent = "";
        for (const seg of segments) {
          if (seg.b) {
            const strong = document.createElement("strong");
            strong.textContent = seg.t;
            target.appendChild(strong);
          } else {
            target.appendChild(document.createTextNode(seg.t));
          }
        }
      }

      function renderReview() {
        const grid = document.getElementById("review-grid");
        grid.textContent = "";
        if (!session) return;
        const items = session.history;
        if (items.length === 0) {
          const empty = document.createElement("div");
          empty.className = "review-item";
          empty.style.justifyContent = "center";
          empty.style.color = "var(--text-dim)";
          empty.textContent =
            lang === "ja" ? "（解答履歴なし）" : "(no plate history)";
          grid.appendChild(empty);
          return;
        }
        items.forEach((h, i) => {
          const row = document.createElement("div");
          row.className = "review-item";
          const mark = document.createElement("div");
          if (h.isMiss) {
            mark.className = "review-mark miss";
            mark.textContent = "—";
          } else if (h.isCorrect) {
            mark.className = "review-mark ok";
            mark.textContent = "✓";
          } else {
            mark.className = "review-mark ng";
            mark.textContent = "✕";
          }
          const content = document.createElement("div");
          content.className = "review-content";

          const qLine = document.createElement("div");
          qLine.className = "review-q";
          const ic = document.createElement("span");
          ic.className = "review-icon";
          ic.textContent = h.plate.icon;
          qLine.appendChild(ic);
          qLine.appendChild(
            document.createTextNode(
              "Q" + (i + 1) + ". " + h.plate.name[lang] + " — ",
            ),
          );
          const funcSpan = document.createElement("span");
          renderFuncText(funcSpan, h.plate.func[lang]);
          qLine.appendChild(funcSpan);
          content.appendChild(qLine);

          if (h.isMiss) {
            const yLine = document.createElement("div");
            yLine.className = "review-a";
            const yt = document.createElement("span");
            yt.className = "review-a-tag";
            yt.style.color = "var(--text-dim)";
            yt.textContent = t("resultMissTag");
            yLine.appendChild(yt);
            yLine.appendChild(
              document.createTextNode(
                lang === "ja" ? "見逃しました。" : "you ran out of time.",
              ),
            );
            content.appendChild(yLine);
          } else {
            const yLine = document.createElement("div");
            yLine.className = "review-a";
            const yt = document.createElement("span");
            yt.className = "review-a-tag";
            yt.style.color = h.isCorrect ? "var(--success)" : "var(--danger)";
            yt.textContent = "[" + t("resultYour") + "]";
            yLine.appendChild(yt);
            yLine.appendChild(
              document.createTextNode(" " + ATTACKS[h.picked][lang]),
            );
            content.appendChild(yLine);
          }

          if (!h.isCorrect) {
            const cLine = document.createElement("div");
            cLine.className = "review-a";
            cLine.style.marginTop = "4px";
            const ct = document.createElement("span");
            ct.className = "review-a-tag";
            ct.style.color = "var(--success)";
            ct.textContent = "[" + t("resultAnswer") + "]";
            cLine.appendChild(ct);
            cLine.appendChild(
              document.createTextNode(" " + ATTACKS[h.correct][lang]),
            );
            content.appendChild(cLine);

            const ex = PLATE_EXPLAIN[h.correct];
            if (ex) {
              const eLine = document.createElement("div");
              eLine.className = "review-a";
              eLine.style.marginTop = "6px";
              eLine.style.color = "var(--text-dim)";
              renderFuncText(eLine, ex[lang]);
              content.appendChild(eLine);
            }
          }

          row.appendChild(mark);
          row.appendChild(content);
          grid.appendChild(row);
        });
      }

      /* =========================================================
         X (Twitter) シェア
         ========================================================= */
      // スコアからランクキー（share/{key}/ パスに使う）を返す
      function getRankKey(score) {
        if (score >= 6000) return "legendary";
        if (score >= 3500) return "taisho";
        if (score >= 1800) return "itamae";
        if (score >= 600) return "joren";
        return "shirouto";
      }

      function buildShareText() {
        if (!session) return "";
        const score = session.score;
        const caught = session.caught;
        const maxCombo = session.maxCombo.toFixed(1);
        const rank = getRank(score);
        if (lang === "ja") {
          return (
            "🍣 Sushi Bounty（回転寿司バウンティ）\n" +
            "Score: " +
            score.toLocaleString() +
            " / 捌いた皿: " +
            caught +
            " / 最大コンボ: x" +
            maxCombo +
            " / 称号: " +
            rank.title +
            "\n" +
            "回転寿司レーンで脆弱性を捌いてみよう！\n\n" +
            "#BugBountyJPGame"
          );
        }
        return (
          "🍣 Sushi Bounty (Kaiten Bug Bounty)\n" +
          "Score: " +
          score.toLocaleString() +
          " / Plates: " +
          caught +
          " / Max combo: x" +
          maxCombo +
          " / Rank: " +
          rank.title +
          "\n" +
          "Carve vulnerabilities on the kaiten-sushi belt!\n\n" +
          "#BugBountyJPGame"
        );
      }

      function onShare() {
        const text = buildShareText();
        // スコアに応じたランク別シェアページを向き先にする（OGP がランクごとに焼ける）。
        // share/<rank>/index.html は事前に静的生成されている。
        const rankKey = getRankKey(session ? session.score : 0);
        const base = location.href.split("#")[0].replace(/[^/]*$/, "");
        const url = base + "share/" + rankKey + "/";
        const intent =
          "https://x.com/intent/tweet?text=" +
          encodeURIComponent(text) +
          "&url=" +
          encodeURIComponent(url);
        window.open(intent, "_blank", "noopener,noreferrer");
      }

      /* =========================================================
         キーボード
         ========================================================= */
      function onKeyDown(e) {
        if (
          !document.getElementById("screen-game").classList.contains("active")
        )
          return;
        if (!session || session.ended || session.paused) return;
        if (session.answered) return;
        if (e.key === " " || e.code === "Space") {
          e.preventDefault();
          onPass();
          return;
        }
        if (["1", "2", "3", "4"].indexOf(e.key) >= 0) {
          const idx = parseInt(e.key, 10) - 1;
          const btns = document.querySelectorAll(".choice");
          if (btns[idx]) onAnswer(idx);
        }
      }

      /* =========================================================
         イベントバインド
         ========================================================= */
      document.querySelectorAll(".lang-toggle button").forEach((btn) => {
        btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
      });
      document.querySelectorAll(".mode-card").forEach((btn) => {
        btn.addEventListener("click", () => {
          mode = btn.dataset.mode;
          document
            .querySelectorAll(".mode-card")
            .forEach((c) => c.classList.toggle("selected", c === btn));
        });
      });
      document.getElementById("btn-start").addEventListener("click", startGame);
      document.getElementById("btn-pass").addEventListener("click", onPass);
      document.getElementById("btn-quit").addEventListener("click", quitGame);
      document.getElementById("btn-share").addEventListener("click", onShare);
      document.getElementById("btn-retry").addEventListener("click", startGame);
      window.addEventListener("keydown", onKeyDown);

      /* =========================================================
         パーティクル背景（BBH と同等）
         ========================================================= */
      (function initParticles() {
        const canvas = document.getElementById("particles");
        const ctx = canvas.getContext("2d");
        let w = 0;
        let h = 0;
        let particles = [];
        const reduce =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        function resize() {
          w = canvas.width = window.innerWidth;
          h = canvas.height = window.innerHeight;
        }

        function create() {
          particles = [];
          const count = Math.max(28, Math.floor((w * h) / 32000));
          for (let i = 0; i < count; i++) {
            particles.push({
              x: Math.random() * w,
              y: Math.random() * h,
              r: Math.random() * 1.6 + 0.4,
              vx: (Math.random() - 0.5) * 0.18,
              vy: (Math.random() - 0.5) * 0.18,
              alpha: Math.random() * 0.5 + 0.15,
              hue: Math.random() < 0.5 ? "14, 165, 233" : "251, 146, 60",
            });
          }
        }

        function draw() {
          ctx.clearRect(0, 0, w, h);
          for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(" + p.hue + ", " + p.alpha + ")";
            ctx.fill();
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0) p.x = w;
            if (p.x > w) p.x = 0;
            if (p.y < 0) p.y = h;
            if (p.y > h) p.y = 0;
          }
          if (!reduce) requestAnimationFrame(draw);
        }

        resize();
        create();
        draw();
        window.addEventListener("resize", () => {
          resize();
          create();
        });
      })();

      /* =========================================================
         初期化
         ========================================================= */
      applyI18n();
      requestAnimationFrame(updateLangPill);
      window.addEventListener("resize", updateLangPill);
    </script>
  </body>
</html>
