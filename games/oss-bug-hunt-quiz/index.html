    <style>
      :root {
        /* カワセミ（kingfisher）配色：コバルトブルー × バーントオレンジ */
        --bg: #04111e;
        --bg2: #082336;
        --bg3: #0e3149;
        --surface: #103e58;
        --surface-2: #154d6d;
        --line: rgba(14, 165, 233, 0.2);
        --line-strong: rgba(14, 165, 233, 0.5);

        --text: #e6f4f9;
        --text-muted: #93c5d8;
        --text-dim: #5b8597;

        --primary: #0891b2;
        --primary-light: #22d3ee;
        --primary-deep: #155e75;
        --secondary: #f97316;
        --secondary-light: #fb923c;
        --accent: #fbbf24;
        --gold: #fbbf24;
        --success: #34d399;
        --danger: #fb7185;

        --radius: 14px;
        --radius-sm: 8px;
        --shadow: 0 12px 40px rgba(14, 165, 233, 0.22);
        --shadow-strong: 0 0 60px rgba(14, 165, 233, 0.4);

        --pad-x: 20px;
        --pad-bottom: max(80px, env(safe-area-inset-bottom));
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        height: 100%;
      }

      html,
      body {
        overflow-x: hidden;
        max-width: 100%;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        font-family:
          "Inter", "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic",
          "Noto Sans JP", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        word-wrap: break-word;
        overflow-wrap: break-word;
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      .bg-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .bg-grid {
        background-image:
          linear-gradient(
            to right,
            rgba(14, 165, 233, 0.04) 1px,
            transparent 1px
          ),
          linear-gradient(
            to bottom,
            rgba(14, 165, 233, 0.04) 1px,
            transparent 1px
          );
        background-size: 56px 56px;
        mask-image: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0.85) 0%,
          rgba(0, 0, 0, 0.2) 70%,
          transparent 100%
        );
      }
      .bg-glow1 {
        background: radial-gradient(
          circle at 18% 12%,
          rgba(14, 165, 233, 0.18),
          transparent 55%
        );
      }
      .bg-glow2 {
        background: radial-gradient(
          circle at 82% 88%,
          rgba(251, 146, 60, 0.14),
          transparent 60%
        );
      }
      #particles {
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
        max-width: 880px;
        width: 100%;
        margin: 0 auto;
        padding: 28px var(--pad-x) var(--pad-bottom);
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }
      .brand-mark {
        width: 36px;
        height: 36px;
        border-radius: 9px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 800;
        font-size: 18px;
        box-shadow: 0 0 20px rgba(14, 165, 233, 0.5);
      }
      .brand-text {
        display: flex;
        flex-direction: column;
        line-height: 1.15;
      }
      .brand-name {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.5px;
        color: var(--text);
      }
      .brand-sub {
        font-size: 10.5px;
        color: var(--text-dim);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .lang-toggle {
        display: inline-flex;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px;
        position: relative;
        overflow: hidden;
      }
      .lang-toggle button {
        background: transparent;
        border: 0;
        color: var(--text-muted);
        padding: 7px 14px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        border-radius: 999px;
        transition: color 0.2s;
        position: relative;
        z-index: 1;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        -webkit-tap-highlight-color: transparent;
      }
      .lang-toggle button.active {
        color: #fff;
      }
      .lang-toggle .lang-pill {
        position: absolute;
        top: 3px;
        left: 3px;
        height: calc(100% - 6px);
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        border-radius: 999px;
        transition:
          transform 0.28s ease,
          width 0.28s ease;
        z-index: 0;
        box-shadow: 0 0 16px rgba(14, 165, 233, 0.4);
      }

      .screen {
        display: none;
        animation: fadeIn 0.45s ease;
      }
      .screen.active {
        display: block;
      }

      .start-hero {
        text-align: center;
        margin-top: 6px;
        margin-bottom: 28px;
      }

      /* スタートヒーロー：30 日カレンダー + CVE バッジ */
      .cve-illustration {
        display: block;
        width: clamp(200px, 36vw, 280px);
        height: auto;
        margin: 0 auto 16px;
        filter: drop-shadow(0 12px 22px rgba(14, 165, 233, 0.3))
          drop-shadow(0 4px 6px rgba(0, 0, 0, 0.45));
      }
      .cve-illustration .day-cell {
        opacity: 0.6;
        animation: dayFlash 6s ease-in-out infinite;
      }
      .cve-illustration .day-cell:nth-child(odd) {
        animation-delay: 0.4s;
      }
      .cve-illustration .day-cell:nth-child(3n) {
        animation-delay: 1.2s;
      }
      .cve-illustration .day-30-glow {
        animation: stampPulse 2.6s ease-in-out infinite;
      }
      @keyframes dayFlash {
        0%,
        100% {
          opacity: 0.55;
        }
        50% {
          opacity: 1;
        }
      }
      @keyframes stampPulse {
        0%,
        100% {
          opacity: 0.8;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.06);
        }
      }
      .cve-illustration .badge-body {
        animation: badgeFloat 3.5s ease-in-out infinite alternate;
        transform-origin: 50% 100%;
      }
      @keyframes badgeFloat {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-3px);
        }
      }

      .hero-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        font-size: 11px;
        letter-spacing: 2.5px;
        color: var(--secondary-light);
        background: rgba(251, 146, 60, 0.08);
        border: 1px solid rgba(251, 146, 60, 0.3);
        border-radius: 999px;
        font-weight: 700;
        margin-bottom: 18px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .hero-tag-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--secondary);
        box-shadow: 0 0 8px var(--secondary);
        animation: blink 1.4s infinite;
      }
      .hero-title {
        font-size: clamp(22px, 6vw, 44px);
        font-weight: 900;
        letter-spacing: -0.5px;
        line-height: 1.22;
        background: linear-gradient(
          120deg,
          var(--primary-light) 10%,
          var(--secondary-light) 55%,
          var(--accent) 95%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 12px;
      }
      .hero-sub {
        color: var(--text-muted);
        font-size: clamp(13.5px, 2vw, 15.5px);
        max-width: 560px;
        margin: 0 auto;
      }

      .info-card {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 22px 26px;
        margin-bottom: 22px;
        position: relative;
        overflow: hidden;
      }
      .info-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at top right,
          rgba(14, 165, 233, 0.08),
          transparent 60%
        );
        pointer-events: none;
      }
      .info-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 16px;
        position: relative;
      }
      .info-stat {
        text-align: center;
      }
      .info-stat-num {
        font-size: 26px;
        font-weight: 900;
        background: linear-gradient(
          135deg,
          var(--primary-light),
          var(--secondary-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        font-feature-settings: "tnum";
      }
      .info-stat-label {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 6px;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .sources {
        background: linear-gradient(160deg, var(--bg2), var(--surface));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 24px;
        margin-bottom: 26px;
      }
      .sources-title {
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 12px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .source-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .source-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        text-decoration: none;
        color: var(--text-muted);
        font-size: 13px;
        transition: all 0.2s;
      }
      .source-item:hover {
        border-color: var(--primary);
        color: var(--primary-light);
        transform: translateX(2px);
      }
      .source-tag {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 11px;
        font-weight: 700;
        color: var(--secondary-light);
        background: rgba(251, 146, 60, 0.1);
        padding: 3px 8px;
        border-radius: 4px;
        flex-shrink: 0;
      }
      .source-title {
        flex: 1;
      }
      .source-arrow {
        color: var(--text-dim);
      }

      .start-btn-wrap {
        text-align: center;
      }
      .btn-start {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 16px 36px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        border: 0;
        color: #fff;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.5px;
        border-radius: 999px;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 8px 32px rgba(14, 165, 233, 0.35);
        position: relative;
        overflow: hidden;
      }
      .btn-start::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          120deg,
          transparent 30%,
          rgba(255, 255, 255, 0.18) 50%,
          transparent 70%
        );
        transform: translateX(-100%);
        transition: transform 0.6s ease;
      }
      .btn-start:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 40px rgba(14, 165, 233, 0.5);
      }
      .btn-start:hover::after {
        transform: translateX(100%);
      }
      .start-note {
        margin-top: 14px;
        color: var(--text-dim);
        font-size: 12px;
      }

      .quiz-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px 12px;
        flex-wrap: wrap;
        margin-bottom: 12px;
        font-size: 12.5px;
      }
      .quiz-counter {
        color: var(--text-muted);
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        letter-spacing: 1px;
      }
      .quiz-counter strong {
        color: var(--primary-light);
        font-size: 16px;
        font-weight: 800;
      }
      .quiz-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 12px;
        background: rgba(251, 146, 60, 0.08);
        border: 1px solid rgba(251, 146, 60, 0.25);
        border-radius: 999px;
        color: var(--secondary-light);
        font-size: 11px;
        letter-spacing: 0.5px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      /* 30 日カレンダー演出（Q1..Q10 進行で Day 1..Day 30 まで点灯） */
      .day-calendar {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 14px 16px;
        margin-bottom: 14px;
      }
      .day-calendar-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        font-size: 11px;
        letter-spacing: 1.5px;
        color: var(--text-dim);
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        text-transform: uppercase;
      }
      .day-calendar-head .dc-label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .day-calendar-head .dc-now {
        color: var(--primary-light);
        font-weight: 800;
        font-size: 12px;
      }
      .day-grid {
        display: grid;
        grid-template-columns: repeat(15, minmax(0, 1fr));
        gap: 4px;
      }
      .day-cell {
        aspect-ratio: 1 / 1;
        border-radius: 4px;
        background: var(--bg);
        border: 1px solid rgba(14, 165, 233, 0.08);
        transition: all 0.3s ease;
        position: relative;
      }
      .day-cell.is-passed {
        background: linear-gradient(
          135deg,
          var(--primary-deep),
          var(--primary)
        );
        border-color: var(--primary);
        box-shadow: 0 0 6px rgba(34, 211, 238, 0.5);
      }
      .day-cell.is-current {
        background: linear-gradient(
          135deg,
          var(--secondary),
          var(--secondary-light)
        );
        border-color: var(--secondary-light);
        box-shadow: 0 0 10px rgba(251, 146, 60, 0.7);
        animation: cellGlow 1.2s ease-in-out infinite alternate;
      }
      .day-cell.is-30 {
        background: linear-gradient(135deg, var(--accent), var(--gold));
        border-color: var(--accent);
        box-shadow: 0 0 12px rgba(251, 191, 36, 0.7);
        position: relative;
      }
      .day-cell.is-30::after {
        content: "★";
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        color: #04111e;
        font-weight: 900;
        line-height: 1;
      }
      /* 最終問題 (Q20) では Day 30 が「現在地」かつ「ゴール」を兼ねるため、
         ゴール印（金色＋★）を保ちつつパルス点滅で現在地を示す。 */
      .day-cell.is-30.is-current {
        animation: cellGlow30 1.2s ease-in-out infinite alternate;
      }
      @keyframes cellGlow30 {
        from {
          box-shadow: 0 0 8px rgba(251, 191, 36, 0.7);
        }
        to {
          box-shadow: 0 0 16px rgba(251, 191, 36, 1);
        }
      }
      @keyframes cellGlow {
        from {
          box-shadow: 0 0 6px rgba(251, 146, 60, 0.5);
        }
        to {
          box-shadow: 0 0 14px rgba(251, 146, 60, 0.95);
        }
      }

      .progress {
        height: 6px;
        background: var(--surface);
        border-radius: 999px;
        overflow: hidden;
        margin-bottom: 22px;
        border: 1px solid var(--line);
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--primary),
          var(--secondary),
          var(--accent)
        );
        background-size: 200% 100%;
        animation: shimmer 4s linear infinite;
        transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        border-radius: 999px;
        box-shadow: 0 0 12px rgba(14, 165, 233, 0.5);
      }

      .question-card {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 30px 32px;
        margin-bottom: 18px;
        animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .question-text {
        font-size: clamp(16px, 2.6vw, 19px);
        line-height: 1.7;
        color: var(--text);
        font-weight: 600;
      }

      .choices {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 16px;
      }
      .choice {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 16px 18px;
        background: var(--surface);
        border: 1.5px solid var(--line);
        color: var(--text);
        border-radius: var(--radius-sm);
        cursor: pointer;
        text-align: left;
        font-size: 14px;
        line-height: 1.55;
        transition: all 0.2s;
        position: relative;
        font-family: inherit;
        word-break: break-word;
        -webkit-tap-highlight-color: transparent;
      }
      .choice .choice-key,
      .choice .choice-icon {
        margin-top: 1px;
      }
      .choice:hover:not(:disabled) {
        border-color: var(--primary);
        background: var(--surface-2);
        transform: translateX(2px);
      }
      .choice:disabled {
        cursor: default;
      }
      .choice-key {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: rgba(14, 165, 233, 0.15);
        border: 1px solid rgba(14, 165, 233, 0.3);
        color: var(--primary-light);
        font-size: 12px;
        font-weight: 800;
        flex-shrink: 0;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        transition: all 0.2s;
      }
      .choice-text {
        flex: 1;
      }
      .choice-icon {
        opacity: 0;
        font-size: 18px;
        transition: opacity 0.2s;
      }
      .choice.correct {
        border-color: var(--success);
        background: rgba(52, 211, 153, 0.1);
      }
      .choice.correct .choice-key {
        background: var(--success);
        color: #04261b;
        border-color: var(--success);
      }
      .choice.correct .choice-icon {
        opacity: 1;
        color: var(--success);
      }
      .choice.wrong {
        border-color: var(--danger);
        background: rgba(251, 113, 133, 0.1);
      }
      .choice.wrong .choice-key {
        background: var(--danger);
        color: #2a0710;
        border-color: var(--danger);
      }
      .choice.wrong .choice-icon {
        opacity: 1;
        color: var(--danger);
      }
      .choice.dim {
        opacity: 0.45;
      }

      .feedback {
        background: var(--surface);
        border: 1px solid var(--line);
        border-left: 3px solid var(--primary);

        /* =========================================================
         復号
         ========================================================= */
        function _decryptQuiz(payload) {
          const bin = atob(payload);
          const out = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) {
            let x = bin.charCodeAt(i);
            x ^= _kA.charCodeAt(i % _kA.length);
            x ^= _kB.charCodeAt(i % _kB.length);
            x ^= _kC[i % _kC.length];
            out[i] = x;
          }
          return JSON.parse(new TextDecoder().decode(out));
        }

        /* =========================================================
         Fisher-Yates シャッフル（呼ぶたびに別の順序）
         - 各問題の choices 配列の順序をランダム化することで、
           DevTools で復号後 QUIZ を覗いても「画面上の A〜D が
           配列インデックスのどれに対応するか」が一定にならない
         ========================================================= */
        function _shuffleInPlace(arr) {
          for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const tmp = arr[i];
            arr[i] = arr[j];
            arr[j] = tmp;
          }
          return arr;
        }

        // 復号 → クロージャ内に保持（window には載せない）
        const QUIZ = _decryptQuiz(_PAYLOAD);
        // 各問題の choices をシャッフル
        for (const q of QUIZ) {
          _shuffleInPlace(q.choices);
        }

        // 正解の choice 配列インデックスを返す（c フラグ持ち）
        function _correctIdx(qIdx) {
          const choices = QUIZ[qIdx].choices;
          for (let i = 0; i < choices.length; i++) {
            if (choices[i].c) return i;
          }
          return -1;
        }

        /* =========================================================
         セグメント配列を <strong> 込みで安全に DOM へ描画
         ========================================================= */
        function renderSegments(target, segments) {
          target.textContent = "";
          for (const seg of segments) {
            if (seg.b) {
              const strong = document.createElement("strong");
              strong.textContent = seg.t;
              target.appendChild(strong);
            } else {
              target.appendChild(document.createTextNode(seg.t));
            }
          }
        }

        /* =========================================================
         状態
         ========================================================= */
        let lang = "ja";
        try {
          // 全ゲーム共通キー mk12_game_lang を優先、旧キー oss_quiz_lang から移行も読む
          const stored =
            localStorage.getItem("mk12_game_lang") ||
            localStorage.getItem("oss_quiz_lang");
          if (stored === "ja" || stored === "en") lang = stored;
        } catch (e) {}

        let qIndex = 0;
        let answers = [];
        let answered = false;

        function t(key) {
          return I18N[lang][key] !== undefined ? I18N[lang][key] : key;
        }

         I18N - プレーン文字列のみ textContent でセット
         ========================================================= */
        function applyI18n() {
          document.documentElement.lang = lang;

          document.getElementById("brand-name").textContent = t("brandName");
          document.getElementById("hero-tag-text").textContent = t("heroTag");

          // ヒーロー見出しは 2 行構成
          const heroTitle = document.getElementById("hero-title");
          heroTitle.textContent = "";
          heroTitle.appendChild(document.createTextNode(t("heroTitleLine1")));
          heroTitle.appendChild(document.createElement("br"));
          heroTitle.appendChild(document.createTextNode(t("heroTitleLine2")));

          document.getElementById("hero-sub").textContent = t("heroSub");
          document.getElementById("stat-label-q").textContent =
            t("statQuestions");
          document.getElementById("stat-label-d").textContent = t("statDays");
          document.getElementById("stat-label-t").textContent = t("statTime");
          document.getElementById("stat-label-f").textContent = t("statFormat");

          document.getElementById("sources-title").textContent =
            t("sourcesTitle");
          document.getElementById("src-book").textContent = t("srcBook");
          document.getElementById("src-free").textContent = t("srcFree");

          document.getElementById("btn-start-text").textContent = t("startBtn");
          document.getElementById("start-note").textContent = t("startNote");

          document.getElementById("qm-q-label").textContent = t("quizQ");
          document.getElementById("dc-label-text").textContent = t("dcLabel");
          document.getElementById("dc-now-prefix").textContent =
            t("dcNowPrefix");

          document.getElementById("stat-lbl-correct").textContent =
            t("resultCorrect");
          document.getElementById("stat-lbl-wrong").textContent =
            t("resultWrong");
          document.getElementById("stat-lbl-acc").textContent = t("resultAcc");
          document.getElementById("btn-share-text").textContent =
            t("resultShare");
          document.getElementById("btn-retry-text").textContent =
            t("resultRetry");
          document.getElementById("review-title").textContent =
            t("resultReview");
          document.getElementById("book-cta-title").textContent =
            t("bookCtaTitle");
          document.getElementById("book-cta-body").textContent =
            t("bookCtaBody");
          document.getElementById("book-cta-link-text").textContent =
            t("bookCtaLinkText");
          document.getElementById("footer-by").textContent = t("footerBy");
        }

        function updateLangPill() {
          const pill = document.getElementById("lang-pill");
          const buttons = document.querySelectorAll(".lang-toggle button");
          const active = document.querySelector(
            '.lang-toggle button[data-lang="' + lang + '"]',
          );
          if (!active || !pill) return;
          buttons.forEach((b) => b.classList.toggle("active", b === active));
          pill.style.width = active.offsetWidth + "px";
          pill.style.transform =
            "translateX(" + (active.offsetLeft - 3) + "px)";
        }

        function setLanguage(next) {
          if (lang === next) return;
          lang = next;
          try {
            localStorage.setItem("mk12_game_lang", lang);
          } catch (e) {}
          applyI18n();
          updateLangPill();
          if (
            document.getElementById("screen-quiz").classList.contains("active")
          ) {
            renderQuestion();
          }
          if (
            document
              .getElementById("screen-result")
              .classList.contains("active")
          ) {
            renderResult();
          }
        }

        /* =========================================================
         画面切り替え
         ========================================================= */
        function showScreen(id) {
          document
            .querySelectorAll(".screen")
            .forEach((s) => s.classList.remove("active"));
          document.getElementById(id).classList.add("active");
          window.scrollTo({ top: 0, behavior: "smooth" });
        }

        /* =========================================================
         30 日カレンダー（Q1..Q10 → Day 1..Day 30 を進行）
         ========================================================= */
        function buildDayGrid() {
          const grid = document.getElementById("day-grid");
          grid.textContent = "";
          for (let i = 1; i <= 30; i++) {
            const cell = document.createElement("div");
            cell.className = "day-cell";
            cell.dataset.day = String(i);
            grid.appendChild(cell);
          }
        }

        // qIndex → Day 範囲を Math.floor((qIdx * 30) / N) + 1 ... Math.floor((qIdx+1) * 30 / N) に線形マップ
        function updateDayGrid() {
          // スタート画面の SVG にも .day-cell が含まれるため #day-grid 配下に限定する
          const cells = document.querySelectorAll("#day-grid .day-cell");
          const total = QUIZ.length;
          const startDay = Math.floor((qIndex * 30) / total) + 1;
          const endDay = Math.floor(((qIndex + 1) * 30) / total);
          const currentMid = Math.round((startDay + endDay) / 2);
          cells.forEach((cell, i) => {
            const day = i + 1;
            cell.classList.remove("is-passed", "is-current", "is-30");
            // 最終日（Day 30）はゴール印として常に is-30 を付ける。
            // ただし最終問題で currentMid===30 になるケースでは
            // is-current も併用して「今ここ」表示が消えないようにする。
            if (day === 30) {
              cell.classList.add("is-30");
              if (day === currentMid) cell.classList.add("is-current");
              return;
            }
            if (day < startDay) {
              cell.classList.add("is-passed");
            } else if (day >= startDay && day <= endDay) {
              if (day === currentMid) cell.classList.add("is-current");
            }
          });
          document.getElementById("dc-now-num").textContent =
            String(currentMid);
        }

        /* =========================================================
         クイズ
         ========================================================= */
        function startQuiz() {
          qIndex = 0;
          answers = [];
          answered = false;
          document.getElementById("q-total").textContent = QUIZ.length;
          showScreen("screen-quiz");
          buildDayGrid();
          renderQuestion();
        }

        function renderQuestion() {
          const item = QUIZ[qIndex];
          answered = !!answers[qIndex];

          document.getElementById("q-current").textContent = qIndex + 1;
          document.getElementById("q-tag").textContent = item.tag[lang];
          document.getElementById("question-text").textContent = item.q[lang];

          updateDayGrid();

          const pct = (qIndex / QUIZ.length) * 100;
          document.getElementById("progress-fill").style.width = pct + "%";

          const choicesEl = document.getElementById("choices");
          choicesEl.textContent = "";

          const keys = ["A", "B", "C", "D"];
          item.choices.forEach((c, idx) => {
            const btn = document.createElement("button");
            btn.className = "choice";
            btn.type = "button";

            const key = document.createElement("span");
            key.className = "choice-key";
            key.textContent = keys[idx];

            const text = document.createElement("span");
            text.className = "choice-text";
            text.textContent = c[lang];

            const icon = document.createElement("span");
            icon.className = "choice-icon";
            icon.setAttribute("aria-hidden", "true");

            btn.appendChild(key);
            btn.appendChild(text);
            btn.appendChild(icon);

            btn.addEventListener("click", () => onAnswer(idx));
            choicesEl.appendChild(btn);
          });

          document.getElementById("feedback-area").textContent = "";
          document.getElementById("btn-next").style.display = "none";

          if (answered) {
            applyAnswerVisual(answers[qIndex].selected);
            showFeedback(answers[qIndex].selected);
          }
        }

        function onAnswer(selectedIdx) {
          if (answered) return;
          answered = true;

          const correctIdx = _correctIdx(qIndex);
          answers[qIndex] = { selected: selectedIdx, correct: correctIdx };

          applyAnswerVisual(selectedIdx);
          showFeedback(selectedIdx);
        }

        function applyAnswerVisual(selectedIdx) {
          const correctIdx = _correctIdx(qIndex);
          const btns = document.querySelectorAll(".choice");
          btns.forEach((b, idx) => {
            b.disabled = true;
            const icon = b.querySelector(".choice-icon");
            if (idx === correctIdx) {
              b.classList.add("correct");
              icon.textContent = "✓";
            } else if (idx === selectedIdx) {
              b.classList.add("wrong");
              icon.textContent = "✕";
            } else {
              b.classList.add("dim");
            }
          });
        }

        function showFeedback(selectedIdx) {
          const item = QUIZ[qIndex];
          const correctIdx = _correctIdx(qIndex);
          const isCorrect = selectedIdx === correctIdx;

          const fb = document.createElement("div");
          fb.className = "feedback " + (isCorrect ? "correct-fb" : "wrong-fb");

          const title = document.createElement("div");
          title.className = "feedback-title";
          title.textContent =
            (isCorrect ? "✓ " : "✕ ") +
            (isCorrect ? t("quizCorrect") : t("quizWrong"));
          fb.appendChild(title);

          const body = document.createElement("div");
          body.className = "feedback-body";
          renderSegments(body, item.ex[lang]);
          fb.appendChild(body);

          const fbArea = document.getElementById("feedback-area");
          fbArea.textContent = "";
          fbArea.appendChild(fb);

          const nextBtn = document.getElementById("btn-next");
          nextBtn.textContent =
            qIndex >= QUIZ.length - 1 ? t("quizLast") : t("quizNext");
          nextBtn.style.display = "flex";
          nextBtn.onclick = onNext;
          // 回答直後にフォーカスを「次へ」へ移し、Tab/SR ユーザに次アクションを伝える
          // 既に回答済みの問題を再描画した場合（言語切替等）にフォーカスを奪わないよう
          // document.activeElement が body / disabled な choice の場合のみ移動する
          const ae = document.activeElement;
          const aeIsChoice =
            ae && ae.classList && ae.classList.contains("choice");
          if (!ae || ae === document.body || aeIsChoice) {
            // レイアウト確定後に focus（次フレーム）
            requestAnimationFrame(function () {
              try {
                nextBtn.focus({ preventScroll: false });
              } catch (e) {
                nextBtn.focus();
              }
            });
          }
        }

        function onNext() {
          if (qIndex >= QUIZ.length - 1) {
            finishQuiz();
          } else {
            qIndex++;
            renderQuestion();
          }
        }

        /* =========================================================
         結果（4 段階：Day 0 / Day 15 / Day 28 / Day 30）
         ========================================================= */
        function finishQuiz() {
          document.getElementById("progress-fill").style.width = "100%";
          renderResult();
          showScreen("screen-result");
        }

                ? "30 日チャレンジを満点で完走した猛者です。"
                : "Flawless run on the 30-day challenge.",
              comment: isJa
                ? [
                    { t: "10/10、お見事です。", b: true },

                ? "ロードマップの大半は身についています。"

              comment: isJa
                ? [

                    { t: "ロードマップを実走できる水準", b: true },
                    {

                : "Front-half locked. Time to sharpen taint-analysis through CVE issuance.",
              comment: isJa
                ? [
                    {
                      t: "「採番フロー」「ターゲット選定」「脆弱性タイプ」",
                      b: true,

        function renderResult() {
          const correctCount = answers.filter(
            (a) => a.selected === a.correct,
          ).length;
          const wrongCount = QUIZ.length - correctCount;
          const acc = Math.round((correctCount / QUIZ.length) * 100);
          const rank = getRank(correctCount, QUIZ.length);

          document.getElementById("result-rank").textContent = rank.tag;
          document.getElementById("result-title").textContent = rank.title;
          document.getElementById("result-sub").textContent = rank.sub;
          document.getElementById("score-num").textContent = correctCount;
          document.getElementById("score-ring").style.setProperty("--pct", acc);
          document.getElementById("stat-correct").textContent = correctCount;
          document.getElementById("stat-wrong").textContent = wrongCount;
          document.getElementById("stat-acc").textContent = acc + "%";
          renderSegments(
            document.getElementById("result-comment"),
            rank.comment,
          );

          const reviewGrid = document.getElementById("review-grid");
          reviewGrid.textContent = "";
          const keys = ["A", "B", "C", "D"];
          QUIZ.forEach((item, i) => {
            const ans = answers[i];
            const isOk = ans && ans.selected === ans.correct;
            const row = document.createElement("div");
            row.className = "review-item";

            const mark = document.createElement("div");
            mark.className = "review-mark " + (isOk ? "ok" : "ng");
            mark.textContent = isOk ? "✓" : "✕";

            const content = document.createElement("div");
            content.className = "review-content";

            const qLine = document.createElement("div");
            qLine.className = "review-q";
            qLine.textContent = "Q" + (i + 1) + ". " + item.q[lang];
            content.appendChild(qLine);

            if (ans) {
              const aLine = document.createElement("div");
              aLine.className = "review-a";
              const yourTag = document.createElement("span");
              yourTag.className = "review-a-tag";
              yourTag.style.color = isOk ? "var(--success)" : "var(--danger)";
              yourTag.textContent =
                "[" + t("resultYour") + "] " + keys[ans.selected];
              aLine.appendChild(yourTag);
              aLine.appendChild(
                document.createTextNode(item.choices[ans.selected][lang]),
              );
              content.appendChild(aLine);

              if (!isOk) {
                const cLine = document.createElement("div");
                cLine.className = "review-a";
                cLine.style.marginTop = "4px";
                const cTag = document.createElement("span");
                cTag.className = "review-a-tag";
                cTag.style.color = "var(--success)";
                cTag.textContent =
                  "[" + t("resultAnswer") + "] " + keys[ans.correct];
                cLine.appendChild(cTag);
                cLine.appendChild(
                  document.createTextNode(item.choices[ans.correct][lang]),
                );
                content.appendChild(cLine);
              }
            }

            row.appendChild(mark);
            row.appendChild(content);
            reviewGrid.appendChild(row);
          });
        }

        /* =========================================================
         X (Twitter) シェア
         ========================================================= */
        function buildShareText(correct, total, acc) {
          if (lang === "ja") {
            return (
              "「OSSバグハント入門 クイズ」全 " +
              total +
              " 問中 " +
              correct +
              " 問正解（正答率 " +
              acc +
              "%）\n" +
              "Zenn 書籍『30日でCVE取得! OSSバグハント入門』の30日ロードマップに挑戦してみよう！\n\n" +
              "#BugBountyJPGame"
            );
          }
          return (
            "I scored " +
            correct +
            "/" +
            total +
            " (" +
            acc +
            "%) on the OSS Bug Hunting 101 Quiz \n" +
            "Try the 30-day CVE roadmap from the Zenn book!\n\n" +
            "#BugBountyJPGame"
          );

        function onShare() {
          const correct = answers.filter(
            (a) => a.selected === a.correct,
          ).length;
          const acc = Math.round((correct / QUIZ.length) * 100);
          const text = buildShareText(correct, QUIZ.length, acc);
          // スコア別シェアページ（OGP 画像にスコアが焼き込まれる）へリンクを向ける。
          // new URL の相対パス解決でドット入りディレクトリ名や /index.html 直指定にも安全。
          const url = new URL("share/" + correct + "/", location.href).href;
          const intent =
            "https://x.com/intent/tweet?text=" +
            encodeURIComponent(text) +
            "&url=" +
            encodeURIComponent(url);
          window.open(intent, "_blank", "noopener,noreferrer");
        }

        /* =========================================================
         イベントバインド
         ========================================================= */
        document.querySelectorAll(".lang-toggle button").forEach((btn) => {
          btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
        });
        document
          .getElementById("btn-start")
          .addEventListener("click", startQuiz);
        document.getElementById("btn-share").addEventListener("click", onShare);
        document
          .getElementById("btn-retry")
          .addEventListener("click", startQuiz);

        /* =========================================================
         パーティクル背景
         ========================================================= */
        (function initParticles() {
          const canvas = document.getElementById("particles");
          const ctx = canvas.getContext("2d");
          let w = 0;
          let h = 0;
          let particles = [];
          const reduce =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;

          function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
          }

          function create() {
            particles = [];
            const count = Math.max(28, Math.floor((w * h) / 32000));
            for (let i = 0; i < count; i++) {
              particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                r: Math.random() * 1.6 + 0.4,
                vx: (Math.random() - 0.5) * 0.18,
                vy: (Math.random() - 0.5) * 0.18,
                alpha: Math.random() * 0.5 + 0.15,
                hue: Math.random() < 0.5 ? "14, 165, 233" : "251, 146, 60",
              });
            }
          }

          function draw() {
            ctx.clearRect(0, 0, w, h);
            for (let i = 0; i < particles.length; i++) {
              const p = particles[i];
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
              ctx.fillStyle = "rgba(" + p.hue + ", " + p.alpha + ")";
              ctx.fill();
              p.x += p.vx;
              p.y += p.vy;
              if (p.x < 0) p.x = w;
              if (p.x > w) p.x = 0;
              if (p.y < 0) p.y = h;
              if (p.y > h) p.y = 0;
            }
            if (!reduce) requestAnimationFrame(draw);
          }

          resize();
          create();
          draw();
          window.addEventListener("resize", () => {
            resize();
            create();
          });
        })();

        /* =========================================================
         初期化
         ========================================================= */
        applyI18n();
        requestAnimationFrame(updateLangPill);
        /* ===== Quiz keyboard shortcuts (1-4 / A-D / Enter) ===== */
        document.addEventListener("keydown", function (_kbEvt) {
          if (_kbEvt.isComposing || _kbEvt.keyCode === 229) return;
          const _tg = _kbEvt.target;
          if (_tg && /^(INPUT|TEXTAREA|SELECT)$/i.test(_tg.tagName)) return;
          // quiz 画面がアクティブな時のみ反応する
          const _scr = document.querySelector("#screen-quiz.active");
          if (!_scr) return;
          // Enter / Space で「次へ」ボタンを進める
          if (
            _kbEvt.key === "Enter" ||
            _kbEvt.key === " " ||
            _kbEvt.code === "Space"
          ) {
            const _nb = document.getElementById("btn-next");
            if (_nb && _nb.style.display !== "none" && !_nb.disabled) {
              _kbEvt.preventDefault();
              _nb.click();
            }
            return;
          }
          // 1-4 / A-D で choice を選択（disabled なら無視）
          let _idx = -1;
          if (/^[1-4]$/.test(_kbEvt.key)) _idx = parseInt(_kbEvt.key, 10) - 1;
          else if (/^[a-dA-D]$/.test(_kbEvt.key))
            _idx = _kbEvt.key.toUpperCase().charCodeAt(0) - 65;
          if (_idx < 0) return;
          const _btns = _scr.querySelectorAll(".choice");
          if (_btns[_idx] && !_btns[_idx].disabled) {
            _kbEvt.preventDefault();
            _btns[_idx].click();
          }
        });

        window.addEventListener("resize", updateLangPill);
      })();
    </script>
