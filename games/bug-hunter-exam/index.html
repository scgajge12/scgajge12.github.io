    <style>
      :root {
        /* カワセミ（kingfisher）配色：コバルトブルー × バーントオレンジ */
        --bg: #04111e;
        --bg2: #082336;
        --bg3: #0e3149;
        --surface: #103e58;
        --surface-2: #154d6d;
        --line: rgba(14, 165, 233, 0.2);
        --line-strong: rgba(14, 165, 233, 0.5);

        --text: #e6f4f9;
        --text-muted: #93c5d8;
        --text-dim: #5b8597;

        --primary: #0891b2;
        --primary-light: #22d3ee;
        --primary-deep: #155e75;
        --secondary: #f97316;
        --secondary-light: #fb923c;
        --accent: #fbbf24;
        --gold: #fbbf24;
        --success: #34d399;
        --danger: #fb7185;

        /* 朱印用（バーミリオン） */
        --stamp: #dc2626;
        --stamp-deep: #991b1b;

        --radius: 14px;
        --radius-sm: 8px;
        --shadow: 0 12px 40px rgba(14, 165, 233, 0.22);
        --shadow-strong: 0 0 60px rgba(14, 165, 233, 0.4);

        --pad-x: 20px;
        --pad-bottom: max(80px, env(safe-area-inset-bottom));
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        height: 100%;
      }

      html,
      body {
        overflow-x: hidden;
        max-width: 100%;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        font-family:
          "Inter", "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic",
          "Noto Sans JP", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        word-wrap: break-word;
        overflow-wrap: break-word;
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      .bg-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .bg-grid {
        background-image:
          linear-gradient(
            to right,
            rgba(14, 165, 233, 0.04) 1px,
            transparent 1px
          ),
          linear-gradient(
            to bottom,
            rgba(14, 165, 233, 0.04) 1px,
            transparent 1px
          );
        background-size: 56px 56px;
        mask-image: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0.85) 0%,
          rgba(0, 0, 0, 0.2) 70%,
          transparent 100%
        );
      }
      .bg-glow1 {
        background: radial-gradient(
          circle at 18% 12%,
          rgba(14, 165, 233, 0.18),
          transparent 55%
        );
      }
      .bg-glow2 {
        background: radial-gradient(
          circle at 82% 88%,
          rgba(251, 146, 60, 0.14),
          transparent 60%
        );
      }
      #particles {
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
        max-width: 880px;
        width: 100%;
        margin: 0 auto;
        padding: 28px var(--pad-x) var(--pad-bottom);
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }
      .brand-mark {
        width: 36px;
        height: 36px;
        border-radius: 9px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 800;
        font-size: 18px;
        box-shadow: 0 0 20px rgba(14, 165, 233, 0.5);
      }
      .brand-text {
        display: flex;
        flex-direction: column;
        line-height: 1.15;
      }
      .brand-name {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.5px;
        color: var(--text);
      }
      .brand-sub {
        font-size: 10.5px;
        color: var(--text-dim);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .lang-toggle {
        display: inline-flex;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px;
        position: relative;
        overflow: hidden;
      }
      .lang-toggle button {
        background: transparent;
        border: 0;
        color: var(--text-muted);
        padding: 7px 14px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        border-radius: 999px;
        transition: color 0.2s;
        position: relative;
        z-index: 1;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        -webkit-tap-highlight-color: transparent;
      }
      .lang-toggle button.active {
        color: #fff;
      }
      .lang-toggle .lang-pill {
        position: absolute;
        top: 3px;
        left: 3px;
        height: calc(100% - 6px);
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        border-radius: 999px;
        transition:
          transform 0.28s ease,
          width 0.28s ease;
        z-index: 0;
        box-shadow: 0 0 16px rgba(14, 165, 233, 0.4);
      }

      .screen {
        display: none;
        animation: fadeIn 0.45s ease;
      }
      .screen.active {
        display: block;
      }

      .start-hero {
        text-align: center;
        margin-top: 6px;
        margin-bottom: 28px;
      }

      /* スタートヒーロー：受験票 + 朱印「試」 */
      .exam-illustration {
        display: block;
        width: clamp(220px, 38vw, 300px);
        height: auto;
        margin: 0 auto 16px;
        filter: drop-shadow(0 12px 22px rgba(14, 165, 233, 0.3))
          drop-shadow(0 4px 6px rgba(0, 0, 0, 0.45));
      }
      .exam-illustration .stamp-ring {
        transform-origin: 232px 70px;
        animation: stampRotate 14s linear infinite;
      }
      .exam-illustration .stamp-body {
        animation: stampBeat 2.4s ease-in-out infinite;
        transform-origin: 232px 70px;
      }
      .exam-illustration .ticket-shadow {
        animation: cardFloat 3.5s ease-in-out infinite alternate;
      }
      @keyframes stampRotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes stampBeat {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }
      @keyframes cardFloat {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-3px);
        }
      }

      .hero-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        font-size: 11px;
        letter-spacing: 2.5px;
        color: var(--secondary-light);
        background: rgba(251, 146, 60, 0.08);
        border: 1px solid rgba(251, 146, 60, 0.3);
        border-radius: 999px;
        font-weight: 700;
        margin-bottom: 18px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .hero-tag-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--secondary);
        box-shadow: 0 0 8px var(--secondary);
        animation: blink 1.4s infinite;
      }
      .hero-title {
        font-size: clamp(22px, 6vw, 44px);
        font-weight: 900;
        letter-spacing: -0.5px;
        line-height: 1.22;
        background: linear-gradient(
          120deg,
          var(--primary-light) 10%,
          var(--secondary-light) 55%,
          var(--accent) 95%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 12px;
      }
      .hero-sub {
        color: var(--text-muted);
        font-size: clamp(13.5px, 2vw, 15.5px);
        max-width: 600px;
        margin: 0 auto;
      }

      .info-card {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 22px 26px;
        margin-bottom: 22px;
        position: relative;
        overflow: hidden;
      }
      .info-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at top right,
          rgba(14, 165, 233, 0.08),
          transparent 60%
        );
        pointer-events: none;
      }
      .info-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 16px;
        position: relative;
      }
      .info-stat {
        text-align: center;
      }
      .info-stat-num {
        font-size: 26px;
        font-weight: 900;
        background: linear-gradient(
          135deg,
          var(--primary-light),
          var(--secondary-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        font-feature-settings: "tnum";
      }
      .info-stat-label {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 6px;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      /* 試験官紹介カード（スタート画面） */
      .examiners {
        background: linear-gradient(160deg, var(--bg2), var(--surface));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 18px 22px 20px;
        margin-bottom: 22px;
      }
      .examiners-title {
        font-size: 11.5px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 12px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .examiner-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
        gap: 10px;
      }
      .examiner-cell {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
      }
      .examiner-svg {
        width: 36px;
        height: 36px;
        flex-shrink: 0;
      }
      .examiner-text {
        display: flex;
        flex-direction: column;
        line-height: 1.2;
      }
      .examiner-phase {
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 1.2px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        text-transform: uppercase;
      }
      .examiner-name {
        font-size: 12.5px;
        color: var(--text);
        font-weight: 700;
        margin-top: 2px;
      }

      /* スコアランク（ライセンス階位）一覧 */
      .rank-list {
        background: linear-gradient(160deg, var(--bg2), var(--surface));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 18px 22px 20px;
        margin-bottom: 22px;
      }
      .rank-list-title {
        font-size: 11.5px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 12px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .rank-list-grid {
        display: grid;
        gap: 8px;
      }
      .rank-row {
        display: grid;
        grid-template-columns: 28px 96px 1fr auto;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
      }
      .rank-row-mark {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        flex-shrink: 0;
        border: 2px solid rgba(255, 255, 255, 0.18);
        box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.3);
      }
      .rank-row-score {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 12px;
        font-weight: 800;
        color: var(--accent);
        letter-spacing: 0.5px;
      }
      .rank-row-name {
        font-size: 13.5px;
        color: var(--text);
        font-weight: 800;
        line-height: 1.3;
      }
      .rank-row-tag {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 10px;
        color: var(--secondary-light);
        letter-spacing: 1.4px;
        text-transform: uppercase;
        white-space: nowrap;
      }
      @media (max-width: 480px) {
        .rank-row {
          grid-template-columns: 22px 72px 1fr;
          gap: 8px;
          padding: 9px 11px;
        }
        .rank-row-tag {
          display: none;
        }
      }

      .sources {
        background: linear-gradient(160deg, var(--bg2), var(--surface));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 24px;
        margin-bottom: 22px;
      }
      .sources-title {
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 12px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .source-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .source-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        text-decoration: none;
        color: var(--text-muted);
        font-size: 13px;
        transition: all 0.2s;
      }
      .source-item:hover {
        border-color: var(--primary);
        color: var(--primary-light);
        transform: translateX(2px);
      }
      .source-tag {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 11px;
        font-weight: 700;
        color: var(--secondary-light);
        background: rgba(251, 146, 60, 0.1);
        padding: 3px 8px;
        border-radius: 4px;
        flex-shrink: 0;
      }
      .source-title {
        flex: 1;
      }
      .source-arrow {
        color: var(--text-dim);
      }

      .start-btn-wrap {
        text-align: center;
      }
      .btn-start {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 16px 36px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        border: 0;
        color: #fff;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.5px;
        border-radius: 999px;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 8px 32px rgba(14, 165, 233, 0.35);
        position: relative;
        overflow: hidden;
      }
      .btn-start::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          120deg,
          transparent 30%,
          rgba(255, 255, 255, 0.18) 50%,
          transparent 70%
        );
        transform: translateX(-100%);
        transition: transform 0.6s ease;
      }
      .btn-start:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 40px rgba(14, 165, 233, 0.5);
      }
      .btn-start:hover::after {
        transform: translateX(100%);
      }
      .start-note {
        margin-top: 14px;
        color: var(--text-dim);
        font-size: 12px;
      }

      .quiz-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px 12px;
        flex-wrap: wrap;
        margin-bottom: 12px;
        font-size: 12.5px;
      }
      .quiz-counter {
        color: var(--text-muted);
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        letter-spacing: 1px;
      }
      .quiz-counter strong {
        color: var(--primary-light);
        font-size: 16px;
        font-weight: 800;
      }
      .quiz-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 12px;
        background: rgba(251, 146, 60, 0.08);
        border: 1px solid rgba(251, 146, 60, 0.25);
        border-radius: 999px;
        color: var(--secondary-light);
        font-size: 11px;
        letter-spacing: 0.5px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      /* 5 次試験ステップ進行 UI（一次〜五次） */
      .phase-bar {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 14px 16px 12px;
        margin-bottom: 14px;
      }
      .phase-bar-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        font-size: 11px;
        letter-spacing: 1.5px;
        color: var(--text-dim);
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        text-transform: uppercase;
      }
      .phase-bar-now {
        color: var(--primary-light);
        font-weight: 800;
        font-size: 12px;
      }
      .phase-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .phase-cell {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 8px 4px 6px;
        border-radius: 8px;
        background: var(--bg);
        border: 1.5px solid rgba(14, 165, 233, 0.18);
        text-align: center;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        transition: all 0.3s ease;
      }
      .phase-cell .phase-no {
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 1.4px;
        font-weight: 800;
        line-height: 1;
      }
      .phase-cell .phase-jp {
        font-size: 13px;
        font-weight: 900;
        margin-top: 4px;
        color: var(--text-muted);
        line-height: 1.1;
        letter-spacing: 1px;
      }
      .phase-cell.is-passed {
        background: linear-gradient(
          135deg,
          var(--primary-deep),
          var(--primary)
        );
        border-color: var(--primary);
        box-shadow: 0 0 6px rgba(34, 211, 238, 0.5);
      }
      .phase-cell.is-passed .phase-no,
      .phase-cell.is-passed .phase-jp {
        color: #e6f4f9;
      }
      .phase-cell.is-current {
        background: linear-gradient(
          135deg,
          var(--secondary),
          var(--secondary-light)
        );
        border-color: var(--secondary-light);
        box-shadow: 0 0 12px rgba(251, 146, 60, 0.7);
        animation: phaseGlow 1.4s ease-in-out infinite alternate;
      }
      .phase-cell.is-current .phase-no,
      .phase-cell.is-current .phase-jp {
        color: #2a0710;
      }
      /* 通過印（朱印スタンプ）演出 */
      .phase-cell.is-passed::after {
        content: "通";
        position: absolute;
        top: -6px;
        right: -6px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--stamp);
        border: 1.5px solid var(--stamp-deep);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 900;
        color: #fef2f2;
        transform: rotate(-12deg);
        box-shadow: 0 2px 6px rgba(220, 38, 38, 0.55);
        animation: stampPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      @keyframes phaseGlow {
        from {
          box-shadow: 0 0 8px rgba(251, 146, 60, 0.4);
        }
        to {
          box-shadow: 0 0 16px rgba(251, 146, 60, 0.95);
        }
      }
      @keyframes stampPop {
        from {
          opacity: 0;
          transform: scale(2) rotate(20deg);
        }
        to {
          opacity: 1;
          transform: scale(1) rotate(-12deg);
        }
      }

      .progress {
        height: 6px;
        background: var(--surface);
        border-radius: 999px;
        overflow: hidden;
        margin-bottom: 22px;
        border: 1px solid var(--line);
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--primary),
          var(--secondary),
          var(--accent)
        );
        background-size: 200% 100%;
        animation: shimmer 4s linear infinite;
        transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        border-radius: 999px;
        box-shadow: 0 0 12px rgba(14, 165, 233, 0.5);
      }

      /* 試験官のブリーフィング（フェーズ開始時のフレーバー） */
      .briefing {
        background: linear-gradient(160deg, var(--bg2), var(--surface));
        border: 1px solid rgba(220, 38, 38, 0.25);
        border-left: 3px solid var(--stamp);
        border-radius: var(--radius-sm);
        padding: 12px 16px;
        margin-bottom: 14px;
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }
      .briefing-icon {
        width: 34px;
        height: 34px;
        flex-shrink: 0;
        border-radius: 50%;
        background: var(--bg);
        border: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .briefing-icon svg {
        width: 26px;
        height: 26px;
      }
      .briefing-text {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.6;
      }
      .briefing-role {
        font-size: 11px;
        color: var(--secondary-light);
        letter-spacing: 1.5px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      .question-card {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 30px 32px;
        margin-bottom: 18px;
        animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .question-text {
        font-size: clamp(15.5px, 2.6vw, 18px);
        line-height: 1.75;
        color: var(--text);
        font-weight: 600;
      }

      .choices {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 16px;
      }
      .choice {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 16px 18px;
        background: var(--surface);
        border: 1.5px solid var(--line);
        color: var(--text);
        border-radius: var(--radius-sm);
        cursor: pointer;
        text-align: left;
        font-size: 13.5px;
        line-height: 1.6;
        transition: all 0.2s;
        position: relative;
        font-family: inherit;
        word-break: break-word;
        -webkit-tap-highlight-color: transparent;
      }
      .choice .choice-key,
      .choice .choice-icon {
        margin-top: 1px;
      }
      .choice:hover:not(:disabled) {
        border-color: var(--primary);
        background: var(--surface-2);
        transform: translateX(2px);
      }
      .choice:disabled {
        cursor: default;
      }
      .choice-key {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: rgba(14, 165, 233, 0.15);
        border: 1px solid rgba(14, 165, 233, 0.3);
        color: var(--primary-light);
        font-size: 12px;
        font-weight: 800;
        flex-shrink: 0;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        transition: all 0.2s;
      }
      .choice-text {
        flex: 1;
      }
      .choice-icon {
        opacity: 0;
        font-size: 18px;
        transition: opacity 0.2s;
      }
      .choice.correct {
        border-color: var(--success);
        background: rgba(52, 211, 153, 0.1);
      }
      .choice.correct .choice-key {
        background: var(--success);
        color: #04261b;
        border-color: var(--success);
      }
      .choice.correct .choice-icon {
        opacity: 1;
        color: var(--success);
      }
      .choice.wrong {
        border-color: var(--danger);
        background: rgba(251, 113, 133, 0.1);
      }
      .choice.wrong .choice-key {
        background: var(--danger);
        color: #2a0710;
        border-color: var(--danger);
      }
      .choice.wrong .choice-icon {
        opacity: 1;
        color: var(--danger);
      }
      .choice.dim {
        opacity: 0.45;
      }

      .feedback {
        background: var(--surface);
        border: 1px solid var(--line);
        border-left: 3px solid var(--primary);
        border-radius: var(--radius-sm);
        padding: 16px 20px;
        margin-top: 14px;
        animation: fadeIn 0.3s ease;
      }
      .feedback.correct-fb {
        border-left-color: var(--success);
        background: rgba(52, 211, 153, 0.06);
      }
      .feedback.wrong-fb {
        border-left-color: var(--danger);
        background: rgba(251, 113, 133, 0.06);
      }
      .feedback-title {
        font-weight: 800;
        font-size: 14px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .feedback.correct-fb .feedback-title {
        color: var(--success);
      }
      .feedback.wrong-fb .feedback-title {
        color: var(--danger);
      }
      .feedback-body {
        font-size: 13.5px;
        line-height: 1.75;
        color: var(--text-muted);
        word-break: break-word;
      }
      .feedback-body strong {
        color: var(--text);
        font-weight: 700;
      }

      .next-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 16px;
        margin-top: 18px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        border: 0;
        color: #fff;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.5px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 6px 20px rgba(14, 165, 233, 0.3);
      }
      .next-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(14, 165, 233, 0.45);
      }

      .result {
        text-align: center;
        max-width: 660px;
        margin: 0 auto;
      }
      .result-rank-tag {
        display: inline-block;
        padding: 6px 18px;
        font-size: 11px;
        letter-spacing: 3px;
        color: var(--gold);
        background: rgba(251, 191, 36, 0.08);
        border: 1px solid rgba(251, 191, 36, 0.3);
        border-radius: 999px;
        font-weight: 700;
        margin-bottom: 18px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .result-title {
        font-size: clamp(22px, 6vw, 42px);
        font-weight: 900;
        background: linear-gradient(
          120deg,
          var(--primary-light),
          var(--secondary-light),
          var(--accent)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.2;
        margin-bottom: 10px;
      }
      .result-sub {
        color: var(--text-muted);
        margin-bottom: 24px;
        font-size: 14px;
      }

      /* ハンターライセンスカード（結果画面） */
      .license-card {
        position: relative;
        margin: 0 auto 28px;
        max-width: 480px;
        padding: 22px 26px 24px;
        background: linear-gradient(
          150deg,
          #0e3149 0%,
          #103e58 40%,
          #134e74 100%
        );
        border: 1.5px solid rgba(251, 191, 36, 0.55);
        border-radius: 16px;
        box-shadow:
          0 0 40px rgba(251, 191, 36, 0.18),
          inset 0 0 30px rgba(251, 191, 36, 0.08);
        overflow: hidden;
        text-align: left;
        animation: licenseFade 0.8s ease;
      }
      .license-card::before {
        content: "";
        position: absolute;
        inset: 6px;
        border: 1px dashed rgba(251, 191, 36, 0.32);
        border-radius: 10px;
        pointer-events: none;
      }
      .license-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }
      .license-head-l {
        font-size: 11.5px;
        color: rgba(254, 243, 199, 0.85);
        letter-spacing: 3px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-weight: 800;
      }
      .license-head-r {
        font-size: 11px;
        color: rgba(254, 243, 199, 0.55);
        letter-spacing: 1.5px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .license-body {
        display: flex;
        gap: 16px;
        align-items: center;
      }
      .license-stars {
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        padding: 8px 10px;
        background: rgba(4, 17, 30, 0.45);
        border: 1px solid rgba(251, 191, 36, 0.35);
        border-radius: 12px;
      }
      .license-stars .ls-row {
        font-size: 16px;
        letter-spacing: 1.5px;
        color: var(--accent);
        line-height: 1.05;
      }
      .license-stars .ls-grade {
        font-size: 9.5px;
        color: rgba(254, 243, 199, 0.85);
        letter-spacing: 1.2px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        margin-top: 4px;
      }
      .license-name {
        flex: 1;
      }
      .license-rank {
        font-size: clamp(17px, 4vw, 21px);
        font-weight: 900;
        color: var(--accent);
        line-height: 1.25;
        margin-bottom: 4px;
        letter-spacing: 0.3px;
      }
      .license-tier {
        font-size: 11.5px;
        color: rgba(254, 243, 199, 0.75);
        letter-spacing: 1.5px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        text-transform: uppercase;
      }
      .license-foot {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-top: 14px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .license-id {
        font-size: 11.5px;
        color: rgba(254, 243, 199, 0.85);
        letter-spacing: 1.2px;
      }
      .license-id strong {
        color: var(--accent);
      }
      .license-date {
        font-size: 11px;
        color: rgba(254, 243, 199, 0.55);
        letter-spacing: 1px;
      }
      /* 朱印（合格印） */
      .license-seal {
        position: absolute;
        top: 14px;
        right: 14px;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: var(--stamp);
        border: 2.5px solid var(--stamp-deep);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 900;
        color: #fef2f2;
        letter-spacing: 1px;
        transform: rotate(-12deg);
        box-shadow: 0 4px 12px rgba(220, 38, 38, 0.55);
        line-height: 1.05;
        text-align: center;
        font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      }
      .license-seal.is-fail {
        background: #6b7280;
        border-color: #374151;
      }
      @keyframes licenseFade {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .score-display {
        position: relative;
        display: inline-block;
        margin-bottom: 24px;
      }
      .score-ring {
        --pct: 0;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: conic-gradient(
          from -90deg,
          var(--primary) 0%,
          var(--secondary) calc(var(--pct) * 0.5%),
          var(--accent) calc(var(--pct) * 1%),
          var(--surface-2) calc(var(--pct) * 1%)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        box-shadow: var(--shadow-strong);
      }
      .score-ring::before {
        content: "";
        position: absolute;
        inset: 14px;
        border-radius: 50%;
        background: var(--bg);
      }
      .score-content {
        position: relative;
        z-index: 1;
        text-align: center;
      }
      .score-num {
        font-size: 48px;
        font-weight: 900;
        background: linear-gradient(
          135deg,
          var(--primary-light),
          var(--secondary-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        font-feature-settings: "tnum";
      }
      .score-total {
        color: var(--text-dim);
        font-size: 14px;
        margin-top: 4px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .result-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 28px;
      }
      .result-stat {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 14px 10px;
      }
      .result-stat-num {
        font-size: 22px;
        font-weight: 800;
        color: var(--primary-light);
        font-feature-settings: "tnum";
      }
      .result-stat-label {
        font-size: 10.5px;
        color: var(--text-dim);
        letter-spacing: 1px;
        margin-top: 4px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .result-comment {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 24px;
        margin-bottom: 26px;
        text-align: left;
        font-size: 14px;
        line-height: 1.75;
        color: var(--text-muted);
      }
      .result-comment strong {
        color: var(--text);
      }

      .book-cta {
        background: linear-gradient(160deg, var(--bg2), var(--surface));
        border: 1px solid rgba(251, 191, 36, 0.3);
        border-radius: var(--radius);
        padding: 18px 22px;
        margin-bottom: 22px;
        text-align: left;
      }
      .book-cta-title {
        font-size: 11px;
        letter-spacing: 2px;
        color: var(--accent);
        margin-bottom: 8px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        text-transform: uppercase;
      }
      .book-cta-body {
        font-size: 13.5px;
        color: var(--text-muted);
        line-height: 1.65;
        margin-bottom: 10px;
      }
      .book-cta-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        background: rgba(251, 191, 36, 0.1);
        border: 1px solid rgba(251, 191, 36, 0.35);
        border-radius: 999px;
        color: var(--accent);
        text-decoration: none;
        font-size: 12.5px;
        font-weight: 700;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        transition: all 0.2s;
      }
      .book-cta-link:hover {
        background: rgba(251, 191, 36, 0.18);
        transform: translateX(2px);
      }

      .result-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
      }
      .btn-share-x {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 14px 28px;
        background: #000;
        border: 1.5px solid #2a2a2a;
        color: #fff;
        font-size: 14px;
        font-weight: 800;
        border-radius: 999px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s;
        font-family: inherit;
      }
      .btn-share-x:hover {
        background: #111;
        border-color: #555;
        transform: translateY(-2px);
      }
      .btn-secondary {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 28px;
        background: transparent;
        color: var(--primary-light);
        font-size: 14px;
        font-weight: 800;
        border-radius: 999px;
        border: 1.5px solid var(--primary);
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }
      .btn-secondary:hover {
        background: rgba(14, 165, 233, 0.12);
        transform: translateY(-2px);
      }

      .review {
        margin-top: 36px;
        text-align: left;
      }
      .review-title {
        font-size: 14px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 16px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        text-align: center;
      }
      .review-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .review-item {
        display: flex;
        gap: 12px;
        padding: 14px 18px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        font-size: 13px;
      }
      .review-mark {
        flex-shrink: 0;
        width: 26px;
        height: 26px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 13px;
      }
      .review-mark.ok {
        background: rgba(52, 211, 153, 0.18);
        color: var(--success);
      }
      .review-mark.ng {
        background: rgba(251, 113, 133, 0.18);
        color: var(--danger);
      }
      .review-content {
        flex: 1;
      }
      .review-q {
        color: var(--text);
        font-weight: 600;
        margin-bottom: 6px;
        line-height: 1.5;
      }
      .review-a {
        color: var(--text-muted);
        font-size: 12.5px;
      }
      .review-a-tag {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-weight: 700;
        margin-right: 6px;
      }

      .footer {
        margin-top: 60px;
        text-align: center;
        font-size: 12px;
        color: var(--text-dim);
      }
      .footer a {
        color: var(--text-muted);
        text-decoration: none;
        border-bottom: 1px dotted var(--text-dim);
      }
      .footer a:hover {
        color: var(--primary-light);
        border-color: var(--primary-light);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      @keyframes shimmer {
        0% {
          background-position: 0% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }

      @media (max-width: 560px) {
        :root {
          --pad-x: 16px;
        }
        .page {
          padding-top: 22px;
        }
        .question-card {
          padding: 22px 18px;
        }
        .info-card,
        .sources,
        .examiners {
          padding: 18px 16px;
        }
        .top-bar {
          flex-wrap: wrap;
        }
        .choice {
          padding: 14px 14px;
          gap: 12px;
          font-size: 13px;
        }
        .choice-key {
          width: 26px;
          height: 26px;
        }
        .feedback {
          padding: 14px 16px;
        }
        .feedback-body {
          font-size: 12.8px;
        }
        .result-stats {
          gap: 8px;
        }
        .result-stat-num {
          font-size: 18px;
        }
        .result-comment {
          padding: 16px 18px;
          font-size: 13px;
        }
        .review-item {
          padding: 12px 14px;
          font-size: 12.5px;
        }
        .btn-share-x,
        .btn-secondary {
          padding: 13px 22px;
          font-size: 13.5px;
        }
        .source-item {
          font-size: 12.5px;
        }
        .phase-grid {
          gap: 4px;
        }
        .phase-cell .phase-jp {
          font-size: 12px;
        }
        .phase-cell .phase-no {
          font-size: 10px;
        }
        .phase-cell.is-passed::after {
          width: 18px;
          height: 18px;
          font-size: 9px;
        }
        .license-card {
          padding: 18px 18px 20px;
        }
        .license-seal {
          width: 48px;
          height: 48px;
          font-size: 12px;
        }
      }

      @media (max-width: 400px) {
        :root {
          --pad-x: 12px;
        }
        .page {
          padding-top: 18px;
        }
        .brand-sub {
          letter-spacing: 1px;
          font-size: 9.5px;
        }
        .hero-tag {
          letter-spacing: 1.5px;
          font-size: 10.5px;
          padding: 5px 12px;
        }
        .hero-sub {
          font-size: 13px;
        }
        .question-card {
          padding: 20px 16px;
        }
        .question-text {
          font-size: 14.5px;
          line-height: 1.7;
        }
        .choice {
          padding: 13px 13px;
          font-size: 12.8px;
        }

        function _decryptQuiz(payload) {
          const bin = atob(payload);
          const out = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) {
            let x = bin.charCodeAt(i);
            x ^= _kA.charCodeAt(i % _kA.length);
            x ^= _kB.charCodeAt(i % _kB.length);
            x ^= _kC[i % _kC.length];
            out[i] = x;
          }
          return JSON.parse(new TextDecoder().decode(out));
        }

        function _shuffleInPlace(arr) {
          for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const tmp = arr[i];
            arr[i] = arr[j];
            arr[j] = tmp;
          }
          return arr;
        }

        const QUIZ = _decryptQuiz(_PAYLOAD);
        for (const q of QUIZ) {
          _shuffleInPlace(q.choices);
        }

        function _correctIdx(qIdx) {
          const choices = QUIZ[qIdx].choices;
          for (let i = 0; i < choices.length; i++) {
            if (choices[i].c) return i;
          }
          return -1;
        }

        function renderSegments(target, segments) {
          target.textContent = "";
          for (const seg of segments) {
            if (seg.b) {

              strong.textContent = seg.t;
              target.appendChild(strong);
            } else {
              target.appendChild(document.createTextNode(seg.t));
            }
          }
        }

        /* =========================================================

        function buildPhaseGrid() {
          const grid = document.getElementById("phase-grid");
          grid.textContent = "";
          const dict = I18N[lang];
          for (let i = 0; i < 5; i++) {
            // ol > li ベースに変更し、スクリーンリーダで「N 番目の項目」と読まれるように
            const cell = document.createElement("li");
            cell.className = "phase-cell";
            cell.dataset.phase = String(i);

            const no = document.createElement("span");
            no.className = "phase-no";
            no.textContent = dict.phaseNames[i].no;

            const jp = document.createElement("span");
            jp.className = "phase-jp";
            jp.textContent = dict.phaseNames[i].jp;

            cell.appendChild(no);
            cell.appendChild(jp);
            grid.appendChild(cell);
          }
        }

        function updatePhaseGrid() {
          const cells = document.querySelectorAll(".phase-cell");
          const current = phaseOf(qIndex);
          cells.forEach((cell, i) => {
            cell.classList.remove("is-passed", "is-current");
            // SR に「現在のステップ」を伝えるため aria-current を動的更新
            if (i < current) {
              cell.classList.add("is-passed");
              cell.removeAttribute("aria-current");
            } else if (i === current) {
              cell.classList.add("is-current");
              cell.setAttribute("aria-current", "step");
            } else {
              cell.removeAttribute("aria-current");
            }
          });
          document.getElementById("pb-now-num").textContent = String(
            current + 1,
          );
        }

        /* =========================================================
         クイズ
         ========================================================= */
        function startQuiz() {
          qIndex = 0;
          answers = [];
          answered = false;
          // 受験開始時に固定の受験番号を発行。試験官口上の "#x" と
          // ライセンスカードの ID の両方で同一値を使う。
          candidateNo = generateCandidateNo();
          document.getElementById("q-total").textContent = QUIZ.length;
          showScreen("screen-quiz");
          buildPhaseGrid();
          renderQuestion();
        }

        function renderQuestion() {
          const item = QUIZ[qIndex];
          answered = !!answers[qIndex];

          document.getElementById("q-current").textContent = qIndex + 1;
          document.getElementById("q-tag").textContent = item.tag[lang];
          document.getElementById("question-text").textContent = item.q[lang];

          // 言語切替時にもフェーズグリッドの文字列が更新されるよう再構築
          buildPhaseGrid();
          updatePhaseGrid();
          renderBriefing();

          const pct = (qIndex / QUIZ.length) * 100;
          document.getElementById("progress-fill").style.width = pct + "%";

          const choicesEl = document.getElementById("choices");
          choicesEl.textContent = "";

          const keys = ["A", "B", "C", "D"];
          item.choices.forEach((c, idx) => {
            const btn = document.createElement("button");
            btn.className = "choice";
            btn.type = "button";

            const key = document.createElement("span");
            key.className = "choice-key";
            key.textContent = keys[idx];

            const text = document.createElement("span");
            text.className = "choice-text";
            text.textContent = c[lang];

            const icon = document.createElement("span");
            icon.className = "choice-icon";
            icon.setAttribute("aria-hidden", "true");

            btn.appendChild(key);
            btn.appendChild(text);
            btn.appendChild(icon);

            btn.addEventListener("click", () => onAnswer(idx));
            choicesEl.appendChild(btn);
          });

          document.getElementById("feedback-area").textContent = "";
          document.getElementById("btn-next").style.display = "none";

          if (answered) {
            applyAnswerVisual(answers[qIndex].selected);
            showFeedback(answers[qIndex].selected);
          }
        }

        function renderBriefing() {
          // 各フェーズの最初の設問（qIndex % 4 === 0、つまり 0/4/8/12/16）で
          // 試験官のブリーフィングを差し込む。
          const brief = document.getElementById("briefing");
          brief.textContent = "";
          const isFirstOfPhase = qIndex % 4 === 0;
          if (!isFirstOfPhase) {
            brief.style.display = "none";
            return;
          }
          brief.style.display = "flex";
          const ex = I18N[lang].examiners[phaseOf(qIndex)];

          const iconWrap = document.createElement("div");
          iconWrap.className = "briefing-icon";
          iconWrap.appendChild(createExaminerSvg(phaseOf(qIndex)));

          const body = document.createElement("div");
          body.style.flex = "1";
          const role = document.createElement("div");
          role.className = "briefing-role";
          role.textContent = ex.role + " / " + ex.name;
          const txt = document.createElement("div");
          txt.className = "briefing-text";
          // フレーバー文中の "#x" を受験番号に差し替え（演出の一貫性）
          txt.textContent = (ex.flavor || "").replace(/#x/g, candidateNo);
          body.appendChild(role);
          body.appendChild(txt);

          brief.appendChild(iconWrap);
          brief.appendChild(body);
        }

        function onAnswer(selectedIdx) {
          if (answered) return;
          answered = true;

          const correctIdx = _correctIdx(qIndex);
          answers[qIndex] = { selected: selectedIdx, correct: correctIdx };

          applyAnswerVisual(selectedIdx);
          showFeedback(selectedIdx);
        }

        function applyAnswerVisual(selectedIdx) {
          const correctIdx = _correctIdx(qIndex);
          const btns = document.querySelectorAll(".choice");
          btns.forEach((b, idx) => {
            b.disabled = true;
            const icon = b.querySelector(".choice-icon");
            if (idx === correctIdx) {
              b.classList.add("correct");
              icon.textContent = "✓";
            } else if (idx === selectedIdx) {
              b.classList.add("wrong");
              icon.textContent = "✕";
            } else {
              b.classList.add("dim");
            }
          });
        }

        function showFeedback(selectedIdx) {
          const item = QUIZ[qIndex];
          const correctIdx = _correctIdx(qIndex);
          const isCorrect = selectedIdx === correctIdx;

          const fb = document.createElement("div");
          fb.className = "feedback " + (isCorrect ? "correct-fb" : "wrong-fb");

          const title = document.createElement("div");
          title.className = "feedback-title";
          title.textContent =
            (isCorrect ? "✓ " : "✕ ") +
            (isCorrect ? t("quizCorrect") : t("quizWrong"));
          fb.appendChild(title);

          const body = document.createElement("div");
          body.className = "feedback-body";
          // シャッフル後の正解の位置を表すアルファベットを動的に注入する。
          // 解説文ソース内では「正解は A」のように固定文字列で書かれているが、
          // 実際の位置（A〜D）はシャッフル後の correctIdx に依存する。
          // よって、最初に出現する太字の単一英字 A-D セグメントだけを差し替える。
          const correctLetter = ["A", "B", "C", "D"][correctIdx] || "";
          let letterReplaced = false;
          const renderedSegs = item.ex[lang].map((seg) => {
            if (
              !letterReplaced &&
              seg.b &&
              typeof seg.t === "string" &&
              /^[A-D]$/.test(seg.t)
            ) {
              letterReplaced = true;
              return { t: correctLetter, b: true };
            }
            return seg;
          });
          renderSegments(body, renderedSegs);
          fb.appendChild(body);

          const fbArea = document.getElementById("feedback-area");
          fbArea.textContent = "";
          fbArea.appendChild(fb);

          const nextBtn = document.getElementById("btn-next");
          nextBtn.textContent =
            qIndex >= QUIZ.length - 1 ? t("quizLast") : t("quizNext");
          nextBtn.style.display = "flex";
          nextBtn.onclick = onNext;
          /* focus-next-btn-after-answer */
          {
            const _ae = document.activeElement;
            const _aeChoice =
              _ae && _ae.classList && _ae.classList.contains("choice");
            if (!_ae || _ae === document.body || _aeChoice) {
              requestAnimationFrame(function () {
                try {
                  nextBtn.focus({ preventScroll: false });
                } catch (e) {
                  nextBtn.focus();
                }
              });
            }
          }
        }

        function onNext() {
          if (qIndex >= QUIZ.length - 1) {
            finishQuiz();
          } else {
            qIndex++;
            renderQuestion();
          }
        }

        /* =========================================================
         結果（ハンターライセンス発行）
         全 20 問のスコア → tier（tierOf() と整合）:
           0–5    → 1 (Learner / 予選敗退)
           6–10   → 2 (Newbie)
           11–15  → 3 (Rookie / Single-Star ハンター)
           16–19  → 4 (Pro Hunter / Double-Star ハンター)
           20     → 5 (Elite Hunter / Triple-Star ハンター)
         ========================================================= */
        function finishQuiz() {
          document.getElementById("progress-fill").style.width = "100%";
          renderResult();
          showScreen("screen-result");
        }

        function tierOf(score) {
          // 全 20 問における段階分け（百分率と整合）：
          //   20         → 5 (Triple-Star Hunter)
          //   16–19      → 4 (Double-Star Hunter)
          //   11–15      → 3 (Single-Star Hunter)
          //   6–10       → 2 (Newbie)
          //   0–5        → 1 (Learner / 予選敗退)
          if (score >= 20) return 5;
          if (score >= 16) return 4;
          if (score >= 11) return 3;
          if (score >= 6) return 2;
          return 1;
        }

        function rankInfo(score) {
          const tier = tierOf(score);
          const isJa = lang === "ja";
          const dict = I18N[lang];

          // 結果上部のランクタグ。
          // ライセンスカードの星数（dict.licenseStars: ・/☆/★/★★/★★★）と
          // 整合させる：tier 1 は星なし、tier 2 は空星、tier 3 以上は実星。
          // 称号部分は I18N から取得して日本語モードでの違和感を解消する。
          const rn = dict.rankNames || {};
          const tags = {
            1: rn[1] || "PRELIM · DROP-OUT",
            2: "☆ " + (rn[2] || "GRADE II · NEWBIE"),
            3: "★ " + (rn[3] || "GRADE III · ROOKIE"),
            4: "★★ " + (rn[4] || "GRADE IV · PRO HUNTER"),
            5: "★★★ " + (rn[5] || "GRADE V · ELITE HUNTER"),
          };

          const titles = isJa
            ? {
                1: "予選敗退：まずは書籍から始めよう",
                2: "見習いライセンス：方向性は掴めている",
                3: "Single-Star ハンター：初の報奨金が見えてきた",
                4: "Double-Star ハンター：BBP の主戦場が見えた",
                5: "Triple-Star ハンター：受験番号 #x、合格だ。",
              }
            : {
                1: "Preliminary Drop-Out: Start with the book",
                2: "Apprentice License: Direction is right",
                3: "Single-Star Hunter: First bounty in sight",
                4: "Double-Star Hunter: BBP frontline acquired",
                5: "Triple-Star Hunter: Candidate #x — you passed.",
              };

          const subs = isJa
            ? {
                1: "ハンター試験はここで終わらない。次の受験で会おう。",
                2: "二次試験までは姿が見えている。次は素材選びと脅威の高め方を。",
                3: "三次試験まで踏破。あとは脅威の最大化とレポート設計。",
                4: '四次試験までクリア。五次の "降参を取る" 一手を磨こう。',
                5: "5 次試験すべてを満点で突破。ハンターライセンスを受け取れ。",
              }
            : {
                1: "The Hunter Exam doesn't end here — see you at the next sitting.",
                2: "Through the second phase. Sharpen ingredient picking and threat escalation next.",
                3: "Through the third phase. Now master impact maximization and report craft.",
                4: 'Through the fourth phase. Polish the "taking the surrender" move in the fifth.',
                5: "All five phases, flawless. Your Hunter License is yours.",
              };

          const comments = isJa
            ? {
                1: [
                  { t: "0–5 / 20。", b: true },
                  {
                    t:
                      " まずは書籍の無料公開部分（はじめに / Q&A）から始めるのが最短ルートです。" +
                      "ハンターのタイプ別戦略（1.4）と全体像のマインドセット（2.1）を押さえると、" +
                      "次回の受験で一気に二次試験まで通過できるはずです。",
                  },
                ],
                2: [
                  { t: "6–10 / 20。", b: true },
                  {
                    t:
                      " 一次〜二次の入口は掴めています。" +
                      "次は 4.1 脆弱性の脅威の高め方 と 5.1 レポートの解像度 を強化すれば、報奨金到達が見える距離になります。",
                  },
                ],
                3: [
                  { t: "11–15 / 20。", b: true },
                  {
                    t: " 5 次試験のうち過半数を突破し、",
                  },
                  { t: "③ Rookie", b: true },
                  {
                    t: " 相当の判断軸が身についています。あとは 4 章（脅威の最大化）と 5 章（レポート × 再検証）に集中投資すれば、初の Bounty にかなり近づきます。",
                  },
                ],
                4: [
                  { t: "16–19 / 20。", b: true },
                  {
                    t: " もう ",
                  },
                  { t: "Pro Hunter 級", b: true },
                  {
                    t: " の判断軸です。落としているのは「四次の番号札（脅威の最大化）」か「五次の降参を取る一手（再検証 / 対話）」周辺。書籍の該当節を 1〜2 節読み返すだけで満点圏内です。",
                  },
                ],
                5: [
                  { t: "20 / 20、見事だ。", b: true },
                  {
                    t:
                      " ポリシー、思考プロセス、要素別アプローチ、脅威の最大化、レポート × 再検証 — 5 章分の判断軸を完全に押さえています。" +
                      "本物の Private BBP への招待状を狙いに行きましょう。",
                  },
                ],
              }
            : {
                1: [
                  { t: "0–5 / 20. ", b: true },
                  {
                    t: "The fastest route from here is the free preview (Intro / Q&A). Lock in 1.4 hunter-type strategy and 2.1 overall mindset, and you'll clear at least the second phase next time.",
                  },
                ],
                2: [
                  { t: "6–10 / 20. ", b: true },
                  {
                    t: "First/second phase entries are there. Reinforce 4.1 (threat escalation) and 5.1 (report resolution) and the first bounty comes into range.",
                  },
                ],
                3: [
                  { t: "11–15 / 20. ", b: true },
                  {
                    t: "You're already past more than half the exams — call it ",
                  },
                  { t: "Rookie tier", b: true },
                  {
                    t: ". Invest the next few sessions in Chapter 4 (impact max) and Chapter 5 (report × retest); the first bounty is well within reach.",
                  },
                ],
                4: [
                  { t: "16–19 / 20. ", b: true },
                  {
                    t: "Already operating at ",
                  },
                  { t: "Pro Hunter level", b: true },
                  {
                    t: ". You're dropping either the fourth phase (gadget-chain escalation) or the fifth (retest / professional dialogue). Re-read those sections once and full marks is yours.",
                  },
                ],
                5: [
                  { t: "20 / 20. Outstanding. ", b: true },
                  {
                    t: " Policy, thinking, element-specific approach, threat maximization, report × retest — all five chapters' axes locked in. Time to go hunt for a real Private BBP invite.",
                  },
                ],
              };

          return {
            tag: tags[tier],
            title: titles[tier],
            sub: subs[tier],
            comment: comments[tier],
            tier: tier,
            licenseTier: dict.licenseTier[tier],
            licenseRankName: dict.licenseRankName[tier],
            licenseStarsRow: dict.licenseStars[tier],
            licenseGrade: dict.licenseGrade[tier],
            licenseSeal:
              tier === 1 ? dict.licenseSeal.fail : dict.licenseSeal.pass,
          };
        }

        function renderLicenseCard(score, rank) {
          const dict = I18N[lang];
          document.getElementById("license-head-l").textContent =
            dict.licenseTitleStr;
          document.getElementById("license-head-r").textContent =
            rank.licenseGrade;

          document.getElementById("license-stars-row").textContent =
            rank.licenseStarsRow;
          document.getElementById("license-stars-grade").textContent =
            rank.licenseGrade;

          document.getElementById("license-rank-name").textContent =
            rank.licenseRankName;
          document.getElementById("license-tier").textContent =
            rank.licenseTier;

          document.getElementById("license-id-label").textContent =
            dict.licenseIdLabel;
          // セッション開始時に発行した受験番号をそのまま使い、
          // 試験官の口上・結果タイトル・ライセンス ID で表記を統一する。
          document.getElementById("license-id-num").textContent = candidateNo;

          const today = new Date();
          const y = today.getFullYear();
          const m = String(today.getMonth() + 1).padStart(2, "0");
          const d = String(today.getDate()).padStart(2, "0");
          document.getElementById("license-date").textContent =
            (lang === "ja" ? "発行日 " : "Issued ") + y + "-" + m + "-" + d;

          const seal = document.getElementById("license-seal");
          seal.textContent = rank.licenseSeal;
          seal.classList.toggle("is-fail", rank.tier === 1);
        }

        function renderResult() {
          const correctCount = answers.filter(
            (a) => a.selected === a.correct,
          ).length;
          const wrongCount = QUIZ.length - correctCount;
          const acc = Math.round((correctCount / QUIZ.length) * 100);
          const rank = rankInfo(correctCount);

          // タイトル中の "#x" は受験番号（candidateNo）で置換し、
          // 試験官の口上・ライセンスカードと表記を揃える。
          document.getElementById("result-rank").textContent = rank.tag;
          document.getElementById("result-title").textContent = (
            rank.title || ""
          ).replace(/#x/g, candidateNo);
          document.getElementById("result-sub").textContent = (
            rank.sub || ""
          ).replace(/#x/g, candidateNo);
          document.getElementById("score-num").textContent = correctCount;
          document.getElementById("score-ring").style.setProperty("--pct", acc);
          document.getElementById("stat-correct").textContent = correctCount;
          document.getElementById("stat-wrong").textContent = wrongCount;
          document.getElementById("stat-acc").textContent = acc + "%";
          renderSegments(
            document.getElementById("result-comment"),
            rank.comment,
          );

          renderLicenseCard(correctCount, rank);

          const reviewGrid = document.getElementById("review-grid");
          reviewGrid.textContent = "";
          const keys = ["A", "B", "C", "D"];
          QUIZ.forEach((item, i) => {
            const ans = answers[i];
            const isOk = ans && ans.selected === ans.correct;
            const row = document.createElement("div");
            row.className = "review-item";

            const mark = document.createElement("div");
            mark.className = "review-mark " + (isOk ? "ok" : "ng");
            mark.textContent = isOk ? "✓" : "✕";

            const content = document.createElement("div");
            content.className = "review-content";

            const qLine = document.createElement("div");
            qLine.className = "review-q";
            qLine.textContent = "Q" + (i + 1) + ". " + item.q[lang];
            content.appendChild(qLine);

            if (ans) {
              const aLine = document.createElement("div");
              aLine.className = "review-a";
              const yourTag = document.createElement("span");
              yourTag.className = "review-a-tag";
              yourTag.style.color = isOk ? "var(--success)" : "var(--danger)";
              yourTag.textContent =
                "[" + t("resultYour") + "] " + keys[ans.selected];
              aLine.appendChild(yourTag);
              aLine.appendChild(
                document.createTextNode(item.choices[ans.selected][lang]),
              );
              content.appendChild(aLine);

              if (!isOk) {
                const cLine = document.createElement("div");
                cLine.className = "review-a";
                cLine.style.marginTop = "4px";
                const cTag = document.createElement("span");
                cTag.className = "review-a-tag";
                cTag.style.color = "var(--success)";
                cTag.textContent =
                  "[" + t("resultAnswer") + "] " + keys[ans.correct];
                cLine.appendChild(cTag);
                cLine.appendChild(
                  document.createTextNode(item.choices[ans.correct][lang]),
                );
                content.appendChild(cLine);
              }
            }

            row.appendChild(mark);
            row.appendChild(content);
            reviewGrid.appendChild(row);
          });
        }

        /* =========================================================
         X (Twitter) シェア
         ========================================================= */
        function buildShareText(correct, total, acc, rank) {
          if (lang === "ja") {
            return (
              "「バグハンター試験」全 " +
              total +
              " 問中 " +
              correct +
              " 問正解（正答率 " +
              acc +
              "%）\n" +
              "→ 取得ライセンス：" +
              rank.licenseRankName +
              "（" +
              rank.licenseTier +
              "）\n" +
              "#BugBountyJPGame"
            );
          }
          return (
            "I scored " +
            correct +
            "/" +
            total +
            " (" +
            acc +
            "%) on the Bug Hunter Exam.\n" +
            "License: " +
            rank.licenseRankName +
            " (" +
            rank.licenseTier +
            ")\n" +
            'Five-phase quiz on the Zenn book "Breaking into Bug Bounty: A Practical Guide for Beginners."\n\n' +
            "#BugBountyJPGame"
          );
        }

        function onShare() {
          const correct = answers.filter(
            (a) => a.selected === a.correct,
          ).length;
          const acc = Math.round((correct / QUIZ.length) * 100);
          const rank = rankInfo(correct);
          const text = buildShareText(correct, QUIZ.length, acc, rank);
          // new URL の相対パス解決でスコア別シェア URL を組み立てる。
          // ドット入りディレクトリ名や /index.html 直指定にも安全。
          const url = new URL("share/" + correct + "/", location.href).href;
          const intent =
            "https://x.com/intent/tweet?text=" +
            encodeURIComponent(text) +
            "&url=" +
            encodeURIComponent(url);
          window.open(intent, "_blank", "noopener,noreferrer");
        }

        /* =========================================================
         イベントバインド
         ========================================================= */
        document.querySelectorAll(".lang-toggle button").forEach((btn) => {
          btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
        });
        document
          .getElementById("btn-start")
          .addEventListener("click", startQuiz);
        document.getElementById("btn-share").addEventListener("click", onShare);
        document
          .getElementById("btn-retry")
          .addEventListener("click", startQuiz);

        /* =========================================================
         パーティクル背景
         ========================================================= */
        (function initParticles() {
          const canvas = document.getElementById("particles");
          const ctx = canvas.getContext("2d");
          let w = 0;
          let h = 0;
          let particles = [];
          const reduce =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;

          function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
          }

          function create() {
            particles = [];
            const count = Math.max(28, Math.floor((w * h) / 32000));
            for (let i = 0; i < count; i++) {
              particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                r: Math.random() * 1.6 + 0.4,
                vx: (Math.random() - 0.5) * 0.18,
                vy: (Math.random() - 0.5) * 0.18,
                alpha: Math.random() * 0.5 + 0.15,
                hue: Math.random() < 0.5 ? "14, 165, 233" : "251, 146, 60",
              });
            }
          }

          function draw() {
            ctx.clearRect(0, 0, w, h);
            for (let i = 0; i < particles.length; i++) {
              const p = particles[i];
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
              ctx.fillStyle = "rgba(" + p.hue + ", " + p.alpha + ")";
              ctx.fill();
              p.x += p.vx;
              p.y += p.vy;
              if (p.x < 0) p.x = w;
              if (p.x > w) p.x = 0;
              if (p.y < 0) p.y = h;
              if (p.y > h) p.y = 0;
            }
            if (!reduce) requestAnimationFrame(draw);
          }

          resize();
          create();
          draw();
          window.addEventListener("resize", function () {
            resize();
            create();
          });
        })();

        /* =========================================================
         初期化
         ========================================================= */
        applyI18n();
        requestAnimationFrame(updateLangPill);
        /* ===== Quiz keyboard shortcuts (1-4 / A-D / Enter) ===== */
        document.addEventListener("keydown", function (_kbEvt) {
          if (_kbEvt.isComposing || _kbEvt.keyCode === 229) return;
          const _tg = _kbEvt.target;
          if (_tg && /^(INPUT|TEXTAREA|SELECT)$/i.test(_tg.tagName)) return;
          // quiz 画面がアクティブな時のみ反応する
          const _scr = document.querySelector("#screen-quiz.active");
          if (!_scr) return;
          // Enter / Space で「次へ」ボタンを進める
          if (
            _kbEvt.key === "Enter" ||
            _kbEvt.key === " " ||
            _kbEvt.code === "Space"
          ) {
            const _nb = document.getElementById("btn-next");
            if (_nb && _nb.style.display !== "none" && !_nb.disabled) {
              _kbEvt.preventDefault();
              _nb.click();
            }
            return;
          }
          // 1-4 / A-D で choice を選択（disabled なら無視）
          let _idx = -1;
          if (/^[1-4]$/.test(_kbEvt.key)) _idx = parseInt(_kbEvt.key, 10) - 1;
          else if (/^[a-dA-D]$/.test(_kbEvt.key))
            _idx = _kbEvt.key.toUpperCase().charCodeAt(0) - 65;
          if (_idx < 0) return;
          const _btns = _scr.querySelectorAll(".choice");
          if (_btns[_idx] && !_btns[_idx].disabled) {
            _kbEvt.preventDefault();
            _btns[_idx].click();
          }
        });

        window.addEventListener("resize", updateLangPill);
      })();
    </script>
