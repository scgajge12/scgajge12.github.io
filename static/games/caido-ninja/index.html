    <style>
      :root {
        /* カワセミ（kingfisher）配色：コバルトブルー × バーントオレンジ */
        --bg: #04111e;
        --bg2: #082336;
        --bg3: #0e3149;
        --surface: #103e58;
        --surface-2: #154d6d;
        --line: rgba(14, 165, 233, 0.2);
        --line-strong: rgba(14, 165, 233, 0.5);

        --text: #e6f4f9;
        --text-muted: #93c5d8;
        --text-dim: #5b8597;

        --primary: #0891b2;
        --primary-light: #22d3ee;
        --primary-deep: #155e75;
        --secondary: #f97316;
        --secondary-light: #fb923c;
        --accent: #fbbf24;
        --gold: #fbbf24;
        --success: #34d399;
        --danger: #fb7185;
        --paper: #fdf6e3;
        --paper-dim: #d6c89a;
        --ink: #1a1a1a;

        /* 忍術ごとの差し色 */
        --j-replay: #22d3ee;
        --j-automate: #fb7185;
        --j-mr: #fb923c;
        --j-convert: #34d399;
        --j-workflows: #c084fc;

        --radius: 14px;
        --radius-sm: 8px;
        --shadow: 0 12px 40px rgba(14, 165, 233, 0.22);
        --shadow-strong: 0 0 60px rgba(14, 165, 233, 0.4);

        --pad-x: 20px;
        --pad-bottom: max(80px, env(safe-area-inset-bottom));
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        height: 100%;
      }

      html,
      body {
        overflow-x: hidden;
        max-width: 100%;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        font-family:
          "Inter", "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic",
          "Noto Sans JP", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        word-wrap: break-word;
        overflow-wrap: anywhere;
        word-break: break-word;
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        /* ゲーム中は誤ってテキスト選択しないようにする */
        -webkit-user-select: none;
        user-select: none;
      }
      /* 解説テキストなどは選択できるように戻す */
      .selectable,
      .selectable * {
        -webkit-user-select: text;
        user-select: text;
      }

      .bg-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .bg-grid {
        background-image:
          linear-gradient(
            to right,
            rgba(14, 165, 233, 0.04) 1px,
            transparent 1px
          ),
          linear-gradient(
            to bottom,
            rgba(14, 165, 233, 0.04) 1px,
            transparent 1px
          );
        background-size: 56px 56px;
        mask-image: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0.85) 0%,
          rgba(0, 0, 0, 0.2) 70%,
          transparent 100%
        );
      }
      .bg-glow1 {
        background: radial-gradient(
          circle at 18% 12%,
          rgba(14, 165, 233, 0.18),
          transparent 55%
        );
      }
      .bg-glow2 {
        background: radial-gradient(
          circle at 82% 88%,
          rgba(251, 146, 60, 0.14),
          transparent 60%
        );
      }
      #particles {
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
        max-width: 980px;
        width: 100%;
        margin: 0 auto;
        padding: 24px var(--pad-x) var(--pad-bottom);
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        flex-wrap: wrap;
        min-width: 0;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        min-width: 0;
        flex: 1 1 auto;
      }
      .brand-mark {
        width: 36px;
        height: 36px;
        border-radius: 9px;
        background: linear-gradient(135deg, #1f2937, #0b1220);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--accent);
        font-weight: 800;
        font-size: 18px;
        box-shadow: 0 0 18px rgba(251, 191, 36, 0.35);
        flex-shrink: 0;
        border: 1px solid rgba(251, 191, 36, 0.35);
      }
      .brand-text {
        display: flex;
        flex-direction: column;
        line-height: 1.15;
        min-width: 0;
        overflow: hidden;
      }
      .brand-name {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.5px;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .brand-sub {
        font-size: 10.5px;
        color: var(--text-dim);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .lang-toggle {
        display: inline-flex;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px;
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
      }
      .lang-toggle button {
        background: transparent;
        border: 0;
        color: var(--text-muted);
        padding: 8px 14px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        border-radius: 999px;
        transition: color 0.2s;
        position: relative;
        z-index: 1;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        -webkit-tap-highlight-color: transparent;
        min-height: 32px;
      }
      .lang-toggle button.active {
        color: #fff;
      }
      .lang-toggle .lang-pill {
        position: absolute;
        top: 3px;
        left: 3px;
        height: calc(100% - 6px);
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        border-radius: 999px;
        transition:
          transform 0.28s ease,
          width 0.28s ease;
        z-index: 0;
        box-shadow: 0 0 16px rgba(14, 165, 233, 0.4);
      }

      .screen {
        display: none;
        animation: fadeIn 0.35s ease;
      }
      .screen.active {
        display: block;
      }

      /* ====== スタート画面 ====== */
      .start-hero {
        text-align: center;
        margin: 6px 0 22px;
      }

      /* スタートヒーローの忍者シーン（月・提灯・竹・忍者・巻物） */
      .ninja-illustration {
        display: block;
        width: clamp(220px, 42vw, 320px);
        height: auto;
        margin: 0 auto 12px;
        filter: drop-shadow(0 14px 22px rgba(0, 0, 0, 0.55))
          drop-shadow(0 0 18px rgba(251, 191, 36, 0.15));
      }
      /* 提灯のぼんやりした明滅 */
      .ninja-illustration .lantern-glow {
        animation: lanternFlicker 3.2s ease-in-out infinite;
        transform-origin: center;
      }
      @keyframes lanternFlicker {
        0%,
        100% {
          opacity: 0.85;
          transform: scale(1);
        }
        45% {
          opacity: 1;
          transform: scale(1.05);
        }
        55% {
          opacity: 0.78;
          transform: scale(0.98);
        }
      }
      /* 落ち葉が舞う */
      .ninja-illustration .petal {
        animation: petalDrift 6s linear infinite;
        transform-origin: center;
      }
      .ninja-illustration .petal-b {
        animation-delay: 2s;
      }
      .ninja-illustration .petal-c {
        animation-delay: 4s;
      }
      @keyframes petalDrift {
        0% {
          transform: translate(0, 0) rotate(0deg);
          opacity: 0;
        }
        15% {
          opacity: 0.8;
        }
        100% {
          transform: translate(-8px, 14px) rotate(60deg);
          opacity: 0;
        }
      }
      /* 竹がそよ風で揺れる */
      .ninja-illustration .bamboo {
        animation: bambooSway 5s ease-in-out infinite alternate;
        transform-origin: 50% 100%;
      }
      @keyframes bambooSway {
        from {
          transform: rotate(-0.8deg);
        }
        to {
          transform: rotate(1.2deg);
        }
      }

      .hero-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        font-size: 11px;
        letter-spacing: 2.5px;
        color: var(--accent);
        background: rgba(251, 191, 36, 0.08);
        border: 1px solid rgba(251, 191, 36, 0.35);
        border-radius: 999px;
        font-weight: 700;
        margin-bottom: 16px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        max-width: 100%;
      }
      .hero-tag-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent);
        animation: blink 1.4s infinite;
        flex-shrink: 0;
      }
      .hero-title {
        font-size: clamp(22px, 6vw, 46px);
        font-weight: 900;
        letter-spacing: -0.5px;
        line-height: 1.18;
        background: linear-gradient(
          120deg,
          var(--primary-light) 10%,
          var(--accent) 50%,
          var(--secondary-light) 95%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 12px;
      }
      .hero-sub {
        color: var(--text-muted);
        font-size: clamp(13px, 2vw, 15.5px);
        max-width: 600px;
        margin: 0 auto;
      }

      .rules {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 24px;
        margin-bottom: 18px;
      }
      .rules-title {
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 2.5px;
        text-transform: uppercase;
        margin-bottom: 12px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .rules-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 10px;
      }
      .rules-list li {
        display: flex;
        gap: 12px;
        font-size: 13.5px;
        color: var(--text-muted);
        line-height: 1.6;
      }
      .rules-list .num {
        width: 26px;
        height: 26px;
        flex-shrink: 0;
        border-radius: 6px;
        background: rgba(14, 165, 233, 0.15);
        color: var(--primary-light);
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-weight: 800;
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(14, 165, 233, 0.3);
      }
      .rules-list b {
        color: var(--text);
      }

      .jutsu-legend {
        background: linear-gradient(160deg, var(--bg2), var(--surface));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 18px 20px;
        margin-bottom: 22px;
      }
      .jutsu-legend-title {
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 2.5px;
        text-transform: uppercase;
        margin-bottom: 12px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .jutsu-legend-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
      }
      .jutsu-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
      }
      .jutsu-key {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-weight: 800;
        font-size: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: #04111e;
      }
      .jutsu-row .jutsu-text {
        flex: 1;
        min-width: 0;
        font-size: 12.5px;
        line-height: 1.45;
      }
      .jutsu-row .jutsu-text b {
        color: var(--text);
        font-size: 13.5px;
        display: block;
      }
      .jutsu-row .jutsu-text small {
        color: var(--text-dim);
        font-size: 11px;
        letter-spacing: 0.5px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      /* スコアランク（帯位）一覧 */
      .rank-list {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 18px 20px;
        margin-bottom: 22px;
      }
      .rank-list-title {
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 2.5px;
        text-transform: uppercase;
        margin-bottom: 12px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .rank-list-grid {
        display: grid;
        gap: 8px;
      }
      .rank-row {
        display: grid;
        grid-template-columns: 32px 110px 1fr auto;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
      }
      .rank-row-belt {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        flex-shrink: 0;
        border: 2px solid rgba(255, 255, 255, 0.15);
        box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.3);
      }
      .rank-row-score {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 12px;
        font-weight: 800;
        color: var(--accent);
        letter-spacing: 0.5px;
      }
      .rank-row-name {
        font-size: 14px;
        color: var(--text);
        font-weight: 800;
        line-height: 1.3;
      }
      .rank-row-tag {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 10.5px;
        color: var(--gold);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .start-btn-wrap {
        text-align: center;
      }
      .btn-start {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 16px 36px;
        background: linear-gradient(135deg, var(--accent), #d97706);
        color: #04111e;
        border: 0;
        border-radius: 999px;
        font-size: 15px;
        font-weight: 900;
        letter-spacing: 1.5px;
        cursor: pointer;
        box-shadow: 0 12px 32px rgba(251, 191, 36, 0.3);
        transition: all 0.25s;
        font-family: inherit;
        text-transform: uppercase;
        min-height: 48px;
        max-width: 100%;
      }
      .btn-start:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 48px rgba(251, 191, 36, 0.55);
        filter: brightness(1.06);
      }
      .start-note {
        margin-top: 12px;
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 1px;
      }

      /* ====== ゲーム画面 ====== */
      .hud {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 12px;
      }
      .hud-cell {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 9px 10px;
        text-align: center;
        min-width: 0;
        position: relative;
      }
      .hud-label {
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        margin-bottom: 4px;
      }
      .hud-val {
        font-size: 19px;
        font-weight: 900;
        line-height: 1.05;
        color: var(--text);
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-feature-settings: "tnum";
      }
      .hud-val.lives {
        color: var(--danger);
        letter-spacing: 4px;
        font-size: 20px;
      }
      .hud-val.combo {
        background: linear-gradient(
          90deg,
          var(--primary-light),
          var(--accent)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .hud-val.rank {
        font-size: 15px;
        color: var(--accent);
      }

      .lane-wrap {
        position: relative;
        margin-bottom: 14px;
      }
      .lane {
        position: relative;
        height: 200px;
        background:
          radial-gradient(
            circle at center,
            rgba(14, 165, 233, 0.08),
            transparent 70%
          ),
          linear-gradient(180deg, var(--bg2) 0%, var(--surface) 100%);
        border: 1px solid var(--line-strong);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
      }
      .lane::before,
      .lane::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          rgba(251, 191, 36, 0.25),
          transparent
        );
      }
      .lane::before {
        top: 32px;
      }
      .lane::after {
        bottom: 32px;
      }
      .ninja-zone {
        position: absolute;
        left: 0;
        top: 0;
        width: 22%;
        height: 100%;
        background: linear-gradient(
          to right,
          rgba(14, 165, 233, 0.15),
          transparent
        );
        pointer-events: none;
      }
      .ninja-zone::after {
        content: "";
        position: absolute;
        right: 0;
        top: 8px;
        bottom: 8px;
        width: 2px;
        background: linear-gradient(
          to bottom,
          transparent,
          var(--accent),
          transparent
        );
        box-shadow: 0 0 12px rgba(251, 191, 36, 0.5);
      }
      .ninja-avatar {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: 56px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 38px;
        line-height: 1;
        text-shadow:
          0 0 12px rgba(34, 211, 238, 0.5),
          0 2px 0 rgba(0, 0, 0, 0.6);
        z-index: 2;
        transition: transform 0.12s ease;
      }
      .ninja-avatar.attack {
        animation: ninjaAttack 0.18s ease;
      }
      .lane-hint {
        position: absolute;
        left: 50%;
        bottom: 6px;
        transform: translateX(-50%);
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        opacity: 0.7;
        pointer-events: none;
      }

      .scroll {
        position: absolute;
        top: 50%;
        /* JS の translateX(...) で位置を制御するため、ベースラインは
           レーンの左端（x=0）に置く。right を負値にすると JS の絶対
           ピクセル座標と二重に効いて、巻物が画面外右側に飛んで見えなくなる。 */
        left: 0;
        transform: translateX(-9999px) translateY(-50%);
        width: 200px;
        background: linear-gradient(
          180deg,
          var(--paper) 0%,
          var(--paper-dim) 100%
        );
        color: var(--ink);
        border: 1px solid rgba(0, 0, 0, 0.35);
        border-radius: 6px;
        padding: 10px 12px 11px;
        box-shadow:
          0 6px 18px rgba(0, 0, 0, 0.45),
          inset 0 0 0 1px rgba(255, 255, 255, 0.3);
        font-family:
          "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
        font-weight: 600;
        font-size: 12.5px;
        line-height: 1.45;
        text-align: left;
        will-change: transform, opacity;
        z-index: 1;
      }
      .scroll::before,
      .scroll::after {
        content: "";
        position: absolute;
        top: -3px;
        bottom: -3px;
        width: 8px;
        background: linear-gradient(180deg, #3a2710, #1c1308);
        border-radius: 3px;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.15),
          0 2px 6px rgba(0, 0, 0, 0.5);
      }
      .scroll::before {
        left: -10px;
      }
      .scroll::after {
        right: -10px;
      }
      .scroll .scroll-tag {
        display: inline-block;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 9.5px;
        font-weight: 800;
        color: #6b3a04;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .scroll .scroll-text {
        font-size: 12.5px;
        line-height: 1.45;
        color: #1a1a1a;
        font-weight: 700;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .scroll.active {
        box-shadow:
          0 0 0 2px var(--accent),
          0 0 24px rgba(251, 191, 36, 0.55),
          0 6px 18px rgba(0, 0, 0, 0.45);
      }
      .scroll.slashed {
        animation: scrollSlash 0.35s ease forwards;
      }
      .scroll.wrong {
        animation: scrollWrong 0.4s ease forwards;
      }
      .scroll.missed {
        animation: scrollMissed 0.4s ease forwards;
      }

      .slash-fx {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 3;
      }
      .slash-fx .slash {
        position: absolute;
        top: 50%;
        left: 22%;
        width: 60%;
        height: 5px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.95),
          var(--accent),
          rgba(255, 255, 255, 0.95),
          transparent
        );
        transform-origin: left center;
        transform: translateY(-50%) rotate(-12deg) scaleX(0);
        opacity: 0;
        filter: drop-shadow(0 0 12px var(--accent))
          drop-shadow(0 0 4px rgba(255, 255, 255, 0.8));
        border-radius: 2px;
      }
      .slash-fx .slash.go {
        animation: slashGo 0.32s ease forwards;
      }
      /* 斬撃時の刹那の白フラッシュ（道場が一瞬白む） */
      .slash-fx::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse at 50% 50%,
          rgba(255, 255, 255, 0.45),
          rgba(255, 255, 255, 0.1) 35%,
          transparent 65%
        );
        opacity: 0;
        pointer-events: none;
      }
      .slash-fx.flash::before {
        animation: slashFlash 0.22s ease forwards;
      }
      @keyframes slashFlash {
        0% {
          opacity: 0;
        }
        20% {
          opacity: 0.95;
        }
        100% {
          opacity: 0;
        }
      }

      .float-text {
        position: absolute;
        top: 20%;
        left: 20%;
        font-size: 20px;
        font-weight: 900;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        pointer-events: none;
        z-index: 4;
        opacity: 0;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
      }
      .float-text.go {
        animation: floatUp 0.9s ease forwards;
      }
      .float-text.ok {
        color: var(--accent);
      }
      .float-text.ng {
        color: var(--danger);
      }

      .countdown {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(72px, 14vw, 140px);
        font-weight: 900;
        color: var(--accent);
        background: rgba(4, 17, 30, 0.6);
        backdrop-filter: blur(4px);
        text-shadow: 0 0 24px rgba(251, 191, 36, 0.7);
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        z-index: 10;
      }

      /* 5 つの忍法札 */
      .jutsu-bar {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
      }
      .jutsu-card {
        background: linear-gradient(180deg, var(--surface) 0%, var(--bg2) 100%);
        border: 1.5px solid var(--line);
        color: var(--text);
        border-radius: var(--radius-sm);
        padding: 10px 6px 12px;
        /* モバイルで 300ms tap 遅延と scroll ジェスチャ干渉を回避 */
        touch-action: manipulation;
        -webkit-user-select: none;
        user-select: none;
        /* 札の上では手裏剣カーソル — 投げる/構える感を出す */
        cursor:
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='28' height='28' viewBox='0 0 28 28'><g transform='translate(14,14) rotate(0)'><path d='M 0 -11 L 3 -3 L 11 0 L 3 3 L 0 11 L -3 3 L -11 0 L -3 -3 Z' fill='%23fbbf24' stroke='%231c1917' stroke-width='1' stroke-linejoin='round'/><circle cx='0' cy='0' r='1.8' fill='%231c1917'/></g></svg>")
            14 14,
          pointer;
        text-align: center;
        font-family: inherit;
        position: relative;
        transition:
          transform 0.1s ease,
          border-color 0.15s ease,
          box-shadow 0.15s ease;
        -webkit-tap-highlight-color: transparent;
        min-height: 78px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        overflow: hidden;
      }
      .jutsu-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          var(--j-color, transparent),
          transparent 70%
        );
        opacity: 0.18;
        pointer-events: none;
      }
      .jutsu-card[data-jutsu="replay"] {
        --j-color: var(--j-replay);
      }
      .jutsu-card[data-jutsu="automate"] {
        --j-color: var(--j-automate);
      }
      .jutsu-card[data-jutsu="mr"] {
        --j-color: var(--j-mr);
      }
      .jutsu-card[data-jutsu="convert"] {
        --j-color: var(--j-convert);
      }
      .jutsu-card[data-jutsu="workflows"] {
        --j-color: var(--j-workflows);
      }
      .jutsu-card:hover {
        border-color: var(--j-color);
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
      }
      .jutsu-card:active {
        transform: translateY(0);
      }
      .jutsu-card.flash-ok {
        animation: cardOk 0.32s ease;
      }
      .jutsu-card.flash-ng {
        animation: cardNg 0.32s ease;
      }
      .jutsu-card .jc-key {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 10px;
        font-weight: 800;
        color: var(--j-color);
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid var(--j-color);
        border-radius: 4px;
        padding: 1px 6px;
        letter-spacing: 1px;
        position: absolute;
        top: 5px;
        right: 5px;
      }
      .jutsu-card .jc-name {
        font-size: 13.5px;
        font-weight: 800;
        line-height: 1.15;
        color: var(--text);
      }
      .jutsu-card .jc-ws {
        font-size: 10.5px;
        color: var(--text-dim);
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        letter-spacing: 0.5px;
        line-height: 1.1;
      }

      /* ====== 結果画面 ====== */
      .result {
        text-align: center;
        padding: 12px 0 4px;
      }
      .result-rank-tag {
        display: inline-block;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 11.5px;
        letter-spacing: 3px;
        color: var(--gold);
        background: rgba(251, 191, 36, 0.1);
        border: 1px solid rgba(251, 191, 36, 0.4);
        padding: 6px 14px;
        border-radius: 4px;
        margin-bottom: 18px;
        font-weight: 800;
      }
      .result-title {
        font-size: clamp(22px, 5vw, 36px);
        font-weight: 900;
        background: linear-gradient(
          120deg,
          var(--primary-light),
          var(--accent),
          var(--secondary-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 8px;
        line-height: 1.2;
      }
      .result-sub {
        color: var(--text-muted);
        font-size: 14px;
        max-width: 520px;
        margin: 0 auto 22px;
      }
      .result-score {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: clamp(40px, 10vw, 72px);
        font-weight: 900;
        background: linear-gradient(
          135deg,
          var(--primary-light),
          var(--accent)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        font-feature-settings: "tnum";
        margin: 8px 0 4px;
      }
      .result-score-label {
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        margin-bottom: 20px;
      }
      .result-stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 22px;
      }
      .result-stat {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 14px 8px;
        text-align: center;
        min-width: 0;
      }
      .result-stat-num {
        font-size: 22px;
        font-weight: 900;
        color: var(--primary-light);
        line-height: 1;
        font-feature-settings: "tnum";
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .result-stat-label {
        font-size: 10.5px;
        color: var(--text-dim);
        margin-top: 5px;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .result-best {
        font-size: 12px;
        color: var(--text-dim);
        margin-bottom: 20px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .result-best b {
        color: var(--accent);
        font-weight: 800;
      }
      .result-comment {
        background: linear-gradient(160deg, var(--bg2), var(--surface));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 18px 22px;
        font-size: 13.5px;
        line-height: 1.8;
        color: var(--text-muted);
        margin-bottom: 20px;
        text-align: left;
      }
      .result-comment strong {
        color: var(--text);
      }
      .result-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 28px;
      }
      .btn-share-x {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 24px;
        background: #000;
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 999px;
        font-size: 13.5px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        min-height: 44px;
      }
      .btn-share-x:hover {
        background: #181818;
        transform: translateY(-1px);
      }
      .btn-secondary {
        padding: 12px 24px;
        background: transparent;
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 999px;
        font-size: 13.5px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        min-height: 44px;
      }
      .btn-secondary:hover {
        border-color: var(--primary);
        color: var(--primary-light);
      }

      .footer {
        margin-top: 50px;
        padding-top: 22px;
        border-top: 1px solid var(--line);
        text-align: center;
        font-size: 12px;
        color: var(--text-dim);
      }
      .footer a {
        color: var(--primary-light);
        text-decoration: none;
      }
      .footer a:hover {
        text-decoration: underline;
      }

      /* ====== アニメーション ====== */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      @keyframes ninjaAttack {
        0% {
          transform: translateY(-50%) translateX(0) scale(1);
        }
        50% {
          transform: translateY(-50%) translateX(8px) scale(1.1);
        }
        100% {
          transform: translateY(-50%) translateX(0) scale(1);
        }
      }
      @keyframes scrollSlash {
        0% {
          opacity: 1;
          filter: brightness(1);
        }
        40% {
          opacity: 1;
          filter: brightness(2);
        }
        100% {
          opacity: 0;
          transform: translateY(-50%) translateY(-20px) rotate(-8deg) scale(1.1);
        }
      }
      @keyframes scrollWrong {
        0% {
          filter: brightness(1) hue-rotate(0);
        }
        30% {
          filter: brightness(1.4) hue-rotate(-40deg);
        }
        100% {
          opacity: 0;
          filter: brightness(0.5);
          transform: translateY(-50%) translateY(8px) scale(0.95);
        }
      }
      @keyframes scrollMissed {
        0% {
          filter: brightness(1);
        }
        100% {
          opacity: 0;
          filter: brightness(0.3) grayscale(1);
        }
      }
      @keyframes slashGo {
        0% {
          transform: translateY(-50%) rotate(-12deg) scaleX(0);
          opacity: 0;
        }
        30% {
          transform: translateY(-50%) rotate(-12deg) scaleX(1);
          opacity: 1;
        }
        100% {
          transform: translateY(-50%) rotate(-12deg) scaleX(1.05);
          opacity: 0;
        }
      }
      @keyframes floatUp {
        0% {
          opacity: 0;
          transform: translateY(0) scale(0.9);
        }
        25% {
          opacity: 1;
          transform: translateY(-10px) scale(1.05);
        }
        100% {
          opacity: 0;
          transform: translateY(-40px) scale(1);
        }
      }
      @keyframes cardOk {
        0%,
        100% {
          box-shadow: 0 0 0 0 transparent;
        }
        50% {
          box-shadow:
            0 0 0 2px var(--accent),
            0 0 18px rgba(251, 191, 36, 0.6);
        }
      }
      @keyframes cardNg {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-3px);
        }
        40% {
          transform: translateX(3px);
        }
        60% {
          transform: translateX(-2px);
        }
        80% {
          transform: translateX(2px);
        }
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        50% {
          transform: translateX(5px);
        }
        75% {
          transform: translateX(-3px);
        }
      }
      .lane.shake {
        animation: shake 0.3s ease;
      }

      /* ====== ナビゲーションタブ（ゲーム / 機能解説） ====== */
      .nav-tabs {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-bottom: 22px;
        padding: 4px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 999px;
        max-width: 380px;
        margin-left: auto;
        margin-right: auto;
        position: relative;
      }
      .nav-tab {
        flex: 1;
        background: transparent;
        border: 0;
        color: var(--text-muted);
        padding: 9px 16px;
        font-size: 12.5px;
        font-weight: 800;
        letter-spacing: 1px;
        cursor: pointer;
        border-radius: 999px;
        transition: all 0.2s;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        text-transform: uppercase;
        -webkit-tap-highlight-color: transparent;
      }
      .nav-tab.active {
        color: #04111e;
        background: linear-gradient(135deg, var(--accent), #d97706);
        box-shadow: 0 0 16px rgba(251, 191, 36, 0.4);
      }
      .nav-tab:hover:not(.active) {
        color: var(--accent);
      }

      /* ====== 機能解説（Features Glossary） ====== */
      .features-hero {
        text-align: center;
        margin-bottom: 22px;
      }
      .features-title {
        font-size: clamp(22px, 5vw, 34px);
        font-weight: 900;
        letter-spacing: -0.5px;
        line-height: 1.2;
        background: linear-gradient(
          120deg,
          var(--primary-light) 10%,
          var(--accent) 50%,
          var(--secondary-light) 95%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 8px;
      }
      .features-sub {
        color: var(--text-muted);
        font-size: 13.5px;
        max-width: 600px;
        margin: 0 auto;
      }

      .features-filter {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-bottom: 22px;
      }
      .features-chip {
        padding: 7px 16px;
        background: var(--surface);
        border: 1px solid var(--line);
        color: var(--text-muted);
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        -webkit-tap-highlight-color: transparent;
      }
      .features-chip:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .features-chip.active {
        background: linear-gradient(135deg, var(--accent), #d97706);
        border-color: var(--accent);
        color: #1a0a02;
        box-shadow: 0 0 16px rgba(251, 191, 36, 0.4);
      }

      .features-section {
        margin-bottom: 28px;
      }
      .features-section-title {
        font-size: 13px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 14px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .features-section-title::before,
      .features-section-title::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          var(--line-strong),
          transparent
        );
      }

      .features-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 14px;
      }
      .feat-card {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 18px 20px 20px;
        position: relative;
        overflow: hidden;
        transition:
          transform 0.2s,
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .feat-card:hover {
        transform: translateY(-2px);
        border-color: var(--j-color, var(--primary));
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
      }
      .feat-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at top right,
          var(--j-color, transparent),
          transparent 60%
        );
        opacity: 0.08;
        pointer-events: none;
      }
      .feat-card[data-j="replay"] {
        --j-color: var(--j-replay);
      }
      .feat-card[data-j="automate"] {
        --j-color: var(--j-automate);
      }
      .feat-card[data-j="mr"] {
        --j-color: var(--j-mr);
      }
      .feat-card[data-j="convert"] {
        --j-color: var(--j-convert);
      }
      .feat-card[data-j="workflows"] {
        --j-color: var(--j-workflows);
      }
      .feat-card[data-j="general"] {
        --j-color: var(--accent);
      }

      .feat-head {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 12px;
      }
      .feat-emblem {
        width: 56px;
        height: 56px;
        flex-shrink: 0;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.35);
        border: 1.5px solid var(--j-color, var(--primary));
        color: var(--j-color, var(--primary));
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
        font-weight: 900;
        font-size: 28px;
        line-height: 1;
        box-shadow: 0 0 18px rgba(251, 191, 36, 0.06);
      }
      .feat-emblem.is-text {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 14px;
        letter-spacing: 1px;
      }
      .feat-meta {
        flex: 1;
        min-width: 0;
      }
      .feat-name {
        font-size: 15px;
        font-weight: 800;
        color: var(--text);
        line-height: 1.25;
        margin-bottom: 4px;
        word-break: break-word;
      }
      .feat-name-en {
        font-size: 11.5px;

        /* =========================================================
           巻物の正解（jutsu）を XOR + Base64 で難読化
             DevTools の Sources 検索で "replay" などの平文が見つから
             ないようにする。kaiten-bounty と同じレベルのカジュアル
             チート対策（暗号強度は期待しない）。
           ========================================================= */
        const _NK = "sH4d0wN1nj4D0j0v1";
        function _decJ(payload) {
          const bin = atob(payload);
          const out = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) {
            out[i] = bin.charCodeAt(i) ^ _NK.charCodeAt(i % _NK.length);
          }
          return JSON.parse(new TextDecoder().decode(out));
        }
        // 同じ巻物に対して何度もデコードしないようキャッシュ
        const _jCache = new WeakMap();
        function jutsuOf(scroll) {
          let v = _jCache.get(scroll);
          if (!v) {
            v = _decJ(scroll.jE);
            _jCache.set(scroll, v);
          }
          return v.j;
        }

        /* =========================================================
           DOM 安全構築ユーティリティ
           ========================================================= */
        function el(tag, className, text) {
          const e = document.createElement(tag);
          if (className) e.className = className;
          if (text !== undefined && text !== null) e.textContent = text;
          return e;
        }
        function setHtmlSafe(el, html) {
          // 簡易的に <b>…</b> だけ許可してそれ以外をエスケープする
          el.textContent = "";
          const parts = html.split(/(<b>|<\/b>)/);
          let inBold = false;
          for (const p of parts) {
            if (p === "<b>") {
              inBold = true;
              continue;
            }
            if (p === "</b>") {
              inBold = false;
              continue;
            }
            if (!p) continue;
            if (inBold) {
              const b = document.createElement("b");
              b.textContent = p;
              el.appendChild(b);
            } else {
              el.appendChild(document.createTextNode(p));
            }
          }
        }

            const ws = el("span", "jc-ws", j.ws);

            btn.appendChild(k);

            // PointerEvents で 300ms tap 遅延を回避（モバイル応答性向上）
            // pointerdown が拾えない環境のため click にもフォールバックを残す
            if (window.PointerEvent) {
              btn.addEventListener("pointerdown", (e) => {
                if (e.button === 0 || e.pointerType !== "mouse") {
                  e.preventDefault();
                  tryHit(j.id);
                }
              });
              // 二重発火防止用に click は無効化
              btn.addEventListener("click", (e) => e.preventDefault());
            } else {
              btn.addEventListener("click", () => tryHit(j.id));
            }
            bar.appendChild(btn);
          });
        }

          const card = el("div", "feat-card");
          card.dataset.j = item.j || "general";

          // ヘッダ：エンブレム + 名称 / サブ / Burp 対応
          const head = el("div", "feat-head");
          // 短いラテン文字（HTTPQL の "Q" など）は monospaced 表記、それ以外は明朝
          const emblemKind = /^[\x20-\x7E]+$/.test(item.emblem)
            ? " is-text"
            : "";
          const emblem = el("div", "feat-emblem" + emblemKind, item.emblem);
          head.appendChild(emblem);

          const meta = el("div", "feat-meta");
          const name = el("div", "feat-name", item.name[lang]);
          meta.appendChild(name);
          if (item.nameSub) {
            const sub = el("div", "feat-name-en", item.nameSub);
            meta.appendChild(sub);
          }
          if (item.burpEq) {
            const burp = el("span", "feat-burp", item.burpEq[lang]);
            meta.appendChild(burp);
          }
          head.appendChild(meta);
          card.appendChild(head);

          // 説明
          card.appendChild(el("p", "feat-desc", item.desc[lang]));

          // Tip（一言）
          if (item.tip) {
            const tip = el("div", "feat-tip");
            const label = el("span", "feat-tip-label", t("featTipLabel"));
            tip.appendChild(label);
            tip.appendChild(document.createTextNode(" " + item.tip[lang]));
            card.appendChild(tip);
          }

          return card;
        }

        /* =========================================================
           ナビタブの切替
             - ゲーム → screen-start（実行中ならキャンセル）
             - 機能解説 → screen-features
           ========================================================= */
        function showTab(tab) {
          document
            .querySelectorAll(".nav-tab")
            .forEach((b) =>
              b.classList.toggle("active", b.dataset.tab === tab),
            );
          if (tab === "features") {
            if (state.phase === "game") cancelActiveGame();
            showScreen("screen-features");
            renderFeatures();
          } else {
            if (state.phase === "game") cancelActiveGame();
            showScreen("screen-start");
          }
        }

        function cancelActiveGame() {
          if (state.raf) cancelAnimationFrame(state.raf);
          state.raf = null;
          // カウントダウン setInterval も止めないと、startGame 直後のキャンセル時に
          // tick が遅延発火して state.raf を勝手に再開してしまう
          if (state.cdTimer) {
            clearInterval(state.cdTimer);
            state.cdTimer = null;
          }
          state._cdResume = false;
          state.pausedAt = 0;
          for (const s of state.scrolls) s.dom.remove();
          state.scrolls = [];
          state.activeScrollId = null;
          state.phase = "start";
          // カウントダウンが回っていれば隠す
          const cdEl = document.getElementById("countdown");
          if (cdEl) cdEl.style.display = "none";
        }

        /* =========================================================
           言語切替
           ========================================================= */
        function updateLangPill() {
          const pill = document.getElementById("lang-pill");
          const buttons = document.querySelectorAll(".lang-toggle button");
          const active = document.querySelector(
            '.lang-toggle button[data-lang="' + lang + '"]',
          );
          if (!active || !pill) return;
          buttons.forEach((b) => b.classList.toggle("active", b === active));
          pill.style.width = active.offsetWidth + "px";
          pill.style.transform =
            "translateX(" + (active.offsetLeft - 3) + "px)";
        }

        function setLanguage(next) {
          if (lang === next) return;
          lang = next;
          try {
            localStorage.setItem("mk12_game_lang", lang);
          } catch (e) {}
          applyStartI18n();
          applyGameI18n();
          applyResultI18n();
          applyTabsI18n();
          updateLangPill();
          // ゲーム中なら巻物のテキストも更新
          if (state.phase === "game") {
            for (const s of state.scrolls) {
              const txtEl = s.dom.querySelector(".scroll-text");
              const tagEl = s.dom.querySelector(".scroll-tag");
              if (txtEl)
                txtEl.textContent = SCROLLS[s.scenarioIdx][lang];
              if (tagEl) tagEl.textContent = t("scrollTag");
            }
            // ランクも再表示
            updateHud();
          }
          // 結果画面なら再レンダ
          if (state.phase === "gameover") {
            renderResult();
          }
          // 機能解説画面が開いていれば再レンダ
          if (
            document
              .getElementById("screen-features")
              .classList.contains("active")
          ) {
            renderFeatures();
          }
        }

        /* =========================================================
           画面切替
           ========================================================= */
        function showScreen(id) {
          document
            .querySelectorAll(".screen")
            .forEach((s) => s.classList.remove("active"));
          document.getElementById(id).classList.add("active");
          window.scrollTo({ top: 0, behavior: "smooth" });
        }

        /* =========================================================
           ベルト（帯位）の判定
           ========================================================= */
        function getBeltIdx(score) {
          if (score >= 4000) return 5; // 影忍
          if (score >= 2500) return 4; // 師範
          if (score >= 1500) return 3; // 黒帯
          if (score >= 800) return 2; // 紫帯
          if (score >= 300) return 1; // 黄帯
          return 0; // 白帯
        }
        function getBeltLabel(score) {
          return t("ranks")[getBeltIdx(score)];
        }

        /* =========================================================
           ゲームの開始
           ========================================================= */
        function startGame() {
          state.phase = "game";
          state.scrolls.forEach((s) => s.dom.remove());
          state.scrolls = [];
          state.scrollIdSeq = 0;
          state.activeScrollId = null;
          state.score = 0;
          state.combo = 0;
          state.bestCombo = 0;
          state.lives = 3;
          state.slashes = 0;
          state.hits = 0;
          state.cleared = 0;
          state.spawned = 0;
          state.spawnInterval = 3600;
          state.scrollDuration = 11200;
          state.recentScrollIdx = [];
          updateHud();

          showScreen("screen-game");

          // 3-2-1 カウントダウン（cdTimer は state に持たせて
          // visibilitychange / endGame / quitGame から確実に停止できるようにする）
          const cdEl = document.getElementById("countdown");
          state.countdown = 3;
          cdEl.style.display = "flex";
          cdEl.textContent = "3";
          let tick = 1;
          if (state.cdTimer) clearInterval(state.cdTimer);
          state.cdTimer = setInterval(() => {
            tick++;
            if (tick === 2) cdEl.textContent = "2";
            else if (tick === 3) cdEl.textContent = "1";
            else if (tick === 4) {
              cdEl.textContent = lang === "ja" ? "斬！" : "GO!";
            } else {
              cdEl.style.display = "none";
              clearInterval(state.cdTimer);
              state.cdTimer = null;
              state.gameStartMs = performance.now();
              state.nextSpawnAt = state.gameStartMs + 600;
              state.raf = requestAnimationFrame(loop);
            }
          }, 700);
        }

        /* =========================================================
           メインループ
           ========================================================= */
        function loop(now) {
          if (state.phase !== "game") return;

          // スポーン
          if (now >= state.nextSpawnAt) {
            spawnScroll(now);
            // 難易度上昇：スポーン数に応じて少しずつ速くする
            const sp = state.spawned;
            state.spawnInterval = Math.max(1800, 3600 - sp * 35);
            state.scrollDuration = Math.max(5200, 11200 - sp * 80);
            state.nextSpawnAt = now + state.spawnInterval;
          }

          // 巻物の位置を更新
          const laneW = laneEl.clientWidth;
          const playerLineX = laneW * 0.18; // 忍者ラインの X（左端から）
          for (let i = state.scrolls.length - 1; i >= 0; i--) {
            const s = state.scrolls[i];
            if (s.removed) continue;
            const elapsed = now - s.spawnAt;
            const tt = elapsed / s.duration;
            // 右端 (laneW + 50) から、左端 (-260) までを 0.0〜1.0 で
            const startX = laneW + 50;
            const endX = -260;
            const px = startX + (endX - startX) * tt;
            s.x = px;
            s.dom.style.transform =
              "translateX(" + px + "px) translateY(-50%)";

            // 見逃し：プレイヤーラインを過ぎてかつまだ無事
            if (!s.slashed && px < playerLineX - 30) {
              onMissed(s);
            }
            // 完全に画面外に出たら掃除
            if (px < -260) {
              s.dom.remove();
              state.scrolls.splice(i, 1);
            }
          }

          // 一番先頭（左寄り）の未斬巻物をアクティブにする
          updateActiveScroll();

          state.raf = requestAnimationFrame(loop);
        }

        function spawnScroll(now) {
          // 直近に出した巻物・現在画面上にある巻物は除外して、連続出題を避ける。
          // 候補が枯渇した場合は許可セットを段階的に緩めるため、フィルタは
          // "直近 N 件除外" → "全件許可" の二段フォールバックにする。
          const active = new Set(state.scrolls.map((s) => s.scenarioIdx));
          const banned = new Set([...state.recentScrollIdx, ...active]);
          let candidates = [];
          for (let i = 0; i < SCROLLS.length; i++) {
            if (!banned.has(i)) candidates.push(i);
          }
          if (candidates.length === 0) {
            // 直近履歴を切り詰めて再評価。最低でも「画面上に居る巻物」は避ける。
            for (let i = 0; i < SCROLLS.length; i++) {
              if (!active.has(i)) candidates.push(i);
            }
          }
          if (candidates.length === 0) {
            // どうしても枯れたら全部許可（理論的にここに来るのは稀）
            candidates = SCROLLS.map((_, i) => i);
          }
          const idx = candidates[Math.floor(Math.random() * candidates.length)];
          state.recentScrollIdx.push(idx);
          if (state.recentScrollIdx.length > RECENT_SCROLL_WINDOW) {
            state.recentScrollIdx.shift();
          }
          const data = SCROLLS[idx];
          const dom = document.createElement("div");
          dom.className = "scroll";
          const tag = el("div", "scroll-tag", t("scrollTag"));
          const text = el("div", "scroll-text", data[lang]);
          dom.appendChild(tag);
          dom.appendChild(text);
          // 縦のばらつきを少しつける
          const off = (Math.random() - 0.5) * 30;
          dom.style.top = "calc(50% + " + off.toFixed(1) + "px)";
          // 初期 X 位置（レーン右端の少し外側）を append 前に確定させて、
          // 最初の rAF が回るまでに巻物がレーン左端に一瞬出ないようにする。
          const initX = laneEl.clientWidth + 50;
          dom.style.transform =
            "translateX(" + initX + "px) translateY(-50%)";
          laneEl.appendChild(dom);

          state.scrollIdSeq += 1;
          // jutsu は data オブジェクト経由で jutsuOf() から取得する
          // （state には平文を載せず DevTools 対策にする）
          state.scrolls.push({
            id: state.scrollIdSeq,
            scenarioIdx: idx,
            data,
            dom,
            spawnAt: now,
            duration: state.scrollDuration,
            slashed: false,
            removed: false,
            x: initX,
          });
          state.spawned += 1;
        }

        function updateActiveScroll() {
          // 一番 x が小さい（左にある）未斬巻物を active に
          let target = null;
          for (const s of state.scrolls) {
            if (s.slashed) continue;
            if (!target || s.x < target.x) target = s;
          }
          const newActiveId = target ? target.id : null;
          if (newActiveId !== state.activeScrollId) {
            for (const s of state.scrolls) {
              s.dom.classList.toggle("active", s.id === newActiveId);
            }
            state.activeScrollId = newActiveId;
          }
        }

        /* =========================================================
           入力処理
           ========================================================= */
        function tryHit(jutsuId) {
          if (state.phase !== "game") return;
          // 視覚上 active で表示されている巻物のみを判定対象にする
          // （updateActiveScroll が最後にセットした state.activeScrollId と完全に一致させる）
          let target = null;
          if (state.activeScrollId != null) {
            for (const s of state.scrolls) {
              if (s.id === state.activeScrollId && !s.slashed) {
                target = s;
                break;
              }
            }
          }
          if (!target) {
            flashCard(jutsuId, "ng");
            return;
          }
          state.slashes += 1;
          if (jutsuOf(target.data) === jutsuId) {
            onSlash(target);
            flashCard(jutsuId, "ok");
          } else {
            onWrong(target);
            flashCard(jutsuId, "ng");
          }
        }

        function onSlash(s) {
          if (s.slashed) return;
          s.slashed = true;
          state.hits += 1;
          state.cleared += 1;
          state.combo += 1;
          if (state.combo > state.bestCombo) state.bestCombo = state.combo;

          const mult = comboMultiplier(state.combo);
          const gain = 100 * mult;
          state.score += gain;

          s.dom.classList.add("slashed");
          playSlash();
          floatText("+" + gain, "ok");
          // しばらく後に DOM から消す
          setTimeout(() => {
            s.dom.remove();
            s.removed = true;
            const i = state.scrolls.indexOf(s);
            if (i >= 0) state.scrolls.splice(i, 1);
            if (state.activeScrollId === s.id) state.activeScrollId = null;
            updateActiveScroll();
          }, 350);
          updateHud();
        }

        function onWrong(s) {
          if (s.slashed) return;
          s.slashed = true; // wrong も「処理済み」として扱う
          state.combo = 0;
          state.lives -= 1;
          s.dom.classList.add("wrong");
          laneEl.classList.add("shake");
          setTimeout(() => laneEl.classList.remove("shake"), 320);
          floatText(t("ngText"), "ng");
          setTimeout(() => {
            s.dom.remove();
            s.removed = true;
            const i = state.scrolls.indexOf(s);
            if (i >= 0) state.scrolls.splice(i, 1);
            if (state.activeScrollId === s.id) state.activeScrollId = null;
            updateActiveScroll();
          }, 400);
          updateHud();
          if (state.lives <= 0) endGame();
        }

        function onMissed(s) {
          if (s.slashed) return;
          s.slashed = true;
          state.combo = 0;
          state.lives -= 1;
          s.dom.classList.add("missed");
          floatText(t("missText"), "ng");
          setTimeout(() => {
            s.dom.remove();
            s.removed = true;
            const i = state.scrolls.indexOf(s);
            if (i >= 0) state.scrolls.splice(i, 1);
            if (state.activeScrollId === s.id) state.activeScrollId = null;
            updateActiveScroll();
          }, 400);
          updateHud();
          if (state.lives <= 0) endGame();
        }

        function comboMultiplier(combo) {
          if (combo >= 15) return 5;
          if (combo >= 10) return 4;
          if (combo >= 6) return 3;
          if (combo >= 3) return 2;
          return 1;
        }

        function flashCard(jutsuId, kind) {
          const card = document.querySelector(
            '.jutsu-card[data-jutsu="' + jutsuId + '"]',
          );
          if (!card) return;
          card.classList.remove("flash-ok", "flash-ng");
          // 強制リフロー
          void card.offsetWidth;
          card.classList.add(kind === "ok" ? "flash-ok" : "flash-ng");
        }

        function playSlash() {
          // 斬撃エフェクト：1 本のラインを描画してすぐ消す + 道場が一瞬白む
          const slash = document.createElement("div");
          slash.className = "slash go";
          slashFxEl.appendChild(slash);
          slashFxEl.classList.remove("flash");
          void slashFxEl.offsetWidth;
          slashFxEl.classList.add("flash");
          ninjaEl.classList.remove("attack");
          void ninjaEl.offsetWidth;
          ninjaEl.classList.add("attack");
          setTimeout(() => slash.remove(), 340);
          setTimeout(() => slashFxEl.classList.remove("flash"), 240);
        }

        function floatText(txt, kind) {
          const ft = document.createElement("div");
          ft.className = "float-text " + (kind === "ok" ? "ok" : "ng") + " go";
          ft.textContent = txt;
          slashFxEl.appendChild(ft);
          setTimeout(() => ft.remove(), 900);
        }

        /* =========================================================
           HUD 更新
           ========================================================= */
        function updateHud() {
          document.getElementById("hud-score").textContent = String(state.score);
          const mult = comboMultiplier(state.combo);
          document.getElementById("hud-combo").textContent =
            state.combo > 0 ? state.combo + " ×" + mult : "×1";
          const hearts = "★".repeat(Math.max(0, state.lives)) +
            "☆".repeat(Math.max(0, 3 - state.lives));
          document.getElementById("hud-lives").textContent = hearts;
          document.getElementById("hud-rank").textContent =
            getBeltLabel(state.score);
        }

        /* =========================================================
           終了処理
           ========================================================= */
        function endGame() {
          state.phase = "gameover";
          if (state.raf) cancelAnimationFrame(state.raf);
          state.raf = null;
          // 残っている巻物を消す
          for (const s of state.scrolls) {
            s.dom.remove();
          }
          state.scrolls = [];

          // 自己ベスト更新
          try {
            const prev = parseInt(
              localStorage.getItem("caido_ninja_best") || "0",
              10,
            );
            if (state.score > prev) {
              localStorage.setItem(
                "caido_ninja_best",
                String(state.score),
              );
            }
          } catch (e) {}

          renderResult();
          showScreen("screen-result");
        }

        function renderResult() {
          document.getElementById("result-score").textContent = String(
            state.score,
          );
          document.getElementById("stat-cleared").textContent = String(
            state.cleared,
          );
          document.getElementById("stat-bestcombo").textContent = String(
            state.bestCombo,
          );
          const acc =
            state.slashes > 0
              ? Math.round((state.hits / state.slashes) * 100)
              : 0;
          document.getElementById("stat-acc").textContent = acc + "%";

          // 帯位＝結果のサブにも反映
          const beltIdx = getBeltIdx(state.score);
          const belt = getBeltLabel(state.score);
          const rankTag = "★ " + belt.toUpperCase() + " BELT";
          document.getElementById("result-rank").textContent = rankTag;

          // 帯位別コメント
          let commentKey = "commentRookie";
          if (beltIdx === 0) commentKey = "commentNewbie";
          else if (beltIdx === 1) commentKey = "commentRookie";
          else if (beltIdx === 2) commentKey = "commentRookie";
          else if (beltIdx === 3) commentKey = "commentMid";
          else if (beltIdx === 4) commentKey = "commentHigh";
          else if (beltIdx === 5) commentKey = "commentElite";
          setHtmlSafe(
            document.getElementById("result-comment"),
            t(commentKey),
          );

          // 自己ベスト表示
          let best = state.score;
          try {
            best = parseInt(
              localStorage.getItem("caido_ninja_best") || "0",
              10,
            );
          } catch (e) {}
          setHtmlSafe(
            document.getElementById("result-best"),
            t("resultBest").replace("%d", String(best)),
          );
        }

        /* =========================================================
           X (Twitter) シェア
           ========================================================= */
        function shareBucket(score) {
          // share/ ディレクトリのインデックスに合わせる
          if (score >= 4000) return "elite";
          if (score >= 2500) return "master";
          if (score >= 1500) return "black";
          if (score >= 800) return "purple";
          if (score >= 300) return "yellow";
          return "white";
        }

        function onShare() {
          const acc =
            state.slashes > 0
              ? Math.round((state.hits / state.slashes) * 100)
              : 0;
          let text;
          if (lang === "ja") {
            text =
              "「Caido 忍者道場」スコア " +
              state.score +
              "（" +
              getBeltLabel(state.score) +
              "・斬った巻物 " +
              state.cleared +
              " 本／最大コンボ " +
              state.bestCombo +
              "／命中率 " +
              acc +
              "%）\n" +
              "Caido のワークスペースを忍術に見立てて遊ぶアーケード。あなたも修行してみよう！\n\n" +
              "#BugBountyJPGame";
          } else {
            text =
              "I scored " +
              state.score +
              " on Caido Ninja Dojo (" +
              getBeltLabel(state.score) +
              " belt · " +
              state.cleared +
              " scrolls / best combo " +
              state.bestCombo +
              " / " +
              acc +
              "% accuracy)\n" +
              "An arcade where Caido workspaces become ninjutsu — train your bug-bounty reflexes!\n\n" +
              "#BugBountyJPGame";
          }
          // 現在のページ位置を基準に share/<bucket>/ への絶対 URL を作る。
          // new URL は相対パス解決を仕様通り行うため、ドット入りディレクトリ名や
          // /index.html 直指定でも正しく動作する。
          const url = new URL(
            "share/" + shareBucket(state.score) + "/",
            location.href,
          ).href;
          const intent =
            "https://x.com/intent/tweet?text=" +
            encodeURIComponent(text) +
            "&url=" +
            encodeURIComponent(url);
          window.open(intent, "_blank", "noopener,noreferrer");
        }

        /* =========================================================
           入力イベント
           ========================================================= */
        document.querySelectorAll(".lang-toggle button").forEach((btn) => {
          btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
        });
        document.querySelectorAll(".nav-tab").forEach((btn) => {
          btn.addEventListener("click", () => showTab(btn.dataset.tab));
        });
        // ゲームを開始したらゲームタブを active 状態にする
        const _origStartBtn = document.getElementById("btn-start");
        _origStartBtn.addEventListener("click", () => {
          document
            .querySelectorAll(".nav-tab")
            .forEach((b) =>
              b.classList.toggle("active", b.dataset.tab === "game"),
            );
          startGame();
        });
        document.getElementById("btn-share").addEventListener("click", onShare);
        document.getElementById("btn-retry").addEventListener("click", () => {
          document
            .querySelectorAll(".nav-tab")
            .forEach((b) =>
              b.classList.toggle("active", b.dataset.tab === "game"),
            );
          startGame();
        });

        // キーボード入力
        document.addEventListener("keydown", (e) => {
          // IME 入力中の Enter 等で誤発火しないようガード
          if (e.isComposing || e.keyCode === 229) return;
          if (state.phase !== "game") {
            if ((e.key === " " || e.key === "Enter") && state.phase === "start") {
              e.preventDefault();
              startGame();
            }
            return;
          }
          const key = e.key;
          const jutsu = JUTSU.find((j) => j.key === key);
          if (jutsu) {
            e.preventDefault();
            tryHit(jutsu.id);
          }
        });

        // ページが非表示になったら一時停止（戻ったときの猛攻ぎを防ぐ）
        // カウントダウン中（state.raf 未開始 + state.cdTimer 走行中）も止める
        document.addEventListener("visibilitychange", () => {
          if (document.hidden && state.phase === "game") {
            if (state.raf) cancelAnimationFrame(state.raf);
            state.raf = null;
            // カウントダウン setInterval も停止しておかないと、戻った瞬間に
            // throttled で残っていた tick が一気に発火して startGame 直行になる
            if (state.cdTimer) {
              clearInterval(state.cdTimer);
              state.cdTimer = null;
              state._cdResume = true;
            }
            state.pausedAt = performance.now();
          } else if (!document.hidden && state.phase === "game") {
            // 経過時間の補正：止まっていた分を巻物に加算
            if (state.pausedAt) {
              const delta = performance.now() - state.pausedAt;
              for (const s of state.scrolls) {
                s.spawnAt += delta;
              }
              if (state.nextSpawnAt) state.nextSpawnAt += delta;
              if (state.gameStartMs) state.gameStartMs += delta;
              state.pausedAt = 0;
            }
            // カウントダウン中だった場合は「斬！」→ loop 開始へ強制復帰
            if (state._cdResume) {
              state._cdResume = false;
              const cdEl = document.getElementById("countdown");
              cdEl.textContent = lang === "ja" ? "斬！" : "GO!";
              cdEl.style.display = "flex";
              setTimeout(() => {
                cdEl.style.display = "none";
                state.gameStartMs = performance.now();
                state.nextSpawnAt = state.gameStartMs + 600;
                state.raf = requestAnimationFrame(loop);
              }, 400);
            } else if (!state.raf && state.gameStartMs) {
              state.raf = requestAnimationFrame(loop);
            }
          }
        });

        /* =========================================================
           背景パーティクル
           ========================================================= */
        (function initParticles() {
          const canvas = document.getElementById("particles");
          const ctx = canvas.getContext("2d");
          let w = 0;
          let h = 0;
          let particles = [];
          const reduce =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;

          function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
          }
          function create() {
            particles = [];
            const count = Math.max(28, Math.floor((w * h) / 32000));
            for (let i = 0; i < count; i++) {
              particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                r: Math.random() * 1.6 + 0.4,
                vx: (Math.random() - 0.5) * 0.18,
                vy: (Math.random() - 0.5) * 0.18,
                alpha: Math.random() * 0.5 + 0.15,
                hue: Math.random() < 0.5 ? "14, 165, 233" : "251, 146, 60",
              });
            }
          }
          function draw() {
            ctx.clearRect(0, 0, w, h);
            for (let i = 0; i < particles.length; i++) {
              const p = particles[i];
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
              ctx.fillStyle = "rgba(" + p.hue + ", " + p.alpha + ")";
              ctx.fill();
              p.x += p.vx;
              p.y += p.vy;
              if (p.x < 0) p.x = w;
              if (p.x > w) p.x = 0;
              if (p.y < 0) p.y = h;
              if (p.y > h) p.y = 0;
            }
            if (!reduce) requestAnimationFrame(draw);
          }
          resize();
          create();
          draw();
          window.addEventListener("resize", () => {
            resize();
            create();
          });
        })();

        /* =========================================================
           初期化
           ========================================================= */
        applyStartI18n();
        applyGameI18n();
        applyResultI18n();
        applyTabsI18n();
        requestAnimationFrame(updateLangPill);
        window.addEventListener("resize", updateLangPill);
      })();
    </script>
  </body>
</html>
