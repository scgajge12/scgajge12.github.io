    <style>
      :root {
        /* カワセミ（kingfisher）配色：コバルトブルー × バーントオレンジ */
        --bg: #04111e;
        --bg2: #082336;
        --bg3: #0e3149;
        --surface: #103e58;
        --surface-2: #154d6d;
        --line: rgba(14, 165, 233, 0.2);
        --line-strong: rgba(14, 165, 233, 0.5);

        --text: #e6f4f9;
        --text-muted: #93c5d8;
        --text-dim: #5b8597;

        --primary: #0891b2;
        --primary-light: #22d3ee;
        --primary-deep: #155e75;
        --secondary: #f97316;
        --secondary-light: #fb923c;
        --accent: #fbbf24;
        --gold: #fbbf24;
        --success: #34d399;
        --danger: #fb7185;

        --radius: 14px;
        --radius-sm: 8px;
        --shadow: 0 12px 40px rgba(14, 165, 233, 0.22);
        --shadow-strong: 0 0 60px rgba(14, 165, 233, 0.4);

        /* スマホ／safe-area 用 */
        --pad-x: 20px;
        --pad-bottom: max(80px, env(safe-area-inset-bottom));
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        /* iOS でのキーボード出現時の高さズレに強い動的ビューポート単位 */
        height: 100%;
      }

      html,
      body {
        /* 横スクロールを完全に殺す */
        overflow-x: hidden;
        max-width: 100%;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        font-family:
          "Inter", "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic",
          "Noto Sans JP", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        /* 長い英数字（URL・base64 等）が幅を突き破らないように */
        word-wrap: break-word;
        overflow-wrap: anywhere;
        word-break: break-word;
        /* セーフエリア（iPhone ノッチ／ホームインジケータ）対応 */
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      .bg-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .bg-grid {
        background-image:
          linear-gradient(
            to right,
            rgba(14, 165, 233, 0.04) 1px,
            transparent 1px
          ),
          linear-gradient(
            to bottom,
            rgba(14, 165, 233, 0.04) 1px,
            transparent 1px
          );
        background-size: 56px 56px;
        mask-image: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0.85) 0%,
          rgba(0, 0, 0, 0.2) 70%,
          transparent 100%
        );
      }
      .bg-glow1 {
        background: radial-gradient(
          circle at 18% 12%,
          rgba(14, 165, 233, 0.18),
          transparent 55%
        );
      }
      .bg-glow2 {
        background: radial-gradient(
          circle at 82% 88%,
          rgba(251, 146, 60, 0.14),
          transparent 60%
        );
      }
      #particles {
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
        max-width: 880px;
        width: 100%;
        margin: 0 auto;
        padding: 28px var(--pad-x) var(--pad-bottom);
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
        flex-wrap: wrap;
        min-width: 0;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        min-width: 0;
        flex: 1 1 auto;
      }
      .brand-mark {
        width: 36px;
        height: 36px;
        border-radius: 9px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 800;
        font-size: 18px;
        box-shadow: 0 0 20px rgba(14, 165, 233, 0.5);
        flex-shrink: 0;
      }
      .brand-text {
        display: flex;
        flex-direction: column;
        line-height: 1.15;
        min-width: 0;
        overflow: hidden;
      }
      .brand-name {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.5px;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .brand-sub {
        font-size: 10.5px;
        color: var(--text-dim);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .lang-toggle {
        display: inline-flex;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px;
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
      }
      .lang-toggle button {
        background: transparent;
        border: 0;
        color: var(--text-muted);
        /* タップ領域を 44px 程度確保（iOS HIG） */
        padding: 8px 14px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        border-radius: 999px;
        transition: color 0.2s;
        position: relative;
        z-index: 1;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        -webkit-tap-highlight-color: transparent;
        min-height: 32px;
      }
      .lang-toggle button.active {
        color: #fff;
      }
      .lang-toggle .lang-pill {
        position: absolute;
        top: 3px;
        left: 3px;
        height: calc(100% - 6px);
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        border-radius: 999px;
        transition:
          transform 0.28s ease,
          width 0.28s ease;
        z-index: 0;
        box-shadow: 0 0 16px rgba(14, 165, 233, 0.4);
      }

      .screen {
        display: none;
        animation: fadeIn 0.45s ease;
      }
      .screen.active {
        display: block;
      }

      .start-hero {
        text-align: center;
        margin-top: 6px;
        margin-bottom: 28px;
      }

      /* スタートヒーロー：ターミナル + Claude オレンジ AI オーブ + スラッシュコマンド */
      .terminal-illustration {
        display: block;
        width: clamp(220px, 42vw, 320px);
        height: auto;
        margin: 0 auto 14px;
        filter: drop-shadow(0 14px 28px rgba(0, 0, 0, 0.55))
          drop-shadow(0 0 18px rgba(251, 146, 60, 0.18));
      }
      /* AI オーブが脈動 */
      .terminal-illustration .ai-orb {
        animation: orbPulse 2.2s ease-in-out infinite;
        transform-origin: center;
      }
      .terminal-illustration .orb-ring {
        animation: orbRing 3.5s ease-in-out infinite;
        transform-origin: center;
      }
      @keyframes orbPulse {
        0%,
        100% {
          opacity: 0.85;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.06);
        }
      }
      @keyframes orbRing {
        0% {
          opacity: 0.35;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(1.6);
        }
      }
      /* ターミナルのカーソルが点滅 */
      .terminal-illustration .term-cursor {
        animation: termCursor 1s steps(1) infinite;
      }
      @keyframes termCursor {
        0%,
        50% {
          opacity: 1;
        }
        51%,
        100% {
          opacity: 0;
        }
      }
      /* 出力行がタイプされていくようにスライド */
      .terminal-illustration .term-line-b {
        animation: typeIn 4s ease-in-out infinite;
      }
      .terminal-illustration .term-line-c {
        animation: typeIn 4s ease-in-out infinite;
        animation-delay: 1.2s;
      }
      @keyframes typeIn {
        0%,
        20% {
          opacity: 0;
          transform: translateX(-4px);
        }
        30%,
        90% {
          opacity: 1;
          transform: translateX(0);
        }
        100% {
          opacity: 0;
          transform: translateX(0);
        }
      }

      .hero-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        font-size: 11px;
        letter-spacing: 2.5px;
        color: var(--secondary-light);
        background: rgba(251, 146, 60, 0.08);
        border: 1px solid rgba(251, 146, 60, 0.3);
        border-radius: 999px;
        font-weight: 700;
        margin-bottom: 18px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        max-width: 100%;
      }
      .hero-tag-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--secondary);
        box-shadow: 0 0 8px var(--secondary);
        animation: blink 1.4s infinite;
        flex-shrink: 0;
      }
      .hero-title {
        /* 320px 端末でも 1 行に収まる最小値 */
        font-size: clamp(20px, 5.6vw, 44px);
        font-weight: 900;
        letter-spacing: -0.5px;
        line-height: 1.22;
        background: linear-gradient(
          120deg,
          var(--primary-light) 10%,
          var(--secondary-light) 55%,
          var(--accent) 95%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 12px;
      }
      .hero-sub {
        color: var(--text-muted);
        font-size: clamp(13px, 2vw, 15.5px);
        max-width: 560px;
        margin: 0 auto;
      }

      .info-card {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 22px 26px;
        margin-bottom: 22px;
        position: relative;
        overflow: hidden;
      }
      .info-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at top right,
          rgba(14, 165, 233, 0.1),
          transparent 60%
        );
        pointer-events: none;
      }
      .info-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 16px;
        position: relative;
      }
      .info-stat {
        text-align: center;
        min-width: 0;
      }
      .info-stat-num {
        font-size: 26px;
        font-weight: 900;
        background: linear-gradient(
          135deg,
          var(--primary-light),
          var(--secondary-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        font-feature-settings: "tnum";
      }
      .info-stat-label {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 6px;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .sources {
        background: linear-gradient(160deg, var(--bg2), var(--surface));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 24px;
        margin-bottom: 26px;
      }
      .sources-title {
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 12px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .source-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .source-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        text-decoration: none;
        color: var(--text-muted);
        font-size: 13px;
        transition: all 0.2s;
        min-width: 0;
      }
      .source-item:hover {
        border-color: var(--primary);
        color: var(--primary-light);
        transform: translateX(2px);
      }
      .source-year {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 11px;
        font-weight: 700;
        color: var(--secondary-light);
        background: rgba(251, 146, 60, 0.1);
        padding: 3px 8px;
        border-radius: 4px;
        flex-shrink: 0;
      }
      .source-title {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .source-arrow {
        color: var(--text-dim);
        flex-shrink: 0;
      }

      .start-btn-wrap {
        text-align: center;
      }
      .btn-start {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 16px 36px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        color: #fff;
        border: 0;
        border-radius: 999px;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 1px;
        cursor: pointer;
        box-shadow: var(--shadow);
        transition: all 0.25s;
        font-family: inherit;
        text-transform: uppercase;
        min-height: 48px;
        max-width: 100%;
      }
      .btn-start:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-strong);
        filter: brightness(1.1);
      }
      .start-note {
        margin-top: 12px;
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 1px;
      }

      .quiz-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
        gap: 12px;
        flex-wrap: wrap;
        min-width: 0;
      }
      .quiz-counter {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 13px;
        color: var(--text-muted);
        letter-spacing: 1px;
        flex-shrink: 0;
      }
      .quiz-counter strong {
        color: var(--primary-light);
        font-size: 16px;
      }
      .quiz-tag {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 11px;
        color: var(--secondary-light);
        background: rgba(251, 146, 60, 0.08);
        border: 1px solid rgba(251, 146, 60, 0.25);
        padding: 4px 12px;
        border-radius: 4px;
        letter-spacing: 1px;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .progress {
        height: 4px;
        background: var(--surface);
        border-radius: 999px;
        margin-bottom: 26px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        border-radius: 999px;
        transition: width 0.4s ease;
        width: 0%;
      }

      .question-card {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 28px 30px;
        margin-bottom: 22px;
        box-shadow: var(--shadow);
      }
      .question-text {
        font-size: clamp(15px, 2.4vw, 18.5px);
        font-weight: 700;
        line-height: 1.65;
        color: var(--text);
      }

      .choices {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 18px;
      }
      .choice {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        background: var(--surface);
        border: 1.5px solid var(--line);
        color: var(--text);
        padding: 14px 18px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        text-align: left;
        font-size: 14.5px;
        line-height: 1.6;
        font-family: inherit;
        transition: all 0.2s;
        position: relative;
        -webkit-tap-highlight-color: transparent;
        min-width: 0;
        min-height: 48px;
        width: 100%;
      }
      .choice:hover:not(:disabled) {
        border-color: var(--primary);
        background: var(--surface-2);
        transform: translateX(3px);
      }
      .choice:disabled {
        cursor: default;
      }
      .choice-key {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 12px;
        font-weight: 800;
        color: var(--primary-light);
        background: rgba(14, 165, 233, 0.15);
        border: 1px solid rgba(14, 165, 233, 0.3);
        width: 26px;
        height: 26px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .choice-text {
        flex: 1;
        min-width: 0;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .choice-icon {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-weight: 800;
        font-size: 18px;
        margin-left: auto;
        align-self: center;
        opacity: 0;
        transition: opacity 0.2s;
        flex-shrink: 0;
      }
      .choice.correct {
        border-color: var(--success);
        background: rgba(52, 211, 153, 0.08);
      }
      .choice.correct .choice-key {
        color: var(--success);
        background: rgba(52, 211, 153, 0.15);
        border-color: rgba(52, 211, 153, 0.4);
      }
      .choice.correct .choice-icon {
        color: var(--success);
        opacity: 1;
      }
      .choice.wrong {
        border-color: var(--danger);
        background: rgba(251, 113, 133, 0.1);
      }
      .choice.wrong .choice-key {
        color: var(--danger);
        background: rgba(251, 113, 133, 0.15);
        border-color: rgba(251, 113, 133, 0.4);
      }
      .choice.wrong .choice-icon {
        color: var(--danger);
        opacity: 1;
      }
      .choice.dim {
        opacity: 0.45;
      }

      .feedback {
        background: linear-gradient(160deg, var(--bg2), var(--surface));
        border-left: 3px solid var(--primary);
        border-radius: var(--radius-sm);
        padding: 16px 20px;
        margin-bottom: 18px;
        font-size: 13.5px;
        line-height: 1.75;
        color: var(--text-muted);
      }
      .feedback strong {
        color: var(--text);
      }
      .feedback.correct-fb {
        border-color: var(--success);
        background: rgba(52, 211, 153, 0.05);
      }
      .feedback.wrong-fb {
        border-color: var(--danger);
        background: rgba(251, 113, 133, 0.06);
      }
      .feedback-title {
        font-weight: 800;
        color: var(--text);
        margin-bottom: 6px;
        font-size: 14px;
      }
      .feedback.correct-fb .feedback-title {
        color: var(--success);
      }
      .feedback.wrong-fb .feedback-title {
        color: var(--danger);
      }
      .feedback-correct-row {
        margin-top: 10px;
        font-size: 12.5px;
        color: var(--text-muted);
        line-height: 1.7;
      }
      .feedback-correct-row .fc-tag {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 10.5px;
        font-weight: 800;
        letter-spacing: 1px;
        color: var(--success);
        background: rgba(52, 211, 153, 0.12);
        border: 1px solid rgba(52, 211, 153, 0.35);
        padding: 2px 8px;
        border-radius: 4px;
        margin-right: 8px;
      }

      .next-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        color: #fff;
        border: 0;
        border-radius: var(--radius-sm);
        font-size: 14.5px;
        font-weight: 800;
        cursor: pointer;
        letter-spacing: 0.5px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-family: inherit;
        box-shadow: 0 4px 14px rgba(14, 165, 233, 0.3);
        min-height: 48px;
      }
      .next-btn:hover {
        filter: brightness(1.1);
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(14, 165, 233, 0.45);
      }

      /* 結果画面 */
      .result {
        text-align: center;
        padding: 16px 0;
      }
      .result-rank-tag {
        display: inline-block;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 11.5px;
        letter-spacing: 3px;
        color: var(--gold);
        background: rgba(251, 191, 36, 0.1);
        border: 1px solid rgba(251, 191, 36, 0.4);
        padding: 6px 14px;
        border-radius: 4px;
        margin-bottom: 20px;
        font-weight: 800;
      }
      .result-title {
        font-size: clamp(22px, 5vw, 36px);
        font-weight: 900;
        background: linear-gradient(
          120deg,
          var(--primary-light),
          var(--accent),
          var(--secondary-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 10px;
        line-height: 1.2;
      }
      .result-sub {
        color: var(--text-muted);
        font-size: 14px;
        max-width: 480px;
        margin: 0 auto 24px;
      }

      .score-display {
        display: flex;
        justify-content: center;
        margin: 28px 0 22px;
      }
      .score-ring {
        --pct: 0;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: conic-gradient(
          from -90deg,
          var(--primary) 0%,
          var(--secondary) calc(var(--pct) * 0.5%),
          var(--accent) calc(var(--pct) * 1%),
          var(--surface-2) calc(var(--pct) * 1%)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        box-shadow: var(--shadow-strong);
      }
      .score-ring::before {
        content: "";
        position: absolute;
        inset: 14px;
        background: var(--bg);
        border-radius: 50%;
      }
      .score-content {
        position: relative;
        z-index: 1;
        text-align: center;
      }
      .score-num {
        font-size: 56px;
        font-weight: 900;
        background: linear-gradient(
          135deg,
          var(--primary-light),
          var(--secondary-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        font-feature-settings: "tnum";
      }
      .score-total {
        font-size: 14px;
        color: var(--text-dim);
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        margin-top: 4px;
      }

      .result-stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 22px;
      }
      .result-stat {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 14px 8px;
        text-align: center;
        min-width: 0;
      }
      .result-stat-num {
        font-size: 22px;
        font-weight: 900;
        color: var(--primary-light);
        line-height: 1;
        font-feature-settings: "tnum";
      }
      .result-stat-label {
        font-size: 10.5px;
        color: var(--text-dim);
        margin-top: 5px;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .result-comment {
        background: linear-gradient(160deg, var(--bg2), var(--surface));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 18px 22px;
        font-size: 13.5px;
        line-height: 1.8;
        color: var(--text-muted);
        margin-bottom: 20px;
        text-align: left;
      }
      .result-comment strong {
        color: var(--text);
      }

      .result-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 28px;
      }
      .btn-share-x {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 24px;
        background: #000;
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 999px;
        font-size: 13.5px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        min-height: 44px;
      }
      .btn-share-x:hover {
        background: #181818;
        transform: translateY(-1px);
      }
      .btn-secondary {
        padding: 12px 24px;
        background: transparent;
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 999px;
        font-size: 13.5px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        min-height: 44px;
      }
      .btn-secondary:hover {
        border-color: var(--primary);
        color: var(--primary-light);
      }

      .review {
        margin-top: 28px;
        text-align: left;
      }
      .review-title {
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 14px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .review-grid {
        display: grid;
        gap: 10px;
      }
      .review-item {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 12px 16px;
        display: flex;
        gap: 14px;
        align-items: flex-start;
        font-size: 13px;
        min-width: 0;
      }
      .review-mark {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 16px;
        font-weight: 800;
        line-height: 1.4;
        flex-shrink: 0;
      }
      .review-mark.ok {
        color: var(--success);
      }
      .review-mark.ng {
        color: var(--danger);
      }
      .review-content {
        flex: 1;
        min-width: 0;
      }
      .review-q {
        color: var(--text);
        font-weight: 700;
        margin-bottom: 6px;
        line-height: 1.5;
      }
      .review-a {
        color: var(--text-muted);
        font-size: 12.5px;
        line-height: 1.55;
      }
      .review-a-tag {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 10.5px;
        letter-spacing: 1px;
        margin-right: 6px;
      }

      .footer {
        margin-top: 60px;
        padding-top: 26px;
        border-top: 1px solid var(--line);
        text-align: center;
        font-size: 12px;
        color: var(--text-dim);
      }
      .footer a {
        color: var(--primary-light);
        text-decoration: none;
      }
      .footer a:hover {
        text-decoration: underline;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /* タブレット以下 */
      @media (max-width: 720px) {
        :root {
          --pad-x: 16px;
        }
        .page {
          padding-top: 22px;
        }
        .question-card {
          padding: 22px 20px;
        }
        .info-card {
          padding: 18px 18px;
        }
        .sources {
          padding: 16px 16px;
        }
        .score-ring {
          width: 150px;
          height: 150px;
        }
        .score-num {
          font-size: 44px;
        }
      }

      /* スマホ（〜480px） */
      @media (max-width: 480px) {
        .top-bar {
          gap: 8px;
        }
        .brand-mark {
          width: 32px;
          height: 32px;
          font-size: 16px;
        }
        .brand-name {
          font-size: 12px;
        }
        .brand-sub {
          font-size: 9.5px;
          letter-spacing: 1.2px;
        }
        .lang-toggle button {
          padding: 7px 12px;
          font-size: 11.5px;
        }
        .info-card-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 14px;
        }
        .info-stat-num {
          font-size: 22px;
        }
        .question-card {
          padding: 18px 16px;
        }
        .choice {
          padding: 12px 14px;
          font-size: 13.5px;
          gap: 12px;
        }
        .feedback {
          padding: 14px 16px;
          font-size: 13px;
        }
        .result-stats {
          gap: 8px;
        }
        .result-stat-num {
          font-size: 20px;
        }
        .btn-start {
          padding: 14px 28px;
          font-size: 14px;
        }
        .quiz-meta {
          gap: 8px;
        }
        .quiz-tag {
          font-size: 10.5px;
          padding: 3px 10px;
        }
      }

      /* 小型スマホ（〜380px） */
      @media (max-width: 380px) {
        :root {
          --pad-x: 12px;
        }
        .brand-sub {
          /* 小型端末ではサブテキストを切る */
          display: none;
        }
        .lang-toggle button {
          padding: 7px 11px;
          font-size: 11px;
        }
        .info-card-grid {
          gap: 10px;
        }
        .info-stat-num {
          font-size: 20px;
        }
        .question-card {
          padding: 16px 14px;
        }
        .choice {
          padding: 11px 12px;
          font-size: 13px;
        }
        .choice-key {
          width: 24px;
          height: 24px;
          font-size: 11px;
        }
        .result-stats {
          gap: 6px;
        }
        .result-stat {
          padding: 12px 4px;
        }
        .result-stat-num {
          font-size: 18px;
        }
        .result-stat-label {
          font-size: 9.5px;
          letter-spacing: 0.5px;
        }
        .btn-share-x,
        .btn-secondary {
          padding: 11px 18px;
          font-size: 12.5px;
        }
        .score-ring {
          width: 130px;
          height: 130px;
        }
        .score-num {
          font-size: 38px;
        }
      }

      /* 横向きスマホでの圧縮 */
      @media (max-height: 480px) and (orientation: landscape) {
        .start-hero {
          margin-bottom: 18px;
        }
        .info-card,
        .sources {
          padding: 14px 18px;
          margin-bottom: 14px;
        }
        .score-ring {
          width: 120px;
          height: 120px;
        }
        .score-num {
          font-size: 34px;
        }
      }

      /* 動きを抑える設定の尊重 */
      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-layer bg-grid"></div>
    <div class="bg-layer bg-glow1"></div>
    <div class="bg-layer bg-glow2"></div>
    <canvas id="particles" class="bg-layer"></canvas>

    <div class="page">
      <header class="top-bar">
        <a class="brand" href="../" title="morioka12 game site">
          <div class="brand-mark">C</div>
          <div class="brand-text">
            <span class="brand-name" id="brand-name"></span>
            <span class="brand-sub">CLAUDE-CODE · AI BUG BOUNTY</span>
          </div>
        </a>
        <div class="lang-toggle" role="tablist" aria-label="Language">
          <span class="lang-pill" id="lang-pill"></span>
          <button data-lang="ja" class="active" role="tab">日本語</button>
          <button data-lang="en" role="tab">EN</button>
        </div>
      </header>

      <section id="screen-start" class="screen active">
        <div class="start-hero">
          <!--
            ターミナル × Claude オレンジ AI オーブ × スラッシュコマンドのヒーロー。
            装飾用、aria-hidden。AIオーブは脈動、ターミナル行は時差でタイプイン。
          -->
          <svg
            class="terminal-illustration"
            viewBox="0 0 320 190"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <defs>
              <linearGradient id="termFrame" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#1c1917" />
                <stop offset="1" stop-color="#0a0a10" />
              </linearGradient>
              <radialGradient id="orbGrad" cx="0.4" cy="0.35" r="0.8">
                <stop offset="0" stop-color="#fed7aa" />
                <stop offset="0.35" stop-color="#fb923c" />
                <stop offset="0.7" stop-color="#c2410c" />
                <stop offset="1" stop-color="#451a03" />
              </radialGradient>
              <radialGradient id="orbHalo" cx="0.5" cy="0.5" r="0.5">
                <stop offset="0" stop-color="#fb923c" stop-opacity="0.5" />
                <stop offset="1" stop-color="#fb923c" stop-opacity="0" />
              </radialGradient>
            </defs>

            <!-- AIオーブの後光 -->
            <circle class="ai-orb" cx="252" cy="48" r="55" fill="url(#orbHalo)" />
            <!-- 拡散する波紋 -->
            <circle class="orb-ring" cx="252" cy="48" r="30" fill="none" stroke="#fb923c" stroke-width="1.4" />

            <!-- AIオーブ本体 -->
            <g class="ai-orb">
              <circle cx="252" cy="48" r="28" fill="url(#orbGrad)" stroke="#7c2d12" stroke-width="1" />
              <!-- ハイライト -->
              <ellipse cx="244" cy="38" rx="9" ry="7" fill="#ffffff" opacity="0.5" />
              <ellipse cx="244" cy="38" rx="4" ry="3" fill="#ffffff" opacity="0.8" />
              <!-- 内部のスラッシュ '/' -->
              <text
                x="252"
                y="56"
                text-anchor="middle"
                font-size="26"
                font-weight="900"
                fill="#451a03"
                font-family="JetBrains Mono, monospace"
              >/</text>
            </g>

            <!-- ターミナルウィンドウ -->
            <g>
              <!-- 影 -->
              <rect x="22" y="60" width="240" height="115" rx="8" fill="#000" opacity="0.4" />
              <!-- 枠 -->
              <rect x="20" y="58" width="240" height="115" rx="8" fill="url(#termFrame)" stroke="#3f3f46" stroke-width="1" />
              <!-- タイトルバー -->
              <rect x="20" y="58" width="240" height="22" rx="8" fill="#27272a" />
              <rect x="20" y="74" width="240" height="6" fill="#27272a" />
              <!-- 信号ボタン（赤・黄・緑） -->
              <circle cx="34" cy="69" r="4" fill="#fb7185" />
              <circle cx="46" cy="69" r="4" fill="#fbbf24" />
              <circle cx="58" cy="69" r="4" fill="#34d399" />
              <!-- タイトル -->
              <text
                x="140"
                y="73"
                text-anchor="middle"
                font-size="9"
                fill="#71717a"
                font-family="JetBrains Mono, monospace"
                letter-spacing="0.6"
              >claude-bug-bounty</text>

              <!-- 出力行 1: プロンプト + スラッシュコマンド -->
              <g font-family="JetBrains Mono, monospace" font-size="10">
                <text x="32" y="100" fill="#34d399">$</text>
                <text x="44" y="100" fill="#fb923c">claude</text>
                <text x="82" y="100" fill="#22d3ee">/bb-recon</text>
                <rect class="term-cursor" x="138" y="92" width="6" height="10" fill="#22d3ee" />

                <!-- 出力行 2 -->
                <text class="term-line-b" x="32" y="120" fill="#71717a">→ enumerating subdomains...</text>

                <!-- 出力行 3 -->
                <text class="term-line-c" x="32" y="138" fill="#22d3ee">✓ </text>
                <text class="term-line-c" x="42" y="138" fill="#e6f4f9">found 47 hosts</text>

                <!-- 出力行 4: 次のプロンプト -->
                <text class="term-line-c" x="32" y="158" fill="#34d399">$</text>
                <text class="term-line-c" x="44" y="158" fill="#fb923c">claude</text>
                <text class="term-line-c" x="82" y="158" fill="#22d3ee">/bb-triage</text>
              </g>
            </g>

            <!-- スラッシュコマンドの泡（オーブから流れ出す） -->
            <g
              font-family="JetBrains Mono, monospace"
              font-size="9"
              font-weight="700"
              fill="#fb923c"
              opacity="0.85"
            >
              <text class="term-line-b" x="282" y="100" letter-spacing="0.4">/bb-poc</text>
              <text class="term-line-c" x="276" y="118" letter-spacing="0.4">/bb-report</text>
            </g>
            <g fill="#fb923c" opacity="0.6">
              <circle class="ai-orb" cx="288" cy="92" r="1.6" />
              <circle class="orb-ring" cx="282" cy="124" r="1.4" />
              <circle class="ai-orb" cx="270" cy="78" r="1.2" />
            </g>
          </svg>

          <div class="hero-tag">
            <span class="hero-tag-dot"></span>
            <span id="hero-tag-text"></span>
          </div>
          <h1 class="hero-title" id="hero-title"></h1>
          <p class="hero-sub" id="hero-sub"></p>
        </div>

        <div class="info-card">

            <div class="info-stat">
              <div class="info-stat-num">10</div>
              <div class="info-stat-label" id="stat-label-q"></div>
            </div>
            <div class="info-stat">
              <div class="info-stat-num">15</div>
              <div class="info-stat-label" id="stat-label-cmd"></div>
            </div>
            <div class="info-stat">
              <div class="info-stat-num">8</div>
              <div class="info-stat-label" id="stat-label-agent"></div>
            </div>
            <div class="info-stat">
              <div class="info-stat-num">4-Choice</div>
              <div class="info-stat-label" id="stat-label-f"></div>
            </div>

              <span class="source-year">README</span>

              <span class="source-arrow">→</span>
            </a>
            <a
              class="source-item"
              href="https://github.com/shuvonsec/claude-bug-bounty/blob/main/FAQ.md"
              target="_blank"
              rel="noopener noreferrer"
            >
              <span class="source-year">FAQ</span>
              <span class="source-title" id="src-faq"></span>
              <span class="source-arrow">→</span>
            </a>
          </div>

        <div class="start-btn-wrap">
          <button class="btn-start" id="btn-start">

            <span aria-hidden="true">→</span>
          </button>

              <svg

                viewBox="0 0 24 24"
                fill="currentColor"
                aria-hidden="true"
              >
                <path
                  d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.259 5.631 5.905-5.631Zm-1.161 17.52h1.833L7.084 4.126H5.117z"

        /* =========================================================
           復号
           ========================================================= */
        function _decryptQuiz(payload) {
          const bin = atob(payload);
          const out = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) {
            let x = bin.charCodeAt(i);
            x ^= _kA.charCodeAt(i % _kA.length);
            x ^= _kB.charCodeAt(i % _kB.length);
            x ^= _kC[i % _kC.length];
            out[i] = x;
          }
          return JSON.parse(new TextDecoder().decode(out));
        }

        /* =========================================================
           Fisher-Yates シャッフル（呼ぶたびに別の順序）
           - 各問題の choices 配列の順序をランダム化することで、
             DevTools で復号後 QUIZ を覗いても「画面上の A〜D が
             配列インデックスのどれに対応するか」が一定にならない
           ========================================================= */
        function _shuffleInPlace(arr) {
          for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const tmp = arr[i];
            arr[i] = arr[j];
            arr[j] = tmp;
          }
          return arr;
        }

        // 復号 → クロージャ内に保持（window には載せない）
        const QUIZ = _decryptQuiz(_PAYLOAD);
        // 各問題の choices をシャッフル
        for (const q of QUIZ) {
          _shuffleInPlace(q.choices);
        }

        /* =========================================================
           セグメント配列を <strong> 込みで安全に DOM へ描画
           ========================================================= */
        function renderSegments(target, segments) {
          target.textContent = "";
          if (!segments) return;
          for (const seg of segments) {
            if (seg.b) {
              const strong = document.createElement("strong");
              strong.textContent = seg.t;
              target.appendChild(strong);
            } else {
              target.appendChild(document.createTextNode(seg.t));
            }
          }
        }

        /* =========================================================
           状態
           ========================================================= */
        let lang = "ja";
        try {
          const stored = localStorage.getItem("cbb_quiz_lang");
          if (stored === "ja" || stored === "en") lang = stored;
        } catch (e) {}

        let qIndex = 0;
        let answers = []; // [{ selected: idx, correctIdx: idx }]

        function t(key) {
          return I18N[lang][key] !== undefined ? I18N[lang][key] : key;
        }

        function correctIdxOf(qIdx) {
          const choices = QUIZ[qIdx].choices;
          for (let i = 0; i < choices.length; i++) {
            if (choices[i].c) return i;
          }
          return -1;
        }

        /* =========================================================
           I18N - プレーン文字列のみ textContent でセット
           ========================================================= */
        function applyI18n() {
          document.documentElement.lang = lang;

          document.getElementById("brand-name").textContent = t("brandName");
          document.getElementById("hero-tag-text").textContent = t("heroTag");

          const heroTitle = document.getElementById("hero-title");
          heroTitle.textContent = "";
          heroTitle.appendChild(document.createTextNode(t("heroTitleLine1")));
          heroTitle.appendChild(document.createElement("br"));
          heroTitle.appendChild(document.createTextNode(t("heroTitleLine2")));

          document.getElementById("hero-sub").textContent = t("heroSub");
          document.getElementById("stat-label-q").textContent =
            t("statQuestions");
          document.getElementById("stat-label-cmd").textContent =
            t("statCommands");
          document.getElementById("stat-label-agent").textContent =
            t("statAgents");
          document.getElementById("stat-label-f").textContent = t("statFormat");

          document.getElementById("sources-title").textContent =
            t("sourcesTitle");
          document.getElementById("src-repo").textContent = t("srcRepo");
          document.getElementById("src-readme").textContent = t("srcReadme");
          document.getElementById("src-faq").textContent = t("srcFaq");

          document.getElementById("btn-start-text").textContent = t("startBtn");
          document.getElementById("start-note").textContent = t("startNote");

          document.getElementById("qm-q-label").textContent = t("quizQ");

          document.getElementById("stat-lbl-correct").textContent =
            t("resultCorrect");
          document.getElementById("stat-lbl-wrong").textContent =
            t("resultWrong");
          document.getElementById("stat-lbl-acc").textContent = t("resultAcc");
          document.getElementById("btn-share-text").textContent =
            t("resultShare");
          document.getElementById("btn-retry-text").textContent =
            t("resultRetry");
          document.getElementById("review-title").textContent =
            t("resultReview");
          document.getElementById("footer-by").textContent = t("footerBy");
        }

        function updateLangPill() {
          const pill = document.getElementById("lang-pill");
          const buttons = document.querySelectorAll(".lang-toggle button");
          const active = document.querySelector(
            '.lang-toggle button[data-lang="' + lang + '"]',
          );
          if (!active || !pill) return;
          buttons.forEach((b) => b.classList.toggle("active", b === active));
          pill.style.width = active.offsetWidth + "px";
          pill.style.transform =
            "translateX(" + (active.offsetLeft - 3) + "px)";
        }

        function setLanguage(next) {
          if (lang === next) return;
          lang = next;
          try {
            localStorage.setItem("cbb_quiz_lang", lang);
          } catch (e) {}
          applyI18n();
          updateLangPill();
          if (
            document.getElementById("screen-quiz").classList.contains("active")
          ) {
            renderQuestion();
          }
          if (
            document
              .getElementById("screen-result")
              .classList.contains("active")
          ) {
            renderResult();
          }
        }

        /* =========================================================
           画面切り替え
           ========================================================= */
        function showScreen(id) {
          document
            .querySelectorAll(".screen")
            .forEach((s) => s.classList.remove("active"));
          document.getElementById(id).classList.add("active");
          window.scrollTo({ top: 0, behavior: "smooth" });
        }

        /* =========================================================
           クイズ
           ========================================================= */
        function startQuiz() {
          qIndex = 0;
          answers = [];
          // 再挑戦の度に choices を再シャッフル
          for (const q of QUIZ) {
            _shuffleInPlace(q.choices);
          }
          document.getElementById("q-total").textContent = QUIZ.length;
          showScreen("screen-quiz");
          renderQuestion();
        }

        function renderQuestion() {
          const item = QUIZ[qIndex];
          const answered = !!answers[qIndex];

          document.getElementById("q-current").textContent = qIndex + 1;
          document.getElementById("q-tag").textContent = item.tag[lang];
          document.getElementById("question-text").textContent = item.q[lang];

          const pct = (qIndex / QUIZ.length) * 100;
          document.getElementById("progress-fill").style.width = pct + "%";

          const choicesEl = document.getElementById("choices");
          choicesEl.textContent = "";

          const keys = ["A", "B", "C", "D"];
          item.choices.forEach((c, idx) => {
            const btn = document.createElement("button");
            btn.className = "choice";
            btn.type = "button";

            const key = document.createElement("span");
            key.className = "choice-key";
            key.textContent = keys[idx];

            const text = document.createElement("span");
            text.className = "choice-text";
            text.textContent = c[lang];

            const icon = document.createElement("span");
            icon.className = "choice-icon";
            icon.setAttribute("aria-hidden", "true");

            btn.appendChild(key);
            btn.appendChild(text);
            btn.appendChild(icon);

            btn.addEventListener("click", () => onAnswer(idx));
            choicesEl.appendChild(btn);
          });

          document.getElementById("feedback-area").textContent = "";
          document.getElementById("btn-next").style.display = "none";

          if (answered) {
            applyAnswerVisual(answers[qIndex].selected);
            showFeedback(answers[qIndex].selected);
          }
        }

        function onAnswer(selectedIdx) {
          if (answers[qIndex]) return;
          const correctIdx = correctIdxOf(qIndex);
          answers[qIndex] = { selected: selectedIdx, correctIdx };

          applyAnswerVisual(selectedIdx);
          showFeedback(selectedIdx);
        }

        function applyAnswerVisual(selectedIdx) {
          const correctIdx = correctIdxOf(qIndex);
          const btns = document.querySelectorAll(".choice");
          btns.forEach((b, idx) => {
            b.disabled = true;
            const icon = b.querySelector(".choice-icon");
            if (idx === correctIdx) {
              b.classList.add("correct");
              icon.textContent = "✓";
            } else if (idx === selectedIdx) {
              b.classList.add("wrong");
              icon.textContent = "✕";
            } else {
              b.classList.add("dim");
            }
          });
        }

        function showFeedback(selectedIdx) {
          const item = QUIZ[qIndex];
          const correctIdx = correctIdxOf(qIndex);
          const isCorrect = selectedIdx === correctIdx;
          const keys = ["A", "B", "C", "D"];

          const fb = document.createElement("div");
          fb.className = "feedback " + (isCorrect ? "correct-fb" : "wrong-fb");

          const title = document.createElement("div");
          title.className = "feedback-title";
          title.textContent =
            (isCorrect ? "✓ " : "✕ ") +
            (isCorrect ? t("quizCorrect") : t("quizWrong"));
          fb.appendChild(title);

          // 選んだ選択肢の why（個別解説）
          const body = document.createElement("div");
          body.className = "feedback-body";
          renderSegments(body, item.choices[selectedIdx].why[lang]);
          fb.appendChild(body);

          // 不正解時のみ「正解はこれ」を補足表示
          if (!isCorrect) {
            const cRow = document.createElement("div");
            cRow.className = "feedback-correct-row";
            const tag = document.createElement("span");
            tag.className = "fc-tag";
            tag.textContent =
              "[" + t("correctAnswerTag") + "] " + keys[correctIdx];
            cRow.appendChild(tag);
            cRow.appendChild(
              document.createTextNode(item.choices[correctIdx][lang]),
            );
            fb.appendChild(cRow);
          }

          const fbArea = document.getElementById("feedback-area");
          fbArea.textContent = "";
          fbArea.appendChild(fb);

          const nextBtn = document.getElementById("btn-next");
          nextBtn.textContent =
            qIndex >= QUIZ.length - 1 ? t("quizLast") : t("quizNext");
          nextBtn.style.display = "flex";
          nextBtn.onclick = onNext;
        }

        function onNext() {
          if (qIndex >= QUIZ.length - 1) {
            finishQuiz();
          } else {
            qIndex++;
            renderQuestion();
          }
        }

        /* =========================================================
           結果
           ========================================================= */
        function finishQuiz() {
          document.getElementById("progress-fill").style.width = "100%";
          renderResult();
          showScreen("screen-result");
        }

                    { t: "/recon → /hunt → /validate → /report", b: true },
                    {
                      t: " という 4 コマンドの直線フローを覚えるだけでも一気に景色が変わります。エージェント名はそのフローに 1 つずつ「専門担当」を貼り付ける形で覚えると忘れません。",
                    },
                  ]
                : [
                    { t: "Start by memorizing the linear flow " },
                    { t: "/recon → /hunt → /validate → /report", b: true },
                    {
                      t: ". Then attach one specialist agent to each step — that mnemonic sticks.",
                    },
                  ],
            };
          }
          return {
            tag: "★ NEWCOMER",
            title: isJa ? "ニューカマー" : "Newcomer",
            sub: isJa
              ? "リポジトリ README から始めるのがおすすめ。"
              : "Start with the repo README.",
            comment: isJa
              ? [
                  { t: "まずは " },
                  { t: "GitHub の README を流し読み", b: true },
                  {
                    t: "して、`/recon`・`/hunt`・`/validate`・`/report` の 4 コマンドが何をする道具なのかだけ把握すれば十分。それを基準にもう一度クイズを試すと、急に当たり始めます。",
                  },
                ]
              : [
                  {
                    t: "Skim the GitHub README first — just understand what the four commands ",
                  },
                  {
                    t: "/recon, /hunt, /validate, /report",
                    b: true,
                  },
                  {
                    t: " do. Re-take the quiz from that anchor and your hit rate will jump.",
                  },
                ],
          };
        }

        function renderResult() {
          const correctCount = answers.filter(
            (a) => a.selected === a.correctIdx,
          ).length;
          const wrongCount = QUIZ.length - correctCount;
          const acc = Math.round((correctCount / QUIZ.length) * 100);
          const rank = getRank(correctCount, QUIZ.length);

          document.getElementById("result-rank").textContent = rank.tag;
          document.getElementById("result-title").textContent = rank.title;
          document.getElementById("result-sub").textContent = rank.sub;
          document.getElementById("score-num").textContent = correctCount;
          document.getElementById("score-ring").style.setProperty("--pct", acc);
          document.getElementById("stat-correct").textContent = correctCount;
          document.getElementById("stat-wrong").textContent = wrongCount;
          document.getElementById("stat-acc").textContent = acc + "%";
          renderSegments(
            document.getElementById("result-comment"),
            rank.comment,
          );

          const reviewGrid = document.getElementById("review-grid");
          reviewGrid.textContent = "";
          const keys = ["A", "B", "C", "D"];
          QUIZ.forEach((item, i) => {
            const ans = answers[i];
            const isOk = ans && ans.selected === ans.correctIdx;
            const row = document.createElement("div");
            row.className = "review-item";

            const mark = document.createElement("div");
            mark.className = "review-mark " + (isOk ? "ok" : "ng");
            mark.textContent = isOk ? "✓" : "✕";

            const content = document.createElement("div");
            content.className = "review-content";

            const qLine = document.createElement("div");
            qLine.className = "review-q";
            qLine.textContent = "Q" + (i + 1) + ". " + item.q[lang];
            content.appendChild(qLine);

            if (ans) {
              const aLine = document.createElement("div");
              aLine.className = "review-a";
              const yourTag = document.createElement("span");
              yourTag.className = "review-a-tag";
              yourTag.style.color = isOk ? "var(--success)" : "var(--danger)";
              yourTag.textContent =
                "[" + t("resultYour") + "] " + keys[ans.selected];
              aLine.appendChild(yourTag);
              aLine.appendChild(
                document.createTextNode(item.choices[ans.selected][lang]),
              );
              content.appendChild(aLine);

              if (!isOk) {
                const cLine = document.createElement("div");
                cLine.className = "review-a";
                cLine.style.marginTop = "4px";
                const cTag = document.createElement("span");
                cTag.className = "review-a-tag";
                cTag.style.color = "var(--success)";
                cTag.textContent =
                  "[" + t("resultAnswer") + "] " + keys[ans.correctIdx];
                cLine.appendChild(cTag);
                cLine.appendChild(
                  document.createTextNode(item.choices[ans.correctIdx][lang]),
                );
                content.appendChild(cLine);
              }
            }

            row.appendChild(mark);
            row.appendChild(content);
            reviewGrid.appendChild(row);
          });
        }

        /* =========================================================
           X (Twitter) シェア
           ========================================================= */
        function buildShareText(correct, total, acc) {
          if (lang === "ja") {
            return (
              "「Claude Bug Bounty 機能クイズ」全 " +
              total +
              " 問中 " +
              correct +
              " 問正解（正答率 " +
              acc +
              "%）\n" +
              "Claude Code 用バグバウンティ拡張 claude-bug-bounty の機能クイズに挑戦してみよう！\n\n" +
              "#BugBountyJPGame"
            );
          }
          return (
            "I scored " +
            correct +
            "/" +
            total +
            " (" +
            acc +
            "%) on the Claude Bug Bounty Capability Quiz \n" +
            "Try the trivia on the AI bug-bounty extension `claude-bug-bounty` for Claude Code!\n\n" +
            "#BugBountyJPGame"
          );
        }

        function onShare() {
          const correct = answers.filter(
            (a) => a.selected === a.correctIdx,
          ).length;
          const acc = Math.round((correct / QUIZ.length) * 100);
          const text = buildShareText(correct, QUIZ.length, acc);
          // スコア別シェアページ（OGP 画像にスコアが焼き込まれる）へリンクを向ける。
          // share/<score>/index.html は事前に静的生成されており、og:image が
          // /images/games/<slug>/score-<score>.png を指している。
          const base = location.href.split("#")[0].replace(/[^/]*$/, "");
          const url = base + "share/" + correct + "/";
          const intent =
            "https://x.com/intent/tweet?text=" +
            encodeURIComponent(text) +
            "&url=" +
            encodeURIComponent(url);
          window.open(intent, "_blank", "noopener,noreferrer");
        }

        /* =========================================================
           イベントバインド
           ========================================================= */
        document.querySelectorAll(".lang-toggle button").forEach((btn) => {
          btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
        });
        document
          .getElementById("btn-start")
          .addEventListener("click", startQuiz);
        document.getElementById("btn-share").addEventListener("click", onShare);
        document
          .getElementById("btn-retry")
          .addEventListener("click", startQuiz);

        /* =========================================================
           パーティクル背景
           ========================================================= */
        (function initParticles() {
          const canvas = document.getElementById("particles");
          const ctx = canvas.getContext("2d");
          let w = 0;
          let h = 0;
          let particles = [];
          const reduce =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;

          function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
          }

          function create() {
            particles = [];
            const count = Math.max(28, Math.floor((w * h) / 32000));
            for (let i = 0; i < count; i++) {
              particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                r: Math.random() * 1.6 + 0.4,
                vx: (Math.random() - 0.5) * 0.18,
                vy: (Math.random() - 0.5) * 0.18,
                alpha: Math.random() * 0.5 + 0.15,
                hue: Math.random() < 0.5 ? "14, 165, 233" : "251, 146, 60",
              });
            }
          }

          function draw() {
            ctx.clearRect(0, 0, w, h);
            for (let i = 0; i < particles.length; i++) {
              const p = particles[i];
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
              ctx.fillStyle = "rgba(" + p.hue + ", " + p.alpha + ")";
              ctx.fill();
              p.x += p.vx;
              p.y += p.vy;
              if (p.x < 0) p.x = w;
              if (p.x > w) p.x = 0;
              if (p.y < 0) p.y = h;
              if (p.y > h) p.y = 0;
            }
            if (!reduce) requestAnimationFrame(draw);
          }

          resize();
          create();
          draw();
          window.addEventListener("resize", () => {
            resize();
            create();
          });
        })();

        /* =========================================================
           初期化
           ========================================================= */
        applyI18n();
        requestAnimationFrame(updateLangPill);
        window.addEventListener("resize", updateLangPill);
      })();
    </script>
  </body>
</html>
