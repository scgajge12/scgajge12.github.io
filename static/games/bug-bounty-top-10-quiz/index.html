    <style>
      :root {
        /* カワセミ（kingfisher）配色：コバルトブルー × バーントオレンジ */
        --bg: #04111e;
        --bg2: #082336;
        --bg3: #0e3149;
        --surface: #103e58;
        --surface-2: #154d6d;
        --line: rgba(14, 165, 233, 0.2);
        --line-strong: rgba(14, 165, 233, 0.5);

        --text: #e6f4f9;
        --text-muted: #93c5d8;
        --text-dim: #5b8597;

        --primary: #0891b2;
        --primary-light: #22d3ee;
        --primary-deep: #155e75;
        --secondary: #f97316;
        --secondary-light: #fb923c;
        --accent: #fbbf24;
        --gold: #fbbf24;
        --success: #34d399;
        --danger: #fb7185;

        --radius: 14px;
        --radius-sm: 8px;
        --shadow: 0 12px 40px rgba(14, 165, 233, 0.22);
        --shadow-strong: 0 0 60px rgba(14, 165, 233, 0.4);

        /* スマホ／safe-area 用 */
        --pad-x: 20px;
        --pad-bottom: max(80px, env(safe-area-inset-bottom));
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        height: 100%;
      }

      html,
      body {
        /* モバイルで横スクロールが発生しないよう保険 */
        overflow-x: hidden;
        max-width: 100%;
        /* 横向き回転時の文字サイズ自動拡大を抑止 */
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        font-family:
          "Inter", "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic",
          "Noto Sans JP", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        /* iOS でのキーボード出現時のズレに強い動的ビューポート単位 */
        min-height: 100dvh;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        /* 長い英数字（URL・base64 等）が幅を突き破らないように */
        word-wrap: break-word;
        overflow-wrap: break-word;
        /* セーフエリア（iPhone ノッチ／ホームインジケータ）対応 */
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      .bg-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .bg-grid {
        background-image:
          linear-gradient(
            to right,
            rgba(14, 165, 233, 0.04) 1px,
            transparent 1px
          ),
          linear-gradient(
            to bottom,
            rgba(14, 165, 233, 0.04) 1px,
            transparent 1px
          );
        background-size: 56px 56px;
        mask-image: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0.85) 0%,
          rgba(0, 0, 0, 0.2) 70%,
          transparent 100%
        );
      }
      .bg-glow1 {
        background: radial-gradient(
          circle at 18% 12%,
          rgba(14, 165, 233, 0.18),
          transparent 55%
        );
      }
      .bg-glow2 {
        background: radial-gradient(
          circle at 82% 88%,
          rgba(251, 146, 60, 0.14),
          transparent 60%
        );
      }
      #particles {
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
        max-width: 880px;
        width: 100%;
        margin: 0 auto;
        padding: 28px var(--pad-x) var(--pad-bottom);
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }
      .brand-mark {
        width: 36px;
        height: 36px;
        border-radius: 9px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 800;
        font-size: 18px;
        box-shadow: 0 0 20px rgba(14, 165, 233, 0.5);
      }
      .brand-text {
        display: flex;
        flex-direction: column;
        line-height: 1.15;
      }
      .brand-name {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.5px;
        color: var(--text);
      }
      .brand-sub {
        font-size: 10.5px;
        color: var(--text-dim);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .lang-toggle {
        display: inline-flex;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px;
        position: relative;
        overflow: hidden;
      }
      .lang-toggle button {
        background: transparent;
        border: 0;
        color: var(--text-muted);
        /* タップ領域を 32px 程度確保 */
        padding: 7px 14px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        border-radius: 999px;
        transition: color 0.2s;
        position: relative;
        z-index: 1;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        -webkit-tap-highlight-color: transparent;
      }
      .lang-toggle button.active {
        color: #fff;
      }
      .lang-toggle .lang-pill {
        position: absolute;
        top: 3px;
        left: 3px;
        height: calc(100% - 6px);
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        border-radius: 999px;
        transition:
          transform 0.28s ease,
          width 0.28s ease;
        z-index: 0;
        box-shadow: 0 0 16px rgba(14, 165, 233, 0.4);
      }

      .screen {
        display: none;
        animation: fadeIn 0.45s ease;
      }
      .screen.active {
        display: block;
      }

      .start-hero {
        text-align: center;
        margin-top: 6px;
        margin-bottom: 28px;
      }
      .hero-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        font-size: 11px;
        letter-spacing: 2.5px;
        color: var(--secondary-light);
        background: rgba(251, 146, 60, 0.08);
        border: 1px solid rgba(251, 146, 60, 0.3);
        border-radius: 999px;
        font-weight: 700;
        margin-bottom: 18px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .hero-tag-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--secondary);
        box-shadow: 0 0 8px var(--secondary);
        animation: blink 1.4s infinite;
      }
      .hero-title {
        /* 320px 端末でも「脆弱性ランキング・クイズ」が 1 行に収まる最小値 */
        font-size: clamp(22px, 6vw, 44px);
        font-weight: 900;
        letter-spacing: -0.5px;
        line-height: 1.22;
        background: linear-gradient(
          120deg,
          var(--primary-light) 10%,
          var(--secondary-light) 55%,
          var(--accent) 95%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 12px;
      }
      .hero-sub {
        color: var(--text-muted);
        font-size: clamp(13.5px, 2vw, 15.5px);
        max-width: 560px;
        margin: 0 auto;
      }

      .info-card {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 22px 26px;
        margin-bottom: 22px;
        position: relative;
        overflow: hidden;
      }
      .info-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at top right,
          rgba(14, 165, 233, 0.08),
          transparent 60%
        );
        pointer-events: none;
      }
      .info-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 16px;
        position: relative;
      }
      .info-stat {
        text-align: center;
      }
      .info-stat-num {
        font-size: 26px;
        font-weight: 900;
        background: linear-gradient(
          135deg,
          var(--primary-light),
          var(--secondary-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        font-feature-settings: "tnum";
      }
      .info-stat-label {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 6px;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .sources {
        background: linear-gradient(160deg, var(--bg2), var(--surface));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 24px;
        margin-bottom: 26px;
      }
      .sources-title {
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 12px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .source-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .source-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        text-decoration: none;
        color: var(--text-muted);
        font-size: 13px;
        transition: all 0.2s;
      }
      .source-item:hover {
        border-color: var(--primary);
        color: var(--primary-light);
        transform: translateX(2px);
      }
      .source-year {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-size: 11px;
        font-weight: 700;
        color: var(--secondary-light);
        background: rgba(251, 146, 60, 0.1);
        padding: 3px 8px;
        border-radius: 4px;
        flex-shrink: 0;
      }
      .source-title {
        flex: 1;
      }
      .source-arrow {
        color: var(--text-dim);
      }

      .start-btn-wrap {
        text-align: center;
      }
      .btn-start {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 16px 36px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        border: 0;
        color: #fff;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.5px;
        border-radius: 999px;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 8px 32px rgba(14, 165, 233, 0.35);
        position: relative;
        overflow: hidden;
      }
      .btn-start::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          120deg,
          transparent 30%,
          rgba(255, 255, 255, 0.18) 50%,
          transparent 70%
        );
        transform: translateX(-100%);
        transition: transform 0.6s ease;
      }
      .btn-start:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 40px rgba(14, 165, 233, 0.5);
      }
      .btn-start:hover::after {
        transform: translateX(100%);
      }
      .start-note {
        margin-top: 14px;
        color: var(--text-dim);
        font-size: 12px;
      }

      .quiz-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px 12px;
        flex-wrap: wrap;
        margin-bottom: 14px;
        font-size: 12.5px;
      }
      .quiz-counter {
        color: var(--text-muted);
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        letter-spacing: 1px;
      }
      .quiz-counter strong {
        color: var(--primary-light);
        font-size: 16px;
        font-weight: 800;
      }
      .quiz-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 12px;
        background: rgba(251, 146, 60, 0.08);
        border: 1px solid rgba(251, 146, 60, 0.25);
        border-radius: 999px;
        color: var(--secondary-light);
        font-size: 11px;
        letter-spacing: 0.5px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .progress {
        height: 6px;
        background: var(--surface);
        border-radius: 999px;
        overflow: hidden;
        margin-bottom: 26px;
        border: 1px solid var(--line);
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--primary),
          var(--secondary),
          var(--accent)
        );
        background-size: 200% 100%;
        animation: shimmer 4s linear infinite;
        transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        border-radius: 999px;
        box-shadow: 0 0 12px rgba(14, 165, 233, 0.5);
      }

      .question-card {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 30px 32px;
        margin-bottom: 18px;
        animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .question-text {
        font-size: clamp(16px, 2.6vw, 19px);
        line-height: 1.7;
        color: var(--text);
        font-weight: 600;
      }

      .choices {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 16px;
      }
      .choice {
        display: flex;
        /* 長文選択肢のとき Key/Icon が中央に飛ばないよう先頭揃え */
        align-items: flex-start;
        gap: 14px;
        padding: 16px 18px;
        background: var(--surface);
        border: 1.5px solid var(--line);
        color: var(--text);
        border-radius: var(--radius-sm);
        cursor: pointer;
        text-align: left;
        font-size: 14px;
        line-height: 1.55;
        transition: all 0.2s;
        position: relative;
        font-family: inherit;
        /* スマホで長単語が幅を突き破らないように */
        word-break: break-word;
        /* タップハイライトの紫を抑える */
        -webkit-tap-highlight-color: transparent;
      }
      .choice .choice-key,
      .choice .choice-icon {
        /* 1 行目の中央揃えに近づける微調整 */
        margin-top: 1px;
      }
      .choice:hover:not(:disabled) {
        border-color: var(--primary);
        background: var(--surface-2);
        transform: translateX(2px);
      }
      .choice:disabled {
        cursor: default;
      }
      .choice-key {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: rgba(14, 165, 233, 0.15);
        border: 1px solid rgba(14, 165, 233, 0.3);
        color: var(--primary-light);
        font-size: 12px;
        font-weight: 800;
        flex-shrink: 0;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        transition: all 0.2s;
      }
      .choice-text {
        flex: 1;
      }
      .choice-icon {
        opacity: 0;
        font-size: 18px;
        transition: opacity 0.2s;
      }
      .choice.correct {
        border-color: var(--success);
        background: rgba(52, 211, 153, 0.1);
      }
      .choice.correct .choice-key {
        background: var(--success);
        color: #04261b;
        border-color: var(--success);
      }
      .choice.correct .choice-icon {
        opacity: 1;
        color: var(--success);
      }
      .choice.wrong {
        border-color: var(--danger);
        background: rgba(251, 113, 133, 0.1);
      }
      .choice.wrong .choice-key {
        background: var(--danger);
        color: #2a0710;
        border-color: var(--danger);
      }
      .choice.wrong .choice-icon {
        opacity: 1;
        color: var(--danger);
      }
      .choice.dim {
        opacity: 0.45;
      }

      .feedback {
        background: var(--surface);
        border: 1px solid var(--line);
        border-left: 3px solid var(--primary);
        border-radius: var(--radius-sm);
        padding: 16px 20px;
        margin-top: 14px;
        animation: fadeIn 0.3s ease;
      }
      .feedback.correct-fb {
        border-left-color: var(--success);
        background: rgba(52, 211, 153, 0.06);
      }
      .feedback.wrong-fb {
        border-left-color: var(--danger);
        background: rgba(251, 113, 133, 0.06);
      }
      .feedback-title {
        font-weight: 800;
        font-size: 14px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .feedback.correct-fb .feedback-title {
        color: var(--success);
      }
      .feedback.wrong-fb .feedback-title {
        color: var(--danger);
      }
      .feedback-body {
        font-size: 13.5px;
        line-height: 1.7;
        color: var(--text-muted);
      }
      .feedback-body strong {
        color: var(--text);
        font-weight: 700;
      }

      .next-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 16px;
        margin-top: 18px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        border: 0;
        color: #fff;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.5px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 6px 20px rgba(14, 165, 233, 0.3);
      }
      .next-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(14, 165, 233, 0.45);
      }

      .result {
        text-align: center;
        max-width: 620px;
        margin: 0 auto;
      }
      .result-rank-tag {
        display: inline-block;
        padding: 6px 18px;
        font-size: 11px;
        letter-spacing: 3px;
        color: var(--gold);
        background: rgba(251, 191, 36, 0.08);
        border: 1px solid rgba(251, 191, 36, 0.3);
        border-radius: 999px;
        font-weight: 700;
        margin-bottom: 18px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .result-title {
        font-size: clamp(22px, 6vw, 44px);
        font-weight: 900;
        background: linear-gradient(
          120deg,
          var(--primary-light),
          var(--secondary-light),
          var(--accent)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.2;
        margin-bottom: 10px;
      }
      .result-sub {
        color: var(--text-muted);
        margin-bottom: 30px;
        font-size: 14px;
      }

      .score-display {
        position: relative;
        display: inline-block;
        margin-bottom: 24px;
      }
      .score-ring {
        --pct: 0;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: conic-gradient(
          from -90deg,
          var(--primary) 0%,
          var(--secondary) calc(var(--pct) * 0.5%),
          var(--accent) calc(var(--pct) * 1%),
          var(--surface-2) calc(var(--pct) * 1%)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        box-shadow: var(--shadow-strong);
      }
      .score-ring::before {
        content: "";
        position: absolute;
        inset: 14px;
        border-radius: 50%;
        background: var(--bg);
      }
      .score-content {
        position: relative;
        z-index: 1;
        text-align: center;
      }
      .score-num {
        font-size: 48px;

        gap: 8px;

        color: var(--primary-light);
        font-size: 14px;
        font-weight: 800;
        border-radius: 999px;
        border: 1.5px solid var(--primary);
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;

        background: rgba(14, 165, 233, 0.12);
        transform: translateY(-2px);

        margin-top: 36px;

        font-size: 14px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 16px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        text-align: center;

        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .review-item {
        display: flex;
        gap: 12px;

        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);

        height: 26px;

        font-weight: 800;

            en: "MEpME2QLFUpyERleHRRmAhURVhMZQk4TLlQVC1YcH1QcRylXFRxbF0tlARdmAAVIWgFLExNLZkoXHBFISxMPBCVURhsTEQRfGhUpXRVHExMeRQZHaRFXHUAbBVQdFGZdWg9aEUkdTkUkEw9IRwAeVBNLZkoXHBFISxNARx5iZkVgIydYTg8nQhUeXB4eXAtHJERBSF8dHFQcRzBeQQ1AXQleGwkyWFAbCFIAVBwJI10VPXI0S0EPHjURQg1fHktTGxNmWEZIXRMZQwEQaBFhAFZSCEQcFSNfQUhABQ5UGkc1QVocExsYEUwaahFOSkdQURFMhcatRhxSC0teAEcyWVBIRBcJHU4LI1BbSFocH15OCylWXAsdkOusTEtmE1dKCVIfQxsCO2w=",
          },
        },
      ];

      /* =========================================================
         正解インデックス／解説の難読化
           - 正解は _ANS_ENC[i] ^ mask(i) で復元
           - 解説 ex は UTF-8 → XOR(_EX_KEY) → Base64 でエンコード
         （DevTools で QUIZ をぼんやり眺めただけでは答えが分からないようにする目的）
         ========================================================= */
      const _ANS_ENC = [3, 0, 0, 3, 3, 0, 0, 3, 3, 0];
      function _correctIdx(qIdx) {
        return _ANS_ENC[qIdx] ^ (((qIdx * 7 + 11) | 0) & 3);
      }

      const _EX_KEY = "k1ngF15h3r";
      function _decodeEx(payload) {
        const bin = atob(payload);
        const out = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) {
          out[i] = bin.charCodeAt(i) ^ _EX_KEY.charCodeAt(i % _EX_KEY.length);
        }
        return JSON.parse(new TextDecoder().decode(out));
      }

      /* =========================================================
         セグメント配列を <strong> 込みで安全に DOM へ描画
         ========================================================= */
      function renderSegments(target, segments) {
        target.textContent = "";
        for (const seg of segments) {
          if (seg.b) {
            const strong = document.createElement("strong");
            strong.textContent = seg.t;
            target.appendChild(strong);
          } else {
            target.appendChild(document.createTextNode(seg.t));
          }
        }
      }

      /* =========================================================
         状態
         ========================================================= */
      let lang = "ja";
      try {
        const stored = localStorage.getItem("bb_quiz_lang");
        if (stored === "ja" || stored === "en") lang = stored;
      } catch (e) {}

      let qIndex = 0;
      let answers = [];
      let answered = false;

      function t(key) {
        return I18N[lang][key] !== undefined ? I18N[lang][key] : key;
      }

      /* =========================================================
         I18N - プレーン文字列のみ textContent でセット
         ========================================================= */
      function applyI18n() {
        document.documentElement.lang = lang;

        document.getElementById("brand-name").textContent = t("brandName");
        document.getElementById("hero-tag-text").textContent = t("heroTag");

        // ヒーロー見出しは 2 行構成（<br> も createElement で）
        const heroTitle = document.getElementById("hero-title");
        heroTitle.textContent = "";
        heroTitle.appendChild(document.createTextNode(t("heroTitleLine1")));
        heroTitle.appendChild(document.createElement("br"));
        heroTitle.appendChild(document.createTextNode(t("heroTitleLine2")));

        document.getElementById("hero-sub").textContent = t("heroSub");
        document.getElementById("stat-label-q").textContent =
          t("statQuestions");
        document.getElementById("stat-label-y").textContent = t("statYears");
        document.getElementById("stat-label-t").textContent = t("statTime");
        document.getElementById("stat-label-f").textContent = t("statFormat");

        document.getElementById("sources-title").textContent =
          t("sourcesTitle");
        document.getElementById("src-2025").textContent = t("src2025");
        document.getElementById("src-2024").textContent = t("src2024");
        document.getElementById("src-2023").textContent = t("src2023");

        document.getElementById("btn-start-text").textContent = t("startBtn");
        document.getElementById("start-note").textContent = t("startNote");

        document.getElementById("qm-q-label").textContent = t("quizQ");

        document.getElementById("stat-lbl-correct").textContent =
          t("resultCorrect");
        document.getElementById("stat-lbl-wrong").textContent =
          t("resultWrong");
        document.getElementById("stat-lbl-acc").textContent = t("resultAcc");
        document.getElementById("btn-share-text").textContent =
          t("resultShare");
        document.getElementById("btn-retry-text").textContent =
          t("resultRetry");
        document.getElementById("review-title").textContent = t("resultReview");
        document.getElementById("footer-by").textContent = t("footerBy");
      }

      function updateLangPill() {
        const pill = document.getElementById("lang-pill");
        const buttons = document.querySelectorAll(".lang-toggle button");
        const active = document.querySelector(
          '.lang-toggle button[data-lang="' + lang + '"]',
        );
        if (!active || !pill) return;
        buttons.forEach((b) => b.classList.toggle("active", b === active));
        pill.style.width = active.offsetWidth + "px";
        pill.style.transform = "translateX(" + (active.offsetLeft - 3) + "px)";
      }

      function setLanguage(next) {
        if (lang === next) return;
        lang = next;
        try {
          localStorage.setItem("bb_quiz_lang", lang);
        } catch (e) {}
        applyI18n();
        updateLangPill();
        if (
          document.getElementById("screen-quiz").classList.contains("active")
        ) {
          renderQuestion();
        }
        if (
          document.getElementById("screen-result").classList.contains("active")
        ) {
          renderResult();
        }
      }

      /* =========================================================
         画面切り替え
         ========================================================= */
      function showScreen(id) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      /* =========================================================
         クイズ
         ========================================================= */
      function startQuiz() {
        qIndex = 0;
        answers = [];
        answered = false;
        document.getElementById("q-total").textContent = QUIZ.length;
        showScreen("screen-quiz");
        renderQuestion();
      }

      function renderQuestion() {
        const item = QUIZ[qIndex];
        answered = !!answers[qIndex];

        document.getElementById("q-current").textContent = qIndex + 1;
        document.getElementById("q-tag").textContent = item.tag[lang];
        document.getElementById("question-text").textContent = item.q[lang];

        const pct = (qIndex / QUIZ.length) * 100;
        document.getElementById("progress-fill").style.width = pct + "%";

        const choicesEl = document.getElementById("choices");
        choicesEl.textContent = "";

        const keys = ["A", "B", "C", "D"];
        item.choices.forEach((c, idx) => {
          const btn = document.createElement("button");
          btn.className = "choice";
          btn.type = "button";

          const key = document.createElement("span");
          key.className = "choice-key";
          key.textContent = keys[idx];

          const text = document.createElement("span");
          text.className = "choice-text";
          text.textContent = c[lang];

          const icon = document.createElement("span");
          icon.className = "choice-icon";
          icon.setAttribute("aria-hidden", "true");

          btn.appendChild(key);
          btn.appendChild(text);
          btn.appendChild(icon);

          btn.addEventListener("click", () => onAnswer(idx));
          choicesEl.appendChild(btn);
        });

        document.getElementById("feedback-area").textContent = "";
        document.getElementById("btn-next").style.display = "none";

        if (answered) {
          applyAnswerVisual(answers[qIndex].selected);
          showFeedback(answers[qIndex].selected);
        }
      }

      function onAnswer(selectedIdx) {
        if (answered) return;
        answered = true;

        const item = QUIZ[qIndex];
        const correctIdx = _correctIdx(qIndex);
        answers[qIndex] = { selected: selectedIdx, correct: correctIdx };

        applyAnswerVisual(selectedIdx);
        showFeedback(selectedIdx);
      }

      function applyAnswerVisual(selectedIdx) {
        const item = QUIZ[qIndex];
        const correctIdx = _correctIdx(qIndex);
        const btns = document.querySelectorAll(".choice");
        btns.forEach((b, idx) => {
          b.disabled = true;
          const icon = b.querySelector(".choice-icon");
          if (idx === correctIdx) {
            b.classList.add("correct");
            icon.textContent = "✓";
          } else if (idx === selectedIdx) {
            b.classList.add("wrong");
            icon.textContent = "✕";
          } else {
            b.classList.add("dim");
          }
        });
      }

      function showFeedback(selectedIdx) {
        const item = QUIZ[qIndex];
        const correctIdx = _correctIdx(qIndex);
        const isCorrect = selectedIdx === correctIdx;

        const fb = document.createElement("div");
        fb.className = "feedback " + (isCorrect ? "correct-fb" : "wrong-fb");

        const title = document.createElement("div");
        title.className = "feedback-title";
        title.textContent =
          (isCorrect ? "✓ " : "✕ ") +
          (isCorrect ? t("quizCorrect") : t("quizWrong"));
        fb.appendChild(title);

        const body = document.createElement("div");
        body.className = "feedback-body";
        renderSegments(body, _decodeEx(item.ex[lang]));
        fb.appendChild(body);

        const fbArea = document.getElementById("feedback-area");
        fbArea.textContent = "";
        fbArea.appendChild(fb);

        const nextBtn = document.getElementById("btn-next");
        nextBtn.textContent =
          qIndex >= QUIZ.length - 1 ? t("quizLast") : t("quizNext");
        nextBtn.style.display = "flex";
        nextBtn.onclick = onNext;
      }

      function onNext() {
        if (qIndex >= QUIZ.length - 1) {
          finishQuiz();
        } else {
          qIndex++;
          renderQuestion();
        }
      }

      /* =========================================================
         結果
         ========================================================= */
      function finishQuiz() {
        document.getElementById("progress-fill").style.width = "100%";
        renderResult();
        showScreen("screen-result");
      }

      function getRank(score, total) {
        const pct = (score / total) * 100;
        const isJa = lang === "ja";
        if (pct === 100) {
          return {
            tag: "★ ELITE HUNTER",
            title: isJa ? "完全制覇！" : "Flawless Victory!",
            sub: isJa
              ? "Hacktivity を年表のように暗記している猛者です。"
              : "You read Hacktivity like a calendar.",
            comment: isJa
              ? [
                  { t: "10/10、お見事です。", b: true },
                  {
                    t: " HackerOne の人気投票・報奨金額・ターゲット選びの観点を、複数年にわたって押さえている証拠。次は同じ視点で「自分の調査ターゲット」を選び直してみると、CVE / 報奨に直結する仮説が立てやすくなります。",
                  },
                ]
              : [
                  { t: "10/10. ", b: true },
                  {
                    t: "You've internalized the popularity-vote, bounty, and target-selection signals across multiple years. Use the same lens on your own targets next — it'll sharpen the hypothesis behind every report.",
                  },
                ],
          };
        }
        if (pct >= 80) {
          return {
            tag: "★ SENIOR HUNTER",
            title: isJa ? "シニアハンター級！" : "Senior Hunter!",
            sub: isJa
              ? "業界トレンドをほぼ正確に掴めています。"
              : "You're tracking the industry pulse pretty well.",
            comment: isJa
              ? [
                  { t: "正答率 80% 以上は" },
                  { t: "業界の動向を把握している層", b: true },
                  {
                    t: "。「アクセス制御」「認証フロー」が現代の主戦場であるという感覚と、報奨金 ≠ 投票数の差を理解しているはずです。間違えた問題は、出典記事を流し読みするだけでも一気に埋まります。",
                  },
                ]
              : [
                  {
                    t: "80%+ means you're already plugged into the meta. ",
                    b: true,
                  },
                  {
                    t: "Access control and auth flows are the modern frontline, and you can sense that votes and bounties don't always agree. Skim the source articles for the ones you missed.",
                  },
                ],
          };
        }
        if (pct >= 60) {
          return {
            tag: "★ JUNIOR HUNTER",
            title: isJa ? "ジュニアハンター級" : "Junior Hunter",
            sub: isJa
              ? "基礎は固まりつつあります。あと一歩。"
              : "Solid foundation. One more push.",
            comment: isJa
              ? [
                  { t: "「投票数」「報奨金」「ターゲット種類」", b: true },
                  {
                    t: " の3軸でランキングを再読すると、頭の中で立体的にトレンドが整理されます。出典記事は3本でも 30 分かからない読了量。次回は 80% 越えを狙えます。",
                  },
                ]
              : [
                  { t: "Re-read the rankings on three axes: " },
                  { t: "votes, bounty, and target type", b: true },
                  {
                    t: ". The three source posts together take ~30 minutes — and they'll push you over 80% next round.",
                  },
                ],
          };
        }
        if (pct >= 30) {
          return {
            tag: "★ ROOKIE",
            title: isJa ? "ルーキー" : "Rookie",
            sub: isJa ? "ここから伸びる時期です。" : "Plenty of room to grow.",
            comment: isJa
              ? [
                  { t: "脆弱性カテゴリの " },
                  { t: "名前と特徴の対応", b: true },
                  {
                    t: "（IDOR・SSRF・SAML・UAF など）を整理するだけで、得点は一気に伸びます。下のレビューで、自分が引っ掛かったパターンを把握すると次回の伸び幅が大きいです。",
                  },
                ]
              : [
                  {
                    t: "Just mapping vulnerability names to their characteristics (IDOR, SSRF, SAML, UAF…) will boost your score quickly. Use the review below to spot the patterns you fell for.",
                  },
                ],
          };
        }
        return {
          tag: "★ NEWCOMER",
          title: isJa ? "ニューカマー" : "Newcomer",
          sub: isJa
            ? "出典記事から始めるのがおすすめ。"
            : "Start with the source articles.",
          comment: isJa
            ? [
                { t: "まずは " },
                { t: "出典記事 3 本", b: true },
                {
                  t: " に目を通すと、世界のバグハンターが「何にいくら払われているか」の感覚が一気に手に入ります。クイズはそのあとリトライしてみましょう。",
                },
              ]
            : [
                {
                  t: "Skim the three source articles first — you'll quickly get a feel for ",
                },
                {
                  t: "what the bug-bounty world is currently paying for",
                  b: true,
                },
                { t: ". Then come back for the retry." },
              ],
        };
      }

      function renderResult() {
        const correctCount = answers.filter(
          (a) => a.selected === a.correct,
        ).length;
        const wrongCount = QUIZ.length - correctCount;
        const acc = Math.round((correctCount / QUIZ.length) * 100);
        const rank = getRank(correctCount, QUIZ.length);

        document.getElementById("result-rank").textContent = rank.tag;
        document.getElementById("result-title").textContent = rank.title;
        document.getElementById("result-sub").textContent = rank.sub;
        document.getElementById("score-num").textContent = correctCount;
        document.getElementById("score-ring").style.setProperty("--pct", acc);
        document.getElementById("stat-correct").textContent = correctCount;
        document.getElementById("stat-wrong").textContent = wrongCount;
        document.getElementById("stat-acc").textContent = acc + "%";
        renderSegments(document.getElementById("result-comment"), rank.comment);

        const reviewGrid = document.getElementById("review-grid");
        reviewGrid.textContent = "";
        const keys = ["A", "B", "C", "D"];
        QUIZ.forEach((item, i) => {
          const ans = answers[i];
          const isOk = ans && ans.selected === ans.correct;
          const row = document.createElement("div");
          row.className = "review-item";

          const mark = document.createElement("div");
          mark.className = "review-mark " + (isOk ? "ok" : "ng");
          mark.textContent = isOk ? "✓" : "✕";

          const content = document.createElement("div");
          content.className = "review-content";

          const qLine = document.createElement("div");
          qLine.className = "review-q";
          qLine.textContent = "Q" + (i + 1) + ". " + item.q[lang];
          content.appendChild(qLine);

          if (ans) {
            const aLine = document.createElement("div");
            aLine.className = "review-a";
            const yourTag = document.createElement("span");
            yourTag.className = "review-a-tag";
            yourTag.style.color = isOk ? "var(--success)" : "var(--danger)";
            yourTag.textContent =
              "[" + t("resultYour") + "] " + keys[ans.selected];
            aLine.appendChild(yourTag);
            aLine.appendChild(
              document.createTextNode(item.choices[ans.selected][lang]),
            );
            content.appendChild(aLine);

            if (!isOk) {
              const cLine = document.createElement("div");
              cLine.className = "review-a";
              cLine.style.marginTop = "4px";
              const cTag = document.createElement("span");
              cTag.className = "review-a-tag";
              cTag.style.color = "var(--success)";
              cTag.textContent =
                "[" + t("resultAnswer") + "] " + keys[ans.correct];
              cLine.appendChild(cTag);
              cLine.appendChild(
                document.createTextNode(item.choices[ans.correct][lang]),
              );
              content.appendChild(cLine);
            }
          }

          row.appendChild(mark);
          row.appendChild(content);
          reviewGrid.appendChild(row);
        });
      }

      /* =========================================================
         X (Twitter) シェア
         ========================================================= */
      function buildShareText(correct, total, acc) {
        if (lang === "ja") {
          return (
            "「バグバウンティ脆弱性ランキング・クイズ」全 " +
            total +
            " 問中 " +
            correct +
            " 問正解（正答率 " +
            acc +
            "%）\n" +
            "HackerOne Hacktivity 2023〜2025 のバグハンター・トリビアに挑戦してみよう！\n\n" +
            "#BugBountyQuizM"
          );
        }
        return (
          "I scored " +
          correct +
          "/" +
          total +
          " (" +
          acc +
          "%) on the Bug Bounty Top 10 Quiz \n" +
          "Try the bug-hunter trivia from HackerOne Hacktivity 2023–2025!\n\n" +
          "#BugBountyQuizM"
        );
      }

      function onShare() {
        const correct = answers.filter((a) => a.selected === a.correct).length;
        const acc = Math.round((correct / QUIZ.length) * 100);
        const text = buildShareText(correct, QUIZ.length, acc);
        const url = location.href.split("#")[0];
        const intent =
          "https://x.com/intent/tweet?text=" +
          encodeURIComponent(text) +
          "&url=" +
          encodeURIComponent(url);
        window.open(intent, "_blank", "noopener,noreferrer");
      }

      /* =========================================================
         イベントバインド
         ========================================================= */
      document.querySelectorAll(".lang-toggle button").forEach((btn) => {
        btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
      });
      document.getElementById("btn-start").addEventListener("click", startQuiz);
      document.getElementById("btn-share").addEventListener("click", onShare);
      document.getElementById("btn-retry").addEventListener("click", startQuiz);

      /* =========================================================
         パーティクル背景
         ========================================================= */
      (function initParticles() {
        const canvas = document.getElementById("particles");
        const ctx = canvas.getContext("2d");
        let w = 0;
        let h = 0;
        let particles = [];
        const reduce =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        function resize() {
          w = canvas.width = window.innerWidth;
          h = canvas.height = window.innerHeight;
        }

        function create() {
          particles = [];
          const count = Math.max(28, Math.floor((w * h) / 32000));
          for (let i = 0; i < count; i++) {
            particles.push({
              x: Math.random() * w,
              y: Math.random() * h,
              r: Math.random() * 1.6 + 0.4,
              vx: (Math.random() - 0.5) * 0.18,
              vy: (Math.random() - 0.5) * 0.18,
              alpha: Math.random() * 0.5 + 0.15,
              hue: Math.random() < 0.5 ? "14, 165, 233" : "251, 146, 60",
            });
          }
        }

        function draw() {
          ctx.clearRect(0, 0, w, h);
          for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(" + p.hue + ", " + p.alpha + ")";
            ctx.fill();
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0) p.x = w;
            if (p.x > w) p.x = 0;
            if (p.y < 0) p.y = h;
            if (p.y > h) p.y = 0;
          }
          if (!reduce) requestAnimationFrame(draw);
        }

        resize();
        create();
        draw();
        window.addEventListener("resize", () => {
          resize();
          create();
        });
      })();

      /* =========================================================
         初期化
         ========================================================= */
      applyI18n();
      requestAnimationFrame(updateLangPill);
      window.addEventListener("resize", updateLangPill);
      })();
    </script>
