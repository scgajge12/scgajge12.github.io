    <style>
      :root {
        /* カワセミ配色：コバルトブルー × バーントオレンジ（BBH と統一） */
        --bg: #04111e;
        --bg2: #082336;
        --bg3: #0e3149;
        --surface: #103e58;
        --surface-2: #154d6d;
        --line: rgba(14, 165, 233, 0.2);
        --line-strong: rgba(14, 165, 233, 0.5);

        --text: #e6f4f9;
        --text-muted: #93c5d8;
        --text-dim: #5b8597;

        --primary: #0891b2;
        --primary-light: #22d3ee;
        --primary-deep: #155e75;
        --secondary: #f97316;
        --secondary-light: #fb923c;
        --accent: #fbbf24;
        --gold: #fbbf24;
        --success: #34d399;
        --danger: #fb7185;

        --radius: 14px;
        --radius-sm: 8px;
        --shadow: 0 12px 40px rgba(14, 165, 233, 0.22);
        --shadow-strong: 0 0 60px rgba(14, 165, 233, 0.4);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        font-family:
          "Inter", "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic",
          "Noto Sans JP", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        word-wrap: break-word;
        overflow-wrap: break-word;
        /* セーフエリア（iPhone ノッチ／ホームインジケータ）対応 */
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      .bg-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .bg-grid {
        background-image:
          linear-gradient(
            to right,
            rgba(14, 165, 233, 0.04) 1px,
            transparent 1px
          ),
          linear-gradient(
            to bottom,
            rgba(14, 165, 233, 0.04) 1px,
            transparent 1px
          );
        background-size: 56px 56px;
        mask-image: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0.85) 0%,
          rgba(0, 0, 0, 0.2) 70%,
          transparent 100%
        );
      }
      .bg-glow1 {
        background: radial-gradient(
          circle at 18% 12%,
          rgba(14, 165, 233, 0.18),
          transparent 55%
        );
      }
      .bg-glow2 {
        background: radial-gradient(
          circle at 82% 88%,
          rgba(251, 146, 60, 0.14),
          transparent 60%
        );
      }
      #particles {
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
        max-width: 880px;
        margin: 0 auto;
        /* セーフエリア（iPhone ホームインジケータ）下部に追従 */
        padding: 28px 20px max(80px, env(safe-area-inset-bottom));
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }
      .brand-mark {
        width: 36px;
        height: 36px;
        border-radius: 9px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 800;
        font-size: 20px;
        box-shadow: 0 0 20px rgba(14, 165, 233, 0.5);
        font-family: "Noto Serif JP", "Yu Mincho", serif;
      }
      .brand-text {
        display: flex;
        flex-direction: column;
        line-height: 1.15;
      }
      .brand-name {
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.5px;
        color: var(--text);
      }
      .brand-sub {
        font-size: 10.5px;
        color: var(--text-dim);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      /* ナビゲーションタブ（Quiz / Glossary） */
      .nav-tabs {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-bottom: 22px;
        padding: 4px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 999px;
        max-width: 360px;
        margin-left: auto;
        margin-right: auto;
        position: relative;
      }
      .nav-tab {
        flex: 1;
        background: transparent;
        border: 0;
        color: var(--text-muted);
        padding: 9px 16px;
        font-size: 12.5px;
        font-weight: 800;
        letter-spacing: 1px;
        cursor: pointer;
        border-radius: 999px;
        transition: all 0.2s;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        text-transform: uppercase;
        -webkit-tap-highlight-color: transparent;
      }
      .nav-tab.active {
        color: #fff;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        box-shadow: 0 0 16px rgba(14, 165, 233, 0.4);
      }
      .nav-tab:hover:not(.active) {
        color: var(--primary-light);
      }

      .lang-toggle {
        display: inline-flex;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px;
        position: relative;
        overflow: hidden;
      }
      .lang-toggle button {
        background: transparent;
        border: 0;
        color: var(--text-muted);
        padding: 7px 14px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        border-radius: 999px;
        transition: color 0.2s;
        position: relative;
        z-index: 1;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        -webkit-tap-highlight-color: transparent;
      }
      .lang-toggle button.active {
        color: #fff;
      }
      .lang-toggle .lang-pill {
        position: absolute;
        top: 3px;
        left: 3px;
        height: calc(100% - 6px);
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        border-radius: 999px;
        transition:
          transform 0.28s ease,
          width 0.28s ease;
        z-index: 0;
        box-shadow: 0 0 16px rgba(14, 165, 233, 0.4);
      }

      .screen {
        display: none;
        animation: fadeIn 0.45s ease;
      }
      .screen.active {
        display: block;
      }

      .start-hero {
        text-align: center;
        margin-top: 6px;
        margin-bottom: 28px;
      }
      .hero-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        font-size: 11px;
        letter-spacing: 2.5px;
        color: var(--secondary-light);
        background: rgba(251, 146, 60, 0.08);
        border: 1px solid rgba(251, 146, 60, 0.3);
        border-radius: 999px;
        font-weight: 700;
        margin-bottom: 18px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .hero-tag-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--secondary);
        box-shadow: 0 0 8px var(--secondary);
        animation: blink 1.4s infinite;
      }
      .hero-title {
        font-size: clamp(28px, 7vw, 52px);
        font-weight: 900;
        letter-spacing: -0.5px;
        line-height: 1.18;
        background: linear-gradient(
          120deg,
          var(--primary-light) 10%,
          var(--secondary-light) 55%,
          var(--accent) 95%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 12px;
      }
      .hero-sub {
        color: var(--text-muted);
        font-size: clamp(13.5px, 2vw, 15.5px);
        max-width: 560px;
        margin: 0 auto;
      }

      .info-card {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 22px 26px;
        margin-bottom: 22px;
        position: relative;
        overflow: hidden;
      }
      .info-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at top right,
          rgba(14, 165, 233, 0.08),
          transparent 60%
        );
        pointer-events: none;
      }
      .info-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 16px;
        position: relative;
      }
      .info-stat {
        text-align: center;
      }
      .info-stat-num {
        font-size: 26px;
        font-weight: 900;
        background: linear-gradient(
          135deg,
          var(--primary-light),
          var(--secondary-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        font-feature-settings: "tnum";
      }
      .info-stat-label {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 6px;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      /* 難易度選択 */
      .diff-section {
        background: linear-gradient(160deg, var(--bg2), var(--surface));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 24px;
        margin-bottom: 22px;
      }
      .diff-title {
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 14px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .diff-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
      }
      .diff-card {
        background: var(--bg);
        border: 1.5px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 14px 16px;
        cursor: pointer;
        transition: all 0.2s;
        text-align: left;
        color: var(--text);
        font-family: inherit;
        -webkit-tap-highlight-color: transparent;
      }
      .diff-card:hover {
        border-color: var(--primary);
        background: var(--surface);
        transform: translateY(-2px);
      }
      .diff-card.active {
        border-color: var(--secondary);
        background: rgba(251, 146, 60, 0.08);
        box-shadow: 0 0 20px rgba(251, 146, 60, 0.18);
      }
      .diff-card-name {
        font-size: 14px;
        font-weight: 800;
        color: var(--primary-light);
        margin-bottom: 4px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .diff-card.active .diff-card-name {
        color: var(--secondary-light);
      }
      .diff-card-sub {
        font-size: 11.5px;
        color: var(--text-dim);
        line-height: 1.5;
      }

      /* ベストタイム表示 */
      .best-time-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        margin-bottom: 22px;
        font-size: 13px;
      }
      .best-time-label {
        color: var(--text-dim);
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        letter-spacing: 1px;
        font-size: 11px;
        text-transform: uppercase;
      }
      .best-time-value {
        color: var(--gold);
        font-weight: 800;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-feature-settings: "tnum";
        font-size: 16px;
      }

      .start-btn-wrap {
        text-align: center;
      }
      .btn-start {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 16px 36px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        border: 0;
        color: #fff;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.5px;
        border-radius: 999px;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 8px 32px rgba(14, 165, 233, 0.35);
        position: relative;
        overflow: hidden;
      }
      .btn-start::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          120deg,
          transparent 30%,
          rgba(255, 255, 255, 0.18) 50%,
          transparent 70%
        );
        transform: translateX(-100%);
        transition: transform 0.6s ease;
      }
      .btn-start:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 40px rgba(14, 165, 233, 0.5);
      }
      .btn-start:hover::after {
        transform: translateX(100%);
      }
      .start-note {
        margin-top: 14px;
        color: var(--text-dim);
        font-size: 12px;
      }

      /* クイズ画面 */
      .quiz-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px 12px;
        flex-wrap: wrap;
        margin-bottom: 14px;
        font-size: 12.5px;
      }
      .quiz-counter {
        color: var(--text-muted);
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        letter-spacing: 1px;
      }
      .quiz-counter strong {
        color: var(--primary-light);
        font-size: 16px;
        font-weight: 800;
      }
      .quiz-timer-wrap {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .quiz-timer {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 12px;
        background: rgba(14, 165, 233, 0.08);
        border: 1px solid rgba(14, 165, 233, 0.25);
        border-radius: 999px;
        color: var(--primary-light);
        font-size: 12.5px;
        letter-spacing: 0.5px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-feature-settings: "tnum";
        font-weight: 700;
      }
      .quiz-penalty {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 10px;
        background: rgba(251, 113, 133, 0.08);
        border: 1px solid rgba(251, 113, 133, 0.25);
        border-radius: 999px;
        color: var(--danger);
        font-size: 11.5px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-weight: 700;
        opacity: 0;
        transition: opacity 0.25s;
      }
      .quiz-penalty.show {
        opacity: 1;
      }

      .progress {
        height: 6px;
        background: var(--surface);
        border-radius: 999px;
        overflow: hidden;
        margin-bottom: 26px;
        border: 1px solid var(--line);
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--primary),
          var(--secondary),
          var(--accent)
        );
        background-size: 200% 100%;
        animation: shimmer 4s linear infinite;
        transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        border-radius: 999px;
        box-shadow: 0 0 12px rgba(14, 165, 233, 0.5);
      }

      /* 漢字カード（メイン演出） */
      .kanji-card {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 40px 24px 36px;
        margin-bottom: 18px;
        text-align: center;
        animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        overflow: hidden;
      }
      .kanji-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at center,
          rgba(251, 146, 60, 0.08),
          transparent 60%
        );
        pointer-events: none;
      }
      .kanji-display {
        font-family:
          "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho",
          "Times New Roman", serif;
        font-weight: 900;
        line-height: 1;
        background: linear-gradient(
          135deg,
          var(--primary-light) 10%,
          var(--secondary-light) 55%,
          var(--accent) 95%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        position: relative;
        z-index: 1;
        text-shadow: none;
        filter: drop-shadow(0 0 30px rgba(251, 146, 60, 0.18));
      }
      .kanji-display.len-1 {
        font-size: clamp(120px, 30vw, 200px);
        letter-spacing: 0;
      }
      .kanji-display.len-2 {
        font-size: clamp(78px, 18vw, 140px);
        letter-spacing: 0.05em;
      }
      .kanji-display.len-3,
      .kanji-display.len-4 {
        font-size: clamp(54px, 12vw, 92px);
        letter-spacing: 0.04em;
      }
      .kanji-prompt {
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 12px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        position: relative;
        z-index: 1;
      }

      .choices {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 16px;
      }
      .choice {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 16px 18px;
        background: var(--surface);
        border: 1.5px solid var(--line);
        color: var(--text);
        border-radius: var(--radius-sm);
        cursor: pointer;
        text-align: left;
        font-size: 14px;
        line-height: 1.55;
        transition: all 0.2s;
        position: relative;
        font-family: inherit;
        word-break: break-word;
        -webkit-tap-highlight-color: transparent;
      }
      .choice:hover:not(:disabled) {
        border-color: var(--primary);
        background: var(--surface-2);
        transform: translateX(2px);
      }
      .choice:disabled {
        cursor: default;
      }
      .choice-key {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: rgba(14, 165, 233, 0.15);
        border: 1px solid rgba(14, 165, 233, 0.3);
        color: var(--primary-light);
        font-size: 12px;
        font-weight: 800;
        flex-shrink: 0;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        transition: all 0.2s;
      }
      .choice-text {
        flex: 1;
      }
      .choice-icon {
        opacity: 0;
        font-size: 18px;
        transition: opacity 0.2s;
      }
      .choice.correct {
        border-color: var(--success);
        background: rgba(52, 211, 153, 0.1);
      }
      .choice.correct .choice-key {
        background: var(--success);
        color: #04261b;
        border-color: var(--success);
      }
      .choice.correct .choice-icon {
        opacity: 1;
        color: var(--success);
      }
      .choice.wrong {
        border-color: var(--danger);
        background: rgba(251, 113, 133, 0.1);
        animation: shake 0.4s;
      }
      .choice.wrong .choice-key {
        background: var(--danger);
        color: #2a0710;
        border-color: var(--danger);
      }
      .choice.wrong .choice-icon {
        opacity: 1;
        color: var(--danger);
      }
      .choice.dim {
        opacity: 0.45;
      }

      .feedback {
        background: var(--surface);
        border: 1px solid var(--line);
        border-left: 3px solid var(--success);
        border-radius: var(--radius-sm);
        padding: 16px 20px;
        margin-top: 14px;
        animation: fadeIn 0.3s ease;
        background: rgba(52, 211, 153, 0.06);
      }
      .feedback-title {
        font-weight: 800;
        font-size: 14px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--success);
      }
      .feedback-body {
        font-size: 13.5px;
        line-height: 1.7;
        color: var(--text-muted);
      }
      .feedback-body strong {
        color: var(--text);
        font-weight: 700;
      }

      .next-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 16px;
        margin-top: 18px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-deep)
        );
        border: 0;
        color: #fff;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.5px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 6px 20px rgba(14, 165, 233, 0.3);
      }
      .next-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(14, 165, 233, 0.45);
      }

      /* 結果画面 */
      .result {
        text-align: center;
        max-width: 620px;
        margin: 0 auto;
      }
      .result-rank-tag {
        display: inline-block;
        padding: 6px 18px;
        font-size: 11px;
        letter-spacing: 3px;
        color: var(--gold);
        background: rgba(251, 191, 36, 0.08);
        border: 1px solid rgba(251, 191, 36, 0.3);
        border-radius: 999px;
        font-weight: 700;
        margin-bottom: 18px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .result-title {
        font-size: clamp(22px, 6vw, 44px);
        font-weight: 900;
        background: linear-gradient(
          120deg,
          var(--primary-light),
          var(--secondary-light),
          var(--accent)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.2;
        margin-bottom: 10px;
      }
      .result-sub {
        color: var(--text-muted);
        margin-bottom: 28px;
        font-size: 14px;
      }

      .result-time {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 28px 24px;
        margin-bottom: 24px;
        box-shadow: var(--shadow);
      }
      .result-time-label {
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 2.5px;
        text-transform: uppercase;
        margin-bottom: 8px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .result-time-value {
        font-size: clamp(38px, 9vw, 60px);
        font-weight: 900;
        background: linear-gradient(
          135deg,
          var(--primary-light),
          var(--secondary-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        font-feature-settings: "tnum";
        margin-bottom: 12px;
      }
      .result-time-meta {
        font-size: 12px;
        color: var(--text-dim);
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .result-time-best {
        color: var(--gold);
        font-weight: 700;
      }
      .result-time-new {
        display: inline-block;
        padding: 2px 8px;
        background: rgba(251, 191, 36, 0.15);
        border: 1px solid rgba(251, 191, 36, 0.4);
        border-radius: 4px;
        margin-left: 6px;
        color: var(--gold);
        font-size: 10.5px;
        letter-spacing: 1px;
      }

      .result-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 26px;
      }
      .result-stat {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 14px 10px;
      }
      .result-stat-num {
        font-size: 22px;
        font-weight: 800;
        color: var(--primary-light);
        font-feature-settings: "tnum";
      }
      .result-stat-label {
        font-size: 10.5px;
        color: var(--text-dim);
        letter-spacing: 1px;
        margin-top: 4px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }

      .result-comment {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 24px;
        margin-bottom: 26px;
        text-align: left;
        font-size: 14px;
        line-height: 1.75;
        color: var(--text-muted);
      }
      .result-comment strong {
        color: var(--text);
      }

      .result-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
      }
      .btn-share-x {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 14px 28px;
        background: #000;
        border: 1.5px solid #2a2a2a;
        color: #fff;
        font-size: 14px;
        font-weight: 800;
        border-radius: 999px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s;
        font-family: inherit;
      }
      .btn-share-x:hover {
        background: #111;
        border-color: #555;
        transform: translateY(-2px);
      }
      .btn-secondary {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 28px;
        background: transparent;
        color: var(--primary-light);
        font-size: 14px;
        font-weight: 800;
        border-radius: 999px;
        border: 1.5px solid var(--primary);
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }
      .btn-secondary:hover {
        background: rgba(14, 165, 233, 0.12);
        transform: translateY(-2px);
      }

      .review {
        margin-top: 36px;
        text-align: left;
      }
      .review-title {
        font-size: 14px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 16px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        text-align: center;
      }
      .review-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .review-item {
        display: flex;
        gap: 14px;
        padding: 14px 18px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        font-size: 13px;
        align-items: center;
      }
      .review-kanji {
        flex-shrink: 0;
        width: 56px;
        height: 56px;
        border-radius: 8px;
        background: var(--bg);
        border: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Noto Serif JP", "Yu Mincho", serif;
        font-weight: 800;
        color: var(--secondary-light);
      }
      .review-kanji.len-1 {
        font-size: 32px;
      }
      .review-kanji.len-2 {
        font-size: 19px;
      }
      .review-kanji.len-3,
      .review-kanji.len-4 {
        font-size: 13px;
        letter-spacing: -0.5px;
        line-height: 1.1;
      }
      .review-content {
        flex: 1;
      }
      .review-a {
        color: var(--text);
        font-weight: 700;
        font-size: 13.5px;
      }
      .review-meta {
        color: var(--text-dim);
        font-size: 11.5px;
        margin-top: 4px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .review-meta.miss {
        color: var(--danger);
      }
      .review-meta.hit {
        color: var(--success);
      }

      /* ============ Glossary（単語帳） ============ */
      .glossary-hero {
        text-align: center;
        margin-bottom: 24px;
      }
      .glossary-title {
        font-size: clamp(22px, 5vw, 34px);
        font-weight: 900;
        letter-spacing: -0.5px;
        line-height: 1.2;
        background: linear-gradient(
          120deg,
          var(--primary-light) 10%,
          var(--secondary-light) 55%,
          var(--accent) 95%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 8px;
      }
      .glossary-sub {
        color: var(--text-muted);
        font-size: 13.5px;
        max-width: 560px;
        margin: 0 auto 4px;
      }

      .glossary-filter {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-bottom: 22px;
      }
      .glossary-chip {
        padding: 7px 16px;
        background: var(--surface);
        border: 1px solid var(--line);
        color: var(--text-muted);
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        -webkit-tap-highlight-color: transparent;
      }
      .glossary-chip:hover {
        border-color: var(--primary);
        color: var(--primary-light);
      }
      .glossary-chip.active {
        background: linear-gradient(
          135deg,
          var(--secondary),
          var(--secondary-light)
        );
        border-color: var(--secondary);
        color: #1a0a02;
        box-shadow: 0 0 16px rgba(251, 146, 60, 0.4);
      }

      .glossary-section {
        margin-bottom: 32px;
      }
      .glossary-section-title {
        font-size: 13px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 14px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .glossary-section-title::before,
      .glossary-section-title::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          var(--line-strong),
          transparent
        );
      }

      .glossary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 14px;
      }
      .gloss-card {
        background: linear-gradient(160deg, var(--surface), var(--bg2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 22px;
        position: relative;
        overflow: hidden;
        transition:
          transform 0.2s,
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .gloss-card:hover {
        transform: translateY(-2px);
        border-color: var(--primary);
        box-shadow: 0 12px 32px rgba(14, 165, 233, 0.25);
      }
      .gloss-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at top right,
          rgba(251, 146, 60, 0.06),
          transparent 60%
        );
        pointer-events: none;
      }
      .gloss-head {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 14px;
        position: relative;
      }
      .gloss-kanji {
        font-family:
          "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
        font-weight: 900;
        line-height: 1;
        background: linear-gradient(
          135deg,
          var(--primary-light),
          var(--secondary-light),
          var(--accent)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        flex-shrink: 0;
        text-align: center;
        letter-spacing: 0;
        filter: drop-shadow(0 0 18px rgba(251, 146, 60, 0.18));
      }
      .gloss-kanji.len-1 {
        font-size: 64px;
        min-width: 70px;
      }
      .gloss-kanji.len-2 {
        font-size: 44px;
        min-width: 92px;
      }
      .gloss-kanji.len-3,
      .gloss-kanji.len-4 {
        font-size: 26px;
        min-width: 110px;
        letter-spacing: -0.02em;
      }
      .gloss-meta {
        flex: 1;
        min-width: 0;
      }
      .gloss-romaji {
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        color: var(--primary-light);
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
        word-break: break-word;
      }
      .gloss-kana {
        color: var(--text-dim);
        font-size: 12px;
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
        margin-bottom: 6px;
      }
      .gloss-vuln {
        display: inline-block;
        font-size: 11.5px;
        font-weight: 800;
        color: var(--secondary-light);
        background: rgba(251, 146, 60, 0.1);
        border: 1px solid rgba(251, 146, 60, 0.3);
        padding: 3px 10px;
        border-radius: 6px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
        letter-spacing: 0.3px;
      }

      .gloss-chars {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 12px;
      }
      .gloss-char {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px 4px 6px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 6px;
        font-size: 11.5px;
        color: var(--text-muted);
      }
      .gloss-char-c {
        font-family: "Noto Serif JP", "Yu Mincho", serif;
        font-weight: 800;
        color: var(--text);
        font-size: 14px;
        line-height: 1;
        padding: 2px 4px;
      }

      .gloss-literal {
        font-size: 13px;
        line-height: 1.65;
        color: var(--text-muted);
        margin-bottom: 8px;
      }
      .gloss-literal-label {
        display: inline-block;
        font-size: 10px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-right: 6px;
        font-family: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
      }
      .gloss-note {
        font-size: 12.5px;
        line-height: 1.7;
        color: var(--text-muted);
        padding-top: 10px;
        border-top: 1px dashed var(--line);
      }
      .gloss-note strong {
        color: var(--text);
      }

      .glossary-empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-dim);
      }

      .footer {
        margin-top: 60px;
        text-align: center;
        font-size: 12px;
        color: var(--text-dim);
      }
      .footer a {
        color: var(--text-muted);
        text-decoration: none;
        border-bottom: 1px dotted var(--text-dim);
      }
      .footer a:hover {
        color: var(--primary-light);
        border-color: var(--primary-light);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      @keyframes shimmer {
        0% {
          background-position: 0% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        75% {
          transform: translateX(5px);
        }
      }
      @keyframes penaltyPop {
        0% {
          transform: scale(0.8);
          opacity: 0;
        }
        40% {
          transform: scale(1.15);
          opacity: 1;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      .quiz-penalty.pop {
        animation: penaltyPop 0.5s;
      }

      @media (max-width: 560px) {
        .page {
          padding: 20px 14px 60px;
        }
        .kanji-card {
          padding: 32px 18px 28px;
        }
        .info-card,
        .diff-section {
          padding: 18px 16px;
        }
        .top-bar {
          flex-wrap: wrap;
        }
        .choice {
          padding: 14px 14px;
          gap: 12px;
        }
        .choice-key {
          width: 26px;
          height: 26px;
        }
        .feedback {
          padding: 14px 16px;
        }
        .result-stats {
          gap: 8px;
        }
        .result-stat-num {
          font-size: 18px;
        }
        .result-comment {
          padding: 16px 18px;
          font-size: 13px;
        }
        .review-item {
          padding: 12px 14px;
          font-size: 12.5px;
        }
        .btn-share-x,
        .btn-secondary {
          padding: 13px 22px;
          font-size: 13.5px;
        }
        .review-kanji {
          width: 48px;
          height: 48px;
        }
        .review-kanji.len-1 {
          font-size: 26px;
        }
        .review-kanji.len-2 {
          font-size: 16px;
        }
        /* ナビゲーションタブ */
        .nav-tabs {
          max-width: 100%;
          margin-bottom: 18px;
        }
        .nav-tab {
          padding: 8px 12px;
          font-size: 11.5px;
          letter-spacing: 0.8px;
        }
        /* Glossary 全般 */
        .glossary-grid {
          grid-template-columns: 1fr;
          gap: 10px;
        }
        .gloss-card {
          padding: 16px 16px;
        }
        .gloss-head {
          gap: 12px;
          margin-bottom: 12px;
        }
        .gloss-kanji.len-1 {
          font-size: 52px;
          min-width: 60px;
        }
        .gloss-kanji.len-2 {
          font-size: 38px;
          min-width: 78px;
        }
        .gloss-kanji.len-3,
        .gloss-kanji.len-4 {
          font-size: 22px;
          min-width: 90px;
        }
        .gloss-romaji {
          font-size: 13px;
        }
        .gloss-vuln {
          font-size: 11px;
          padding: 2px 8px;
        }
        .gloss-char {
          font-size: 11px;
        }
        .gloss-char-c {
          font-size: 13px;
        }
        .gloss-literal {
          font-size: 12.5px;
        }
        .gloss-note {
          font-size: 12px;
        }
        .glossary-section-title {
          font-size: 11.5px;
          letter-spacing: 1.5px;
          gap: 8px;
        }
        .glossary-chip {
          padding: 6px 14px;
          font-size: 11.5px;
        }
        /* クイズ画面のメタ情報 */
        .quiz-meta {
          font-size: 12px;
        }
        .quiz-timer {
          padding: 3px 10px;
          font-size: 12px;
        }
      }

      @media (max-width: 400px) {
        .page {
          padding: 18px 12px 56px;
        }
        .brand-sub {
          letter-spacing: 1px;
          font-size: 9.5px;
        }
        .hero-tag {
          letter-spacing: 1.5px;
          font-size: 10.5px;
          padding: 5px 12px;
        }
        .hero-sub {
          font-size: 13px;
        }
        .choice {
          padding: 13px 13px;
          font-size: 13.5px;
        }
        .btn-start {
          padding: 14px 28px;
          font-size: 14px;
        }
        .info-card-grid {
          gap: 12px;
        }
        .info-stat-num {
          font-size: 22px;
        }
        .result-stats {
          gap: 6px;
        }
        .result-stat {
          padding: 12px 6px;
        }
        .result-stat-num {
          font-size: 16px;
        }
        .result-stat-label {
          font-size: 9.5px;
          letter-spacing: 0.5px;
        }
        /* ナビゲーションタブ */
        .nav-tab {
          padding: 7px 10px;
          font-size: 11px;
          letter-spacing: 0.5px;
        }
        /* Glossary 細部調整 */
        .gloss-card {
          padding: 14px 14px;
        }
        .gloss-head {
          gap: 10px;
        }
        .gloss-kanji.len-1 {
          font-size: 44px;
          min-width: 52px;
        }
        .gloss-kanji.len-2 {
          font-size: 30px;
          min-width: 66px;
        }
        .gloss-kanji.len-3,
        .gloss-kanji.len-4 {
          font-size: 18px;
          min-width: 76px;
        }
        .gloss-chars {
          gap: 4px;
        }
        .gloss-char {
          padding: 3px 8px 3px 5px;
          font-size: 10.5px;
        }
        .gloss-char-c {
          font-size: 12px;
        }
        .gloss-literal {
          font-size: 12px;
        }
        .gloss-literal-label {
          font-size: 9.5px;
          letter-spacing: 1px;
        }
        .gloss-note {
          font-size: 11.5px;
          line-height: 1.6;
        }
        .glossary-title {
          font-size: 22px;
        }
        .glossary-sub {
          font-size: 12.5px;
        }
        .glossary-filter {
          gap: 6px;
        }
        .glossary-chip {
          padding: 5px 11px;
          font-size: 11px;
          letter-spacing: 0.3px;
        }
        .glossary-section-title {
          font-size: 11px;
          letter-spacing: 1.2px;
        }
        /* クイズ画面：超狭幅対応 */
        .quiz-meta {
          font-size: 11.5px;
        }
        .quiz-counter strong {
          font-size: 14px;
        }
        .quiz-timer {
          padding: 3px 8px;
          font-size: 11px;
        }
        .quiz-penalty {
          font-size: 10.5px;
          padding: 3px 8px;
        }
        /* 結果画面 */

      const POOL = JSON.parse(_decB64(_POOL_BLOB));

      /* =========================================================
         状態
         ========================================================= */
      let lang = "ja";
      try {
        const stored = localStorage.getItem("bug_kanji_lang");
        if (stored === "ja" || stored === "en") lang = stored;
      } catch (e) {}

      let difficulty = "easy";
      let quizSet = []; // 出題セット（10問）
      let qIndex = 0;
      let answered = false;
      let attempts = []; // 各問題の誤答数
      let totalMisses = 0;
      let startTime = 0;
      let endTime = 0;
      let timerHandle = null;

      const QUESTIONS_PER_RUN = 10;

      function t(key) {
        return I18N[lang][key] !== undefined ? I18N[lang][key] : key;
      }

      function getDifficultyLabel(d) {
        if (d === "easy") return t("diffEasy");
        if (d === "hard") return t("diffHard");
        if (d === "extreme") return t("diffExtreme");
        return t("diffMixed");
      }

      function pickRandom(arr, n) {
        const copy = arr.slice();
        for (let i = copy.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy.slice(0, n);
      }

      function buildQuizSet(diff) {
        let pool;
        if (diff === "mixed") {
          pool = POOL.easy.concat(POOL.hard).concat(POOL.extreme);
        } else {
          pool = POOL[diff];
        }
        const picked = pickRandom(
          pool,
          Math.min(QUESTIONS_PER_RUN, pool.length),
        );
        // 各問題の選択肢を組み立て＆シャッフル
        return picked.map((q) => {
          const opts = [q.a].concat(q.w).slice(0, 4);
          // シャッフル
          for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
          }
          return {
            kanji: q.kanji,
            options: opts,
            correctKey: q.a,
            ex: q.ex,
          };
        });
      }

      function bestTimeKey(diff) {
        return "bug_kanji_best_" + diff;
      }

      function getBestTime(diff) {
        try {
          const v = localStorage.getItem(bestTimeKey(diff));
          if (v == null) return null;
          const n = Number(v);
          return Number.isFinite(n) && n > 0 ? n : null;
        } catch (e) {
          return null;
        }
      }

      function setBestTime(diff, ms) {
        try {
          localStorage.setItem(bestTimeKey(diff), String(ms));
        } catch (e) {}
      }

      function formatTime(ms) {
        if (ms == null || !Number.isFinite(ms)) return "--:--";
        const total = Math.max(0, Math.floor(ms));
        const m = Math.floor(total / 60000);
        const s = Math.floor((total % 60000) / 1000);
        const d = Math.floor((total % 1000) / 100);
        const mm = String(m).padStart(2, "0");
        const ss = String(s).padStart(2, "0");
        return mm + ":" + ss + "." + d;
      }

      /* =========================================================
         I18N 適用
         ========================================================= */
      function applyI18n() {
        document.documentElement.lang = lang;

        document.getElementById("brand-name").textContent = t("brandName");
        document.getElementById("tab-quiz").textContent = t("tabQuiz");
        document.getElementById("tab-glossary").textContent = t("tabGlossary");
        document.getElementById("hero-tag-text").textContent = t("heroTag");
        document.getElementById("hero-title").textContent = t("heroTitle");
        document.getElementById("hero-sub").textContent = t("heroSub");

        document.getElementById("glossary-title").textContent =
          t("glossaryTitle");
        document.getElementById("glossary-sub").textContent = t("glossarySub");

        document.getElementById("stat-label-q").textContent =

        document.getElementById("stat-label-p").textContent = t("statPenalty");
        document.getElementById("stat-label-f").textContent = t("statFormat");
        document.getElementById("stat-label-r").textContent = t("statRank");

        document.getElementById("diff-title").textContent = t("diffTitle");
        renderDifficultyCards();

          t("bestTimeLabel");
        updateBestTimeDisplay();

        document.getElementById("btn-start-text").textContent = t("startBtn");
        document.getElementById("start-note").textContent = t("startNote");

        document.getElementById("qm-q-label").textContent = t("quizQ");

        document.getElementById("stat-lbl-penalty").textContent =
          t("resultPenalty");
        document.getElementById("btn-share-text").textContent =
          t("resultShare");
        document.getElementById("btn-retry-text").textContent =
          t("resultRetry");
        document.getElementById("review-title").textContent = t("resultReview");
        document.getElementById("footer-by").textContent = t("footerBy");
      }

      function renderDifficultyCards() {
        const grid = document.getElementById("diff-grid");
        grid.textContent = "";
        const diffs = [
          { key: "easy", name: t("diffEasy"), sub: t("diffEasySub") },
          { key: "hard", name: t("diffHard"), sub: t("diffHardSub") },
          { key: "extreme", name: t("diffExtreme"), sub: t("diffExtremeSub") },
          { key: "mixed", name: t("diffMixed"), sub: t("diffMixedSub") },
        ];
        diffs.forEach((d) => {
          const card = document.createElement("button");
          card.className =
            "diff-card" + (d.key === difficulty ? " active" : "");
          card.type = "button";
          card.dataset.diff = d.key;

          const name = document.createElement("div");
          name.className = "diff-card-name";
          name.textContent = d.name;
          const sub = document.createElement("div");
          sub.className = "diff-card-sub";
          sub.textContent = d.sub;

          card.appendChild(name);
          card.appendChild(sub);
          card.addEventListener("click", () => {
            difficulty = d.key;
            renderDifficultyCards();
            updateBestTimeDisplay();
          });
          grid.appendChild(card);
        });
      }

      function updateBestTimeDisplay() {
        const ms = getBestTime(difficulty);
        document.getElementById("best-time-value").textContent =
          ms == null ? "--:--.-" : formatTime(ms);
      }

      function updateLangPill() {
        const pill = document.getElementById("lang-pill");
        const buttons = document.querySelectorAll(".lang-toggle button");
        const active = document.querySelector(
          '.lang-toggle button[data-lang="' + lang + '"]',
        );
        if (!active || !pill) return;
        buttons.forEach((b) => b.classList.toggle("active", b === active));
        pill.style.width = active.offsetWidth + "px";
        pill.style.transform = "translateX(" + (active.offsetLeft - 3) + "px)";
      }

      function setLanguage(next) {
        if (lang === next) return;
        lang = next;
        try {
          localStorage.setItem("bug_kanji_lang", lang);
        } catch (e) {}
        applyI18n();
        updateLangPill();
        if (
          document.getElementById("screen-quiz").classList.contains("active")
        ) {
          renderQuestion();
        }
        if (
          document.getElementById("screen-result").classList.contains("active")
        ) {
          renderResult();
        }
        if (
          document
            .getElementById("screen-glossary")
            .classList.contains("active")
        ) {
          renderGlossary();
        }
      }

      /* =========================================================
         ナビゲーションタブ（Quiz / Glossary）
         ========================================================= */
      let glossaryFilter = "all";

      function showTab(tab) {
        document
          .querySelectorAll(".nav-tab")
          .forEach((b) => b.classList.toggle("active", b.dataset.tab === tab));
        if (tab === "glossary") {
          showScreen("screen-glossary");
          renderGlossary();
        } else {
          // クイズタブ：進行中のタイマーを止めてスタート画面へ戻す
          if (timerHandle) {
            clearInterval(timerHandle);
            timerHandle = null;
          }
          showScreen("screen-start");
          updateBestTimeDisplay();
        }
      }

      function renderGlossary() {
        const filterEl = document.getElementById("glossary-filter");
        filterEl.textContent = "";
        const chips = [
          { k: "all", label: t("glossaryAll") },
          { k: "easy", label: t("diffEasy") },
          { k: "hard", label: t("diffHard") },
          { k: "extreme", label: t("diffExtreme") },
        ];
        chips.forEach((c) => {
          const chip = document.createElement("button");
          chip.className =
            "glossary-chip" + (c.k === glossaryFilter ? " active" : "");
          chip.type = "button";
          chip.textContent = c.label;
          chip.addEventListener("click", () => {
            glossaryFilter = c.k;
            renderGlossary();
          });
          filterEl.appendChild(chip);
        });

        const bodyEl = document.getElementById("glossary-body");
        bodyEl.textContent = "";

        const sections = [
          { k: "easy", title: t("glossarySectionEasy"), items: POOL.easy },
          { k: "hard", title: t("glossarySectionHard"), items: POOL.hard },
          {
            k: "extreme",
            title: t("glossarySectionExtreme"),
            items: POOL.extreme,
          },
        ];

        sections.forEach((sec) => {
          if (glossaryFilter !== "all" && glossaryFilter !== sec.k) return;

          const secEl = document.createElement("div");
          secEl.className = "glossary-section";

          const titleEl = document.createElement("div");
          titleEl.className = "glossary-section-title";
          const titleText = document.createElement("span");
          titleText.textContent = sec.title;
          titleEl.appendChild(titleText);
          secEl.appendChild(titleEl);

          const grid = document.createElement("div");
          grid.className = "glossary-grid";

          sec.items.forEach((item) => {
            grid.appendChild(renderGlossCard(item));
          });

          secEl.appendChild(grid);
          bodyEl.appendChild(secEl);
        });
      }

      function renderGlossCard(item) {
        const info = KANJI_INFO[item.kanji];
        const card = document.createElement("div");
        card.className = "gloss-card";

        const head = document.createElement("div");
        head.className = "gloss-head";

        const kanjiEl = document.createElement("div");
        const len = [...item.kanji].length;
        kanjiEl.className = "gloss-kanji len-" + Math.min(Math.max(len, 1), 4);
        kanjiEl.textContent = item.kanji;

        const meta = document.createElement("div");
        meta.className = "gloss-meta";

        if (info) {
          const romaji = document.createElement("div");
          romaji.className = "gloss-romaji";
          romaji.textContent = info.r;
          meta.appendChild(romaji);

          const kana = document.createElement("div");
          kana.className = "gloss-kana";
          kana.textContent = info.k;
          meta.appendChild(kana);
        }

        const vuln = document.createElement("span");
        vuln.className = "gloss-vuln";
        vuln.textContent = VULN[item.a].en;
        meta.appendChild(vuln);

        head.appendChild(kanjiEl);
        head.appendChild(meta);
        card.appendChild(head);

        if (info && info.c) {
          const charsEl = document.createElement("div");
          charsEl.className = "gloss-chars";
          info.c.forEach((pair) => {
            const ch = document.createElement("span");
            ch.className = "gloss-char";
            const charC = document.createElement("span");
            charC.className = "gloss-char-c";
            charC.textContent = pair[0];
            const charM = document.createElement("span");
            charM.textContent = pair[1];
            ch.appendChild(charC);
            ch.appendChild(charM);
            charsEl.appendChild(ch);
          });
          card.appendChild(charsEl);
        }

        if (info && info.lit) {
          const litEl = document.createElement("div");
          litEl.className = "gloss-literal";
          const label = document.createElement("span");
          label.className = "gloss-literal-label";
          label.textContent = t("glossaryLiteral");
          litEl.appendChild(label);
          litEl.appendChild(document.createTextNode(info.lit));
          card.appendChild(litEl);
        }

        const noteEl = document.createElement("div");
        noteEl.className = "gloss-note";
        noteEl.textContent = item.ex[lang];
        card.appendChild(noteEl);

        if (info && info.note) {
          const subNote = document.createElement("div");
          subNote.className = "gloss-note";
          subNote.style.fontStyle = "italic";
          subNote.style.color = "var(--text-dim)";
          subNote.textContent = "※ " + info.note;
          card.appendChild(subNote);
        }

        return card;
      }

      function showScreen(id) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      /* =========================================================
         クイズ進行
         ========================================================= */
      function startQuiz() {
        quizSet = buildQuizSet(difficulty);
        if (quizSet.length === 0) return;
        qIndex = 0;
        answered = false;
        attempts = new Array(quizSet.length).fill(0);
        totalMisses = 0;
        document.getElementById("q-total").textContent = quizSet.length;

        startTime = performance.now();
        endTime = 0;
        clearInterval(timerHandle);
        timerHandle = setInterval(updateTimer, 100);
        updateTimer();

        showScreen("screen-quiz");
        renderQuestion();
      }

      function elapsedMs() {
        const base = (endTime || performance.now()) - startTime;
        return base + totalMisses * PENALTY_PER_MISS_MS;
      }

      function updateTimer() {
        document.getElementById("quiz-timer").textContent =
          "⏱ " + formatTime(elapsedMs());
      }

      function renderQuestion() {
        const item = quizSet[qIndex];
        answered = false;

        document.getElementById("q-current").textContent = qIndex + 1;

        const pct = (qIndex / quizSet.length) * 100;
        document.getElementById("progress-fill").style.width = pct + "%";

        const display = document.getElementById("kanji-display");
        const len = [...item.kanji].length;
        display.className =
          "kanji-display len-" + Math.min(Math.max(len, 1), 4);
        display.textContent = item.kanji;

        document.getElementById("kanji-prompt").textContent = t("quizPrompt");

        const choicesEl = document.getElementById("choices");
        choicesEl.textContent = "";
        const keys = ["A", "B", "C", "D"];

        item.options.forEach((optKey, idx) => {
          const btn = document.createElement("button");
          btn.className = "choice";
          btn.type = "button";
          btn.dataset.optKey = optKey;

          const key = document.createElement("span");
          key.className = "choice-key";
          key.textContent = keys[idx];

          const text = document.createElement("span");
          text.className = "choice-text";
          text.textContent = VULN[optKey][lang];

          const icon = document.createElement("span");
          icon.className = "choice-icon";
          icon.setAttribute("aria-hidden", "true");

          btn.appendChild(key);
          btn.appendChild(text);
          btn.appendChild(icon);

          btn.addEventListener("click", () => onAnswer(btn, optKey));
          choicesEl.appendChild(btn);
        });

        document.getElementById("feedback-area").textContent = "";
        document.getElementById("btn-next").style.display = "none";

        const penaltyEl = document.getElementById("quiz-penalty");
        penaltyEl.classList.remove("show", "pop");
        penaltyEl.textContent = "";
      }

      function onAnswer(btn, optKey) {
        if (answered) return;
        const item = quizSet[qIndex];
        const correctKey = item.correctKey;

        if (optKey === correctKey) {
          // 正解
          answered = true;
          btn.classList.add("correct");
          const icon = btn.querySelector(".choice-icon");
          icon.textContent = "✓";
          // 全選択肢 disable + dim
          document.querySelectorAll(".choice").forEach((b) => {
            b.disabled = true;
            if (b !== btn) b.classList.add("dim");
          });
          showFeedback();
        } else {
          // 不正解：そのボタンだけ wrong + disable、ペナルティ +5s
          btn.classList.add("wrong");
          btn.disabled = true;
          const icon = btn.querySelector(".choice-icon");
          icon.textContent = "✕";
          attempts[qIndex] += 1;
          totalMisses += 1;
          flashPenalty();
          updateTimer();
        }
      }

      function flashPenalty() {
        const el = document.getElementById("quiz-penalty");
        // 累計ペナルティ秒を表示（誤答ごとに +5 秒ずつ加算）
        const totalPenaltySec = (totalMisses * PENALTY_PER_MISS_MS) / 1000;
        el.textContent = "+" + totalPenaltySec + "s";
        el.classList.add("show");
        el.classList.remove("pop");
        // 強制再描画してアニメ再起動
        void el.offsetWidth;
        el.classList.add("pop");
      }

      function showFeedback() {
        const item = quizSet[qIndex];
        const fb = document.createElement("div");
        fb.className = "feedback";

        const title = document.createElement("div");
        title.className = "feedback-title";
        title.textContent = "✓ " + t("quizCorrect");
        fb.appendChild(title);

        const body = document.createElement("div");
        body.className = "feedback-body";
        body.textContent = item.ex[lang];
        fb.appendChild(body);

        const fbArea = document.getElementById("feedback-area");
        fbArea.textContent = "";
        fbArea.appendChild(fb);

        const nextBtn = document.getElementById("btn-next");
        nextBtn.textContent =
          qIndex >= quizSet.length - 1 ? t("quizLast") : t("quizNext");
        nextBtn.style.display = "flex";
        nextBtn.onclick = onNext;
      }

      function onNext() {
        if (qIndex >= quizSet.length - 1) {
          finishQuiz();
        } else {
          qIndex++;
          renderQuestion();
        }
      }

      /* =========================================================
         結果
         ========================================================= */
      function finishQuiz() {
        endTime = performance.now();
        clearInterval(timerHandle);
        timerHandle = null;
        document.getElementById("progress-fill").style.width = "100%";
        renderResult();
        showScreen("screen-result");
      }

      function getRank(ms) {
        // 10 問・標準: S < 60s, A < 90s, B < 120s, C >= 120s
        if (ms < 60000) {
          return {
            tag: "★ S RANK · ELITE HUNTER",
            title:
              lang === "ja" ? "Sランク・エリート" : "S Rank · Elite Hunter",
            sub:
              lang === "ja"
                ? "脆弱性を漢字で見抜く達人。"
                : "A master at reading vulnerabilities through kanji.",
            comment:
              lang === "ja"
                ? "60 秒切りは反射の世界。脆弱性カテゴリの「本質」を漢字レベルで内在化している証。誤答ペナルティすら気にせず、瞬間判断で押し切れています。次は誤答ゼロ・タイムさらに短縮を狙ってみてください。"
                : "Sub-60s means you're operating on reflex. You've internalized vuln categories at the kanji level. Aim for zero misses and a tighter time next.",
          };
        }
        if (ms < 90000) {
          return {
            tag: "★ A RANK · SENIOR HUNTER",
            title: lang === "ja" ? "Aランク・シニア" : "A Rank · Senior Hunter",
            sub:
              lang === "ja"
                ? "業界の主要脆弱性は確実に押さえています。"
                : "You've got the major vuln classes locked down.",
            comment:
              lang === "ja"
                ? "業務でバグハンティングをする上で十分な反応速度。漢字の語感とカテゴリ名がほぼ 1:1 で結びついている状態です。難易度を Hard / Extreme に上げて、亜種（Blind 系・タイムベース等）まで踏み込むと S が見えてきます。"
                : "You read kanji and category names almost 1:1. Push to Hard/Extreme to add variants (Blind, Time-based, etc.) and S is within reach.",
          };
        }
        if (ms < 120000) {
          return {
            tag: "★ B RANK · JUNIOR HUNTER",
            title:
              lang === "ja" ? "Bランク・ジュニア" : "B Rank · Junior Hunter",
            sub:
              lang === "ja"
                ? "基礎は固まりつつあります。"
                : "Solid foundation in place.",
            comment:
              lang === "ja"
                ? "迷う問題があると 120 秒の壁が見えてきます。誤答ペナルティを抑える＝即答できる脆弱性を増やすことが時間短縮の近道。レビュー欄で誤答した漢字を見直してみましょう。"
                : "Sub-120s with hesitation. The fastest path is reducing misses — review the kanji you missed below.",
          };
        }
        return {
          tag: "★ C RANK · ROOKIE",
          title: lang === "ja" ? "Cランク・ルーキー" : "C Rank · Rookie",
          sub:
            lang === "ja"
              ? "ここから伸びる時期です。"
              : "Plenty of room to grow.",
          comment:
            lang === "ja"
              ? "脆弱性カテゴリの「漢字イメージ」を整理することで一気に伸びます。Easy → Hard → Extreme と段階を踏むのがおすすめ。バグバウンティの主要カテゴリ（Injection・XSS・IDOR・SSRF・認証回避）から固めましょう。"
              : "Mapping each kanji to a category will boost you fast. Climb Easy → Hard → Extreme; start with Injection, XSS, IDOR, SSRF, Auth Bypass.",
        };
      }

      function renderResult() {
        const totalMs = elapsedMs();
        const correctCount = quizSet.length;
        const penaltySec = (totalMisses * PENALTY_PER_MISS_MS) / 1000;
        const cleanCount = attempts.filter((a) => a === 0).length;

        const rank = getRank(totalMs);
        document.getElementById("result-rank").textContent = rank.tag;
        document.getElementById("result-title").textContent = rank.title;
        document.getElementById("result-sub").textContent = rank.sub;
        document.getElementById("result-time-value").textContent =
          formatTime(totalMs);

        // ベストタイムの更新判定
        const prevBest = getBestTime(difficulty);
        let isNewBest = false;
        if (prevBest == null || totalMs < prevBest) {
          setBestTime(difficulty, totalMs);
          isNewBest = true;
        }
        const meta = document.getElementById("result-time-meta");
        meta.textContent = "";
        if (prevBest == null) {
          meta.textContent = "★ " + t("resultMetaFirst");
          meta.style.color = "var(--gold)";
        } else if (isNewBest) {
          const baseSpan = document.createElement("span");
          baseSpan.className = "result-time-best";
          baseSpan.textContent =
            t("resultMetaBest") + ": " + formatTime(prevBest);
          const newSpan = document.createElement("span");
          newSpan.className = "result-time-new";
          newSpan.textContent = t("resultMetaNew");
          meta.appendChild(baseSpan);
          meta.appendChild(newSpan);
        } else {
          const baseSpan = document.createElement("span");
          baseSpan.className = "result-time-best";
          baseSpan.textContent =
            t("resultMetaBest") + ": " + formatTime(prevBest);
          meta.appendChild(baseSpan);
        }

        document.getElementById("stat-correct").textContent = correctCount;
        document.getElementById("stat-misses").textContent = totalMisses;
        document.getElementById("stat-penalty").textContent =
          "+" + penaltySec + "s";

        document.getElementById("result-comment").textContent = rank.comment;

        // レビュー
        const reviewGrid = document.getElementById("review-grid");
        reviewGrid.textContent = "";
        quizSet.forEach((item, i) => {
          const miss = attempts[i] || 0;
          const row = document.createElement("div");
          row.className = "review-item";

          const len = [...item.kanji].length;
          const kanjiBox = document.createElement("div");
          kanjiBox.className =
            "review-kanji len-" + Math.min(Math.max(len, 1), 4);
          kanjiBox.textContent = item.kanji;

          const content = document.createElement("div");
          content.className = "review-content";

          const aLine = document.createElement("div");
          aLine.className = "review-a";
          aLine.textContent = VULN[item.correctKey][lang];
          content.appendChild(aLine);

          const metaLine = document.createElement("div");
          metaLine.className = "review-meta " + (miss === 0 ? "hit" : "miss");
          if (miss === 0) {
            metaLine.textContent = "✓ " + t("resultClean");
          } else {
            metaLine.textContent =
              "✕ " + t("resultMissed") + miss + t("resultMissTimes");
          }
          content.appendChild(metaLine);

          row.appendChild(kanjiBox);
          row.appendChild(content);
          reviewGrid.appendChild(row);
        });
      }

      /* =========================================================
         X (Twitter) シェア
         ========================================================= */
      // 経過時間からランクキー（share/{key}/ パスに使う）を返す
      function getRankKey(ms) {
        if (ms < 60000) return "s";
        if (ms < 90000) return "a";
        if (ms < 120000) return "b";
        return "c";
      }

      function onShare() {
        const ms = elapsedMs();
        const timeStr = formatTime(ms);
        const rank = getRank(ms);
        // ランクのプレフィックス（例: 「S RANK」）抽出
        const rankShort = rank.tag.replace(/^★\s*/, "").split("·")[0].trim();
        const text = I18N[lang].shareText(
          timeStr,
          rankShort,
          getDifficultyLabel(difficulty),
        );
        // ランクに応じたシェアページを向き先にする（OGP がランクごとに焼ける）。
        // share/<rank>/index.html は事前に静的生成されている。
        const rankKey = getRankKey(ms);
        const base = location.href.split("#")[0].replace(/[^/]*$/, "");
        const url = base + "share/" + rankKey + "/";
        const intent =
          "https://x.com/intent/tweet?text=" +
          encodeURIComponent(text) +
          "&url=" +
          encodeURIComponent(url);
        window.open(intent, "_blank", "noopener,noreferrer");
      }

      /* =========================================================
         イベントバインド
         ========================================================= */
      document.querySelectorAll(".lang-toggle button").forEach((btn) => {
        btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
      });
      document.querySelectorAll(".nav-tab").forEach((btn) => {
        btn.addEventListener("click", () => showTab(btn.dataset.tab));
      });
      document.getElementById("btn-start").addEventListener("click", startQuiz);
      document.getElementById("btn-share").addEventListener("click", onShare);
      document.getElementById("btn-retry").addEventListener("click", () => {
        showScreen("screen-start");
        updateBestTimeDisplay();
      });

      /* =========================================================
         パーティクル背景
         ========================================================= */
      (function initParticles() {
        const canvas = document.getElementById("particles");
        const ctx = canvas.getContext("2d");
        let w = 0;
        let h = 0;
        let particles = [];
        const reduce =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        function resize() {
          w = canvas.width = window.innerWidth;
          h = canvas.height = window.innerHeight;
        }

        function create() {
          particles = [];
          const count = Math.max(28, Math.floor((w * h) / 32000));
          for (let i = 0; i < count; i++) {
            particles.push({
              x: Math.random() * w,
              y: Math.random() * h,
              r: Math.random() * 1.6 + 0.4,
              vx: (Math.random() - 0.5) * 0.18,
              vy: (Math.random() - 0.5) * 0.18,
              alpha: Math.random() * 0.5 + 0.15,
              hue: Math.random() < 0.5 ? "14, 165, 233" : "251, 146, 60",
            });
          }
        }

        function draw() {
          ctx.clearRect(0, 0, w, h);
          for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(" + p.hue + ", " + p.alpha + ")";
            ctx.fill();
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0) p.x = w;
            if (p.x > w) p.x = 0;
            if (p.y < 0) p.y = h;
            if (p.y > h) p.y = 0;
          }
          if (!reduce) requestAnimationFrame(draw);
        }

        resize();
        create();
        draw();
        window.addEventListener("resize", () => {
          resize();
          create();
        });
      })();

      /* =========================================================
         初期化
         ========================================================= */
      applyI18n();
      requestAnimationFrame(updateLangPill);
      window.addEventListener("resize", updateLangPill);
    </script>
  </body>
