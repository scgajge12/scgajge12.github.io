theme = "gokarna"

# Automatically generate robots.txt
enableRobotsTXT = true

# Google Analytics 4 測定ID（Hugo内部テンプレート用）
googleAnalytics = "G-5RYW8BSKQ2"

[params]
  footer = "scgajge12"
  description = "Security Engineer and Bug Hunter"
  avatarURL = "/images/morioka12.jpg"
  AvatarAltText = "avatar"
  avatarSize = "size-m"
  accentColor = "#38b48b"
  togglePreviousAndNextButtons = "true"
  customHeadHTML = """
    <!-- ポートフォリオ向け追加スタイル -->
    <link rel="stylesheet" type="text/css" href="/css/portfolio.css">
    <!-- ダークテーマの切替を data-pf-theme に同期（カードのカラー追従用） -->
    <script>
      (function() {
        function syncPfTheme() {
          var link = document.getElementById('dark-theme');
          if (!link) return;
          // theme.js は dark時に link を有効化、light時に disabled=true
          var isDark = !link.disabled;
          document.documentElement.setAttribute('data-pf-theme', isDark ? 'dark' : 'light');
        }
        // 初期同期
        document.addEventListener('DOMContentLoaded', function() {
          syncPfTheme();
          var link = document.getElementById('dark-theme');
          if (!link) return;
          // disabled属性の変化を監視してリアルタイム反映
          new MutationObserver(syncPfTheme).observe(link, { attributes: true, attributeFilter: ['disabled'] });
        });
      })();
    </script>
  """
  socialIcons = [
    {name = "twitter", url = "https://twitter.com/scgajge12"},
    {name = "github", url = "https://github.com/scgajge12"},
